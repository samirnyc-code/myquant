rts"}, {"id": "l_management_87", "theme": "management", "teaching": "A protective-stop hit before reaching a scalper's profit means you were trapped; reversing on the stop can be a good strategy, but only when the context supports it (e.g., failed pullback in a trend) — a stop run inside a Tight Trading Range is not a reversal signal.", "quote": "When a protective stop is hit before making a scalper's profit, you were trapped, so reversing on the stop is occasionally a good strategy. This depends on the context.", "pages": "308-309", "book": "Reading Price Charts"}, {"id": "l_management_88", "theme": "management", "teaching": "When bars are unusually large (e.g., first hour, volatile days), quickly cut position size (half to two-thirds) rather than doing exact math — speed of decision matters more than precision.", "quote": "Just quickly cut the position size in half or two-thirds. It doesn't matter what you do; what matters is that you do it quickly, stop thinking about it, and concentrate on what is much more important: reading correctly and placing your orders.", "pages": "315", "book": "Reading Price Charts"}, {"id": "l_management_89", "theme": "management", "teaching": "Because the high or low of the day often forms in the first hour, swing part of any trade that could be a major extreme, using a breakeven stop to capture potential windfall profit.", "quote": "A final important difference is that the high or low of the day occurs in the first hour on most days, so it is critical to swing part of any trade that could be a major high or low, and use a breakeven stop to allow yourself to collect the windfall profits that often happen off the open.", "pages": "315-316", "book": "Reading Price Charts"}, {"id": "l_management_90", "theme": "management", "teaching": "When the entry setup bar's protective stop is not hit, a smart trader stays with the trade rather than taking a small opposite scalp, especially on a strong trend day.", "quote": "smart traders are holding short on a bear trend day.", "pages": "332", "book": "Reading Price Charts"}, {"id": "l_management_91", "theme": "management", "teaching": "Always swing part of every trade in the first hour, even accepting some stop-outs on the swing portion, because one good swing trade can be worth as much as ten scalps.", "quote": "One good swing trade can be as profitable as 10 scalps, so don't give up until it is clear that the day will not trend.", "pages": "330", "book": "Reading Price Charts"}, {"id": "l_management_92", "theme": "management", "teaching": "On a trade that could mark the day's high/low, take partial profits (a third to a half) once price has run 2-3x the initial risk; if a strong trendline break pauses as if reversing into a test, trim a bit more (e.g. a quarter); hold the rest until a clear strong opposite signal or a breakeven stop hit. Add to the position at every With Trend setup and mostly scalp those adds.", "quote": "swing all of the position and take partial profits on a third to a half after the trade has run two to three times your initial risk... Look to add to your position at every With Trend setup, like a two-legged pullback to the EMA in a strong trend.", "pages": "340", "book": "Reading Price Charts"}, {"id": "l_management_93", "theme": "management", "teaching": "On any trade that could be a major reversal, it's imperative to swing part of the position with a breakeven stop after scalping out part of it.", "quote": "Whenever a trade could be a major reversal, it is imperative to swing part with a breakeven stop after scalping out of some of the position.", "pages": "360", "book": "Reading Price Charts"}, {"id": "l_management_94", "theme": "management", "teaching": "New traders/new approaches should start at no more than two contracts regardless of account size, and only scale up after several consecutive weeks of consistent profit.", "quote": "When he begins to trade, he should not trade more than two contracts, no matter how large his account is. Only after consistently making a profit for several weeks should he begin to increase his position size.", "pages": "355", "book": "Reading Price Charts"}, {"id": "l_management_95", "theme": "management", "teaching": "Always let at least a quarter of a position run with a breakeven stop (or until a clear strong opposite signal), because trends last much further than a trader expects; likewise, always swing part of a position after a major reversal — a single swing entry usually earns more than many small scalps, even accounting for occasional breakeven stop-outs.", "quote": "always let at least a quarter of your position run with a breakeven stop or until there is a clear and strong opposite signal because trends last much further than you would ever think possible.", "pages": "357, 361", "book": "Reading Price Charts"}, {"id": "l_management_96", "theme": "management", "teaching": "On huge-range days, it is especially important to swing part of every position with a breakeven stop, since swings of 20+ points can occur and getting stopped at breakeven once or twice before the trend accelerates is normal and expected.", "quote": "on huge days like this, it is very important to swing part of your position and rely on a breakeven stop because there were many swings of 20 points or more... it is common for the market to hit breakeven stops a couple times before the trend accelerates upward.", "pages": "366-367", "book": "Reading Price Charts"}, {"id": "l_management_97", "theme": "management", "teaching": "Successful intraday stock trading can be reduced to three trade types: EMA pullbacks in strong trends, clear/strong reversals after major trendline breaks, and first-hour failed breakouts/breakout pullbacks of prior-day patterns.", "quote": "Trading stocks on a 5-minute chart is fairly easy if you limit yourself to three types of trades: EMA pullbacks in strong trends, clear and strong reversals after major trendline breaks, and first hour failed breakouts and breakout pullbacks of patterns from the prior day.", "pages": "374", "book": "Reading Price Charts"}, {"id": "l_management_98", "theme": "management", "teaching": "Don't move a protective stop to breakeven too early; wait until roughly 60-80 cents (scaled to instrument) of open profit has accrued so the trade has time to work.", "quote": "Typically, you should not move your stop to breakeven until there has been about 60 to 80 cents of open profit.", "pages": "401", "book": "Reading Price Charts"}, {"id": "l_management_99", "theme": "management", "teaching": "Standard execution template: enter on a stop on the 5-minute chart, scale out (all or some) at a limit-order profit target, then move the stop on any remainder to breakeven.", "quote": "Begin trading using a 5-minute chart and entering on a stop. Take some or all off on a limit order at a profit target, and then move the protective stop to breakeven on any remaining contracts.", "pages": "408", "book": "Reading Price Charts"}, {"id": "l_management_100", "theme": "management", "teaching": "Focus on growing position size on your proven best setups rather than increasing trade frequency or the variety of setups traded; even one point per day in the Emini scaled to 100 contracts is a seven-figure annual result.", "quote": "Work on increasing your position size rather than on the number of trades or the variety of setups that you use. You only need to make one point in the Eminis a day to do well (100 contracts at 1 point a day is seven figures a year).", "pages": "412", "book": "Reading Price Charts"}, {"id": "l_management_101", "theme": "management", "teaching": "A scalp trade, because the profit target is smaller than the risk (often <4 points in the Emini), mathematically requires winning at least ~70% of the time to be worthwhile — an unrealistic hit rate for most traders, so traders should generally only take trades where reward is at least as large as risk unless they are extremely skilled.", "quote": "Since the profit is often smaller than the risk, a trader has to win at least 70 percent of the time, which is an unrealistic goal for most traders. Traders should take trades only where the potential reward is at least as great as the risk unless they are extremely skilled.", "pages": "14", "book": "Reversals"}, {"id": "l_management_102", "theme": "management", "teaching": "A setup only qualifies as 'reasonable'/'tradable' if it has a favorable trader's equation and at least a reasonable chance of reaching a scalper's profit — not every pattern recognized on the chart is worth risking capital on.", "quote": "reasonable A setup with a favorable trader's equation. / tradable A setup that you believe has a reasonable chance of leading to at least a scalper's profit.", "pages": "13, 15", "book": "Reversals"}, {"id": "l_management_103", "theme": "management", "teaching": "As a trend extends, traders should trail their protective stop progressively (e.g., raise it to just below the most recent higher low in a bull trend) to lock in more open profit as the trade works.", "quote": "trailing a stop As the trade becomes increasingly profitable, traders will often move, or trail, the protective stop to protect more of their open profit. For example, if they are long in a bull trend, every time the market moves to a new high, they might raise the protective stop to just below the most recent higher low.", "pages": "15", "book": "Reversals"}, {"id": "l_management_104", "theme": "management", "teaching": "A true reversal trade differs from a countertrend scalp: reversal trades justify swinging most of the position because the potential move is large and uncertain in advance, while range/pullback conditions favor scalping for consistent smaller profits.", "quote": "In a true trend reversal, the new trend can go a long way and traders should swing most of their position... in a trading range, traders will usually make more money if they look for scalps rather than swings.", "pages": "37", "book": "Reversals"}, {"id": "l_management_105", "theme": "management", "teaching": "The theoretically 'ideal' stop for a swing reversal trade must sit beyond the start of the most recent countertrend spike (below the most recent higher low in a bull, above the most recent lower high in a bear), which can be far away — explaining why high-reward reversal trades have poor apparent probability/risk at the outset.", "quote": "The theoretically ideal stop for a swing trade goes beyond the start of the most recent spike (below the most recent higher low in a bull or above the most recent lower high in a bear, which can be far away).", "pages": "37", "book": "Reversals"}, {"id": "l_management_106", "theme": "management", "teaching": "Consecutive buy climaxes (progressively shrinking bull bodies, little pullback) are unsustainable and typically require a protracted correction of at least two legs and 10+ bars; the third consecutive buy climax especially signals an impending correction (mirror for sell climaxes).", "quote": "Consecutive buy climaxes usually are followed by a protracted correction that has at least two legs... After a third consecutive buy climax, a correction lasting at least 10 bars and having at least two legs was likely.", "pages": "49-50", "book": "Reversals"}, {"id": "l_management_107", "theme": "management", "teaching": "Don't rely on volume or indicators for reversal confirmation — traditional 'volume should be higher on the reversal' rule is unreliable; price action alone (chart) is sufficient.", "quote": "I don't want the distraction and do not look at volume or any indicators when I am trading, because the chart tells me all that I need to know.", "pages": "93", "book": "Reversals"}, {"id": "l_management_108", "theme": "management", "teaching": "For a successful three-push reversal pattern, first target is a test of the beginning of the pattern; second target is a measured move based on the height of the pattern.", "quote": "The first target is the beginning of the pattern, and the next is a measured move based on the height of the pattern.", "pages": "94, 97", "book": "Reversals"}, {"id": "l_management_109", "theme": "management", "teaching": "Fast, high-urgency reversals off a wedge extreme can be traded early: move stops to breakeven after the first strong leg down and the subsequent lower high, since urgency reversals move fast and traders may struggle to react quickly enough.", "quote": "These fast reversals that quickly cover a lot of points represent the urgency that everyone is feeling... The move down is often fast and they can move their stops to breakeven after the first strong leg down and the subsequent lower high.", "pages": "97", "book": "Reversals"}, {"id": "l_management_110", "theme": "management", "teaching": "If a wedge's breakout is weak (not a strong reversal), traders should assume it fails and instead trade in the direction of the wedge's channel (with-trend), entering where countertrend traders will be taking losses (e.g., short the low-1/low-2 created by a failed upside breakout of a bear wedge).", "quote": "If the breakout is weak, traders assume that it will fail and they look for the channel to continue... These smart traders will enter where the countertrend traders will be taking their losses.", "pages": "99", "book": "Reversals"}, {"id": "l_management_111", "theme": "management", "teaching": "Once a 5-leg expanding triangle completes and a larger trend can develop, it is wise to swing (hold) some or all of the position rather than scalping the whole thing out.", "quote": "...once the fifth leg is complete, a larger trend can develop and it is wise to swing part of the position.", "pages": "111", "book": "Reversals"}, {"id": "l_management_112", "theme": "management", "teaching": "When a reversal's first leg extends beyond the final flag that preceded it, this is one of the best reversal signs and traders should swing some or all of their position for potential windfall profits.", "quote": "Some of the best reversals come when the first leg up from the reversal extends beyond the final flag, as it does here... it is important to swing some or all of your position because the odds are good that you could receive windfall profits.", "pages": "116", "book": "Reversals"}, {"id": "l_management_113", "theme": "management", "teaching": "Traders commonly place initial protective stops one tick beyond the signal bar; after the entry bar closes strong, many move the stop to one tick beyond the entry bar instead — this creates predictable stop clusters that price often runs before reversing.", "quote": "When traders enter a trade, many place a protective stop at one tick beyond the signal bar. After the entry bar closes, if it is strong, many move it to one tick beyond the entry bar.", "pages": "130", "book": "Reversals"}, {"id": "l_management_114", "theme": "management", "teaching": "In the ES, common intraday profit targets cluster at round tick counts (4-tick scalp needing a 6-tick breakout, 2-point/9-tick, 4-point/17-tick); once a limit order is 'exactly' at those targets and price falls just short and reverses, it's a strong reversal signal because trapped limit-order traders must chase or exit at a loss.", "quote": "In the Emini, a popular trade is a scalp for four ticks... this five-tick failure is a sign of a loss of momentum.", "pages": "132", "book": "Reversals"}, {"id": "l_management_115", "theme": "management", "teaching": "When a countertrend trade based on a reversal pattern (e.g., double bottom bull flag) fails and hits a breakeven stop, but the trader still believes the with-trend read is correct, they may re-enter on the breakout-pullback that follows the stop run — but if the market keeps selling off instead, that expected pullback entry becomes a losing idea; recognize when a stop-run keeps going instead of reversing.", "quote": "they would have moved their stops to breakeven, thinking that if the stops were hit but the trade was still good, the stop run would set up a breakout pullback long setup. Here, the stops were hit but the market kept selling off.", "pages": "140", "book": "Reversals"}, {"id": "l_management_116", "theme": "management", "teaching": "There is a mathematical sweet spot for timeframe selection based on personality and skill: more bars/day means more trades and smaller risk per trade, but also a higher chance of misreading the chart or missing the best (fastest-triggering) setups.", "quote": "There is a mathematical sweet spot that you will have to determine based on your personality and trading abilities.", "pages": "150", "book": "Reversals"}, {"id": "l_management_117", "theme": "management", "teaching": "A new trader should focus primarily on swinging only the best two to five entries a day — usually second entries (reversals at new swing highs/lows) on non-trending days and spikes/pullbacks on trend days.", "quote": "A new trader should focus primarily on swinging only the best two to five entries each day, which are usually second entries in the form of reversals at new swing highs and lows on nontrending days ... and spikes and pullbacks on trend days.", "pages": "150", "book": "Reversals"}, {"id": "l_management_118", "theme": "management", "teaching": "In a bull trend on the daily chart, most days will have closes above the opens with a rally attempt into the final 30-60 minutes; in a bear trend, most days close below the open with a sell-off into the close.", "quote": "If there is a strong bull trend on the daily chart, most days will have closes above the opens and the market will usually try to rally in the final 30 to 60 minutes.", "pages": "152", "book": "Reversals"}, {"id": "l_management_119", "theme": "management", "teaching": "A trader can be correct about the trend into the close and still lose money if late dojis/tails create two-sided price action; the correct response is to keep a wide-enough (whole-signal-bar or wider) initial stop and only tighten it after the pullback resolves.", "quote": "You can be right about the trend into the close and still lose money when the market has a couple of dojis before the close ... you have to trade it for the swing and allow for two-sided movement and use a wide stop.", "pages": "154", "book": "Reversals"}, {"id": "l_management_120", "theme": "management", "teaching": "Shorter timeframe charts (e.g., 1 or 3 minute) generate more trades and smaller stops per trade but a lower winning percentage; most traders cannot execute fast enough and end up cherry-picking, keeping the worst trades and missing the best (fastest, easiest-to-miss) setups.", "quote": "the smaller the time frame, the more good trades they miss, and the lower their winning percentage becomes ... Invariably, they will cherry-pick and tend not to pick the very best setups.", "pages": "156", "book": "Reversals"}, {"id": "l_management_121", "theme": "management", "teaching": "Traders who use tick- or volume-based charts often shrink their stops to minimize apparent risk, but this typically just lowers the winning percentage without improving profitability.", "quote": "There is also a tendency for traders who use charts based on ticks or volume to use smaller time frame charts. They do so to minimize their stop sizes, hoping that the reduced risk will result in profitable trading. Invariably, they ignore the trade-off of a lower winning percentage and end up losing money.", "pages": "157", "book": "Reversals"}, {"id": "l_management_122", "theme": "management", "teaching": "Once a with-trend swing has moved several bars in your favor without pulling back to your entry, move your stop to breakeven; if it later gets hit on a deeper pullback without a clear new setup, stay flat rather than force a trade.", "quote": "if there is a pullback that would have hit a breakeven stop and then the market resumes in your direction for several bars, it should not come back to your entry price again. Therefore, in most cases, you could then move your stop to breakeven.", "pages": "168", "book": "Reversals"}, {"id": "l_management_123", "theme": "management", "teaching": "A practical two-lot always-in swing routine: on each reversal signal, sell one contract to exit the prior position and the other two initiate the new opposite position; scalp one for 1-2x risk and swing the other.", "quote": "If your trading size is two contracts and you are long one when a reversal pattern triggers, sell three. One gets you out of your remaining long position and the other two start the process in this new, opposite direction. Scalp the first for one to two times the size of your risk and swing the second.", "pages": "169", "book": "Reversals"}, {"id": "l_management_124", "theme": "management", "teaching": "Institutional risk managers force discretionary traders to cut losing positions against the trend even when they are emotionally attached and hoping for a reversal; the trend tends to be reinforced into the close by momentum programs detecting and selling into ongoing momentum.", "quote": "The boss always wins, and the result was a bear trend into the close. The trend is enhanced by momentum sell programs that detect the strong trend and sell into it, as long as the momentum down continues.", "pages": "172", "book": "Reversals"}, {"id": "l_management_125", "theme": "management", "teaching": "When both a bull and a bear can rationally scalp at the exact same price/bar (e.g., a large trend bar seen by bulls as continuation and by bears as exhaustion), what determines profitability for either side is disciplined trade management, not who was 'right' about direction.", "quote": "Both the bull and the bear scalpers could therefore make a scalper's profit by entering at exactly the same time, but in opposite directions. The key is money management.", "pages": "176", "book": "Reversals"}, {"id": "l_management_126", "theme": "management", "teaching": "In fast, large-bar first-hour conditions, scalpers should quickly cut position size (half to two-thirds) rather than spend time doing exact risk math, since speed of correct reading and order placement matters more than precision sizing.", "quote": "Scalpers should just quickly cut the position size in half or by two-thirds, and concentrate on what is much more important: reading correctly and placing orders.", "pages": "185", "book": "Reversals"}, {"id": "l_management_127", "theme": "management", "teaching": "On a trade that could become the high or low of day, scale out a third to half of the position after it has run one to two times initial risk, hold the remainder for a further move with a breakeven stop, and continue adding scalp-sized pieces on with-trend pullbacks while still swinging some contracts.", "quote": "If the trade looks particularly strong, swing all of the position and take partial profits on a third to a half after the trade has run one to two times your initial risk...Look to add to your position at every with-trend setup, like a two-legged pullback to the moving average in a strong trend. For these additional contracts, scalp most or all of the position, but continue to swing some contracts.", "pages": "206", "book": "Reversals"}, {"id": "l_management_128", "theme": "management", "teaching": "For a swing/pullback trend trade, use a protective stop just beyond the signal bar until the entry bar closes, then move the stop to just beyond the entry bar; exit roughly half the position at a defined profit level, move remaining stop to breakeven, trail beyond swing lows/highs, and consider letting a final runner ride until stopped or a strong opposite signal appears.", "quote": "They should place a protective stop beyond the signal bar...until the entry bar closes, and then once there is a trend bar in their direction, they should move the stop to just beyond the entry bar...After they exit half or so of the trade on a limit order at one dollar of profit, they should rely on their breakeven stop...They should consider letting the final portion run until the stop is hit or a clear and strong opposite signal develops.", "pages": "253", "book": "Reversals"}, {"id": "l_management_129", "theme": "management", "teaching": "Concrete worked example of the trader's-equation-driven stop-tightening process: after a strong 2-bar reversal signal, tighten the stop to one tick beyond it (defining 'actual risk' vs original 'planned risk'); with a believed 60% probability of an equidistant move, the minimum required profit target to keep a positive equation equals that actual risk in ticks.", "quote": "At this point, the trader knew that the actual risk to stay in the trade was only 11 ticks...he believed that the probability of an equidistant move was at least 60 percent. When the probability was 60 percent, the minimum profit that he needed to create a positive trader's equation had to be at least as big as his actual risk of 11 ticks.", "pages": "258", "book": "Reversals"}, {"id": "l_management_130", "theme": "management", "teaching": "After a final-flag-type climax/exhaustion bar (e.g., a large trend bar after a protracted move and a small prior trading range), traders typically wait for at least a 10-bar, two-legged pullback to the moving average before re-entering with-trend, rather than chasing immediately.", "quote": "After a final flag, traders usually wait for at least a 10-bar, two-legged pullback to the moving average before buying again.", "pages": "258", "book": "Reversals"}, {"id": "l_management_131", "theme": "management", "teaching": "Buying a pullback rather than chasing the spike itself reduces required risk because the stop can go below the pullback low instead of below the entire spike's start, trading off some profit potential for materially lower risk.", "quote": "One of the reasons why many traders like to buy pullbacks is because the risk is smaller...If he instead waited to buy a pullback...his stop would be below the low of [the pullback] and he would be risking much less.", "pages": "259", "book": "Reversals"}, {"id": "l_management_132", "theme": "management", "teaching": "Do not move a stop to breakeven too early; typically wait until the trade has moved roughly halfway to target / accumulated meaningful open profit (example: 60-80 cents on a stock trade) before tightening the stop.", "quote": "Typically, traders should not move their stops to breakeven on a trade like this until there has been about 60 to 80 cents of open profit.", "pages": "263", "book": "Reversals"}, {"id": "l_management_133", "theme": "management", "teaching": "Some traders scale out half the position at a fixed profit target (e.g., $1.00) via limit order, then move the remaining stop to breakeven and hold for a bigger swing, exiting on trend reversal, stop, a reasonable late-day reversal, or the close.", "quote": "On bar 6, traders would have been able to exit half of their shares with $1.00 profit using a limit order ... At that point, they could move their stop to breakeven and hold until the always-in position reversed to long, until their stop was hit, until any reasonable reversal up in the final hour or so, or until the close of the day.", "pages": "264", "book": "Reversals"}, {"id": "l_management_134", "theme": "management", "teaching": "When shorting (or buying) what looks like a minor top (or bottom) with-trend, if the market instead forms a clean high-2 (or low-2) reversal against you — especially with the signal bar testing the moving average — exit or even consider reversing the position.", "quote": "if you short what you think is a minor top ... and the market then forms a high 2 as it did at bar 17, exit or even reverse to long. This is especially true if the high 2 signal bar is a bull bar that is testing the moving average.", "pages": "266-267", "book": "Reversals"}, {"id": "l_management_135", "theme": "management", "teaching": "When a move has an increased chance of falling just short of an obvious target, some traders deliberately set their profit-taking limit order one tick less than usual (since price often approaches but reverses just before hitting the 'obvious' round target).", "quote": "Whenever a move has an increased chance of coming up short, many traders will use a limit order that is one tick less than usual, knowing that the market often hits the obvious target price, but reverses instead of filling the profit-taking limit orders.", "pages": "279", "book": "Reversals"}, {"id": "l_management_136", "theme": "management", "teaching": "It's difficult to reverse a position; for most traders it's better to exit (even at a loss) and then look for a fresh setup in the new direction rather than flip the existing position.", "quote": "It is difficult to reverse a position.", "pages": "282", "book": "Reversals"}, {"id": "l_management_137", "theme": "management", "teaching": "Any reversal setup is a good reason to take partial or full profits on an existing with-trend position, but should only be used to initiate a countertrend trade if it's especially strong — treat each top as the start of a bull flag and each bottom as the start of a bear flag.", "quote": "Since 80 percent of reversals fail, it is far better to view each top as the start of a bull flag and each bottom as the start of a bear flag.", "pages": "282", "book": "Reversals"}, {"id": "l_management_138", "theme": "management", "teaching": "Experienced traders can scale into or out of trades to improve the overall trader's equation — an initial entry may have low probability but subsequent entries can have much higher probability, improving the equation for the whole position.", "quote": "Experienced traders can scale into (or out of) trades to improve their trader's equation.", "pages": "284", "book": "Reversals"}, {"id": "l_management_139", "theme": "management", "teaching": "If a trade isn't behaving as expected, decide whether to exit by pretending you're flat and asking whether you would enter this trade right now; if yes, stay in, if not, get out.", "quote": "Look at the market and pretend that you are flat. If you think that you would put that trade on at this moment, stay in your position. If not, get out.", "pages": "285", "book": "Reversals"}, {"id": "l_management_140", "theme": "management", "teaching": "Habitually converting swing trades into quick scalps (or exiting scalps early for less than the risk) tends to lose money; if you can't stick to your plan, rely on bracket orders and walk away for about an hour after entering.", "quote": "If you find that you frequently take swing trades, but quickly convert them to scalps, you will probably lose money.", "pages": "285", "book": "Reversals"}, {"id": "l_management_141", "theme": "management", "teaching": "On higher time frames the signal bars are large, so far fewer contracts can be traded for the same risk; overnight risk means reducing size further or using limited-risk option strategies.", "quote": "far fewer contracts can be traded if the risk is to be the same as for a day trade", "pages": "223", "book": "Reversals"}, {"id": "l_management_142", "theme": "management", "teaching": "Daily-chart pullbacks rarely have classic reversal bars, so there is more uncertainty and risk; use smaller size, take partial positions, and scale in as the price action unfolds.", "quote": "Uncertainty means risk, and when there is more risk, position sizes need to be smaller, and a trader will have to consider taking a partial position and adding to the position as the price action unfolds", "pages": "224", "book": "Reversals"}, {"id": "l_management_143", "theme": "management", "teaching": "Because option bid-ask spreads are often wide, mainly consider option trades on higher time frame (60 minute/daily) charts; any setup with a significantly positive trader's equation is reasonable.", "quote": "traders should usually only consider option trades on higher time frame charts. Any setup with a significantly positive trader's equation is reasonable", "pages": "232", "book": "Reversals"}, {"id": "l_management_144", "theme": "management", "teaching": "Option costs (bid-ask spread on each leg entering and exiting, double commissions on spreads, time decay) mean you must restrict yourself to only the very best setups, and only add options to day trading if it truly increases your bottom line.", "quote": "Because of these costs, traders have to restrict themselves to trading only the very best option setups", "pages": "233", "book": "Reversals"}, {"id": "l_management_145", "theme": "management", "teaching": "Protective stops in options often offer no protection: the stop is based on the last trade, and if no trades occur in your option the stop won't fill even as the option loses value; in a fast move against you, exit on a limit order as soon as you can.", "quote": "It is important to understand that protective stops in options often offer no protection, and if the market is moving quickly against you, you should try to exit on a limit order as soon as you can", "pages": "233", "book": "Reversals"}, {"id": "l_management_146", "theme": "management", "teaching": "In a huge free fall near limit down, broker systems can overload and orders may not fill or report for 30+ minutes; buying calls (rather than the Emini) caps your risk at a known premium even if a stop never triggers.", "quote": "You cannot afford to live with this kind of uncertainty for such a long time on a huge bear day when your broker's order systems are not working correctly", "pages": "233", "book": "Reversals"}, {"id": "l_management_147", "theme": "management", "teaching": "Avoid thinly traded options (open interest under 1,000 or recent daily volume under 300 for the strike) because bid-ask spreads can be unacceptably large; if you must trade them, always use limit orders. Active markets like the SPY front-month ATM have penny spreads.", "quote": "In general, if the open interest is less than 1,000 or the recent daily volume is less than 300 options for the strike that you are considering, you usually should not place the trade", "pages": "235", "book": "Reversals"}, {"id": "l_management_148", "theme": "management", "teaching": "During a strong spike, buy an option early; if you are late in the spike, wait for a pullback to reduce the risk of a brief VIX spike that overprices all options. A strong spike can spike the VIX and elevate your call's cost so its value won't rise even as the trend continues.", "quote": "if you are not buying early on in the spike, it is better to wait for a pullback to reduce the risk of buying during a brief spike up in the VIX", "pages": "236", "book": "Reversals"}, {"id": "l_management_149", "theme": "management", "teaching": "Buy a spread (vs. an outright) only when you plan to hold for several weeks into the final week, or expect a huge move beyond your short strike; time decay accelerates in the final week and hurts the more-OTM short leg less, so spreads reach full value only if price falls well beyond the lower strike or near expiration.", "quote": "Buying a spread is usually best when you plan to hold the trade for several weeks, especially if you can hold the position into the final week", "pages": "234, 235, 236", "book": "Reversals"}, {"id": "l_management_150", "theme": "management", "teaching": "OTM options gain value disproportionately during big spikes (volatility skew), so a spread can profit less than a beginner expects; prefer outright put/call purchases when expecting a move within a week or so, or leg out of a spread when the market moves your way.", "quote": "A dramatic increase in option volatility usually causes a disproportionate increase in price of the OTM options. This is called skew", "pages": "237", "book": "Reversals"}, {"id": "l_management_151", "theme": "management", "teaching": "Enter with-trend option trades near the close of a bar once you can confirm it will be a strong trend bar in your direction (buy puts on a likely strong bear bar, calls on a likely strong bull bar), taking profits below/above the most recent swing.", "quote": "be confident that the day would be a bear trend day... They took profits below the most recent swing low", "pages": "237, 240", "book": "Reversals"}, {"id": "l_trader's-equation_0", "theme": "trader's-equation", "teaching": "The trader's equation: take a trade only if (probability of success x reward) > (probability of failure x risk); you control reward/risk via target/stop placement, but probability can never be known with certainty. As a guideline, assume 50% if uncertain and 60%/40% if confident.", "quote": "To take a trade, you must believe that the probability of success times the potential reward is greater than the probability of failure times the risk... if you are uncertain, assume that you have a 50 percent chance of winning or losing, and if you are confident, assume that you have a 60 percent chance of winning and a 40 percent chance of losing.", "pages": "26", "book": "Trends"}, {"id": "l_trader's-equation_1", "theme": "trader's-equation", "teaching": "During most of the trading day the market is close to a 50-50 directional coin flip for any reasonable target/stop distance; whenever you are uncertain, default assumption should be that the market is in a trading range.", "quote": "When the market is 50–50, it is uncertain and you cannot rationally have an opinion about its direction. This is the hallmark of a trading range, so whenever you are uncertain, assume that the market is in a trading range.", "pages": "45", "book": "Trends"}, {"id": "l_trader's-equation_2", "theme": "trader's-equation", "teaching": "During strong trends the directional probability can briefly rise to 60-70% (occasionally 80-20 in very strong trends), but this cannot persist — the market gravitates back toward 50-50 uncertainty and toward areas of support/resistance (often measured moves) where uncertainty and a brief trading range return.", "quote": "During a strong trend, it might be 60 or even 70 percent, but that cannot last long because it will gravitate toward uncertainty and a 50–50 market...", "pages": "45-46", "book": "Trends"}, {"id": "l_trader's-equation_3", "theme": "trader's-equation", "teaching": "Unlike coin flips (always 50-50), markets exhibit momentum/persistence: in a trend most reversal attempts fail, and in a trading range most breakout attempts fail — roughly 70% or better odds that the current state (trend or range) persists.", "quote": "When a market is trending, most attempts to reverse fail. When it is in a trading range, most attempts to break out fail... In trading, the odds are more like 70 percent or better that what just happened will continue to happen again and again.", "pages": "54", "book": "Trends"}, {"id": "l_trader's-equation_4", "theme": "trader's-equation", "teaching": "A scalper using a stop larger than the profit target needs a ~70%+ win rate to be profitable, which is very hard to sustain; most traders should instead favor swing trades with reward at least equal to (ideally 2x) risk, at typically 40-60% win rate, though truly high-probability swing setups (~60%+) occur mainly during strong breakouts.", "quote": "if a scalper is using a stop that is larger than his profit target, he has to win on 70 percent or more of their trades to be profitable... Most traders should start out looking for swing trades where the profit is at least twice as large as the risk.", "pages": "76", "book": "Trends"}, {"id": "l_trader's-equation_5", "theme": "trader's-equation", "teaching": "If risk equals reward, you must win well over 60% of the time to be profitable; many price-action patterns have a 70%+ success rate, and moving the stop to breakeven while holding a partial position adds further edge.", "quote": "If the risk is the same as the reward, you have to win much more than 60 percent of the time to make the trade worthwhile. However, lots of patterns have a 70 percent or better success rate.", "pages": "53(85)", "book": "Trends"}, {"id": "l_trader's-equation_6", "theme": "trader's-equation", "teaching": "A large non-overlapping multi-bar spike (e.g., 2 consecutive large bear bodies without overlap) implies high odds of a measured move to the open/high of the first bar minus the range, or similar — and is a high-probability with-trend continuation entry despite feeling late/risky.", "quote": "The odds were high that the market would have some kind of measured move down from the high or open of the first bar to the close or low of the final bar of the spike... this was a very high-probability short.", "pages": "72(104)", "book": "Trends"}, {"id": "l_trader's-equation_7", "theme": "trader's-equation", "teaching": "When multiple independent reasons (final flag, third consecutive climax, wedge bottom, measured move) align, the odds of a successful trade increase considerably — combine confluence factors before taking countertrend trades.", "quote": "In the context of a final flag, a third consecutive sell climax, a wedge bottom, and a measured move, it was a good setup for a rally.", "pages": "175", "book": "Trends"}, {"id": "l_trader's-equation_8", "theme": "trader's-equation", "teaching": "Smaller time-frame charts (e.g., 3-min vs 5-min) give smaller stops but a materially higher chance of being stopped out of a trade that the larger time frame would have kept you in — reducing overall profitability despite the smaller per-trade risk.", "quote": "The risk is smaller but the probability of success also drops. Since there are more trades on a 3 minute chart, there is more risk of missing the best ones, and this can lead to the overall profitability of 3 minute trades being less for many traders.", "pages": "203-204", "book": "Trends"}, {"id": "l_trader's-equation_9", "theme": "trader's-equation", "teaching": "Every trade decision must weigh three things — reward, risk, AND probability of success — not just the reward being chased in the moment.", "quote": "they are ignoring two other essential considerations for every trade: the risk and the probability of success. All three must be evaluated before placing a trade.", "pages": "198", "book": "Trends"}, {"id": "l_trader's-equation_10", "theme": "trader's-equation", "teaching": "Market direction is normally only about 50% certain (bulls/bears roughly balanced); in a strong, established trend, traders can be 60% or more certain of continued direction — this is Brooks' explicit probability framing for trend strength.", "quote": "the market’s direction is usually only about 50 percent certain because the bulls and bears are in balance most of the time. However, when there is a strong trend, traders can often be 60 percent or more certain of the direction.", "pages": "199", "book": "Trends"}, {"id": "l_trader's-equation_11", "theme": "trader's-equation", "teaching": "Every trading firm's strategy loses on a large share of its trades (30-70%) yet remains profitable overall; this is why smart institutions still sell at the exact bottom tick of a bear market — don't read a single trade/tick as informative about 'who is right.'", "quote": "Every firm uses strategies that they have carefully tested and found to be profitable, but all lose money on 30 to 70 percent of their trades.", "pages": "213 (245)", "book": "Trends"}, {"id": "l_trader's-equation_12", "theme": "trader's-equation", "teaching": "A short setup can have as low as ~40% win probability and still be a good trade if the reward is several multiples of the risk — the trader's equation (probability x reward vs. probability x risk) is what matters, not raw win rate.", "quote": "The probability of a successful swing down might be only 40 percent. However, since the reward is several times the risk, the trader's equation is still very positive.", "pages": "292-293", "book": "Trends"}, {"id": "l_trader's-equation_13", "theme": "trader's-equation", "teaching": "Scalping against a strong spike usually loses because the trader's equation is weak (probability of the scalp profit times its size is smaller than probability of loss times stop size), and chasing the scalp causes traders to miss the much larger with-trend move that follows.", "quote": "most traders who attempt this will lose, because most of the pullbacks do not fall far enough for a profit, or the trader's equation is weak... traders who take the short are hoping so much for their small profit that they invariably end up missing the much more profitable long that forms a few minutes later.", "pages": "311", "book": "Trends"}, {"id": "l_trader's-equation_14", "theme": "trader's-equation", "teaching": "Trade only when probability of success times potential reward is significantly greater than probability of failure times risk; in a good trend context assume at least 60% win probability, which makes a 2-point reward on a 2-point stop favorable, but a smaller reward loses money over time.", "quote": "trade only when the chance of success times the potential reward is signiﬁcantly greater than the chance of failure times the risk", "pages": "325-326", "book": "Trends"}, {"id": "l_trader's-equation_15", "theme": "trader's-equation", "teaching": "Do not take profit before the market has moved at least twice your initial risk unless your probability of success is truly ~80%, which is rare; most traders should never risk more than their reward.", "quote": "traders should not take any proﬁts until the trade has gone at least two points... the trader's equation begins to become favorable only when the reward is two points or more.", "pages": "326", "book": "Trends"}, {"id": "l_trader's-equation_16", "theme": "trader's-equation", "teaching": "Directional probability of an equidistant move is about 50% in the middle of a trading range; a trend is a move from one trading range (one perceived-value area) to another, and once directional probability falls back to ~50% a new trading range becomes evident.", "quote": "the directional probability of an equidistant move is about 50 percent in the middle of the trading range... A trend is simply a move from one trading range to another.", "pages": "330-331 (362-363)", "book": "Trends"}, {"id": "l_trader's-equation_17", "theme": "trader's-equation", "teaching": "A large gap up leads to a bull trend day about 60% of the time and a bear trend day about 40% of the time (opposite for gap-down); the larger the gap, the more likely it becomes a trend day and the more likely the trend follows the gap direction.", "quote": "When there is a large gap up and a trend from the open day forms, the day will be a bull trend day about 60 percent of the time and a bear trend day 40 percent of the time.", "pages": "415", "book": "Trends"}, {"id": "l_trader's-equation_18", "theme": "trader's-equation", "teaching": "Even to an experienced trader, most with-trend swing setups in a strong trend look like 50% or less probability, yet they actually succeed 70% or more of the time — this gap between appearance and reality is exactly what keeps most traders out of the best trades.", "quote": "Most setups appear to have 50 percent or less probability of success. This makes traders not take the trades and forces them to chase the market, or miss the trend completely.", "pages": "416", "book": "Trends"}, {"id": "l_trader's-equation_19", "theme": "trader's-equation", "teaching": "Even the best price-action patterns fail to do what's expected about 40 percent of the time; if the market hasn't paused by the third or fourth bar of a move, it may have overextended and the odds of reversal instead of continuation increase.", "quote": "Even the best patterns still fail to do what you expect about 40 percent of the time.", "pages": "418", "book": "Trends"}, {"id": "l_trader's-equation_20", "theme": "trader's-equation", "teaching": "You cannot take a trade simply because the risk is small — you must weigh the probability of success together with the size of the profit target (the trader's equation), not risk alone.", "quote": "You cannot take a trade simply because the risk is small. You need to consider the probability of success and the size of the profit target as well.", "pages": "441", "book": "Trends"}, {"id": "l_trader's-equation_21", "theme": "trader's-equation", "teaching": "A one-point scalp risking 6-7 ticks requires roughly a 60% or higher win probability to be worth taking; if the market has proven it can't sustain a move of the needed size (e.g., the biggest pullback all day was only 9 ticks), the trade fails the equation and must be skipped.", "quote": "You can scalp for one point and risk six or seven ticks only if the probability of success is 60 percent or higher, so you cannot short this market.", "pages": "441", "book": "Trends"}, {"id": "l_trader's-equation_22", "theme": "trader's-equation", "teaching": "Even when a setup looks like it's building perfectly toward a big move, there is always roughly a 40% chance the exact opposite happens — never treat a favored scenario as certain.", "quote": "Even though the middle of the day was setting up perfectly for a big sell-off into the close, you can never be certain and there is always about a 40 percent chance that the exact opposite can happen.", "pages": "460", "book": "Trends"}, {"id": "l_trader's-equation_23", "theme": "trader's-equation", "teaching": "To take any trade you must believe probability-of-success × potential reward > probability-of-failure × risk; if uncertain, default to assuming 50% odds, and if confident, assume about 60/40.", "quote": "To take a trade, you must believe that the probability of success times the potential reward is greater than the probability of failure times the risk.", "pages": "15", "book": "Trading Ranges"}, {"id": "l_trader's-equation_24", "theme": "trader's-equation", "teaching": "Buying/selling a with-trend pullback generally has a better trader's equation than chasing the raw breakout above/below a prior swing point: greater reward, smaller risk, higher probability.", "quote": "In general, the reward is greater, the risk is smaller, and the probability of success is higher when entering on pullbacks. ... It is usually better to buy the pullback than the breakout.", "pages": "37", "book": "Trading Ranges"}, {"id": "l_trader's-equation_25", "theme": "trader's-equation", "teaching": "The trader's equation is what matters, not raw win rate: if reward is at least as large as risk, a strategy is only mathematically sound when win probability is meaningfully above 50%; institutions taking a trade at 1:1 risk/reward implicitly signal they believe probability is around 60% or better.", "quote": "it is mathematically unwise to have your risk equal your reward if the chance of success is much less than 60 percent, and institutions would therefore not be taking this trade.", "pages": "41-42", "book": "Trading Ranges"}, {"id": "l_trader's-equation_26", "theme": "trader's-equation", "teaching": "Directional probability of an equidistant move oscillates: roughly 60%+ (or better) at the start of a strong spike/channel, decaying to about 50% near the middle of the move/range, then overshooting to favor the opposite side once the market reaches a significant support/resistance magnet — this cycle underlies why measured moves and reversals work.", "quote": "When a bear channel begins, the directional probability of an equidistant move is at least 60 percent...In the middle of the trading range, there is uncertainty; but once the market hits the bottom...the directional probability favors the bulls.", "pages": "71-72,79", "book": "Trading Ranges"}, {"id": "l_trader's-equation_27", "theme": "trader's-equation", "teaching": "When trading with the trend, assume roughly a 60% directional probability of an equidistant move; set the profit target at least as large as the risk to get a positive trader's equation.", "quote": "the probability is never known with certainty, but since they are making a trade in the direction of the trend, they can assume that the directional probability of an equidistant move is 60 percent", "pages": "85", "book": "Trading Ranges"}, {"id": "l_trader's-equation_28", "theme": "trader's-equation", "teaching": "In a trading range, the trader's equation forces scalping (small targets) but scalping requires very high win probability, which cannot persist long in an inherently uncertain trading range — this tension is 'the trading range dilemma.'", "quote": "The dilemma is that you have to scalp, but scalping requires a very high probability of success, and that high degree of certainty cannot exist for long in a trading range, where by definition uncertainty prevails.", "pages": "137", "book": "Trading Ranges"}, {"id": "l_trader's-equation_29", "theme": "trader's-equation", "teaching": "A worked example: risking 2 points to make 2 points at the top of a 6+ point range with a second-entry signal gives roughly 60% win probability — a minimally but genuinely profitable trader's equation.", "quote": "they have at least a 60 percent chance of making two points while risking two points. This results in a minimally profitable trader's equation and is therefore a successful strategy.", "pages": "138", "book": "Trading Ranges"}, {"id": "l_trader's-equation_30", "theme": "trader's-equation", "teaching": "Tightening the stop after partial profits can flip a lower-probability trade (even 40%) into a favorable equation because reward now vastly exceeds risk.", "quote": "they are risking five ticks to make four points, and even if the chance of success is only 40 percent, they have a winning trader's equation.", "pages": "138", "book": "Trading Ranges"}, {"id": "l_trader's-equation_31", "theme": "trader's-equation", "teaching": "Two exact opposite scalps (same risk/reward) cannot both have >50% probability simultaneously; the person on the other side of a good scalp mathematically has to be a lower-probability, larger-reward swing trader.", "quote": "the market cannot have a 60 percent chance of going up two points before going down two points at the same time that it has a 60 percent chance of going down two points before going up two points.", "pages": "165-166", "book": "Trading Ranges"}, {"id": "l_trader's-equation_32", "theme": "trader's-equation", "teaching": "Core mathematical rule of trading: probability of success × reward must exceed probability of failure × risk (the trader's equation); this, not a simple risk/reward ratio, is what actually determines profitability.", "quote": "you must believe that the trader's equation is favorable: the probability of success times the reward has to be greater than the probability of failure times the risk.", "pages": "171-173", "book": "Trading Ranges"}, {"id": "l_trader's-equation_33", "theme": "trader's-equation", "teaching": "Edges are always small because for every trade one institution must profitably take each side; a trade with 80% probability, 6-point reward, and 2-point risk implies an institution knowingly accepting a 20% probability, 2-point reward, 6-point risk trade — virtually impossible, so overly favorable-looking setups are almost certainly mis-assessed.", "quote": "if you think that you have an 80 percent chance of making six points while risking two points, then you believe that there are institutional traders willing to take the opposite side of your trade... Since that is virtually impossible in a huge market, you have to assume that your assessment of the variables is wrong.", "pages": "173-174", "book": "Trading Ranges"}, {"id": "l_trader's-equation_34", "theme": "trader's-equation", "teaching": "Because ~90%+ of market volume is institutional and institutions are net profitable, every filled trade — including the one that hits your stop — reflects a rational, profitable strategy on the other side; the market never 'runs your stop' out of malice, only because an institution found it profitable to trade there.", "quote": "The market will not run your stops. The market might test the price where your protective stop is, but it has nothing to do with your stop. It will only test that price if one or more institutions believe that it is financially sound to sell there.", "pages": "174", "book": "Trading Ranges"}, {"id": "l_trader's-equation_35", "theme": "trader's-equation", "teaching": "Scalpers and swing traders can profitably take opposite sides of the same trade because their management (targets, stops, scaling) differs, not because either is 'wrong' — the scalper has a small target/high probability, the swing trader on the other side has a large target/lower probability but positive equation via wider stops or scaling.", "quote": "Your entry is the opposite, but your management is not.", "pages": "174", "book": "Trading Ranges"}, {"id": "l_trader's-equation_36", "theme": "trader's-equation", "teaching": "High-probability (60%+) systems with reward ≥ risk have a positive expectation on every individual trade, so cherry-picking is mathematically fine for these — the opposite of low-probability systems.", "quote": "If a system has a probability of 60 percent or higher and a reward that is at least as large as its risk, then every individual trade has a positive trader's equation... traders can cherry pick all they want and still make money.", "pages": "176", "book": "Trading Ranges"}, {"id": "l_trader's-equation_37", "theme": "trader's-equation", "teaching": "Directional probability of an equidistant move (chance of X favorable ticks before X adverse ticks) hovers near 50% most of the day, briefly rising above 50% during trends/spikes and at tested extremes of ranges — traders must act fast because these edges are fleeting and self-correcting.", "quote": "the directional probability of an equidistant move of any size up versus down hovers around 50 percent for most of the day... it is briefly higher many times during the day, and traders should look for trades when that happens.", "pages": "181, 184-185", "book": "Trading Ranges"}, {"id": "l_trader's-equation_38", "theme": "trader's-equation", "teaching": "As a spike/trend extends, the trader who entered early keeps the same fixed dollar risk (stop near spike start) while the reward (measured-move target) keeps growing — this is the core mathematical case for entering trends early rather than waiting for a pullback.", "quote": "If the spike then grows to $4.00, there is still at least a 60 percent chance that AAPL will go up $4.00 more before it falls to below the bottom of the spike... you now have a 60 percent chance of making a total of $6.00 while just risking $2.00.", "pages": "182-183", "book": "Trading Ranges"}, {"id": "l_trader's-equation_39", "theme": "trader's-equation", "teaching": "Most trades are only about 60% certain at best; the other 40% is real and dangerous, so you must always plan for and respect the possibility of loss with a working protective stop.", "quote": "Since most trades are only 60 percent certain at best, you always have to have a plan for that other 40 percent of the time.", "pages": "202", "book": "Trading Ranges"}, {"id": "l_trader's-equation_40", "theme": "trader's-equation", "teaching": "Once a swing trade moves roughly halfway to its profit target, move the stop to breakeven (or better) — this strengthens the trader's equation because probability of success rises while risk shrinks.", "quote": "Once a swing trade reaches about halfway to the profit target, many traders will move their protective stop to break even.", "pages": "203, 211", "book": "Trading Ranges"}, {"id": "l_trader's-equation_41", "theme": "trader's-equation", "teaching": "All trade decisions should be based on the trader's equation (probability x reward vs (1-probability) x risk); beginners should seek setups with ≥60% win probability and reward at least equal to (ideally ~2x) risk, though such strong setups occur only a couple times a day.", "quote": "All trades should be made on the basis of the trader's equation, and beginning traders should look for trades where the probability of success is 60 percent or higher, and the reward is at least as large and preferably about twice the size of the risk.", "pages": "209-210", "book": "Trading Ranges"}, {"id": "l_trader's-equation_42", "theme": "trader's-equation", "teaching": "Random entries are a coin flip (50%); a trade is only worthwhile long-run if, for equal risk and reward, win rate exceeds 50%, and many valid price-action patterns run 70% or better.", "quote": "without even looking at a chart, you can place a buy order and have a 50 percent chance of being right! ... lots of patterns have a 70 percent or better success rate", "pages": "xvi, 6", "book": "Reading Price Charts"}, {"id": "l_trader's-equation_43", "theme": "trader's-equation", "teaching": "A bar count/pattern label alone (e.g. High 4) is not sufficient to trade — you need prior demonstrated strength (a relatively strong move that broke at least a minor trendline) before acting on the count.", "quote": "Note that Bar 7 on the Emini was a High 4, which is usually a reliable buy signal. However, in the absence of any bullish strength in the High 1, 2, or 3, you cannot take the trade. A bar count alone is not sufficient.", "pages": "153", "book": "Reading Price Charts"}, {"id": "l_trader's-equation_44", "theme": "trader's-equation", "teaching": "A breakout implies strength and possible new trend; in a strong trend (strong-close breakout bar + subsequent bars with strong closes/trending highs-lows and no pullback), price is likely to be higher before the trend reverses back beyond the start of the move — but most breakouts fail, so fade failures or wait for the failure-of-failure (Breakout Pullback) rather than entering the raw breakout.", "quote": "Fade it if it fails, as most breakouts do, and re-enter in the direction of the breakout if the failed breakout fails and therefore becomes a Breakout Pullback. Only rarely is it best to enter on the breakout.", "pages": "181", "book": "Reading Price Charts"}, {"id": "l_trader's-equation_45", "theme": "trader's-equation", "teaching": "A rough magnet/target heuristic: expect price to run roughly double the stop distance required to avoid being stopped out (e.g., a 12-tick required stop implies roughly a 12-tick favorable excursion from entry).", "quote": "Double the required stop (if an Emini trade required you to use a 12-tick stop to avoid getting stopped out, expect the move to extend about 12 ticks from your entry.", "pages": "199", "book": "Reading Price Charts"}, {"id": "l_trader's-equation_46", "theme": "trader's-equation", "teaching": "Scalping the 5-minute Emini at a typical ~2-point risk for a 1-point target requires winning over 67% of trades just to break even; using breakeven stops on swung partial size, tightening stops progressively, or using a wider stop/target with adds all reduce the required win percentage.", "quote": "To scalp the 5-minute Emini chart effectively, you usually have to risk about two points and your profit target is one point or more. This means that you have to win on over 67 percent of your trades just to breakeven.", "pages": "296", "book": "Reading Price Charts"}, {"id": "l_trader's-equation_47", "theme": "trader's-equation", "teaching": "On a strong trend day, taking countertrend long scalps against the prevailing bear trend is a low-probability bet where most scalps fail and losses outweigh the rare winner — do the math before taking the trade.", "quote": "Most long scalps will fail, and the amount you lose on each one will be too great to make up by the eventual winner or two.", "pages": "403", "book": "Reading Price Charts"}, {"id": "l_trader's-equation_48", "theme": "trader's-equation", "teaching": "Countertrend trading in strong trends will often win individual trades and feel fun, but the math guarantees a slow account bleed over time — countertrend setups in strong trends almost always fail and become great with-trend trades instead.", "quote": "If you trade Countertrend, you are gambling, and although you will often win and have fun, the math is against you, and you will slowly but surely go broke.", "pages": "410", "book": "Reading Price Charts"}, {"id": "l_trader's-equation_49", "theme": "trader's-equation", "teaching": "Countertrend scalps and with-trend pullback avoidance are the two habits that most directly prevent consistent profitability; reversals should only be traded after a break of a significant trendline followed by a strong reversal bar on a test of the trend's extreme.", "quote": "You will not make consistent money until you stop trading Countertrend scalps... You will not make money until you start trading With Trend pullbacks... You will not make money trading reversals until you wait for a break of a significant trendline and then for a strong reversal bar on a test of the trend's extreme.", "pages": "410-411", "book": "Reading Price Charts"}, {"id": "l_trader's-equation_50", "theme": "trader's-equation", "teaching": "To take any trade you must believe the probability of success times the potential reward is greater than the probability of failure times the risk — this trader's equation, not pattern recognition alone, is the real basis for whether a setup is worth taking.", "quote": "trader's equation To take a trade, you must believe that the probability of success times the potential reward is greater than the probability of failure times the risk. You set the reward and risk... The difficulty in solving the equation is assigning a value to the probability, which can never be known with certainty.", "pages": "15", "book": "Reversals"}, {"id": "l_trader's-equation_51", "theme": "trader's-equation", "teaching": "As a practical guideline when uncertain, assume a 50% chance of winning or losing; when confident in a setup, assume 60% win / 40% loss — Brooks' working definitions of 'probably'/'likely'/'usually' (≥60%) versus 'risky' (≤50%) versus 'unlikely' (≤40%).", "quote": "As a guideline, if you are uncertain, assume that you have a 50 percent chance of winning or losing, and if you are confident, assume that you have a 60 percent chance of winning and a 40 percent chance of losing. / likely At least 60 percent certain. / risky ... the probability of success for a trade is 50 percent or less... / unlikely At most 40 percent certain.", "pages": "12, 14, 16", "book": "Reversals"}, {"id": "l_trader's-equation_52", "theme": "trader's-equation", "teaching": "Without looking at a chart, buying or selling any instrument with a symmetric bracket (OCO) gives roughly a 50% win rate — this is the baseline; a trading range is defined as a period where directional probability is genuinely near 50-50, and traders should default to assuming a trading range whenever uncertain.", "quote": "The market gravitates toward uncertainty. During most of the day, every market has a directional probability of 50–50... When you are uncertain, assume that the market is in a trading range.", "pages": "23", "book": "Reversals"}, {"id": "l_trader's-equation_53", "theme": "trader's-equation", "teaching": "During a strong trend the directional probability can briefly reach 60-70%, but it cannot persist because the market gravitates back toward 50-50 equilibrium and toward support/resistance (measured-move) areas where uncertainty returns.", "quote": "During a strong trend, it might be 60 or even 70 percent, but that cannot last long because it will gravitate toward uncertainty and a 50–50 market.", "pages": "23", "book": "Reversals"}, {"id": "l_trader's-equation_54", "theme": "trader's-equation", "teaching": "Reversal trades typically have positive trader's equations because even at a low win rate (40-50%, sometimes only 30-60%), the reward is several times the risk; math, not win rate alone, determines whether a setup is worth taking.", "quote": "In general, when risk is held constant, a larger potential reward usually means a smaller probability of success... a trend reversal trade may have a reward that is several times larger than the risk, it can have a profitable trader's equation.", "pages": "53", "book": "Reversals"}, {"id": "l_trader's-equation_55", "theme": "trader's-equation", "teaching": "Worked numeric example: on a 4-point swing reversal in the Emini (10-15pt avg range) with good context and a decent signal bar, probability of success ~40% (up to 50-60% if the setup is very strong); probability of a 2-point stop being hit before target/exit is only ~30%. Over 10 trades: 4 wins x 4pts = 16pts; remaining 6 trades average out near breakeven (3 losses ≤2pts, 3 small wins 1-3pts) → ~1.6 pts/trade average, 'good for a day trader.'", "quote": "If traders win four points in four out of 10 trades, they have 16 points of profit... They then have about 16 points of profit on 10 trades, or an average of 1.6 points of profit per trade, which is good for a day trader.", "pages": "45", "book": "Reversals"}, {"id": "l_trader's-equation_56", "theme": "trader's-equation", "teaching": "Most initial reversal entries have relatively low probability (~40-50%); waiting for strong follow-through and a clear always-in flip raises probability to ~60%+ but shrinks the reward. Both approaches are mathematically sound; choose based on personality.", "quote": "Most initial entries have relatively low probability (about 40 to 50 percent) of success. Some traders prefer a higher probability, and they wait for strong follow-through and a clear always-in flip. The trade-off is a smaller reward for a higher chance of success.", "pages": "45", "book": "Reversals"}, {"id": "l_trader's-equation_57", "theme": "trader's-equation", "teaching": "An average setup has ~40% chance of a profitable swing, ~30% chance of a small loss, ~30% chance of a small profit (70% chance of at least a small profit); the strongest setups have a 60%+ chance of a profitable swing.", "quote": "An average setup has about a 40 percent chance of leading to a profitable swing, a 30 percent chance of a small loss, and a 30 percent chance of a small profit.", "pages": "64", "book": "Reversals"}, {"id": "l_trader's-equation_58", "theme": "trader's-equation", "teaching": "Earlier, weaker-looking entries in a reversal have lower probability (often below 50%) but the greatest potential reward, and the trader's equation is usually still positive; waiting for a confirmed always-in reversal raises probability to 60%+ but the stop is further away, reducing reward.", "quote": "The earliest entries in major trend reversals often do not look strong... the potential reward is at its greatest and the result usually is a positive trader's equation.", "pages": "66", "book": "Reversals"}, {"id": "l_trader's-equation_59", "theme": "trader's-equation", "teaching": "After three consecutive climaxes without a significant break, the odds are 60 percent or better that the market will attempt a more complex correction (two legs, 10+ bars).", "quote": "They know that the odds are 60 percent or better that the market will try to have a more complex correction, like two legs up, that lasts for about 10 or more bars.", "pages": "94", "book": "Reversals"}, {"id": "l_trader's-equation_60", "theme": "trader's-equation", "teaching": "A trade with a low win-rate (e.g., ~40%) can still have a positive trader's equation if the reward targeted is at least twice the risk; conversely, waiting for confirmation trades off lower reward for higher win probability (~60%+), which is also positive if reward ≥ risk.", "quote": "The traders who took the first entry knew that it had only about a 40 percent chance of success, but they were looking for a reversal down and a reward that was at least twice the size of their risk, and therefore had a positive trader's equation.", "pages": "104", "book": "Reversals"}, {"id": "l_trader's-equation_61", "theme": "trader's-equation", "teaching": "A failure is any trade that does not reach its goal (smaller profit than expected, or a loss); since most good setups have about a 60% win rate, they have about a 40% failure rate as a baseline.", "quote": "Since the most common good setups have about a 60 percent success rate, they have about a 40 percent failure rate.", "pages": "130", "book": "Reversals"}, {"id": "l_trader's-equation_62", "theme": "trader's-equation", "teaching": "When a trade reaches a scalper's profit and then comes back and takes out the original signal/entry bar stops, the reversal move has less fuel because fewer traders are trapped (many already exited profitably or moved stops to breakeven), so it tends to be a smaller/less reliable reversal than a fresh failure.", "quote": "If a trade makes a scalper's profit... and then comes back and takes out the original signal or entry bar stops, there is much less fuel left in the market to drive the market in this new, opposite direction because there are far fewer traders who are trapped in the trade.", "pages": "130", "book": "Reversals"}, {"id": "l_trader's-equation_63", "theme": "trader's-equation", "teaching": "Once a profit target is missed by one tick, a disciplined trader should never let the trade turn into a loss because doing so risks far more (e.g., 8+ ticks) to make 1 tick — a terrible trader's equation.", "quote": "Once it hits nine ticks, they should never allow the trade to turn into a loss, because they would then be risking eight or more ticks to make one tick, and this has a terrible trader's equation.", "pages": "132", "book": "Reversals"}, {"id": "l_trader's-equation_64", "theme": "trader's-equation", "teaching": "Scalping requires a very high winning percentage to be profitable, which is difficult even for experienced traders; traders who are not yet consistently profitable should avoid making scalps their cornerstone strategy.", "quote": "you should avoid scalps until you are an experienced trader, because you need a very high winning percentage to be profitable", "pages": "150", "book": "Reversals"}, {"id": "l_trader's-equation_65", "theme": "trader's-equation", "teaching": "Around scheduled reports, slippage is common, risk is often larger and reward smaller, and probability is roughly only 50%, producing a bad trader's equation — wait for the market to become orderly before entering.", "quote": "Whenever a report is released ... slippage is common ... the risk is often larger and the reward is often smaller. Also, the probability is only 50 percent. The result is a bad trader's equation.", "pages": "152", "book": "Reversals"}, {"id": "l_trader's-equation_66", "theme": "trader's-equation", "teaching": "The minimum bar for taking any always-in style trade is that probability × reward must exceed (1-probability) × risk; in practice most qualifying always-in setups are at least 60% certain, well above the 51% breakeven minimum.", "quote": "the minimum criterion for an always-in signal is that the market is more likely to go in the new direction than in the old one, which implies that all that is needed is 51 percent certainty, most such signals are 60 percent or higher.", "pages": "165", "book": "Reversals"}, {"id": "l_trader's-equation_67", "theme": "trader's-equation", "teaching": "As a spike grows and the trader tightens the stop, the risk shrinks while the measured-move reward target grows, so the trade's math keeps improving as long as the spike continues (and probability stays at or above 60%).", "quote": "As the spike continues, the risk remains constant, and the directional probability of an equidistant move will stay at 60 percent or better, but the reward grows and this makes the trade even better mathematically.", "pages": "167-168", "book": "Reversals"}, {"id": "l_trader's-equation_68", "theme": "trader's-equation", "teaching": "Countertrend scalps against a clear always-in trend are mathematically poor: risk is roughly double the reward, requiring an unrealistic ~70% win rate, versus waiting to enter with the trend at the end of a pullback.", "quote": "This is because they almost certainly would have to be scalps, which means that the risk would probably be about twice the reward and the chance of success would have to be an unrealistic 70 percent or greater.", "pages": "168", "book": "Reversals"}, {"id": "l_trader's-equation_69", "theme": "trader's-equation", "teaching": "Scalps generally need a win rate of about 60% or more because the stop (risk) usually has to be roughly the same size as the target (reward); swings can succeed with a much lower win rate (even ~40%) if the reward is a multiple of the risk.", "quote": "From the trader's equation, readers know that scalpers generally have to win on 60 percent or more of their trades, since the risk usually has to be about the size of the reward. Scalp setups are much more common than swing setups, but most scalp setups do not have a 60 percent probability of success and should be avoided.", "pages": "184", "book": "Reversals"}, {"id": "l_trader's-equation_70", "theme": "trader's-equation", "teaching": "A trader must decide, before entering, whether a trade is being taken as a scalp or a swing, and manage it consistently with that premise; switching goals mid-trade (e.g., planning to swing but grabbing a scalp profit, or vice versa) produces a losing trader's equation over time.", "quote": "You can't have one premise and then manage the trade as if it was based on a different premise, but it is common for traders to confuse scalps and swings in the first hour when everything happens so quickly and the bars are large and have big pullbacks within the bars as they are forming.", "pages": "186", "book": "Reversals"}, {"id": "l_trader's-equation_71", "theme": "trader's-equation", "teaching": "For a reasonably good opening reversal setup, the probability of a swing hitting a target of at least twice the stop is often only ~40% (50-60% if the setup is very strong), but the probability of the stop being hit before target or a smaller-loss exit is only ~30%, making the trader's equation strongly favorable even at modest win rates.", "quote": "This makes the trader's equation very favorable for this type of trade. If traders win four points in four out of 10 trades, they have 16 points of profit off of their swing trades...they will end up about breakeven on those trades...the trader then has about 16 points of profit on 10 trades, and averages 1.6 points of profit per trade, which is good for a day trader.", "pages": "204-205", "book": "Reversals"}, {"id": "l_trader's-equation_72", "theme": "trader's-equation", "teaching": "A large gap that goes sideways rather than reversing sharply raises the probability of a trend day (Brooks estimates to 60%+ in his example), which can make the with-trend risk/reward math excellent (e.g., risking ~6-10 points to make ~15-20 points at 60% odds).", "quote": "When there is a large gap up or down and no strong reversal, the trader's equation can be strong for the with-trend traders...they had a 60 percent chance of success, which is a great trade...this excellent math is why large gap openings can offer great trades.", "pages": "217", "book": "Reversals"}, {"id": "l_trader's-equation_73", "theme": "trader's-equation", "teaching": "An edge (positive trader's equation) exists when the probability of reaching the profit target before the stop, times the reward, is greater than the probability of hitting the stop first, times the risk. This is the single mathematical criterion for whether a trade is worth taking.", "quote": "An edge (positive trader's equation) exists if the probability of a trade reaching his profit target before hitting his protective stop is greater than the probability of the market hitting his stop before reaching his target.", "pages": "245", "book": "Reversals"}, {"id": "l_trader's-equation_74", "theme": "trader's-equation", "teaching": "You can have a positive trader's equation even with probability under 50% if the reward is large enough relative to risk (e.g., a bear thinking a swing-down chance is 40% or less can still trade it if reward vastly exceeds risk).", "quote": "T

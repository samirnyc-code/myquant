n", "pages": "221", "book": "Reversals"}, {"id": "l_market-structure_499", "theme": "market-structure", "teaching": "A signal bar that traps early entrants (the next bar cannot exceed a reversal bar) becomes a great signal bar in the opposite direction because those trapped traders must exit.", "quote": "This made bar 12 a great short signal bar because the trapped longs who entered early in bar 11 would have exited below the bar 12 bear trend bar", "pages": "221", "book": "Reversals"}, {"id": "l_market-structure_500", "theme": "market-structure", "teaching": "When a top (or bottom) is not strong enough to show the countertrend side is in control, with-trend setups (e.g. a high 2) remain good even amid barbwire and a second climax.", "quote": "because the top at bar 2 was not strong enough to indicate that the bears were in control", "pages": "222", "book": "Reversals"}, {"id": "l_market-structure_501", "theme": "market-structure", "teaching": "Daily, weekly, and monthly chart signals occur too infrequently for day traders and become a distraction; the most common ones (based on yesterday's high/low) are already visible on the 5 minute chart.", "quote": "they occur so infrequently that they become a distraction for a day trader and should be ignored", "pages": "223", "book": "Reversals"}, {"id": "l_market-structure_502", "theme": "market-structure", "teaching": "Round numbers act as magnets: as the market gets convinced a magnet will be reached, bears stop shorting and a buy vacuum drives price quickly to (and 5-10 percent beyond) the number, which then usually gets penetrated at least once.", "quote": "This absence of bears creates a vacuum that often results in the stock quickly moving up to the magnet", "pages": "224, 225", "book": "Reversals"}, {"id": "l_market-structure_503", "theme": "market-structure", "teaching": "Price action's fingerprint is unchanged over time because it is the cumulative result of many independent traders seeking profit; a 1932-33 Dow chart looks like any market today.", "quote": "Because of that, its fingerprint has remained unchanged and will always provide a reliable tool for making money for those who can read it", "pages": "225", "book": "Reversals"}, {"id": "l_market-structure_504", "theme": "market-structure", "teaching": "Uncertainty is the hallmark of a trading range: once a market appears uncertain (a big rally with a shallower slope than the prior sell-off, not holding above resistance), it has usually become a large trading range and lost the certainty of a trend.", "quote": "Uncertainty is the hallmark of a trading range; once a market appears uncertain, it is usually in a trading range", "pages": "226, 227", "book": "Reversals"}, {"id": "l_market-structure_505", "theme": "market-structure", "teaching": "As happens in about 80 percent of topping patterns, most tops (double tops, head-and-shoulders) are just bull flags and the market breaks to the upside.", "quote": "As happens in 80 percent of topping patterns, the market broke to the upside and the bears learned once again that most tops are just bull flags", "pages": "227", "book": "Reversals"}, {"id": "l_market-structure_506", "theme": "market-structure", "teaching": "Measured-move targets, like all support and resistance, usually fail because the MM is the minimum needed; expect price to hit a target exactly and then reverse or pause as firms take partial/full profits there.", "quote": "Most targets, like all support and resistance, soon fail, because the measured move is the minimum needed", "pages": "227", "book": "Reversals"}, {"id": "l_market-structure_507", "theme": "market-structure", "teaching": "Whenever five to 10 bars are close to a trend line, the odds are good the market will soon break the trend line.", "quote": "Whenever five to 10 bars are close to a trend line, the odds are good that the market will soon fall below the trend line", "pages": "228", "book": "Reversals"}, {"id": "l_market-structure_508", "theme": "market-structure", "teaching": "Buying options before a catalyst (earnings, product/takeover news) is dangerous because inflated premium gets crushed when the news is announced; you can be right on direction and still lose money.", "quote": "you can see the big move in the direction that you expected and still lose money!", "pages": "233, 234", "book": "Reversals"}, {"id": "l_market-structure_509", "theme": "market-structure", "teaching": "The VIX tends to move opposite the indexes and spikes when the market falls in a panic (heavy put buying). Every 16 points of VIX equals about a 1 percent expected average daily range in the S&P 500 (VIX 32 => ~2 percent daily range).", "quote": "every 16 points in the VIX corresponds to a 1 percent expected average daily range in the S&P 500 index", "pages": "234, 235", "book": "Reversals"}, {"id": "l_market-structure_510", "theme": "market-structure", "teaching": "Rising put buying is not always bearish: after a market turns up, confident new longs buy puts to protect their longs, which means the downside risk has actually shrunk; you cannot know whether overall put buying is speculation or protection.", "quote": "this put buying is a sign that the downside risk has shrunk and bulls are becoming confident", "pages": "234", "book": "Reversals"}, {"id": "l_market-structure_511", "theme": "market-structure", "teaching": "Short options at support/resistance levels increase the strength of those levels because options tend to expire near the strike with the biggest open interest; SPY and QQQ often expire close to the largest-open-interest strike, driven by institutions who make their short options expire worthless.", "quote": "short options at support and resistance levels increase the strength of those levels, since options tend to expire near the strike price with the biggest open interest", "pages": "235", "book": "Reversals"}, {"id": "l_market-structure_512", "theme": "market-structure", "teaching": "Extreme behavior offers a regression-to-the-mean trade: if the market is doing something it hasn't done in years (e.g. 30+ consecutive gap bars, 15 consecutive bull trend bars), it will likely stop very soon, so bet in the opposite direction. When something rarely happens it is unsustainable and therefore climactic, and the ensuing pullback is usually deeper and longer than most expect.", "quote": "If the market is doing something that it has not done in years, it will likely stop doing that very soon, and option traders can place a bet in the opposite direction", "pages": "239, 240", "book": "Reversals"}, {"id": "l_market-structure_513", "theme": "market-structure", "teaching": "When the market breaks above a lengthy/tight bull channel, it usually reverses to the bottom of the channel and the reversal generally comes within five bars; bears begin entering at the top of the channel above swing highs and prior-bar highs.", "quote": "When the market breaks above a lengthy bull channel, it usually reverses to the bottom of the channel and the reversal generally comes within five bars", "pages": "239", "book": "Reversals"}, {"id": "l_market-structure_514", "theme": "market-structure", "teaching": "The market tends to keep doing what it has been doing (inertia); a correction's size in bars and points is usually comparable to the prior legs on the chart.", "quote": "the market tends to keep doing what it has been doing (inertia)", "pages": "239", "book": "Reversals"}, {"id": "l_market-structure_515", "theme": "market-structure", "teaching": "About 80 percent of attempts to end a strong trend fail, so in a strong bull trend the odds favor buying each poke below the moving average (and vice versa in a bear trend).", "quote": "About 80 percent of attempts to end a strong trend fail, so the odds", "pages": "240", "book": "Reversals"}, {"id": "l_market-structure_516", "theme": "market-structure", "teaching": "A low 2 short signal at the bottom of a trading range usually fails and leads to a reversal up, as do most attempts to break out of a trading range.", "quote": "A low 2 short signal at the bottom of a trading range usually fails and leads to a reversal up, as do most attempts to break out of a trading range", "pages": "238", "book": "Reversals"}, {"id": "l_market-structure_517", "theme": "market-structure", "teaching": "Bears buying back shorts at new lows (rather than pressing bets by shorting the breakout) is a sign the bear trend is transitioning into a two-sided market / trading range.", "quote": "This is a sign that the bear trend is transitioning into a two-sided market (a trading range)", "pages": "237", "book": "Reversals"}, {"id": "l_discipline_0", "theme": "discipline", "teaching": "Reading price action well is necessary but not sufficient for profitable trading — execution/trading skill takes as long to learn as chart reading itself, and Brooks himself took over 10 years to trade successfully.", "quote": "Although it is very difficult to make money as a trader without understanding price action, that knowledge alone is not enough. It takes a long time to learn how to trade after a trader learns to read charts, and trading is just as difficult as chart reading.", "pages": "39", "book": "Trends"}, {"id": "l_discipline_1", "theme": "discipline", "teaching": "If you can't figure out what the chart is telling you, don't trade — wait for clarity, which always eventually comes; once present, you must take the trade and follow the plan.", "quote": "The only thing that is as it seems is the chart. If you cannot figure out what it is telling you, do not trade. Wait for clarity.", "pages": "51", "book": "Trends"}, {"id": "l_discipline_2", "theme": "discipline", "teaching": "Never drop to a smaller time frame (e.g., 1-minute) to tighten a stop when trading off the 5-minute chart — it tempts overtrading/cherry-picking and divides attention, degrading the 5-minute read.", "quote": "Do not dial down to a 1 minute chart and tighten your stop, because you will lose... you will instead cherry-pick, which will lead to the death of your account.", "pages": "51-52", "book": "Trends"}, {"id": "l_discipline_3", "theme": "discipline", "teaching": "Deviating from your rules for any reason (e.g., revenge-trading after losses) turns trading into gambling; beginners especially gamble after losses trying to get whole, which compounds losses and emotional damage.", "quote": "Whenever traders deviate from those rules for any reason, they are trading on hope rather than logic and are then gambling.", "pages": "54", "book": "Trends"}, {"id": "l_discipline_4", "theme": "discipline", "teaching": "Only fight wars you can win: retail traders should not try to compete with HFT/algorithmic edges (e.g., reading market depth) because any edge there is too small and the distraction costs more in missed chart-based trades than it could gain.", "quote": "Only fight wars that you know you can win.", "pages": "74", "book": "Trends"}, {"id": "l_discipline_5", "theme": "discipline", "teaching": "Avoid trading immediately around major news releases/reports when algorithmic competitors have an overwhelming speed edge; instead wait and let the chart show you the computers' consensus interpretation, then trade the resulting price action.", "quote": "When a trader's opponent has a huge edge, he is at a big disadvantage, which means that he has no edge... all a trader has to do is be able to read a chart to see what the consensus opinion is from all of that analysis.", "pages": "80", "book": "Trends"}, {"id": "l_discipline_6", "theme": "discipline", "teaching": "Near the close of key time-frame bars (3/5/15/60 min), a reversal-looking bar can completely flip appearance in the final seconds, trapping front-runners; always wait for the bar to close before entering countertrend, then enter only on a stop one tick beyond it.", "quote": "It is very common in strong trends for a reversal bar to totally reverse its appearance in the final few seconds before a 5 minute bar closes... When trading countertrend against a strong trend, it is imperative to wait for the signal bar to close before placing your order.", "pages": "52-53(84-85)", "book": "Trends"}, {"id": "l_discipline_7", "theme": "discipline", "teaching": "Fibonacci retracements/extensions are unreliable on their own; only trust a Fib level if it coincides with an independently reliable, tradable chart pattern.", "quote": "Fibonacci retracements and extensions are a part of price action, but since most are just approximations and most fail, they only occasionally are helpful in trading... If a Fibonacci number is good, it will be associated with a chart pattern that is reliable and tradable on its own, independent of the Fibonacci measurement or any indicators.", "pages": "53(85)", "book": "Trends"}, {"id": "l_discipline_8", "theme": "discipline", "teaching": "Elliott Wave analysis is generally not tradable for active day traders because waves aren't clear until well after the ideal entry and admit too many conflicting interpretations.", "quote": "Elliott Wave Theory is also a type of price action analysis, but for most traders it is not tradable... it requires far too much thought and there is too much uncertainty for most active day traders.", "pages": "53(85)", "book": "Trends"}, {"id": "l_discipline_9", "theme": "discipline", "teaching": "'Close is close enough' — do not require textbook-perfect patterns (perfect dojis, perfect double tops); near-equivalents behave the same and perfectionism costs money.", "quote": "In trading, close is close enough and worrying about perfection can only cost you money.", "pages": "53(85),66(98)", "book": "Trends"}, {"id": "l_discipline_10", "theme": "discipline", "teaching": "Beginners should require the signal bar to be a trend bar in the trade direction and only trade with-trend; countertrend/reversal trades require progressively stronger signal bars the more countertrend the entry is, because most countertrend trades fail.", "quote": "A beginning trader should enter only when the signal bar is also a trend bar in the direction of the trade, and should trade only in the direction of the trend... the more countertrend that your entry is, the more important it is to see a strong signal bar.", "pages": "85(117)", "book": "Trends"}, {"id": "l_discipline_11", "theme": "discipline", "teaching": "Candle pattern names (harami, hammer, doji subtypes, etc.) are largely unhelpful distractions from price action/trend analysis and should not drive trading decisions.", "quote": "You should only think of bars in terms of price action and not a collection of meaningless and misleading candle names... candle pattern names will complicate your trading by giving you too much to think about and they take your mind off the trend.", "pages": "86-87(118-119)", "book": "Trends"}, {"id": "l_discipline_12", "theme": "discipline", "teaching": "A signal bar can change shape dramatically in the final seconds before the bar closes (e.g., a good bull reversal bar suddenly extends to sit atop a bear flag); until consistently profitable, prefer waiting for a second entry rather than chasing the altered bar.", "quote": "You have seconds to decide if you still want to buy above its high with the realization that you would be buying at the top of a bear flag... Until you are consistently profitable and able to read quickly, it is best to not take the trade and to wait for a second entry instead.", "pages": "87(119)", "book": "Trends"}, {"id": "l_discipline_13", "theme": "discipline", "teaching": "Every reversal, on some time frame or bar-construction (tick/volume/higher time frame chart), is a perfect textbook reversal bar or two-bar reversal — don't waste time hunting across dozens of chart types for a 'perfect' pattern; instead focus on recognizing that the market is trying to reverse and find any reasonable way in.", "quote": "If you see a reversal setting up but there is no reversal bar, don't waste your time looking around at dozens of charts for one where there is a perfect reversal...Your goal is to understand what the market is doing, not to find some perfect pattern.", "pages": "125,135-136,150-151", "book": "Trends"}, {"id": "l_discipline_14", "theme": "discipline", "teaching": "When uncertain about a tricky/ambiguous open or setup, the correct action is to do nothing rather than force a trade.", "quote": "There was a tricky open in Figure 6.7, and when in doubt, stay out.", "pages": "154", "book": "Trends"}, {"id": "l_discipline_15", "theme": "discipline", "teaching": "Two-bar reversals are countertrend signals only if there is a specific reason to expect a reversal (e.g., climax, channel line test); otherwise treat overlapping-bar patterns as continuation/flag material.", "quote": "Two-bar reversals are countertrend signals only if there is a reason to expect a reversal.", "pages": "163", "book": "Trends"}, {"id": "l_discipline_16", "theme": "discipline", "teaching": "Never take a countertrend trade based on a measured-move target alone — most such trades fail; only act when other confirming reasons (trend channel line overshoot, final flag) are also present.", "quote": "you cannot take the countertrend trade on a measured move alone since most fail and you have to keep looking at others. The odds of success are too small.", "pages": "174", "book": "Trends"}, {"id": "l_discipline_17", "theme": "discipline", "teaching": "When a signal bar is a doji or otherwise weak but the market is in a strong trend, do not take the first countertrend attempt — the market rarely reverses far on a first attempt, especially when the reversal bar's close is mid-range rather than at its extreme.", "quote": "the market rarely reverses very far on the first attempt, especially when the signal bar has a close in the middle instead of at its low.", "pages": "169", "book": "Trends"}, {"id": "l_discipline_18", "theme": "discipline", "teaching": "In a tight trading range, entries need a bit more stop room, and small reversal bars formed by a failed ii/ioi breakout inside barbwire are not real reversal bars because there is 'nothing to reverse.'", "quote": "If you are going to take a trade in a tight trading range, you have to give it a little room... small reversal bars are rarely good and when one forms in a tight trading range, it should not be looked at as a reversal bar because there is nothing to reverse.", "pages": "169-170", "book": "Trends"}, {"id": "l_discipline_19", "theme": "discipline", "teaching": "There are many good, tradeable setups every trading day on every chart; skill in spotting them as they form (not hindsight) is what separates profitable traders.", "quote": "There are many good setups every day on every chart, and the more experience you have in spotting them as they form, the better chance you have of being able to profit from them.", "pages": "176", "book": "Trends"}, {"id": "l_discipline_20", "theme": "discipline", "teaching": "In a strong trend-from-the-open move, do not sell (or buy) the first pullback attempt — it is almost always followed by a retest of the trend extreme within a few bars.", "quote": "Since the market was still in a trend from the open bull trend, you should not sell the first attempt at a pullback, because the first pullback is almost always followed by a test of the high within a few bars.", "pages": "180", "book": "Trends"}, {"id": "l_discipline_21", "theme": "discipline", "teaching": "A weak/small reversal bar can still be a valid setup if reinforced by an additional independent reason (e.g., an exact retest of a prior low, a failed breakout of a flag).", "quote": "When a reversal bar is not particularly strong, it can still be a good setup if there is an additional reason to take the trade.", "pages": "182", "book": "Trends"}, {"id": "l_discipline_22", "theme": "discipline", "teaching": "Trend day countertrend moves commonly occur between 11:00 a.m. and noon (PST), trapping traders in the wrong direction before the trend resumes — be mentally prepared to take the with-trend trade instead.", "quote": "It is common for a trend day to have a strong countertrend move between 11:00 a.m. and noon PST, trapping traders into the wrong direction... It is important to realize this so that you will be mentally prepared to take the with-trend trade.", "pages": "167", "book": "Trends"}, {"id": "l_discipline_23", "theme": "discipline", "teaching": "Traditional TA teaches trading the breakout of an outside bar with a stop-and-reverse order, but Brooks says this is almost always unwise on a 5-min chart, especially for large outside bars, due to excessive stop risk; if you must, use a money stop or reduce size.", "quote": "it is almost always unwise to enter on a breakout of a 5 minute outside bar, especially if the outside bar is large, because of the greater risk that the distant stop entails... consider using a money stop (like two points in the Emini) or trading fewer contracts.", "pages": "187", "book": "Trends"}, {"id": "l_discipline_24", "theme": "discipline", "teaching": "The single most important rule for handling outside bars (and by extension any uncertain situation): when uncertain about what to do, the best decision is to wait for more price action to develop.", "quote": "The single most important thing to remember about outside bars is that whenever a trader is uncertain about what to do, the best decision is to wait for more price action to develop.", "pages": "190", "book": "Trends"}, {"id": "l_discipline_25", "theme": "discipline", "teaching": "A high 2 (or low 2) is not by itself a valid setup — it requires prior demonstrated strength (e.g., a high 1 leg that broke a trend line, or at least one strong trend bar) beforehand; without that, it is a trap, not a setup.", "quote": "Note that the high 2 long was a terrible buy setup because five of the six prior bars were bear bars and the other bar was a doji. A high 2 alone is not a setup. There first has to be earlier strength.", "pages": "199", "book": "Trends"}, {"id": "l_discipline_26", "theme": "discipline", "teaching": "Suspecting early in the day (via multiple reversals, big tails, uncertainty in the first hour) that it will be a trading-range day should make traders more comfortable scalping both directions and less inclined to hold swing positions.", "quote": "Multiple reversals, big tails, and uncertainty are all characteristics of trading range days... traders were more comfortable placing trades in both directions, scalping a larger portion of their positions, and less inclined to swing.", "pages": "196-197", "book": "Trends"}, {"id": "l_discipline_27", "theme": "discipline", "teaching": "Don't move your protective stop based on the appearance of the entry bar or next bar seconds before it closes ('getting trapped out of a good trade') — rely on your original stop until the bar fully closes.", "quote": "Good entry, good plan, bad discipline. You just let yourself get trapped out of a good trade.", "pages": "202", "book": "Trends"}, {"id": "l_discipline_28", "theme": "discipline", "teaching": "Trade off a single chart/time frame; watching multiple charts and trying to reconcile inconsistencies leads to missed or mistimed decisions in fast markets.", "quote": "It is always better to just watch and trade off one chart because sometimes things happen too quickly for traders to think fast enough to place their orders if they are watching two charts and trying to reconcile the inconsistencies.", "pages": "204", "book": "Trends"}, {"id": "l_discipline_29", "theme": "discipline", "teaching": "A 'good fill' (better price than expected, e.g. a cheaper-than-normal second entry) is a warning sign, not a bonus — it usually means you're misreading the chart and about to be trapped.", "quote": "Whenever the market is offering you a bargain, assume that you are reading the chart incorrectly; usually it is better not to take the trade.", "pages": "210", "book": "Trends"}, {"id": "l_discipline_30", "theme": "discipline", "teaching": "Trade the market that is actually in front of you, not the one that just ended or the one you believe should come next; don't let a prior strong trend bias you against what current price action is showing (e.g., assuming bears must return after a strong reversal).", "quote": "You have to trade the market in front of you, not the one that just ended or the one that you think should soon begin.", "pages": "243 (275)", "book": "Trends"}, {"id": "l_discipline_31", "theme": "discipline", "teaching": "Do not trade micro trend line setups on the 1-minute chart in real time — most traders can't take all the fast, good-looking-bad signals and end up taking too many losers; read the 5-minute chart instead.", "quote": "Although the vast majority of micro trend line breakouts are one- and two-legged pullbacks on the 1 minute chart, you should avoid trading off that chart because you will likely lose money.", "pages": "285, 294", "book": "Trends"}, {"id": "l_discipline_32", "theme": "discipline", "teaching": "Don't buy just because price has retraced a Fibonacci 38/50/62 percent level in a strong bear market — blue-chip stocks can fall 90%+ over years; wait for an actual price-action setup that includes a prior break of the bear trend line.", "quote": "So don't be eager to buy just because a stock is down a Fibonacci 38 percent, 50 percent, or even 62 percent. Wait until there is a price action setup, and it must include a prior break of the bear trend line.", "pages": "319", "book": "Trends"}, {"id": "l_discipline_33", "theme": "discipline", "teaching": "Great swing trends often begin with weak-looking setups (small dojis, two-bar reversals); both entering the low-probability early setup and waiting for the higher-probability setup after breakout are mathematically sound, but waiting risks missing the trade.", "quote": "Great swings usually begin with weak setups... Entering either on the low-probability setup or on the higher-probability ones after the breakout are both mathematically sound approaches.", "pages": "330", "book": "Trends"}, {"id": "l_discipline_34", "theme": "discipline", "teaching": "As soon as you believe the day is a trend day, force yourself to take at least a small position even without a clean setup; use a wide worst-case stop and reduced size, then add and tighten as price confirms.", "quote": "The most important thing that traders must force themselves to do... is as soon as they believe that the day is in a trend, they must take at least a small position.", "pages": "337", "book": "Trends"}, {"id": "l_discipline_35", "theme": "discipline", "teaching": "If you find you missed a with-trend entry, stop looking for countertrend scalps entirely and refocus only on with-trend setups; during a trend day catching every with-trend signal is the most consistent source of money.", "quote": "If you ﬁnd that you missed a with-trend entry, stop looking for countertrend scalps and start trading only with-trend setups. During a trend day, you must try to catch every with-trend signal, because that is the source of the most consistent money.", "pages": "344", "book": "Trends"}, {"id": "l_discipline_36", "theme": "discipline", "teaching": "When you are not confident in your read of a pattern (e.g., ambiguous two-leg vs three-push structure), don't take the trade — there will always be a clearer trade later, and avoiding confusing setups matters because losses are hard to recover from.", "quote": "whenever you are not conﬁdent about your read, do not take the trade—there will always be another trade before too long that will be much clearer to you.", "pages": "352", "book": "Trends"}, {"id": "l_discipline_37", "theme": "discipline", "teaching": "In a strong trend, take every with-trend signal no matter how weak it looks; only take countertrend trades after a trend-line break with a good reversal bar, scalp them entirely, and cap yourself at 2-3 countertrend trades a day — more than that means you're mistrading against the trend.", "quote": "you should be trying to take every with-trend entry, no matter how weak the setup looks, and you should take countertrend entries only after a trend line break... you should not ﬁnd more than two or three countertrend trades in the day.", "pages": "355-356", "book": "Trends"}, {"id": "l_discipline_38", "theme": "discipline", "teaching": "Do not take countertrend scalps against a tight spike-and-channel trend hoping an ABC pullback extends far enough for profit — the tightness of the channel and lack of a prior trend-line break makes this a losing strategy; instead enter with-trend where countertrend traders are getting stopped out.", "quote": "Once you recognize that a spike and channel trend is in effect, do not take countertrend trades in the hope that an ABC pullback will extend far enough for a scalper's profit... Just enter on a stop where the countertrend traders are exiting with their protective stops.", "pages": "331 (363)", "book": "Trends"}, {"id": "l_discipline_39", "theme": "discipline", "teaching": "Most breakouts of trading ranges fail — a general prior that should temper conviction on any single breakout trade unless there are added confirming factors.", "quote": "Most breakouts of trading ranges fail, so traders were expecting the move down to bar 19 to have little follow-through, since it was near the bottom of the trading range.", "pages": "354 (386)", "book": "Trends"}, {"id": "l_discipline_40", "theme": "discipline", "teaching": "Don't give up on a persistently narrow-range day even late into the session — historically (per Brooks' anecdotal count) the range increases before the close in the large majority of cases, even if not up to the full average daily range.", "quote": "Don't give up on the day and assume that it will end up as only a five-point range day, because in 90 percent of the cases the range will increase before the close.", "pages": "363 (395)", "book": "Trends"}, {"id": "l_discipline_41", "theme": "discipline", "teaching": "Weak setups in a strong trend do not mean 'don't trade' — in a strong trend you can enter for almost any reason using a wider stop, because the trend's strength compensates for a poor-looking signal bar.", "quote": "in a strong bear trend like this, you can short for any reason and just use a wider stop", "pages": "430", "book": "Trends"}, {"id": "l_discipline_42", "theme": "discipline", "teaching": "When a market rallies (in a bear trend) without reaching a level that would trigger breakeven stops on earlier shorts, it signals the strongest bears are still in control and reasserting themselves for a resumption of the trend.", "quote": "alert traders were prepared for the bear day to resume, and they noticed how bar 35 missed the breakeven stops on the shorts below bar 11. This means that the strongest bears were reasserting themselves.", "pages": "431", "book": "Trends"}, {"id": "l_discipline_43", "theme": "discipline", "teaching": "Because computers process economic-report data and act on it within a second, giving them a massive speed edge, traders should rarely try to enter at the instant a report is released; instead wait a bar or two until the always-in direction is clear.", "quote": "When the computers have a big edge, traders are at a disadvantage and therefore should rarely enter at the moment a report is released.", "pages": "418", "book": "Trends"}, {"id": "l_discipline_44", "theme": "discipline", "teaching": "On a very strong trend day, shorting is a distraction that causes traders to miss the far more profitable with-trend swing setups; restrict yourself to buying only (or selling only in a strong bear).", "quote": "When a day is this strong, most traders should not short, because shorting would probably be a distraction and result in missing buy setups, which are swing trades in a strong trend and therefore more profitable than scalps.", "pages": "441", "book": "Trends"}, {"id": "l_discipline_45", "theme": "discipline", "teaching": "If you keep losing on every with-trend scalp attempt despite a trend having looked strong, that is a sure sign the market has actually reversed direction and you either failed to see it or refused to believe it.", "quote": "If you continued to take long scalps, you would eventually realize that you were losing on every trade, which is a sure sign that the market is trending in the wrong direction and either you didn't see it or you didn't believe it.", "pages": "449", "book": "Trends"}, {"id": "l_discipline_46", "theme": "discipline", "teaching": "Don't give up on a boring, quiet midday trading range — the best trend-resumption setups (which occur only a couple times a month) reward staying alert for the final-hour breakout rather than assuming the day is dead.", "quote": "Don't give up on the boring midday trading range, because there might be a strong trend in the final hour or so. ... The best forms of this pattern occur only a couple of times a month.", "pages": "455-456", "book": "Trends"}, {"id": "l_discipline_47", "theme": "discipline", "teaching": "Keep inputs minimal — a single price chart with only a 20-EMA is enough; adding indicators, multiple time frames, and outside opinions slows decision-making, causes cherry-picking, and degrades price-action reading rather than improving it.", "quote": "I consistently make far more money by minimizing what I have to consider when placing a trade. All I need is a single chart on my laptop computer with no indicators except a 20-bar exponential moving average.", "pages": "22-23", "book": "Trading Ranges"}, {"id": "l_discipline_48", "theme": "discipline", "teaching": "Trade the time frame you committed to (e.g., the 5-minute chart) and accept that a smaller time frame will show your stop being tested even on a good trade — watching a lower time frame divides attention and degrades decisions.", "quote": "If you want to compete, you must minimize all distractions and all inputs other than what is on the chart in front of you, and trust that if you do you will make a lot of money.", "pages": "25", "book": "Trading Ranges"}, {"id": "l_discipline_49", "theme": "discipline", "teaching": "Before taking a countertrend scalp against a strong trend, be sure you can reliably flip your mindset and reenter with-trend immediately if the trend resumes; if you cannot do this consistently, skip the countertrend scalp and just hold your with-trend position.", "quote": "If you cannot process the two changes of direction reliably, do not take the countertrend trade; simply hold long.", "pages": "51", "book": "Trading Ranges"}, {"id": "l_discipline_50", "theme": "discipline", "teaching": "Beginners tend to keep shorting resistance levels or buying support levels that 'look great but are bad' in a strong trend and refuse pullback entries that 'look bad but are great,' compounding losses; only once there IS a real pullback or reversal will it occur at a genuine resistance/support level.", "quote": "These beginners will mistakenly be shorting at every perceived resistance level, finding their losses growing all day long. They incorrectly keep shorting tops that look great but are bad, and refuse to buy pullbacks that look bad but are great.", "pages": "68-69", "book": "Trading Ranges"}, {"id": "l_discipline_51", "theme": "discipline", "teaching": "One of the cardinal rules of trading reversals: exit (and if possible reverse) on the market's second attempt to resume the old trend against your countertrend position.", "quote": "one of the cardinal rules about trading reversals is to exit on the market's second attempt to resume the trend.", "pages": "87, 112", "book": "Trading Ranges"}, {"id": "l_discipline_52", "theme": "discipline", "teaching": "Do not use bar-counting (high/low 1-2-3-4) setups mechanically inside a tight trading range — in chop, taking every high/low count in both directions will give back a week's profits in an hour.", "quote": "When the market is in a tight trading range, it often reverses direction repeatedly, so if you take every high 1, 2, 3, and 4 and also short every low 1, 2, 3, and 4, over the course of an hour you will lose all of the money that you made in the past week.", "pages": "109", "book": "Trading Ranges"}, {"id": "l_discipline_53", "theme": "discipline", "teaching": "When you are uncertain whether a signal is strong enough, that uncertainty is itself the answer — a genuinely strong, clear signal does not require extended study; when in doubt, wait for a second signal.", "quote": "Whenever you are wondering if a signal is strong enough... the fact that you feel that you need further study should tell you that it is not a clear and strong signal and therefore you should not take the trade.", "pages": "115", "book": "Trading Ranges"}, {"id": "l_discipline_54", "theme": "discipline", "teaching": "When the market fails twice at doing something (e.g., breaking to a new low, or breaking out of a range in one direction), it usually then tries to do the opposite — the basis for double top/bottom and failed-breakout logic.", "quote": "When the market fails twice in an attempt to do something, it usually then tries to do the opposite.", "pages": "94, 101", "book": "Trading Ranges"}, {"id": "l_discipline_55", "theme": "discipline", "teaching": "Higher time frame charts are largely a distraction for a 5-minute trader — occasionally useful for context (e.g., where the 5-min pullback might end), but spending time on them risks missing too many actionable 5-minute signals.", "quote": "Although it is not worth the effort to pay attention to higher time frame charts when trading on a 5 minute chart... spending time looking for tests of those points will be a distraction and cause traders to miss too many 5 minute signals.", "pages": "91, 116", "book": "Trading Ranges"}, {"id": "l_discipline_56", "theme": "discipline", "teaching": "When the market is confirmed to be in a tight trading range, the correct action is usually to stop trading entirely and wait — even for hours or until the next day — rather than accept degraded-probability trades.", "quote": "Once you see that the market is in a tight trading range, don't trade. Instead, simply wait for good swings to return, and they will, usually by the next day.", "pages": "152-153", "book": "Trading Ranges"}, {"id": "l_discipline_57", "theme": "discipline", "teaching": "Losing streaks in a trading range are not statistically anomalous and do not make the next trade more likely to win (unlike a coin flip); markets exhibit ~70%+ serial continuation of the recent regime (trend persists, range persists), the opposite of gambler's-fallacy intuition.", "quote": "When a market is trending, most attempts to reverse fail. When it is in a trading range, most attempts to break out fail. This is the opposite of coin flips... the odds are more like 70 percent or better that what just happened will continue to happen again and again.", "pages": "153", "book": "Trading Ranges"}, {"id": "l_discipline_58", "theme": "discipline", "teaching": "Martingale position-doubling/tripling after losses is mathematically 'sound but paradoxically impossible to apply' because consecutive-loss streaks of 6-10 are common in barbwire, and the position size required to recover becomes absurd (1,024 or 37,179 contracts after 10 doublings/triplings from a 1-lot).", "quote": "A breakout or a winning trade is never overdue, and the market can sustain unsustainable behavior much longer than you can sustain your account.", "pages": "152-153, 156-157", "book": "Trading Ranges"}, {"id": "l_discipline_59", "theme": "discipline", "teaching": "News/report-driven breakouts are usually decided by institutional positioning well before the news (often ~an hour), and financial-media causal narratives about the news are generally irrelevant post-hoc rationalizations — trade the price action, not the narrative.", "quote": "Almost invariably, the breakout will be unfolding over the course of 10 or more bars before it finally succeeds, which might be an hour before the news was released... All that matters to traders is the net result.", "pages": "135", "book": "Trading Ranges"}, {"id": "l_discipline_60", "theme": "discipline", "teaching": "Keep to your declared time frame: a scalp that goes against you must be exited as a scalp, not silently converted into a long-term 'investment' to avoid taking the loss.", "quote": "A common cause of losses is putting on a trade, watching it become a loser, not exiting at your planned stop, and instead convincing yourself that it is fine to convert the trade into an investment.", "pages": "165", "book": "Trading Ranges"}, {"id": "l_discipline_61", "theme": "discipline", "teaching": "Trading rule for simplicity and discipline: require at least two independent reasons before entering a trade (with narrow, defined exceptions — strong-trend pullbacks, trend-line-overshoot reversals, and second entries — where one reason suffices).", "quote": "you need two reasons to take a trade, and any two reasons are good enough.", "pages": "187", "book": "Trading Ranges"}, {"id": "l_discipline_62", "theme": "discipline", "teaching": "Never trade countertrend in a steep trend using simple bar-counting setups (H2/H4, L2/L4) unless there was first a significant, strong-momentum trend-line break or channel overshoot and reversal — bar-count setups are continuation, not reversal, patterns.", "quote": "if there is a steep trend, never trade countertrend, even if there is a high or low 2 or 4, unless there was first a prior significant trend line break or trend channel overshoot and reversal.", "pages": "187", "book": "Trading Ranges"}, {"id": "l_discipline_63", "theme": "discipline", "teaching": "Trading low-probability trades indiscriminately (without proper reward sizing/management) will erase more than all of your gains from good trades.", "quote": "Trading low-probability trades will wipe out more than all of your gains.", "pages": "189", "book": "Trading Ranges"}, {"id": "l_discipline_64", "theme": "discipline", "teaching": "If you are in a losing trade, ask whether you would enter fresh right now at the market with that same stop; if the answer is no, your premise is no longer valid and you should exit, even at a loss.", "quote": "If you are in a losing trade, ask yourself if you would put the trade on now if you were flat. If the answer is no, then get out.", "pages": "203, 210", "book": "Trading Ranges"}, {"id": "l_discipline_65", "theme": "discipline", "teaching": "Don't try to scalp countertrend while waiting for a with-trend pullback setup to form — you'll typically lose on the countertrend scalp and then miss the real with-trend entry out of denial/hope.", "quote": "Invariably, you will lose money on the short scalp and not take the buy setup when it forms. You will be hoping for more down and be in denial that the pullback is about to end.", "pages": "209", "book": "Trading Ranges"}, {"id": "l_discipline_66", "theme": "discipline", "teaching": "Once you believe the always-in direction has flipped, exit and trade the new direction — hope that a prior directional bias will return is never a valid basis for holding, since price is driven by math, not fairness or emotion.", "quote": "Hope is never a sound basis for holding a position, because the market is based on mathematics and not luck, fairness, emotion, karma, or religion.", "pages": "212", "book": "Trading Ranges"}, {"id": "l_discipline_67", "theme": "discipline", "teaching": "Whenever you scale in against a trend, exit (and consider reversing) if the market makes a second move against you; scaling against a trend is especially risky in the final hour (time pressure to cover by the close) and should never be attempted against a genuinely strong trend.", "quote": "Whenever you scale in against a trend, as a general rule you should exit if the market makes a second move against you...it is risky to scale in against any strong trend.", "pages": "213", "book": "Trading Ranges"}, {"id": "l_discipline_68", "theme": "discipline", "teaching": "If you allow yourself to scale in, you must decide the plan (number of adds, sizing, spacing, final stop, average entry) before entering — undisciplined scaling can silently multiply your risk far beyond your normal tolerance.", "quote": "The most important point is that if you are allowing for the possibility of scaling in, you have to have a plan at the outset...you might find yourself holding your usual number of contracts but the stop is so far from your average entry price that your risk is several times greater.", "pages": "213", "book": "Trading Ranges"}, {"id": "l_discipline_69", "theme": "discipline", "teaching": "A weak/marginal signal in the middle of a trading range (e.g., a low-momentum high 1 after small-bodied, tailed bars, or a doji signal bar forcing entry near an extreme) is a fade candidate, not a with-trend entry — read spike strength and signal-bar quality, not just pattern name.", "quote": "Bar 17 was a high 1 long setup, but the bull spike had bars with small bodies and tails. This was not a strong bull spike, and therefore the high 1 should fail. Bears shorted with limit orders at the high of bar 17.", "pages": "220-221", "book": "Trading Ranges"}, {"id": "l_discipline_70", "theme": "discipline", "teaching": "Never trade off the 1-minute chart as a primary chart — the best trades move too fast to catch there, leaving only second-tier trades that erode the account over time; if you must watch it, don't let it distort your 5-minute stops/targets.", "quote": "Do not dial down to a 1-minute chart and tighten your stop because you will lose. ... you will invariably pick too many bad cherries.", "pages": "xxi-xxii", "book": "Reading Price Charts"}, {"id": "l_discipline_71", "theme": "discipline", "teaching": "Ignore news/TV/fundamentals during the trading day; the chart already reflects everything relevant, and news interpretation is unreliable and can distort discipline.", "quote": "Never watch the news during the trading day. If you want to know what a news event means, the chart in front of you will tell you.", "pages": "xix", "book": "Reading Price Charts"}, {"id": "l_discipline_72", "theme": "discipline", "teaching": "When taking a countertrend trade against a strong trend, always wait for the signal bar to fully close before placing the entry order — trend-following institutional activity can completely reverse a bar's appearance in the final seconds before the close.", "quote": "When trading Countertrend against a strong trend, it is imperative to wait for the signal bar to close before you place your order, and then only enter on a stop at 1 tick beyond the bar", "pages": "6", "book": "Reading Price Charts"}, {"id": "l_discipline_73", "theme": "discipline", "teaching": "A setup bar only becomes a 'signal bar' retroactively, once an entry is actually triggered on the next bar; most potential setup bars never become signal bars, and orders that don't fill should simply be cancelled and reassessed.", "quote": "A signal bar is always labeled in hindsight, after the bar has closed and after a trade is entered.", "pages": "11", "book": "Reading Price Charts"}, {"id": "l_discipline_74", "theme": "discipline", "teaching": "For stock entries (vs. futures), placing the entry stop a couple of ticks beyond the setup bar (rather than just 1 tick) helps avoid common one-tick traps where price barely breaks out and instantly reverses.", "quote": "For stocks, it is often better to place the entry stop at a couple of ticks beyond the potential signal bar because one tick traps are common", "pages": "11", "book": "Reading Price Charts"}, {"id": "l_discipline_75", "theme": "discipline", "teaching": "Simplicity beats complexity: relying on a single 5-minute chart (optionally with a 20-EMA) and reading price action carefully outperforms stacking multiple indicators/timeframes, which slows decision-making and causes missed trades and lazy reading.", "quote": "I consistently make far more money by minimizing what I have to consider when placing a trade... if I rely on indicators, I find that I get lazy in my price action reading and often miss the obvious.", "pages": "xvii-xviii", "book": "Reading Price Charts"}, {"id": "l_discipline_76", "theme": "discipline", "teaching": "Excessive trend-channel-line drawing or dropping to the 1-minute chart to find a reversal is a symptom of being in denial about a strong trend and is causing you to miss With Trend trades.", "quote": "If you find yourself drawing many trend channel lines or looking at a I-minute chart, then you are too eager to find a reversal and are likely miss­ing lots of great With Trend trades. You are in denial and are losing money because of it.", "pages": "99", "book": "Reading Price Charts"}, {"id": "l_discipline_77", "theme": "discipline", "teaching": "You need to actively decide, multiple times per day, whether the day resembles a known trend pattern; if it does, force yourself to take every With Trend entry rather than being distracted by Countertrend setups.", "quote": "You need to decide many times every day if the day resembles any of the types of trends de­scribed later in this chapter, and if it does, force yourself to take the With Trend trades.", "pages": "71, 81-82", "book": "Reading Price Charts"}, {"id": "l_discipline_78", "theme": "discipline", "teaching": "After a series of winning With Trend trades, be suspicious of renewed strength without a larger pullback first — it might be a trap (Failed Final Flag) setting up. Better to miss a possible trade than to feel invincible.", "quote": "It is better to wait for more price action and miss a possible trap than to feel invincible and fearless because you fooled yourself into believing that you are playing with someone else's money. If you trade, it will likely become someone else's money.", "pages": "127", "book": "Reading Price Charts"}, {"id": "l_discipline_79", "theme": "discipline", "teaching": "Patterns are rarely perfect — a second spike in a double top/bottom flag commonly overshoots or undershoots the first by a tick or so; traders should not require exact matches.", "quote": "the second spike can slightly overshoot or undershoot the first one", "pages": "130, 133", "book": "Reading Price Charts"}, {"id": "l_discipline_80", "theme": "discipline", "teaching": "When you feel you need extensive further study to decide if a signal is strong enough (e.g., checking an inverse chart), that uncertainty itself is a signal — it means the setup is not clear/strong enough to trade.", "quote": "just the fact that you feel that you need further study should tell you that it is not a clear and strong signal and therefore you should not take the trade.", "pages": "152-153", "book": "Reading Price Charts"}, {"id": "l_discipline_81", "theme": "discipline", "teaching": "Checking an inverse-correlated instrument's chart (e.g., SDS vs SPY/Emini) can clarify whether a marginal setup is genuinely tradable — if you wouldn't take the mirror-image trade on the inverse chart, don't take it on the original.", "quote": "Since these charts ar.e essentially just the inverse of one another, if you would not buy on the SDS, you should not sell on the Emini.", "pages": "153", "book": "Reading Price Charts"}, {"id": "l_discipline_82", "theme": "discipline", "teaching": "Hard-to-read swings on a lower timeframe (e.g., 5-min) can appear as clean, small trading ranges on a higher timeframe (15- or 60-min); switch timeframes when the chart is unreadable.", "quote": "Trading ranges on a 5-minute chart that last for hours with many big, hard-to-read swings can be small, clean, and easy to read trading ranges on a 15- or 60-minute chart, so it sometimes is helpful to look at higher time frames.", "pages": "163-164", "book": "Reading Price Charts"}, {"id": "l_discipline_83", "theme": "discipline", "teaching": "When uncertain, waiting is always the smart move, even though it feels like an overdue entry is being missed — it doesn't make sense to trade low-probability setups.", "quote": "Whenever you are not certain, the best course always is to wait, which is difficult to do when you feel like an entry is overdue.", "pages": "169", "book": "Reading Price Charts"}, {"id": "l_discipline_84", "theme": "discipline", "teaching": "The middle third of the trading day, when price is also in the middle third of the day's range, is a low-probability, hard-to-read regime (esp. on non-trend days) — traders (especially those not yet consistently profitable) should trade sparingly or not at all during this window and instead wait for a test of the day's high/low.", "quote": "A trader who is not yet successful should not trade when the market is in the middle of the day while it is also in the middle of the day's range. This change to her trading alone can be the difference between being a loser and a winner.", "pages": "174-175", "book": "Reading Price Charts"}, {"id": "l_discipline_85", "theme": "discipline", "teaching": "On trading-range days it's better to not place marginal trades and preserve morning profits than to give them back trying to force reads on chop; the goal is total account P&L, not trade count.", "quote": "The goal is to make money, and sometimes your account is much better served by your not placing trades and instead waiting for strong setups.", "pages": "175", "book": "Reading Price Charts"}, {"id": "l_discipline_86", "theme": "discipline", "teaching": "Small individual scalps within a bigger sequence illustrate recurring behavior but traders should concentrate on trading the bigger turning points rather than every micro Breakout Pullback.", "quote": "Many of these trades are tiny scalps and should not be the focus of the majority of traders...Traders should concentrate on trading the bigger turning points.", "pages": "189", "book": "Reading Price Charts"}, {"id": "l_discipline_87", "theme": "discipline", "teaching": "If you find yourself drawing many trend channel lines, you are too eager to call a reversal and are likely missing With-Trend trades; treat minor trend channel line overshoots as With-Trend setups and enter where the losing countertrend traders are getting stopped out.", "quote": "If you find yourself drawing many trend channel lines, then you are too eager to find a reversal and are likely missing lots of great With Trend trades...enter where the losers are exiting on their protective stops.", "pages": "203", "book": "Reading Price Charts"}, {"id": "l_discipline_88", "theme": "discipline", "teaching": "Chasing countertrend scalps on smaller timeframes (1-min, 3-min) during a strong trend is a losing game of attrition ('death by mathematics') — small losses accumulate to 6-7 losers whose combined loss can't be recovered, even though occasional lucky wins get scalped for only a few ticks instead of ridden.", "quote": "Invariably, the few small losses tum into six or seven and their combined effect is a loss that cannot be recovered later in the day...Death by mathematics.", "pages": "205", "book": "Reading Price Charts"}, {"id": "l_discipline_89", "theme": "discipline", "teaching": "During a strong trend, treat every 1- or 3-minute reversal attempt as a With-Trend setup rather than trading it countertrend; think about where the losing countertrend traders will have to exit and place your entry stop there — you consistently transfer money from their accounts to yours.", "quote": "Rather than joining them, think about where they will have to sell out of their longs and place an entry sell stop at that very location. You will consistently succeed in transferring money from their accounts into yours, which is the primary objective of trading.", "pages": "223", "book": "Reading Price Charts"}, {"id": "l_discipline_90", "theme": "discipline", "teaching": "Before shorting a strong bull (or buying a strong bear), you need the countertrend side to show they've already been willing to be aggressive once and failed — short their second attempt, not their first, since the first usually fails.", "quote": "Before shorting a strong bull, you first need the bears to show that they have already been willing to be aggressive. You look to short their second attempt at pushing the market down, not their first, since the first usually fails.", "pages": "227", "book": "Reading Price Charts"}, {"id": "l_discipline_91", "theme": "discipline", "teaching": "When bars overlap heavily with several dojis (bulls/bears balanced), a big fast move is unlikely — either wait for more price action or take the trade while preparing for an immediate adverse pullback.", "quote": "This rally had many overlapping bars and several dojis, indicating that the bulls and bears were fairly balanced and a big, fast move down was unlikely.", "pages": "254", "book": "Reading Price Charts"}, {"id": "l_discipline_92", "theme": "discipline", "teaching": "It is far better not to trade countertrend off the 1-minute chart since most 1-minute reversals fail — trade almost always in the direction of the 5-minute chart.", "quote": "It is far better to not trade Countertrend off 1-minute charts since most reversals fail. You should almost always trade in the direction of the 5-minute chart.", "pages": "260", "book": "Reading Price Charts"}, {"id": "l_discipline_93", "theme": "discipline", "teaching": "Trading-range breakouts (including outside bars, which are one-bar trading ranges) mostly fail, so you should only rarely enter a breakout of an outside bar because the risk (to the opposite extreme of the large bar) is too great.", "quote": "Outside bars are basically one-bar trading ranges, and most trading range breakout entries fail. You should only rarely enter on a breakout of an outside bar because the risk is too great.", "pages": "268", "book": "Reading Price Charts"}, {"id": "l_discipline_94", "theme": "discipline", "teaching": "Basing a trade on the belief that the market is 'overdue' for a correction is a losing approach — trends can extend far beyond what most traders imagine; only trade what is actually happening, not what you believe should happen.", "quote": "Basing a trade on a belief that the market is overdue for a correction is a losing approach to trading. Trends can go much further than most traders could ever imagine.", "pages": "276", "book": "Reading Price Charts"}, {"id": "l_discipline_95", "theme": "discipline", "teaching": "Whenever you find yourself drawing multiple trend channel lines to justify a countertrend reversal you 'can't believe' isn't happening, you are blinded by anxiety and should instead recognize you are in a strong trend and trade With Trend.", "quote": "Whenever You Find Yourself Drawing Multiple-Trend Channel Lines, You Are Invariably Blinded to What Is in Front of You by Your Anxiety Over What You Can't Believe Is Happening.", "pages": "239", "book": "Reading Price Charts"}, {"id": "l_discipline_96", "theme": "discipline", "teaching": "When a trader is uncertain about holding a countertrend position, moving the stop to breakeven lets a stop-run become informative: if hit but the trade thesis still looks good, the stop run itself can set up a fresh Breakout Pullback entry.", "quote": "They would have moved their stops to breakeven, thinking that if the stop was hit but the trade was still good, the stop run would set up a Breakout Pullback long setup.", "pages": "267", "book": "Reading Price Charts"}, {"id": "l_discipline_97", "theme": "discipline", "teaching": "Beginners should trade only a single market and a single 5-minute chart until consistently profitable — trying to juggle multiple charts before mastering one is costly.", "quote": "Also, until you are profitable, you should only watch a single market because if you are not yet able to juggle one ball, it is foolish and expensive to try to juggle many more.", "pages": "283", "book": "Reading Price Charts"}, {"id": "l_discipline_98", "theme": "discipline", "teaching": "Never trade the 1-minute chart as a primary tool — Brooks strongly recommends against it even though it 'looks easy,' because it wears down accounts over time; the only legitimate uses are (1) entering With-Trend High/Low 1-2 pullbacks off a runaway 5-minute trend when flat, and (2) taking early EMA-touch reversals in a strongly trending stock using a 90-bar EMA as a 5-minute-20-EMA surrogate.", "quote": "Let me again stress that I strongly recommend against ever looking at the I-minute chart because it looks so easy that you will constantly keep trying to do it successfully and you will constantly wear down your account over time. Don't do it!", "pages": "286, 287", "book": "Reading Price Charts"}, {"id": "l_discipline_99", "theme": "discipline", "teaching": "Only fade a strong trend if there was first a trendline break, and a Countertrend trade in a strong trend needs a 5-minute (not 3- or 1-minute) reversal bar.", "quote": "Only fade a strong trend if there was first a trendline break. Also, a Countertrend trade in a strong trend needs a 5-minute (not a 3 or I-minute) reversal bar.", "pages": "294", "book": "Reading Price Charts"}, {"id": "l_discipline_100", "theme": "discipline", "teaching": "The core rule of the Always-In approach: only enter or reverse when there is a clear and strong setup; otherwise rely on the breakeven stop even if it gives back swing gains.", "quote": "The key to this approach is to only enter or reverse when there is a clear and strong setup. If not, rely on your breakeven stop, even though you may give back all of the gains on your swing portion.", "pages": "300", "book": "Reading Price Charts"}, {"id": "l_discipline_101", "theme": "discipline", "teaching": "Require at least two independent reasons to take a With-Trend trade or any trade in a trading-range day; any two qualifying reasons are sufficient to act without hesitation.", "quote": "One of the most important rules is that you need two reasons to take a With Trend trade or any trade in a trading range day, and any two reasons are good enough.", "pages": "301-302", "book": "Reading Price Charts"}, {"id": "l_discipline_102", "theme": "discipline", "teaching": "Only three situations require just one reason to enter: (1) every pullback in a strong trend that doesn't follow a climax/failed-flag breakout, (2) a trend channel line overshoot with a good reversal bar, and (3) a second entry (the first entry supplies the second reason).", "quote": "There are only a few situations when you only need one reason to enter a trade... Also, if there was a trend channel line overshoot and a good reversal bar, you can fade the move. The only other time...is when there is a second entry.", "pages": "302", "book": "Reading Price Charts"}, {"id": "l_discipline_103", "theme": "discipline", "teaching": "Checklist of qualifying reasons to enter (need two or more): reversal bar, good signal-bar pattern, EMA pullback in a trend (especially two-legged), Breakout Pullback, Breakout Test, High/Low 2 or 4 (with prior trendline break if fading a strong trend), and failure of anything (prior high/low, flag breakout, overshoot reversal, 5-tick failure).", "quote": "Here are some possible reasons for entering a trade (remember, you need two or more): Reversal bar / Good signal bar pattern / EMA pullback in a trend, especially if two legged / Breakout Pullback / Breakout Test / High/Low 2 or 4...", "pages": "302", "book": "Reading Price Charts"}, {"id": "l_discipline_104", "theme": "discipline", "teaching": "When a setup looks weak, skip it and wait — weak setups tend to fail, but they often produce a second entry that becomes a strong setup worth taking.", "quote": "When a setup looks weak, it is best to not take it and wait for another opportunity. If it is weak, it will likely fail and you cannot take needless risk. Often a weak setup will have a second entry, in which case it becomes a strong setup.", "pages": "304", "book": "Reading Price Charts"}, {"id": "l_discipline_105", "theme": "discipline", "teaching": "Trade the chart as it is now, not as it was earlier in the day — once a bull leg is clearly over (e.g., price stuck below the EMA for many bars after a trendline break), only look for shorts.", "quote": "Trade what is there now, not what was there earlier in the day.", "pages": "306", "book": "Reading Price Charts"}, {"id": "l_discipline_106", "theme": "discipline", "teaching": "Low-probability trades will wipe out more than all of your gains.", "quote": "Trading low probability trades will wipe out more than all of your gains.", "pages": "306", "book": "Reading Price Charts"}, {"id": "l_discipline_107", "theme": "discipline", "teaching": "Trade opening reversals mindlessly off standard price-action setups without needing to reconcile the apparent contradiction with fundamentals.", "quote": "Don't give it any thought. Instead, just look for standard price action setups, and trade them mindlessly without giving any consideration to the reasons why the reversal is taking place.", "pages": "317", "book": "Reading Price Charts"}, {"id": "l_discipline_108", "theme": "discipline", "teaching": "Always ask what is going on in the market context — a failure of a failure (a 'failed failure') is usually a good entry in the direction of the original move.", "quote": "Always think about what is going on... failed failures are usually good entries.", "pages": "321", "book": "Reading Price Charts"}, {"id": "l_discipline_109", "theme": "discipline", "teaching": "Reversal setups often develop quickly, leaving little time to convince yourself of validity — if a strong trend bar is the signal bar, take the trade; if you need more time, at least take a half or quarter position so you're involved, then add on the First Pullback.", "quote": "if there is a strong trend bar for the signal bar, the chances of success are good, and you must take the trade... at least take a half or a quarter position because the trade might suddenly move very far very fast.", "pages": "341", "book": "Reading Price Charts"}, {"id": "l_discipline_110", "theme": "discipline", "teaching": "Second entries into a setup are always worth taking, especially on nontrend/range days, even if the reversal bar itself is weak.", "quote": "Second entries are always good, especially on nontrend days, and this alone was all the reason that a trader needed to go long, even with the weak reversal bar.", "pages": "347", "book": "Reading Price Charts"}, {"id": "l_discipline_111", "theme": "discipline", "teaching": "A day trader will generally make more money by not trading off daily charts, because divided attention reduces day-trade profits more than the occasional daily-chart win is worth.", "quote": "A day trader will make more money if he does not trade off the daily charts because it is likely that his overall profit will be reduced by being unable to give his full attention to his day trades.", "pages": "347", "book": "Reading Price Charts"}, {"id": "l_discipline_112", "theme": "discipline", "teaching": "Avoiding bad trades matters as much as taking good ones, because bad trades routinely erase more than good trades earn.", "quote": "One important component to making money is avoiding bad trades that invariably erase much more than what you will have earned from your good trades.", "pages": "353", "book": "Reading Price Charts"}, {"id": "l_discipline_113", "theme": "discipline", "teaching": "One-minute charts are a common trading mistake: patterns look easy to spot in hindsight at day's end but are very hard to trade correctly in real time.", "quote": "Another common mistake is to look at 1-minute charts. The trades are very easy to spot at the end of the day, but most are hard to trade real time.", "pages": "356-357", "book": "Reading Price Charts"}, {"id": "l_discipline_114", "theme": "discipline", "teaching": "Do not use Fibonacci retracement levels when trading; they are rarely better than simply eyeballing an acceptable retracement.", "quote": "don't look at Fibonacci numbers when you trade because they are rarely any better than just an eyeball estimate of an acceptable level of retracement.", "pages": "360", "book": "Reading Price Charts"}, {"id": "l_discipline_115", "theme": "discipline", "teaching": "Countertrend trades are only acceptable after both a genuine break of a significant trendline AND a strong reversal bar; absent both, treat any apparent reversal as a trap.", "quote": "Never trade Countertrend unless the setup is perfect. It needs both a prior strong trendline break and a strong reversal bar.", "pages": "402", "book": "Reading Price Charts"}, {"id": "l_discipline_116", "theme": "discipline", "teaching": "There are no rigid rules in trading, only guidelines, because price action is inherently ambiguous ('gray fog'); close-enough pattern recognition is acceptable.", "quote": "Everything that you see is in a gray fog. Nothing is perfectly clear. Close is close enough. If something looks like a reliable pattern, it will likely trade like a reliable pattern.", "pages": "407", "book": "Reading Price Charts"}, {"id": "l_discipline_117", "theme": "discipline", "teaching": "Reading price action correctly is necessary but not sufficient for profitability — you must also select only the best trades and follow a written business plan/rules.", "quote": "Simply understanding price action is not enough to make you profitable. You must learn how to take the best trades and follow your rules... you must follow your plan.", "pages": "407", "book": "Reading Price Charts"}, {"id": "l_discipline_118", "theme": "discipline", "teaching": "Simplicity is a competitive advantage: trade one chart, one time frame (5-minute), no indicators beyond the EMA; adding complexity when unprofitable only makes things worse.", "quote": "Simple is better. You don't need indicators, and you should only look at one chart. If you can't make money off a single chart with no indicators, adding more things to analyze will only make it more difficult.", "pages": "407", "book": "Reading Price Charts"}, {"id": "l_discipline_119", "theme": "discipline", "teaching": "Master one market, one time frame, and one concept (price action) before adding complexity — don't try to juggle multiple charts/markets while still unprofitable.", "quote": "If you can't juggle one ball, don't try to juggle two or three... start with one chart, one market, one time frame (the 5-minute), and one concept.", "pages": "408", "book": "Reading Price Charts"}, {"id": "l_discipline_120", "theme": "discipline", "teaching": "Before every trade ask whether it is one of the best of the day (one institutions would wait for); after two consecutive losses within ~15 minutes, ask the same question — if the answer is no, you are overtrading.", "quote": "When you are about to take any trade, always ask yourself if the setup is one of the best of the day... If you have two consecutive losers within 15-minutes or so, ask yourself if those were trades that the institutions have been waiting hours to take.", "pages": "410", "book": "Reading Price Charts"}, {"id": "l_discipline_121", "theme": "discipline", "teaching": "Daily deliberate practice — printing the chart and annotating every price-action feature you can identify — is prescribed as the path to fluent real-time reading, to be done for years.", "quote": "Print out the 5-minute Emini chart every day (and stock charts, if you trade stocks) and write on the chart every setup that you see... Do this every day for years until you can look at any part of any chart and instantly understand what is happening.", "pages": "411", "book": "Reading Price Charts"}, {"id": "l_discipline_122", "theme": "discipline", "teaching": "A losing streak of two or three trades, or a losing day, is diagnostic of overtrading/impatience — likely causes are chasing low-risk early entries on 1-/3-minute charts, trading countertrend, or trading in Barb Wire.", "quote": "If you lost on two or three trades in a row or if you lost money on the day, you are overtrading and not being patient... you are trading Countertrend, or you are trading in Barb Wire. Bad habits always erase more than your winnings.", "pages": "411", "book": "Reading Price Charts"}, {"id": "l_discipline_123", "theme": "discipline", "teaching": "Never cherry-pick trades from all setups seen during the day; instead either swing-trade only the 2-3 best setups of the day, or commit to scalping every valid setup (a harder discipline suited to few personalities).", "quote": "Never cherry pick because you will invariably pick enough rotten cherries to end up a loser. Either swing trade and look to take only the best two or three of the best setups of the day, or scalp and take every valid setup.", "pages": "411", "book": "Reading Price Charts"}, {"id": "l_discipline_124", "theme": "discipline", "teaching": "Discipline is the single most important trait of winning traders — understanding price action is easy, but executing simple rules consistently, day after day, is extremely difficult; even occasional lapses can be the difference between success and failure.", "quote": "Discipline is the single most important characteristic of winning traders. Trading is easy to understand but difficult to do... even occasional self-indulgences can be the difference between success and failure.", "pages": "411-412", "book": "Reading Price Charts"}, {"id": "l_discipline_125", "theme": "discipline", "teaching": "Reading price action well is necessary but not sufficient: because institutions are already extremely smart and any edge is always small and fleeting (someone must be on the other side), even a trader who knows all the patterns can still lose money by executing badly or hesitating; skillful execution matters as much as pattern knowledge.", "quote": "Because of that balance, any edge that anyone has is always going to be extremely small, and any small mistake will result in a loss, no matter how well a person reads a chart. Although it is very difficult to make money as a trader without understanding price action, that knowledge alone is not enough.", "pages": "19-20", "book": "Reversals"}, {"id": "l_discipline_126", "theme": "discipline", "teaching": "Trading is a hard, zero-sum game against smart competitors; durable edges are small and require relentless discipline — discipline means doing what you don't want to do (waiting, not overtrading).", "quote": "Discipline simply means doing what you do not want to do... you have to patiently wait to take only the best trades.", "pages": "22", "book": "Reversals"}, {"id": "l_discipline_127", "theme": "discipline", "teaching": "If you find yourself drawing many trend channel lines and seeing lots of wedge reversal setups during a trend, that's a sign you're too eager for a reversal and are missing good with-trend trades; wait for a real trend-line break before looking countertrend.", "quote": "If you find yourself drawing many trend channel lines during a trend and seeing lots of wedge reversal setups, then you are too eager to find a reversal and are likely missing many great with-trend trades.", "pages": "40", "book": "Reversals"}, {"id": "l_discipline_128", "theme": "discipline", "teaching": "A single institution can no longer move the market alone (a single micro-channel program might represent $6B and is still small relative to daily Emini volume); all sustained moves reflect many institutions/algorithms agreeing simultaneously, so no 'inside information' edge exists — reading the chart is the only edge available.", "quote": "This means that a single institution cannot move the market very far or for very long, and that all movement on the chart is caused by many institutions trading in the same direction at the same time.", "pages": "34", "book": "Reversals"}, {"id": "l_discipline_129", "theme": "discipline", "teaching": "Trading well over a large sample (100+ trades) is what matters, not any single trade's outcome; occasional strings of losses (even several in a row) are expected due to the probability curve and should not trigger emotional deviation ('gambling') from the system.", "quote": "The key is whether the approach makes money over 100 trades, not over the first one or two... I cannot remember the last time I saw as many as four good signals fail in a row.", "pages": "26,28", "book": "Reversals"}, {"id": "l_discipline_130", "theme": "discipline", "teaching": "Newsletter writers who sell fear profit from being right only 20% of the time on catastrophic predictions, because rare catastrophes generate more attention/fear than frequent accurate forecasts would; traders should bet with the higher-probability continuation (e.g., trading range breaking out with the trend, ~80% odds) rather than the feared crash scenario.", "quote": "They need catastrophic events to be rare so that people worry about their financial death. If crashes were common, people would learn to trade them and there wouldn't be enough fear for these writers to stay rich.", "pages": "46", "book": "Reversals"}, {"id": "l_discipline_131", "theme": "discipline", "teaching": "When both the bull and bear cases for a reversal have merit, the market is most likely in a trading range, and traders should size down expectations to scalping (2-4 points) rather than swinging.", "quote": "Both the bull and bear cases were valid, which usually means that the market is in a trading range, which it was.", "pages": "52", "book": "Reversals"}, {"id": "l_discipline_132", "theme": "discipline", "teaching": "Do not buy at the top of a trading range even on a bullish two-bar reversal setup — it's rarely good to buy strength at range resistance; most bulls exit below a strong bear reversal bar that follows.", "quote": "Although the next bar was a bull trend bar and a two-bar reversal buy setup, it is rarely good to buy at the top of a trading range.", "pages": "52", "book": "Reversals"}, {"id": "l_discipline_133", "theme": "discipline", "teaching": "Rule of thumb: never take a reversal trade of any size unless there is at least a double top/bottom, a micro double top/bottom, or a final flag present.", "quote": "Most traders will not take any reversal trade, no matter how minor, unless there is at least a double top or bottom, a micro double top or bottom, or a final flag.", "pages": "45, 52, 60", "book": "Reversals"}, {"id": "l_discipline_134", "theme": "discipline", "teaching": "Entering on the earliest sign of a reversal (e.g., the channel-line break itself) is low-probability; it's usually better to wait to see how strong the breakout of the channel is, and if strong, enter on the pullback instead. This applies fractally — pullbacks within larger trends, micro-channels, channels after spikes, and broad channels.", "quote": "Some traders like to enter on the earliest sign that a trend is reversing, such as when it is breaking out of the channel. However, this is a low-probability style of trading... it is usually better to wait to see how strong the breakout is. If it is strong, then look to enter on the pullback.", "pages": "60", "book": "Reversals"}, {"id": "l_discipline_135", "theme": "discipline", "teaching": "When there is a strong trend, do not trade countertrend reversal attempts on lower timeframe charts (1-min, 3-min) - nearly all such reversals fail; smaller timeframes should only be used to find with-trend entries, never countertrend ones, when the higher (5-min) timeframe is trending.", "quote": "It is far more profitable and less stressful to simply look for with-trend entries on the 5 minute chart and never look at the 1 minute chart. The only valid reason to look at 1 minute short signals is to find long (with-trend) entries.", "pages": "68-69", "book": "Reversals"}, {"id": "l_discipline_136", "theme": "discipline", "teaching": "Follow the 5-minute chart's own reversal signals rather than hunting across many timeframes for a 'support level' - if the 5-min

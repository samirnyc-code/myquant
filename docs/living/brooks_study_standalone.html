<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>The Brooks Codex</title><style>html,body{margin:0;padding:0}</style></head><body>
<style>
:root{
 --bg:#0c1016; --panel:#141b24; --panel2:#1b2430; --ink:#e8eef6; --dim:#93a2b4; --faint:#6b7a8c;
 --line:#25303d; --gold:#e6b23a; --gold-dim:#8a6d1f; --red:#ec5b5b; --red-dim:#7d2b2b;
 --green:#45c26a; --blue:#5aa0ff; --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
 --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
@media (prefers-color-scheme:light){:root{
 --bg:#eef1f5; --panel:#ffffff; --panel2:#f4f6f9; --ink:#141b24; --dim:#54636f; --faint:#8593a1;
 --line:#dbe2ea; --gold:#b1810c; --gold-dim:#e6cf94; --red:#c8352f; --red-dim:#f0c4c2; --green:#1f9a4d; --blue:#2f6fd6;
}}
:root[data-theme="dark"]{
 --bg:#0c1016; --panel:#141b24; --panel2:#1b2430; --ink:#e8eef6; --dim:#93a2b4; --faint:#6b7a8c;
 --line:#25303d; --gold:#e6b23a; --gold-dim:#8a6d1f; --red:#ec5b5b; --red-dim:#7d2b2b; --green:#45c26a; --blue:#5aa0ff;
}
:root[data-theme="light"]{
 --bg:#eef1f5; --panel:#ffffff; --panel2:#f4f6f9; --ink:#141b24; --dim:#54636f; --faint:#8593a1;
 --line:#dbe2ea; --gold:#b1810c; --gold-dim:#e6cf94; --red:#c8352f; --red-dim:#f0c4c2; --green:#1f9a4d; --blue:#2f6fd6;
}
*{box-sizing:border-box}
#bx{font-family:var(--sans);color:var(--ink);background:var(--bg);min-height:100vh;line-height:1.5;
 -webkit-font-smoothing:antialiased}
#bx .wrap{max-width:1100px;margin:0 auto;padding:0 20px}
#bx header{border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--bg));
 position:sticky;top:0;z-index:20;backdrop-filter:blur(6px)}
#bx .top{display:flex;align-items:center;gap:16px;padding:14px 20px;max-width:1100px;margin:0 auto;flex-wrap:wrap}
#bx .brand{display:flex;flex-direction:column;gap:2px;margin-right:auto}
#bx .brand b{font-size:19px;letter-spacing:.14em;text-transform:uppercase;font-weight:800}
#bx .brand b span{color:var(--gold)}
#bx .brand small{font-family:var(--mono);color:var(--dim);font-size:11.5px;letter-spacing:.04em}
#bx .prog{font-family:var(--mono);font-size:12px;color:var(--dim);text-align:right;line-height:1.35}
#bx .prog b{color:var(--gold);font-size:15px}
#bx .tbtn,#bx .icon{font-family:var(--mono);font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;
 background:transparent;color:var(--dim);border:1px solid var(--line);border-radius:7px;padding:8px 12px;cursor:pointer;
 transition:.15s}
#bx .icon{padding:8px 10px}
#bx .tabs{display:flex;gap:8px;padding:0 20px 12px;max-width:1100px;margin:0 auto;flex-wrap:wrap}
#bx .tbtn:hover{color:var(--ink);border-color:var(--dim)}
#bx .tbtn.on{color:var(--bg);background:var(--gold);border-color:var(--gold);font-weight:700}
#bx .tbtn.on.red{background:var(--red);border-color:var(--red);color:#fff}
#bx main{padding:26px 0 80px}
#bx h2.vh{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:0 0 4px;font-weight:700}
#bx .lead{color:var(--faint);font-size:14px;margin:0 0 20px;max-width:70ch}
#bx .chips{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 20px}
#bx .chip{font-family:var(--mono);font-size:11.5px;letter-spacing:.03em;padding:5px 10px;border-radius:20px;
 border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer}
#bx .chip.on{background:var(--panel2);color:var(--ink);border-color:var(--gold)}
#bx .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
/* flip card */
#bx .card{perspective:1400px;min-height:210px;cursor:pointer}
#bx .inner{position:relative;width:100%;height:100%;min-height:210px;transition:transform .5s;transform-style:preserve-3d}
#bx .card.flip .inner{transform:rotateY(180deg)}
#bx .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:12px;
 background:var(--panel);padding:18px;display:flex;flex-direction:column;gap:10px;overflow:auto}
#bx .face.back{transform:rotateY(180deg);background:var(--panel2)}
#bx .rulet{font-size:18px;font-weight:650;line-height:1.4;text-wrap:balance;margin-top:6px}
#bx .card.red .front{border-left:3px solid var(--red)}
#bx .card.gold .front{border-left:3px solid var(--gold)}
#bx .toprow{display:flex;align-items:center;gap:8px}
#bx .badge{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
 padding:3px 8px;border-radius:5px;background:var(--panel2);color:var(--dim);border:1px solid var(--line)}
#bx .badge.g{color:var(--gold);border-color:var(--gold-dim)}
#bx .badge.r{color:var(--red);border-color:var(--red-dim)}
#bx .rank{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:auto}
#bx .star{margin-left:auto;font-size:17px;cursor:pointer;color:var(--faint);background:none;border:none;line-height:1}
#bx .star.on{color:var(--gold)}
#bx .why{color:var(--dim);font-size:13.5px;font-style:italic}
#bx .q{font-size:13px;color:var(--ink);border-left:2px solid var(--gold);padding-left:11px;line-height:1.55}
#bx .card.red .q{border-color:var(--red)}
#bx .cite{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.03em;margin-top:auto}
#bx .fliphint{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.05em;margin-top:auto}
#bx .instead{font-size:14px}#bx .instead b{color:var(--green)}
/* zoom-to-center */
#bx .zoom-ov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
 background:rgba(4,7,11,.74);backdrop-filter:blur(3px);opacity:0;transition:opacity .35s}
#bx .zoom-ov.show{opacity:1}
#bx .zoom-wrap{width:min(560px,90vw);height:min(64vh,600px);perspective:1600px;
 transition:transform .44s cubic-bezier(.22,1,.36,1);will-change:transform}
#bx .zoom-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s;cursor:pointer}
#bx .zoom-wrap.flip .zoom-inner{transform:rotateY(180deg)}
#bx .zoom-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;border:1px solid var(--line);
 background:var(--panel);padding:34px 30px;display:flex;flex-direction:column;gap:18px;
 box-shadow:0 34px 90px rgba(0,0,0,.55);overflow:auto}
#bx .zoom-face.back{transform:rotateY(180deg);background:var(--panel2)}
#bx .zoom-wrap.gold .zoom-face.front{border-top:4px solid var(--gold)}
#bx .zoom-wrap.red .zoom-face.front{border-top:4px solid var(--red)}
#bx .zoom-wrap.lib .zoom-face.front{border-top:4px solid var(--blue)}
#bx .zoom-face .rulet.lib{font-size:20px;font-weight:600;line-height:1.45}
#bx .zoom-wrap.red .zoom-face .q{border-color:var(--red)}
#bx .zoom-face .rulet{font-size:26px;margin-top:2px}
#bx .zoom-face .why{font-size:16px}
#bx .zoom-face .instead{font-size:17px}
#bx .zoom-face .q{font-size:16.5px;line-height:1.62}
#bx .zoom-face .cite{font-size:12px}
#bx .zoom-face .fliphint{font-size:11px}
#bx .zoom-x{position:fixed;top:16px;right:20px;z-index:101;font-size:18px;background:var(--panel);color:var(--ink);
 border:1px solid var(--line);border-radius:10px;width:44px;height:44px;cursor:pointer}
#bx .zoom-x:hover{border-color:var(--dim)}
#bx .zoom-ctl{position:fixed;left:0;right:0;bottom:26px;z-index:101;display:flex;gap:12px;justify-content:center;padding:0 16px}
#bx .zoom-btn{font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:.02em;padding:12px 22px;border-radius:11px;
 border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;box-shadow:0 10px 28px rgba(0,0,0,.4)}
#bx .zoom-btn:hover{border-color:var(--dim);transform:translateY(-1px)}
#bx .zoom-btn.back{background:var(--gold);color:var(--bg);border-color:var(--gold)}
@media (prefers-reduced-motion:reduce){#bx .zoom-wrap,#bx .zoom-inner,#bx .zoom-ov{transition:opacity .2s}}
/* library */
#bx .search{width:100%;max-width:420px;font-family:var(--mono);font-size:13px;padding:10px 13px;border-radius:9px;
 border:1px solid var(--line);background:var(--panel);color:var(--ink);margin-bottom:20px}
#bx .lib-theme{margin:26px 0 12px;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);
 font-weight:700;display:flex;align-items:center;gap:10px}
#bx .lib-theme .n{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:0}
#bx .lib-theme::after{content:"";flex:1;height:1px;background:var(--line)}
#bx .litem{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,transform .15s}
#bx .litem:hover{border-color:var(--gold);transform:translateY(-1px)}
#bx .litem p{margin:0 0 8px;font-size:15px;line-height:1.5}
#bx .litem .q{font-size:12.5px;color:var(--dim)}
/* quiz */
#bx .quiz{max-width:640px;margin:0 auto;text-align:center}
#bx .qcard{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:34px 26px;min-height:280px;
 display:flex;flex-direction:column;gap:16px;justify-content:center}
#bx .qprompt{font-size:14px;color:var(--dim);letter-spacing:.04em;text-transform:uppercase;font-family:var(--mono)}
#bx .qwhy{font-size:20px;line-height:1.45;text-wrap:balance;font-weight:600}
#bx .qans{font-size:16px;color:var(--gold);line-height:1.5;border-top:1px dashed var(--line);padding-top:16px}
#bx .qbtns{display:flex;gap:12px;justify-content:center;margin-top:8px;flex-wrap:wrap}
#bx .big{font-family:var(--sans);font-size:14px;font-weight:700;padding:12px 22px;border-radius:9px;cursor:pointer;border:1px solid var(--line)}
#bx .big.reveal{background:var(--gold);color:var(--bg);border-color:var(--gold)}
#bx .big.miss{background:transparent;color:var(--red);border-color:var(--red-dim)}
#bx .big.got{background:transparent;color:var(--green);border-color:var(--green)}
#bx .qmeta{font-family:var(--mono);font-size:12px;color:var(--dim);margin-top:14px}
#bx .disc{font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center;padding:30px 20px 0;border-top:1px solid var(--line);margin-top:40px;line-height:1.7}
@media (max-width:560px){#bx .grid{grid-template-columns:1fr}}
</style>
<div id="bx">
<header>
 <div class="top">
  <div class="brand"><b>THE BROOKS <span>CODEX</span></b>
   <small>Al Brooks price action &mdash; cited playbook, no simulation</small></div>
  <div class="prog" id="prog"></div>
  <button class="icon" id="themeBtn" title="toggle theme">◑</button>
 </div>
 <div class="tabs" id="tabs"></div>
</header>
<main class="wrap" id="main"></main>
<div class="disc" id="disc"></div>
</div>
<script>
const DATA={"golden": [{"id": "g0", "rank": 1, "rule": "Take a trade only when probability of success times reward beats probability of failure times risk.", "theme": "Trader's-Equation/Math", "why": "The trader's equation, not the pattern's name, decides whether any setup is worth taking.", "quote": "To take a trade, you must believe that the probability of success times the potential reward is greater than the probability of failure times the risk... if you are uncertain, assume that you have a 50 percent chance of winning or losing, and if you are confident, assume that you have a 60 percent chance of winning and a 40 percent chance of losing.", "pages": "26", "book": "Trends"}, {"id": "g1", "rank": 2, "rule": "Never even think about trading against a trend until a significant trendline has broken.", "theme": "Reversal", "why": "Until one side loses control (shown by a trendline break) the trend is still in force and countertrend is a fade of nothing.", "quote": "The single most important rule in this book is that you should never even be thinking about trading against a trend until after there has been a break of a significant trendline.", "pages": "201", "book": "Reading Price Charts"}, {"id": "g2", "rank": 3, "rule": "Focus on the best trades, avoid the worst, make reward at least as large as risk, and grow your size over time.", "theme": "Psychology/Discipline", "why": "Brooks calls this the single most important message of the entire method.", "quote": "The most important message that I can deliver is to focus on the absolute best trades, avoid the absolute worst setups, use a profit objective (reward) that is at least as large as your protective stop (risk), and work on increasing the number of shares that you are trading.", "pages": "6", "book": "Trends"}, {"id": "g3", "rank": 4, "rule": "In a very strong trend, take every with-trend swing and take no countertrend scalps, as tempting as they are.", "theme": "Trend", "why": "Countertrend scalps against a strong trend have a negative trader's equation and pull your mind to the wrong side.", "quote": "In a very strong trend, all trades should be With Trend swings (scalping out part), and no trades should be Countertrend scalps, as tempting as they are.", "pages": "82, 108", "book": "Reading Price Charts"}, {"id": "g4", "rank": 5, "rule": "Once you believe there is a trend, accept that 80 percent of reversal attempts fail and become flags.", "theme": "Always-In", "why": "Most tops in a bull (bottoms in a bear) are the start of the next flag, not a reversal.", "quote": "Once you believe there is a trend, you must accept that 80 percent of reversal attempts will fail and evolve into flags.", "pages": "209", "book": "Trading Ranges"}, {"id": "g5", "rank": 6, "rule": "Whenever you are uncertain, assume the market is in a trading range.", "theme": "Trading Range", "why": "50-50 directional probability is the defining hallmark of a range, and most of the day is a range.", "quote": "When the market is 50–50, it is uncertain and you cannot rationally have an opinion about its direction. This is the hallmark of a trading range, so whenever you are uncertain, assume that the market is in a trading range.", "pages": "45", "book": "Trends"}, {"id": "g6", "rank": 7, "rule": "Don't touch Barbwire, or you will be hurt.", "theme": "Barbwire/Chop", "why": "Tight overlapping doji ranges whipsaw you; avoiding them is the single biggest fix for beginners.", "quote": "Don't touch Barb Wire, or you will be hurt.", "pages": "168", "book": "Reading Price Charts"}, {"id": "g7", "rank": 8, "rule": "Never watch the news during the trading day; the chart already tells you what any event means.", "theme": "Psychology/Discipline", "why": "Price reflects institutions' interpretation instantly, and pundits have no accountable edge.", "quote": "Never watch the news during the trading day. If you want to know what a news event means, the chart in front of you will tell you.", "pages": "46-48", "book": "Trends"}, {"id": "g8", "rank": 9, "rule": "When trading countertrend against a strong trend, wait for the signal bar to close, then enter only on a stop one tick beyond it.", "theme": "Entry/Stop", "why": "A reversal bar can completely change appearance in the final seconds and trap early entrants.", "quote": "When trading Countertrend against a strong trend, it is imperative to wait for the signal bar to close before you place your order, and then only enter on a stop at 1 tick beyond the bar", "pages": "6", "book": "Reading Price Charts"}, {"id": "g9", "rank": 10, "rule": "Remember that most breakouts fail.", "theme": "Breakout", "why": "Strong momentum into a line tempts you to chase; experienced traders fade the failure or wait for the breakout pullback.", "quote": "most breakouts fail! The market repeatedly races toward a trend line with very strong momentum, and it is easy to get caught up in the strength of the bar and overlook what just took place over the past 20 bars.", "pages": "197-198", "book": "Trends"}, {"id": "g10", "rank": 11, "rule": "Take the with-trend entry precisely because it looks overdone and scary; that is exactly why it works.", "theme": "Trend", "why": "When everyone thinks there's no room left, no one waits for a better price, so the pullback never comes.", "quote": "The With Trend en­tries are scary because the market always looks overdone and it's hard to imagine that selling near the low of an overdone bear or buying near the high of an overdone bull could ever be profitable. However, that is exactly why it is!", "pages": "71, 97, 108-109", "book": "Reading Price Charts"}, {"id": "g11", "rank": 12, "rule": "If a countertrend entry fails, assume you are misreading the market and do not take a third entry unless it is a wedge.", "theme": "Reversal", "why": "Two failures against you means the trend is stronger than your read.", "quote": "if one fails, assume that you are reading the market incorrectly and do not take a third entry unless it is a Wedge (a failed trend channel line breakout).", "pages": "73, 74", "book": "Reading Price Charts"}, {"id": "g12", "rank": 13, "rule": "Discipline is doing what you don't want to do: patiently wait for only the best trades.", "theme": "Psychology/Discipline", "why": "Edges are small in a zero-sum game; patience is what converts them into profit.", "quote": "Discipline simply means doing what you do not want to do... you have to patiently wait to take only the best trades.", "pages": "22", "book": "Reversals"}, {"id": "g13", "rank": 14, "rule": "Buy low and sell high, except in a clear and strong trend.", "theme": "Trading Range", "why": "The market is in a range most of the time, so fade the extremes unless you can prove it is a strong trend.", "quote": "Buy low, sell high, except in a clear and strong trend... However, the market is in a trading range for the vast majority of the time... if you cannot convince yourself that it is, don't buy high, even if the momentum looks great, since the odds are great that you will be trapped.", "pages": "409", "book": "Reading Price Charts"}, {"id": "g14", "rank": 15, "rule": "Close is close enough; demanding perfection only costs you money.", "theme": "Entry/Stop", "why": "Near-equivalent patterns behave the same, so perfectionism just makes you miss good trades.", "quote": "In trading, close is close enough and worrying about perfection can only cost you money.", "pages": "53(85), 66(98)", "book": "Trends"}, {"id": "g15", "rank": 16, "rule": "Never be convinced of anything; always stay open to the market doing the exact opposite.", "theme": "Psychology/Discipline", "why": "An equally smart trader is on the other side, and your 60% edge can flip to theirs in an instant.", "quote": "Never be convinced of anything, and always be open to the possibility that the market will do the exact opposite of what you believe... you can rarely be 60 percent certain of the market's direction, and that can quickly change to 50–50 or even 60 percent in the other direction.", "pages": "59(91), 65(97)", "book": "Trends"}, {"id": "g16", "rank": 17, "rule": "When the trend is strong, enter at the market rather than wait for a pullback that may never come.", "theme": "Always-In", "why": "In a strong trend the good pullback often arrives only far away, or not at all.", "quote": "When the trend is strong, it is often better to enter at the market than to wait for a pullback.", "pages": "86-87", "book": "Trading Ranges"}, {"id": "g17", "rank": 18, "rule": "It is never too late to enter a strong trend; entering late with the original stop is identical to having held from the start.", "theme": "Trend", "why": "\"It already moved\" is an emotional error, not a mathematical one.", "quote": "Entering late and using the original stop is absolutely identical to being long the swing portion of the original position, using the same protective stop.", "pages": "75-76", "book": "Reading Price Charts"}, {"id": "g18", "rank": 19, "rule": "On a real trend day, catch every with-trend signal; if you miss one, stop hunting countertrend scalps and trade only with-trend.", "theme": "Trend", "why": "With-trend entries are the most consistent source of money on a trend day.", "quote": "If you find that you missed a with-trend entry, stop looking for countertrend scalps and start trading only with-trend setups. During a trend day, you must try to catch every with-trend signal, because that is the source of the most consistent money.", "pages": "344", "book": "Trends"}, {"id": "g19", "rank": 20, "rule": "When the market lacks clarity, it is always best to wait for a second entry.", "theme": "Entry/Stop", "why": "The first signal after chop usually fails; a second entry rarely does.", "quote": "when the market lacks clarity, it is always best to wait for a second entry.", "pages": "170", "book": "Reading Price Charts"}, {"id": "g20", "rank": 21, "rule": "Whenever the market tries to do something twice and fails, it usually then tries the opposite.", "theme": "Reversal", "why": "This is why double tops and bottoms work and why you wait for the test of the old extreme.", "quote": "Whenever the market tries to do something twice and fails, it usually then tries the opposite. This is why double tops and bottoms work", "pages": "14", "book": "Reading Price Charts"}, {"id": "g21", "rank": 22, "rule": "Cultivate the ability to do nothing for hours; don't let boredom convince you it's been too long since the last trade.", "theme": "Psychology/Discipline", "why": "It is the second-most-important trait of great traders after discipline.", "quote": "The second-most-important trait of great traders is the ability to do nothing for hours at a time. Don't succumb to boredom and let it convince you that it's been too long since the last trade.", "pages": "412", "book": "Reading Price Charts"}, {"id": "g22", "rank": 23, "rule": "Take a reversal only when it is perfect: a prior strong trendline break AND a strong reversal bar.", "theme": "Reversal", "why": "Most reversals fail; without both components you are trading a trap.", "quote": "Never trade Countertrend unless the setup is perfect. It needs both a prior strong trendline break and a strong reversal bar.", "pages": "402", "book": "Reading Price Charts"}, {"id": "g23", "rank": 24, "rule": "Avoid bad trades as diligently as you take good ones, because bad trades erase more than good ones earn.", "theme": "Psychology/Discipline", "why": "Net profitability is dominated by what you refuse to trade.", "quote": "One important component to making money is avoiding bad trades that invariably erase much more than what you will have earned from your good trades.", "pages": "353", "book": "Reading Price Charts"}, {"id": "g24", "rank": 25, "rule": "\"Never add to a loser\" means never scale into a countertrend/reversal trade; scaling into a with-trend position is fine.", "theme": "Management", "why": "Institutions scale into with-trend positions in pieces all day; the rule is about fighting the trend.", "quote": "'Never add to a losing position.' That is one of the most fundamental rules on Wall Street. However, it is misleading because institutions do it all the time...the adage refers to countertrend trades and the institutions are scaling into with trend trades.", "pages": "212", "book": "Trading Ranges"}, {"id": "g25", "rank": 26, "rule": "Never hold a position on hope; the market runs on math, not luck, fairness, emotion, or karma.", "theme": "Psychology/Discipline", "why": "Once the always-in direction flips, exit and trade the new direction instead of hoping the old bias returns.", "quote": "Hope is never a sound basis for holding a position, because the market is based on mathematics and not luck, fairness, emotion, karma, or religion.", "pages": "212", "book": "Trading Ranges"}, {"id": "g26", "rank": 27, "rule": "Trade the market in front of you, not the one that just ended or the one you think should come next.", "theme": "Psychology/Discipline", "why": "Bias from the prior move traps you against what price is actually doing now.", "quote": "You have to trade the market in front of you, not the one that just ended or the one that you think should soon begin.", "pages": "243 (275)", "book": "Trends"}, {"id": "g27", "rank": 28, "rule": "Always be quicker to take profits than to enter in the opposite direction.", "theme": "Management", "why": "Exiting a with-trend trade needs less proof than initiating a countertrend one.", "quote": "You should always be faster to take profits on a trade than you should be to look for an entry in the opposite direction.", "pages": "66-67", "book": "Trading Ranges"}, {"id": "g28", "rank": 29, "rule": "If a strong breakout's stop is too scary, cut to \"I don't care\" size and take it rather than skip it.", "theme": "Management", "why": "The math (a 60-80% measured move) still favors participating at a quarter or third size.", "quote": "They have to get their position size down to the 'I don't care' size so that they can quickly get in the trade. The best way for them to take a scary trade is to automatically trade only a third or a quarter of their normal trade size and use the wide stop that is required.", "pages": "31", "book": "Trading Ranges"}, {"id": "g29", "rank": 30, "rule": "A tight trading range trumps everything: breakout probability in either direction is never more than about 55 percent.", "theme": "Barbwire/Chop", "why": "The range itself signals the market has lost directional conviction, capping any edge.", "quote": "A tight trading range trumps everything... the probability of the breakout in either direction is never more than about 55 percent.", "pages": "151-152", "book": "Trading Ranges"}, {"id": "g30", "rank": 31, "rule": "Keep it simple: one chart, one time frame (5-minute), no indicators beyond the EMA.", "theme": "Psychology/Discipline", "why": "If you can't profit from a single clean chart, adding complexity only makes it harder.", "quote": "Simple is better. You don't need indicators, and you should only look at one chart. If you can't make money off a single chart with no indicators, adding more things to analyze will only make it more difficult.", "pages": "407", "book": "Reading Price Charts"}, {"id": "g31", "rank": 32, "rule": "Names are never important; just read what is in front of you and trade it, ignoring the pattern that just completed.", "theme": "Psychology/Discipline", "why": "Labeling patterns is a distraction from reading current price action.", "quote": "Names are never important. Just make sure that you read correctly what is in front of you and place your trade, ignoring the pattern that completed a couple of bars earlier.", "pages": "217", "book": "Trends"}, {"id": "g32", "rank": 33, "rule": "Always keep your protective stop as a working order in the market, never a mental stop.", "theme": "Entry/Stop", "why": "Traders find too many reasons to ignore mental stops exactly when they are needed most.", "quote": "It is better to have the stop working, because many traders who use mental stops find too many reasons to ignore them when they are needed most.", "pages": "202", "book": "Trading Ranges"}, {"id": "g33", "rank": 34, "rule": "As a beginner, enter only when the signal bar is a trend bar in your direction, and trade only with the trend.", "theme": "Entry/Stop", "why": "The more countertrend the entry, the stronger the signal bar must be, and most countertrend trades fail.", "quote": "A beginning trader should enter only when the signal bar is also a trend bar in the direction of the trade, and should trade only in the direction of the trend... the more countertrend that your entry is, the more important it is to see a strong signal bar.", "pages": "85(117)", "book": "Trends"}, {"id": "g34", "rank": 35, "rule": "The market will not run your stops; price tests your stop only when an institution finds it profitable to trade there.", "theme": "Trader's-Equation/Math", "why": "90%+ of volume is institutional, so every fill (including the one that stops you) reflects a rational strategy on the other side.", "quote": "The market will not run your stops. The market might test the price where your protective stop is, but it has nothing to do with your stop. It will only test that price if one or more institutions believe that it is financially sound to sell there.", "pages": "174", "book": "Trading Ranges"}, {"id": "g35", "rank": 36, "rule": "If you trade countertrend you are gambling; you will often win and have fun, but the math will slowly break you.", "theme": "Trader's-Equation/Math", "why": "Countertrend setups in strong trends almost always fail and become great with-trend trades.", "quote": "If you trade Countertrend, you are gambling, and although you will often win and have fun, the math is against you, and you will slowly but surely go broke.", "pages": "410", "book": "Reading Price Charts"}, {"id": "g36", "rank": 37, "rule": "Don't take profits until the trade has moved at least twice your risk, unless your probability is truly about 80 percent.", "theme": "Management", "why": "The trader's equation only becomes favorable when reward is two or more times the risk.", "quote": "traders should not take any proﬁts until the trade has gone at least two points... the trader's equation begins to become favorable only when the reward is two points or more.", "pages": "326", "book": "Trends"}, {"id": "g37", "rank": 38, "rule": "At every moment be mentally long or short (always-in); the side you would confidently take now is the trend, and confidence almost always requires seeing a spike first.", "theme": "Always-In", "why": "The always-in read keeps you aligned with the side institutions are pressing.", "quote": "If at any time you are forced to decide between initiating a long or a short trade and are confident in your choice, then the market is in always-in mode at that moment.", "pages": "11", "book": "Trading Ranges"}, {"id": "g38", "rank": 39, "rule": "Reversing your opinion instantly and without ego is essential; never trade through the rearview mirror.", "theme": "Psychology/Discipline", "why": "Everything can flip to its opposite in an instant, and dwelling on the last trade loses money.", "quote": "Everything is relative, and everything can change into the exact opposite in an instant... Trading through the rearview mirror is a sure way to lose money.", "pages": "2", "book": "Reading Price Charts"}], "notrade": [{"id": "n0", "situation": "You cannot figure out what the chart is telling you.", "instead": "Do not trade; wait for clarity, which always eventually comes, then follow your plan.", "theme": "Psychology/Discipline", "quote": "The only thing that is as it seems is the chart. If you cannot figure out what it is telling you, do not trade. Wait for clarity.", "pages": "51", "book": "Trends"}, {"id": "n1", "situation": "The market is confirmed to be in a tight trading range.", "instead": "Don't trade; wait for good swings to return, usually by the next day.", "theme": "Barbwire/Chop", "quote": "Once you see that the market is in a tight trading range, don't trade. Instead, simply wait for good swings to return, and they will, usually by the next day.", "pages": "152-153", "book": "Trading Ranges"}, {"id": "n2", "situation": "Price is in Barbwire (three-plus overlapping bars, one or more dojis).", "instead": "Don't touch it; never enter on the breakout, only fade small bars at the extremes.", "theme": "Barbwire/Chop", "quote": "The cardinal rule for trading in Bar Wire is never enter on a breakout. Instead, always be looking to fade...It is preferable to miss a few signals than to experience the anxiety that comes from trading outside of your comfort zone.", "pages": "171-172", "book": "Reading Price Charts"}, {"id": "n3", "situation": "It is the middle third of the day and price is also in the middle third of the day's range.", "instead": "Don't trade; wait for a test of the day's high or low.", "theme": "Barbwire/Chop", "quote": "A trader who is not yet successful should not trade when the market is in the middle of the day while it is also in the middle of the day's range. This change to her trading alone can be the difference between being a loser and a winner.", "pages": "174-175", "book": "Reading Price Charts"}, {"id": "n4", "situation": "A trading range is forming near the moving average and the bars are mostly below it (or mostly above it).", "instead": "Never buy when bars are mostly below the MA; never sell when mostly above. This one rule saves enormous money.", "theme": "Barbwire/Chop", "quote": "if there is a trading range setting up and it is near the moving average, never look to buy if the bars are mostly below the moving average, and never look to sell if the bars are mostly above the moving average. This one rule will save you an enormous amount of money over the years.", "pages": "154", "book": "Trading Ranges"}, {"id": "n5", "situation": "You are tempted to take every high 1-4 and low 1-4 count inside a tight trading range.", "instead": "Don't; taking both directions in chop can give back a week's profits in an hour.", "theme": "Barbwire/Chop", "quote": "When the market is in a tight trading range, it often reverses direction repeatedly, so if you take every high 1, 2, 3, and 4 and also short every low 1, 2, 3, and 4, over the course of an hour you will lose all of the money that you made in the past week.", "pages": "109", "book": "Trading Ranges"}, {"id": "n6", "situation": "A countertrend entry has already failed once and you want to try a third time.", "instead": "Do not take a third entry unless it is a wedge; assume you're misreading the market.", "theme": "Reversal", "quote": "if one fails, assume that you are reading the market incorrectly and do not take a third entry unless it is a Wedge (a failed trend channel line breakout).", "pages": "73, 74", "book": "Reading Price Charts"}, {"id": "n7", "situation": "You want to fade a steep trend on a high/low 2 or 4 with no prior trendline break.", "instead": "Never trade countertrend without a prior significant trendline break or channel overshoot and reversal first.", "theme": "Reversal", "quote": "if there is a steep trend, never trade countertrend, even if there is a high or low 2 or 4, unless there was first a prior significant trend line break or trend channel overshoot and reversal.", "pages": "187", "book": "Trading Ranges"}, {"id": "n8", "situation": "A strong trend looks extreme and overdone and you want to fade it.", "instead": "Never fade it just because it can't last; a climax can last longer than your account can. Wait for a real reversal.", "theme": "Trend", "quote": "a climax can last longer than you can sustain your account, so never look to short such a strong bull trend, even though you know it cannot last indefinitely.", "pages": "346 (378)", "book": "Trends"}, {"id": "n9", "situation": "An economic report is being released and computers have a huge speed edge.", "instead": "Rarely enter at the moment of release; wait a bar or two until the always-in direction is clear.", "theme": "Psychology/Discipline", "quote": "When the computers have a big edge, traders are at a disadvantage and therefore should rarely enter at the moment a report is released.", "pages": "418", "book": "Trends"}, {"id": "n10", "situation": "The open (or any setup) is tricky and you are in doubt.", "instead": "When in doubt, stay out; do nothing rather than force a trade.", "theme": "Psychology/Discipline", "quote": "There was a tricky open in Figure 6.7, and when in doubt, stay out.", "pages": "154", "book": "Trends"}, {"id": "n11", "situation": "You are uncertain what to do about an outside or otherwise ambiguous bar.", "instead": "Wait for more price action to develop; that is the single most important rule for uncertainty.", "theme": "Psychology/Discipline", "quote": "The single most important thing to remember about outside bars is that whenever a trader is uncertain about what to do, the best decision is to wait for more price action to develop.", "pages": "190", "book": "Trends"}, {"id": "n12", "situation": "A move just had four or more strong trend bars and you want to fade the first countertrend signal.", "instead": "Don't take the first attempt; wait, let it fail, and take the second attempt to reverse (if it comes at all).", "theme": "Reversal", "quote": "It is better to wait for an entry, not take it, wait for the trend to resume for a bar or two, and then enter on the market’s second attempt to reverse.", "pages": "209-211", "book": "Trends"}, {"id": "n13", "situation": "You want to scalp countertrend while waiting for a with-trend pullback setup to form.", "instead": "Don't; you'll lose the scalp and then miss the real with-trend entry out of denial.", "theme": "Trend", "quote": "Invariably, you will lose money on the short scalp and not take the buy setup when it forms. You will be hoping for more down and be in denial that the pullback is about to end.", "pages": "209", "book": "Trading Ranges"}, {"id": "n14", "situation": "You want to take a countertrend trade on a measured-move target alone.", "instead": "Don't; most fail. Require additional reasons (channel overshoot, final flag) before acting.", "theme": "Trader's-Equation/Math", "quote": "you cannot take the countertrend trade on a measured move alone since most fail and you have to keep looking at others. The odds of success are too small.", "pages": "174", "book": "Trends"}, {"id": "n15", "situation": "You are tempted to trade off, or countertrend on, the 1-minute chart.", "instead": "Don't; most 1-minute reversals fail. Almost always trade in the direction of the 5-minute chart.", "theme": "Barbwire/Chop", "quote": "It is far better to not trade Countertrend off 1-minute charts since most reversals fail. You should almost always trade in the direction of the 5-minute chart.", "pages": "260", "book": "Reading Price Charts"}, {"id": "n16", "situation": "You feel you need to study a signal to decide whether it is strong enough.", "instead": "Needing further study is itself the answer that it isn't strong. Don't take it; wait for a second signal.", "theme": "Entry/Stop", "quote": "Whenever you are wondering if a signal is strong enough... the fact that you feel that you need further study should tell you that it is not a clear and strong signal and therefore you should not take the trade.", "pages": "115", "book": "Trading Ranges"}, {"id": "n17", "situation": "The market offers you a better-than-expected fill or an obvious bargain.", "instead": "Treat it as a warning you're misreading the chart; usually it's better not to take the trade.", "theme": "Trader's-Equation/Math", "quote": "Whenever the market is offering you a bargain, assume that you are reading the chart incorrectly; usually it is better not to take the trade.", "pages": "210", "book": "Trends"}, {"id": "n18", "situation": "A trade looks too good to be true, and after entry it slips a tick and doesn't race to target.", "instead": "Assume you're trapped; exit at breakeven rather than fight it.", "theme": "Psychology/Discipline", "quote": "Whenever something looks too good to be true, so obvious that everyone will look to enter, the odds are high that it is exactly as it appears to be...not true.", "pages": "175", "book": "Reading Price Charts"}, {"id": "n19", "situation": "You just lost on the same stock and want to make it back on that name.", "instead": "Don't; that urge is emotional weakness. Accept the loss and move on.", "theme": "Psychology/Discipline", "quote": "There is a natural tendency to want to make back your money on the same stock after a loss, but this is a sign of your emotional weakness... Great traders accept their losses and move on.", "pages": "358", "book": "Reading Price Charts"}, {"id": "n20", "situation": "You've had two consecutive losers within about 15 minutes, or a losing day.", "instead": "Recognize you are overtrading; ask if each trade was one the institutions waited hours to take. If not, stop.", "theme": "Psychology/Discipline", "quote": "When you are about to take any trade, always ask yourself if the setup is one of the best of the day... If you have two consecutive losers within 15-minutes or so, ask yourself if those were trades that the institutions have been waiting hours to take.", "pages": "410", "book": "Reading Price Charts"}, {"id": "n21", "situation": "You're tempted to buy at the top of a range/flag or sell at the bottom of one, even in a trend.", "instead": "Don't; only fade the extremes. Buy low, sell high inside the range.", "theme": "Trading Range", "quote": "Smart traders will look to sell near the high, and they would only buy near the low if the setup was strong.", "pages": "42, 45", "book": "Reading Price Charts"}, {"id": "n22", "situation": "The required stop is far away because the signal bar is large, forcing entry far from a logical stop.", "instead": "Skip it and wait for a strong, tighter-risk setup.", "theme": "Entry/Stop", "quote": "When the risk is greater, it is better to not take the trade and to wait for a strong setup.", "pages": "169", "book": "Trends"}, {"id": "n23", "situation": "You want to move your stop, or enter, based on how the current bar looks before it has closed.", "instead": "Don't act on an unclosed bar; trust the original stop and plan until the bar fully closes.", "theme": "Entry/Stop", "quote": "Good entry, good plan, bad discipline. You just let yourself get trapped out of a good trade.", "pages": "202", "book": "Trends"}, {"id": "n24", "situation": "It's a strong bull trend day and you keep looking for shorts because it 'must' be overdone.", "instead": "Stop looking for shorts; treat every top as a probable bull flag. This is the surest way beginners lose all day.", "theme": "Trend", "quote": "There is one sure way to consistently lose money on a day like this, and all traders know it... Beginners do not stop losing until they are able to stop themselves from looking for shorts in bull trends.", "pages": "329-330, 368", "book": "Trends"}, {"id": "n25", "situation": "You want to go countertrend as price races toward a magnet (measured move, round number, prior swing).", "instead": "Trade with-trend toward the magnet; don't fade it with limit orders or go countertrend until it's tested, absent a trendline break.", "theme": "Reversal", "quote": "When you become aware of a magnet, trade the market as if it is trending toward the magnet, and do not trade Countertrend until after the magnet is tested, unless there is a clear trendline break and then a test of the extreme.", "pages": "191, 198-199", "book": "Reading Price Charts"}, {"id": "n26", "situation": "The setup looks weak or marginal.", "instead": "Skip it and wait; weak setups tend to fail, and often the second entry becomes the strong setup worth taking.", "theme": "Entry/Stop", "quote": "When a setup looks weak, it is best to not take it and wait for another opportunity. If it is weak, it will likely fail and you cannot take needless risk. Often a weak setup will have a second entry, in which case it becomes a strong setup.", "pages": "304", "book": "Reading Price Charts"}], "memorize": [{"id": "m0", "line": "Never even think about trading against a trend until a significant trendline has broken.", "quote": "The single most important rule in this book is that you should never even be thinking about trading against a trend until after there has been a break of a significant trendline.", "pages": "201"}, {"id": "m1", "line": "Don't touch Barbwire, or you will be hurt.", "quote": "Don't touch Barb Wire, or you will be hurt.", "pages": "168"}, {"id": "m2", "line": "Whenever you are uncertain, assume the market is in a trading range.", "quote": "When the market is 50–50, it is uncertain and you cannot rationally have an opinion about its direction. This is the hallmark of a trading range, so whenever you are uncertain, assume that the market is in a trading range.", "pages": "45"}, {"id": "m3", "line": "Eighty percent of reversal attempts fail and become flags.", "quote": "Once you believe there is a trend, you must accept that 80 percent of reversal attempts will fail and evolve into flags.", "pages": "209"}, {"id": "m4", "line": "Never watch the news during the trading day; the chart tells you what it means.", "quote": "Never watch the news during the trading day. If you want to know what a news event means, the chart in front of you will tell you.", "pages": "46-48"}, {"id": "m5", "line": "With-trend entries are scary because the market looks overdone; that is exactly why they work.", "quote": "The With Trend en­tries are scary because the market always looks overdone... However, that is exactly why it is!", "pages": "71, 97, 108-109"}, {"id": "m6", "line": "Close is close enough; worrying about perfection can only cost you money.", "quote": "In trading, close is close enough and worrying about perfection can only cost you money.", "pages": "53(85), 66(98)"}, {"id": "m7", "line": "Discipline means doing what you don't want to do: wait for only the best trades.", "quote": "Discipline simply means doing what you do not want to do... you have to patiently wait to take only the best trades.", "pages": "22"}, {"id": "m8", "line": "If you trade countertrend you are gambling; the math will slowly break you.", "quote": "If you trade Countertrend, you are gambling, and although you will often win and have fun, the math is against you, and you will slowly but surely go broke.", "pages": "410"}, {"id": "m9", "line": "Take a trade only when probability times reward beats probability times risk.", "quote": "To take a trade, you must believe that the probability of success times the potential reward is greater than the probability of failure times the risk... if you are uncertain, assume that you have a 50 percent chance of winning or losing, and if you are confident, assume that you have a 60 percent chance of winning and a 40 percent chance of losing.", "pages": "26"}], "library": [{"id": "l_market-structure_0", "theme": "market-structure", "teaching": "Countertrend trades and countertrend scalps are generally a losing strategy because risk is usually at least as large as reward while probability is rarely high enough to make the trader's equation favorable.", "quote": "countertrend A trade or setup that is in the opposite direction from the current trend... This is a losing strategy for most traders since the risk is usually at least as large as the reward and the probability is rarely high enough to make the trader's equation favorable.", "pages": "15", "book": "Trends"}, {"id": "l_market-structure_1", "theme": "market-structure", "teaching": "Directional probability of an equidistant up/down move hovers around 50% most of the time — there's roughly a 50-50 chance price moves X ticks up before X ticks down, and vice versa, absent other edge.", "quote": "directional probability The probability that the market will move either up or down any number of ticks before it reaches a certain number of ticks in the opposite direction... it hovers around 50 percent most of the time.", "pages": "16", "book": "Trends"}, {"id": "l_market-structure_2", "theme": "market-structure", "teaching": "Every price pattern is a fractal: any pattern is simultaneously a micro pattern on a higher time frame chart and a standard/traditional pattern on a smaller time frame chart.", "quote": "fractal Every pattern is a fractal of a pattern on a higher time frame chart. This means that every pattern is a micro pattern on a higher time frame and every micro pattern is a standard pattern on a smaller time frame.", "pages": "18", "book": "Trends"}, {"id": "l_market-structure_3", "theme": "market-structure", "teaching": "The market cannot reach any price, including where your stop sits, unless institutions are actively willing to trade there — retail stops are not 'run'; the market only tests a price when institutions find it financially sound to trade at that level.", "quote": "The market will not run your stops. The market might test the price where your protective stop is, but it has nothing to do with your stop. It will only test that price if one or more institutions believe that it is financially sound to sell there and other institutions believe that it is profitable to buy there.", "pages": "34", "book": "Trends"}, {"id": "l_market-structure_4", "theme": "market-structure", "teaching": "Whenever price goes up, the bulk of institutional/big money is net buying at that moment (and vice versa on down moves) — even pullbacks within a strong trend that stop out weak longs or trigger weak shorts are often where big money is buying (or selling), so don't fight the trend based on a scary-looking pullback.", "quote": "sometimes when the market is working higher, a bar will trade below the low of the prior bar, yet the trend continues higher. You have to assume that the big money was buying at and below the low of that prior bar... If the market is going up, institutions are buying constantly, even at times when you think that you should stop yourself out of your long with a loss.", "pages": "34-35", "book": "Trends"}, {"id": "l_market-structure_5", "theme": "market-structure", "teaching": "Price action patterns are essentially unchanged across 80+ years of charts and across all markets/timeframes because they emerge from human behavioral 'DNA' operating within an efficient market of countless smart participants — no single group of price-action traders acting on published knowledge can materially change these patterns because institutions already know them intuitively.", "quote": "Price action is a manifestation of human behavior and therefore actually has a genetic basis. Until we evolve, it will likely remain largely unchanged, just as it has been unchanged for the 80 years of charts that I have reviewed.", "pages": "39", "book": "Trends"}, {"id": "l_market-structure_6", "theme": "market-structure", "teaching": "A climax is a move that went too far too fast and reverses; most climaxes end with a trend-channel-line overshoot and reversal, but most of those reversals lead only to a trading range, not a full opposite trend — so don't assume a climax reversal means a new trend.", "quote": "climax A move that has gone too far too fast and has now reversed direction to either a trading range or an opposite trend. Most climaxes end with trend channel overshoots and reversals, but most of those reversals result in trading ranges and not an opposite trend.", "pages": "15", "book": "Trends"}, {"id": "l_market-structure_7", "theme": "market-structure", "teaching": "A trading range is fundamentally a state of uncertainty where repeated breakout attempts in both directions will tend to fail until the range ultimately breaks out — usually in the direction of the larger trend — and is itself just a pullback when viewed on a higher time frame.", "quote": "In other words, traders have become uncertain about the direction of the breakout in the short term, and the market will have repeated breakout attempts up and down that will fail. It will usually ultimately break out in the direction of the trend, and is a pullback on a higher time frame chart.", "pages": "26", "book": "Trends"}, {"id": "l_market-structure_8", "theme": "market-structure", "teaching": "The most useful price action tools are trend lines/channel lines, prior highs and lows, breakouts and failed breakouts, bar/candle body and tail size, and the relationship of the current bar to the prior several bars.", "quote": "The most useful tools for understanding price action are trend lines and trend channel lines, prior highs and lows, breakouts and failed breakouts, the sizes of bodies and tails on candles...", "pages": "44", "book": "Trends"}, {"id": "l_market-structure_9", "theme": "market-structure", "teaching": "Reliable reversals typically first break a trend line with strong momentum, then pull back to test the extreme; trading divergences without a prior trend-line-breaking momentum surge is a losing strategy.", "quote": "Placing a trade because of a divergence in the absence of a prior countertrend momentum surge that breaks a trend line is a losing strategy. Wait for the trend line break and then see if the test of the old extreme reverses or if the old trend resumes.", "pages": "42", "book": "Trends"}, {"id": "l_market-structure_10", "theme": "market-structure", "teaching": "Extended trends with little bar overlap (large trend bars, minimal pullback) that retrace less than ~75% after a pullback tend to resume and test/exceed the prior extreme; a pullback retracing 75%+ should instead be treated as a new trend in the opposite direction.", "quote": "the odds that a pullback will get back to the prior trend's extreme fall substantially if the pullback retraces 75 percent or more. For a pullback in a bear trend, at that point, a trader is better off thinking of the pullback as a new bull trend...", "pages": "50", "book": "Trends"}, {"id": "l_market-structure_11", "theme": "market-structure", "teaching": "Pattern labels (triangle, head-and-shoulders, flag) are irrelevant — what matters is correctly reading whether price is trending or ranging and in which direction it is likely to move next; the same price structure can simultaneously be described multiple ways.", "quote": "The name that you apply is irrelevant since the direction of the subsequent move will be the same if you read the bars correctly.", "pages": "70", "book": "Trends"}, {"id": "l_market-structure_12", "theme": "market-structure", "teaching": "Markets have inertia: trends tend to continue, and most breakout attempts of trading ranges fail, while most reversal attempts within a trend fail and become flags.", "quote": "Markets tend to keep doing what they are doing... most breakout attempts of trading ranges fail... An important point to remember is that the market constantly exhibits inertia and tends to continue to do what is has just been doing. If it is in a trend, most attempts to reverse it will fail. If it is in a trading range, most attempts to break out into a trend will fail.", "pages": "49(81),55(87)", "book": "Trends"}, {"id": "l_market-structure_13", "theme": "market-structure", "teaching": "Two-legged pullbacks (ABC) are common and reliable; Brooks prefers counting legs (high 1/2/3/4, low 1/2/3/4) over ABC/AB=CD or Elliott Wave labeling because pullbacks can extend to 3 or 4 legs.", "quote": "Two-legged corrections are reliable setups for trades in the direction of the trend... Since measured moves are an important part of trading and the AB = CD terminology is inconsistent with the more commonly used ABC labeling, the AB = CD terminology should not be used.", "pages": "51(83),57(89)", "book": "Trends"}, {"id": "l_market-structure_14", "theme": "market-structure", "teaching": "Anything over ~100 contracts (Emini) should be treated as institutional footprint, regardless of whether it's one big trader or many.", "quote": "In general, anything over 100 contracts should be considered institutional in today's Emini market.", "pages": "52(84)", "book": "Trends"}, {"id": "l_market-structure_15", "theme": "market-structure", "teaching": "All trends contain smaller trading ranges and all trading ranges contain smaller trends; most trends are pullbacks within a higher-time-frame trading range, and vice versa — even the 1987 and 2009 crashes were pullbacks to the monthly bull trend line.", "quote": "All trends contain smaller trading ranges, and all trading ranges contain smaller trends. Also, most trends are just parts of trading ranges on higher time frame (HTF) charts, and most trading ranges are parts of trends on HTF charts.", "pages": "55(87)", "book": "Trends"}, {"id": "l_market-structure_16", "theme": "market-structure", "teaching": "A trend bar means one side is in control (has a body); a doji/nontrend bar means bulls and bears are in equilibrium (a one-bar trading range). Subtyping small-bodied bars with candle names (hammer, hanging man, harami) adds little value.", "quote": "For a trader, it is most useful to think of all bars as being either trend bars or nontrend (trading range) bars... Subdividing bars with small bodies into a variety of subtypes like hanging man, hammer, or harami adds little to a trader.", "pages": "59-60(91-92)", "book": "Trends"}, {"id": "l_market-structure_17", "theme": "market-structure", "teaching": "Every trend bar simultaneously functions as (1) a spike, (2) a breakout, (3) a gap (all breakouts/trend bars are functionally gaps), and (4) part or all of a vacuum/climax.", "quote": "Every trend bar is simultaneously (1) a spike; (2) a breakout; (3) a gap...; and (4) a part or all of a vacuum and a climax.", "pages": "60-61(92-93)", "book": "Trends"}, {"id": "l_market-structure_18", "theme": "market-structure", "teaching": "Never compete against algorithms on speed — pick a timeframe (e.g., 5-min) where you have time to process information, rather than trying to read ultra-fast tick/smaller-timeframe reversals.", "quote": "It is always a mistake to compete against an opponent who has an edge in a game where the margin for error is so small... they should pick a time frame, like a 5 minute chart, where they have time to carefully process the information.", "pages": "62(94), 73-74(105-106)", "book": "Trends"}, {"id": "l_market-structure_19", "theme": "market-structure", "teaching": "A climax is any trend bar/consecutive trend bars, ending with the first pause bar; a climax does not necessarily mean a reversal — 'climax' and 'reversal' are not synonyms. A climactic reversal requires both a climax AND a subsequent breakout in the opposite direction.", "quote": "A trend bar is a critical component of a climax, and a climax is a critical component of a reversal, but traders often incorrectly use the term climax as synonymous with reversal... The reversal requires a buy climax and then a bear breakout, which is a strong bear trend bar.", "pages": "62-63(94-95)", "book": "Trends"}, {"id": "l_market-structure_20", "theme": "market-structure", "teaching": "Every reversal, no matter what timeframe it appears on, is fundamentally a climactic reversal (spike + reversal) on some sufficiently small timeframe — but it's not worth hunting for the 'perfect' timeframe to see it.", "quote": "In fact, every reversal at the top of a bull market is a climactic reversal, whether or not it looks like one on the chart in front of you... it is not worth looking for the perfect time frame just to see the perfect reversal bar.", "pages": "63(95)", "book": "Trends"}, {"id": "l_market-structure_21", "theme": "market-structure", "teaching": "Signs of an ideal/strong trend bar: body ≥ median of last 5-10 bars, open near the low / close near the high (bull case), close at/above prior closes and highs, high above prior highs, small tails. An unusually large body after a protracted move can instead signal exhaustion/climax.", "quote": "The bulls can demonstrate stronger control by having the body be about the same size as or larger than that of the median body size over the past five or 10 bars.", "pages": "63(95)", "book": "Trends"}, {"id": "l_market-structure_22", "theme": "market-structure", "teaching": "Buying/selling pressure is cumulative: an increasing number/size of bull (or bear) bodies within a bear trend (or bull trend) signals building pressure that can eventually overwhelm the prevailing trend and reverse or range it.", "quote": "Selling pressure is cumulative, and the more bear bodies and the larger the bodies, the more likely it is that the pressure will reach a critical point and overwhelm the bulls and drive the market down.", "pages": "64(96)", "book": "Trends"}, {"id": "l_market-structure_23", "theme": "market-structure", "teaching": "When strong bulls buy dips but strong bears only sell rallies (not dips), the net effect is a trading range, not a trend reversal — weak traders do the opposite (chase and get stopped).", "quote": "So when the strong bulls are buying at the bottom and strong bears are only willing to sell higher, what happens? The market enters a trading range.", "pages": "65(97)", "book": "Trends"}, {"id": "l_market-structure_24", "theme": "market-structure", "teaching": "A series of dojis with trending closes/highs/lows (each higher/lower than the last) indicates an actual trend despite each individual bar looking indecisive.", "quote": "Individual dojis mean that neither the bulls nor the bears are controlling the market, but trending dojis indicate a trend.", "pages": "65(97),69(101)", "book": "Trends"}, {"id": "l_market-structure_25", "theme": "market-structure", "teaching": "A trend bar breaking out of a range does not guarantee a trend if there's no follow-through in the next bar or two; failed breakouts trap traders and cause reversals, and it typically takes multiple failed attempts before the opposite side capitulates.", "quote": "Just like dojis don't always mean that the market is trendless, a trend bar does not always mean that the market is trending... An experienced trader would have needed follow-through in the form of a second or third bull trend bar before believing that the always-in trade had reversed to up.", "pages": "70-71(102-103)", "book": "Trends"}, {"id": "l_market-structure_26", "theme": "market-structure", "teaching": "A large exhaustive trend bar after a prolonged (30+ bar) trend without a pullback, near a support/resistance area, is often the sign of a sell/buy vacuum and can mark or precede the end of the trend as both sides step aside then rush in.", "quote": "Whenever a large bear trend bar forms in a bear trend that has gone on for 30 or more bars without much of a pullback, it often represents a sell vacuum and an exhaustive sell climax.", "pages": "72(104)", "book": "Trends"}, {"id": "l_market-structure_27", "theme": "market-structure", "teaching": "A trend is a transition into a trading range once the market stops seeing new extremes as good with-trend entries and starts seeing them as good profit-taking/counter-entry levels (buying pressure accumulating in a bear trend, or selling pressure in a bull trend).", "quote": "When bears begin to see a new low as a good place to take profits instead of as a great place to short for a new leg down, and bulls see it as a good price to begin to get long, the market is transitioning from a strong trend into more of a two-sided market.", "pages": "75(107)", "book": "Trends"}, {"id": "l_market-structure_28", "theme": "market-structure", "teaching": "Every bar is simultaneously a potential signal bar for both longs (buy stop above it) and shorts (sell stop/limit below or above it) — the trader's edge lies in correctly reading which side has the imbalance in a given context, not in the pattern alone.", "quote": "That means that every bar is a signal bar for both long and short trades, with both bulls and bears entering on the breakout of both the top and the bottom... Signal bars in the right context are times when there is such an imbalance.", "pages": "83-84(115-116)", "book": "Trends"}, {"id": "l_market-structure_29", "theme": "market-structure", "teaching": "The strongest trends usually have terrible-looking (weak/countertrend-colored) signal bars for with-trend entries, because if a setup looked obvious the market would correct it immediately with a small fast move; conversely swing/reversal setups need to look 'perfect' because their base rate is only ~50% or less.", "quote": "The very strongest trends usually have terrible-looking signal bars, but the trades are still excellent. If a setup is too obvious, the market will quickly correct the discrepancy... Swing trade setups, in contrast, usually have a probability of success of only 50 percent or less.", "pages": "85(117)", "book": "Trends"}, {"id": "l_market-structure_30", "theme": "market-structure", "teaching": "Every trend bar is simultaneously a spike, a breakout, a gap, and a climax/exhaustion bar; context determines which property dominates at any given moment, and any bar can be read multiple ways depending on which lens you apply.", "quote": "remember, all trend bars are simultaneously spikes, breakouts, and climaxes, but the context determines which property is dominant at the moment", "pages": "121,138", "book": "Trends"}, {"id": "l_market-structure_31", "theme": "market-structure", "teaching": "Every bar is technically a setup bar for both a long and short entry; a setup bar only becomes a signal bar if a trade is actually entered on the following bar. A setup bar alone (out of context of surrounding bars) is not a reason to trade.", "quote": "A setup bar becomes a signal bar only if a trade is entered on the next bar, which becomes the entry bar. A setup bar in and of itself is not a reason to enter a trade.", "pages": "122", "book": "Trends"}, {"id": "l_market-structure_32", "theme": "market-structure", "teaching": "When the market attempts something (e.g., break a low) twice and fails both times, it will usually then try the opposite direction — this is the structural reason double tops/bottoms work and why traders wait for a test of the old extreme before believing in a reversal.", "quote": "Whenever the market tries to do something twice and fails, it usually then tries the opposite. This is why double tops and bottoms work", "pages": "123", "book": "Trends"}, {"id": "l_market-structure_33", "theme": "market-structure", "teaching": "Most daily-chart reversal bars originate from 'trending trading range days' on intraday charts rather than pure climactic reversals; be alert that a trending trading-range day can end in a strong late-day reversal.", "quote": "Most reversal bars on the daily chart come from trending trading range days...but a few come from climactic intraday reversals.", "pages": "125", "book": "Trends"}, {"id": "l_market-structure_34", "theme": "market-structure", "teaching": "Swing traders (often institutions) are the strongest market participants because they can tolerate pullbacks; once they give up on a position, there is no one left to hold the market up/down and it typically must move ~10 bars/two legs to reach a new support/resistance level before they reconsider entering again.", "quote": "Swing traders are generally the strongest participants...Once these strongest bulls decide that the market will fall further, there is no one left to buy, and the market usually has to fall for about 10 bars and two legs", "pages": "131", "book": "Trends"}, {"id": "l_market-structure_35", "theme": "market-structure", "teaching": "Most trends end with at least a minor climax where the last late/weak traders finally enter and the last traders on the wrong side finally capitulate/exit; once no one is left on the wrong side, urgency disappears and the market typically enters a trading range.", "quote": "Most trends eventually have at least a minor climax before a deeper correction comes...When no traders are left on the wrong side, the sense of urgency disappears and the market usually enters a trading range", "pages": "134", "book": "Trends"}, {"id": "l_market-structure_36", "theme": "market-structure", "teaching": "Big breakout trend bars often fail on the very next bar, trapping traders on the wrong side — this is especially common on quiet trading-range days where price repeatedly surges to the range extremes and fools naive breakout traders.", "quote": "Big trend bars on breakouts often fail on the next bar, trapping traders into the wrong side of the market. This is especially common on quiet trading range days", "pages": "142", "book": "Trends"}, {"id": "l_market-structure_37", "theme": "market-structure", "teaching": "A climax (sell or buy) is usually followed by a two-legged correction lasting many bars — at least an hour on a 5-minute chart, or at least 10 bars.", "quote": "A climax is usually followed by a two-legged correction that lasts for many bars (at least an hour on a 5 minute chart).", "pages": "161", "book": "Trends"}, {"id": "l_market-structure_38", "theme": "market-structure", "teaching": "When a trend is particularly strong it often will not correct until after a second sell/buy climax, and rarely after a third; a third consecutive climax is unusual and raises the odds of a real two-legged reversal correction.", "quote": "When a trend is particularly strong, it often will not correct until after a second sell climax, and rarely after a third.", "pages": "162,175", "book": "Trends"}, {"id": "l_market-structure_39", "theme": "market-structure", "teaching": "A strong spike is usually followed by a channel, and spike-and-channel (or spike-and-climax) moves commonly test back to around the start of the channel within a day or two — unless a higher timeframe pattern is controlling the move.", "quote": "Spike and climax bears (a type of spike and channel bear trend) usually test to around the start of the channel within a day or two...a higher time frame pattern might be controlling the market.", "pages": "162", "book": "Trends"}, {"id": "l_market-structure_40", "theme": "market-structure", "teaching": "A small inside bar (or any sideways pause) after a strong move can become a one-bar final flag before the trend resumes hard.", "quote": "The small inside bar that formed two bars before bar 1 turned into a one-bar final flag.", "pages": "162", "book": "Trends"}, {"id": "l_market-structure_41", "theme": "market-structure", "teaching": "When a two-bar reversal sell setup forms just below the moving average with large overlapping bars, it is often better to buy at/below the low of the signal bar for a long scalp of the small range instead of shorting.", "quote": "whenever there is a two-bar reversal sell setup just below the moving average and the bars are relatively large and overlap one or more other bars, you usually can buy at or below the low of the signal bar for a long scalp.", "pages": "164", "book": "Trends"}, {"id": "l_market-structure_42", "theme": "market-structure", "teaching": "Tight trading ranges act as magnets: breakouts often fail and get pulled back because both sides see better value at the opposite extreme; the losing side becomes more aggressive at the range's edges, but eventually a breakout does succeed.", "quote": "A series of overlapping bars is a tight trading range, which is a magnet, and breakouts often fail and the market is drawn back into the tight trading range... However, there will always be a successful breakout eventually.", "pages": "164-165", "book": "Trends"}, {"id": "l_market-structure_43", "theme": "market-structure", "teaching": "A bar with no tail at either end (shaved) in a strong trend indicates one-sided pressure and is a sign of strength, but the same shaved appearance can be meaningless (low volume/two-sided) if it occurs in a trading range rather than a real trend — watch for clusters of shaved bars as a low-volume warning.", "quote": "Shaved tops and bottoms are not always a sign of strength... in the second cluster, the market was in a trading range and they may just indicate that the volume was low.", "pages": "166,184", "book": "Trends"}, {"id": "l_market-structure_44", "theme": "market-structure", "teaching": "As a trend wears on, later pullbacks tend to be deeper (bulls/bears in a mature trend want more of a discount before reentering).", "quote": "As a trend wears on, the bulls typically will want deeper pullbacks before looking to buy again.", "pages": "169", "book": "Trends"}, {"id": "l_market-structure_45", "theme": "market-structure", "teaching": "Doji bars are generally poor signal bars for shorting a strong bull trend, but are acceptable countertrend/pullback signal bars within trading ranges or as pullbacks within a strong trend, depending on context.", "quote": "Doji bars are never good signal bars for shorts in strong bulls, but they are acceptable signal bars for shorts in trading ranges, depending on the context.", "pages": "170", "book": "Trends"}, {"id": "l_market-structure_46", "theme": "market-structure", "teaching": "When risk is greater than normal (large signal bars forcing entry far from a logical stop point), it is often better to skip the trade and wait for a strong, tighter-risk setup.", "quote": "When the risk is greater, it is better to not take the trade and to wait for a strong setup.", "pages": "169", "book": "Trends"}, {"id": "l_market-structure_47", "theme": "market-structure", "teaching": "A tight trading range below the moving average usually breaks to the downside (and vice versa above), though this bias alone doesn't guarantee a reliable signal — sometimes it's better to wait rather than force a trade.", "quote": "A tight trading range below the moving average usually breaks out to the downside, but there was no reliable short setup. Instead, traders should wait for a better setup.", "pages": "170", "book": "Trends"}, {"id": "l_market-structure_48", "theme": "market-structure", "teaching": "After a climax that follows a long trend, expect at least a two-legged sideways-to-down (or up) correction lasting at least 10 bars; a second consecutive climax strengthens this expectation to at least an hour and a penetration of the moving average.", "quote": "When a climax occurs after a trend has been going on for many bars, the odds of a two-legged sideways to down correction lasting at least 10 bars increase... A second consecutive buy climax usually results in at least a two-legged correction that penetrates the moving average and lasts at least an hour.", "pages": "171", "book": "Trends"}, {"id": "l_market-structure_49", "theme": "market-structure", "teaching": "Second legs of a move (second push in the same direction) are often where reversals occur.", "quote": "second legs are often reversals.", "pages": "171", "book": "Trends"}, {"id": "l_market-structure_50", "theme": "market-structure", "teaching": "A bear (bull) channel should be conceptually treated as a bull (bear) flag — i.e., expect a strong move in the opposite direction once the channel breaks.", "quote": "The move down from bar 6 was in a channel, and a bear channel should be thought of as a bull flag, so there might be a strong move up before long.", "pages": "172,181", "book": "Trends"}, {"id": "l_market-structure_51", "theme": "market-structure", "teaching": "All breakouts are simultaneously both spikes and climaxes; a strong breakout is usually followed by a channel move before a tradable reversal develops, with bears/bulls aggressively fading every small pullback until a bottom/top at a measured-move target forms.", "quote": "All breakouts are spikes and climaxes... A breakout spike often leads to a measured move down.", "pages": "172,174", "book": "Trends"}, {"id": "l_market-structure_52", "theme": "market-structure", "teaching": "Spike-and-channel patterns / channels following spikes often correct or end after three pushes (three-push exhaustion).", "quote": "Spike and channel patterns often correct after three pushes up. The spike is the first push and then there are often two more spikes followed by a correction.", "pages": "164", "book": "Trends"}, {"id": "l_market-structure_53", "theme": "market-structure", "teaching": "A parabolic (accelerating) trend — where trend channel lines must be redrawn increasingly steep — is itself a form of buy/sell climax and raises correction risk even while momentum looks unstoppable.", "quote": "This parabolic curvature is also a sign of climactic behavior and that makes the risk of a correction significant.", "pages": "179,180", "book": "Trends"}, {"id": "l_market-structure_54", "theme": "market-structure", "teaching": "A market can reverse at any time even amid strong momentum, especially in the first trading hour; it often races to an unseen magnet/target and then is 'free' to do anything once that target is tested.", "quote": "traders should always be aware that the market can reverse at any time, especially in the first hour. The market often races to some magnet that often is not evident, and once it is tested, the market is then free to do anything, including reverse.", "pages": "180", "book": "Trends"}, {"id": "l_market-structure_55", "theme": "market-structure", "teaching": "Tight trading ranges (7+ bars horizontal) that occur after a trend has run 10+ bars often become final flags before trend resumption.", "quote": "tight trading ranges after a trend has gone for 10 or more bars often become final flags.", "pages": "180,183", "book": "Trends"}, {"id": "l_market-structure_56", "theme": "market-structure", "teaching": "The first bar (and first several bars) of the trading day often foreshadow the character (trend day vs. trading-range day) of the entire session.", "quote": "The first bar of the day and the first several bars often foreshadow what the next few hours, and often the entire day, will look like.", "pages": "197", "book": "Trends"}, {"id": "l_market-structure_57", "theme": "market-structure", "teaching": "Many institutional orders are based on the close (line charts / value), which is part of why the close of each bar carries extra weight.", "quote": "many institutional traders place orders based on value and not price action, and when they look at charts, the charts are line charts, which are based on the close.", "pages": "202", "book": "Trends"}, {"id": "l_market-structure_58", "theme": "market-structure", "teaching": "Stop runs on smaller time frames at important reversals are common and are opportunities, not reasons to panic — they trap weak traders and force them to chase.", "quote": "Stop runs on the 3 minute chart are much more common than on the 5 minute chart at important reversals, and smart traders look at them as great opportunities.", "pages": "204", "book": "Trends"}, {"id": "l_market-structure_59", "theme": "market-structure", "teaching": "If a chart's price action is unclear, switching representation (line/bar chart, tick/volume chart, another time frame, a correlated ETF, or even the inverse ETF) can clarify the pattern before committing to a trade.", "quote": "Sometimes the price action becomes clearer if you change something about the chart.", "pages": "205", "book": "Trends"}, {"id": "l_market-structure_60", "theme": "market-structure", "teaching": "Most tops form from some type of micro double top and most bottoms from some type of micro double bottom.", "quote": "most tops occur from some type of micro double top... and most bottoms occur from some type of micro double bottom", "pages": "210", "book": "Trends"}, {"id": "l_market-structure_61", "theme": "market-structure", "teaching": "Most breakouts fail — this is one of the most important realities a trader must accept; strong momentum toward a trend line makes beginners assume reversal, but experienced traders fade that momentum and buy/sell into the trend line expecting the established trend to r

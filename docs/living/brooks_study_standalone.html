esume.", "quote": "most breakouts fail! The market repeatedly races toward a trend line with very strong momentum, and it is easy to get caught up in the strength of the bar and overlook what just took place over the past 20 bars.", "pages": "197-198", "book": "Trends"}, {"id": "l_market-structure_62", "theme": "market-structure", "teaching": "A trend line break is the single most important signal that the market is no longer controlled by one side only, and two-sided trading becomes much more likely; after each break, a new (typically flatter-sloped) trend line forms, and trend lines in the opposite direction gradually gain importance as control shifts.", "quote": "The single most important point about a trend line break is that it is the first sign that the market is no longer being controlled by just one side (buyers or sellers) and the chances of further two-sided trading are now much greater.", "pages": "195-196", "book": "Trends"}, {"id": "l_market-structure_63", "theme": "market-structure", "teaching": "When a market repeatedly tests a trend line many times without pulling away, one of two things usually happens: it eventually breaks through and reverses, or the trend accelerates away from the line as counter-side traders give up.", "quote": "If the market repeatedly tests a trend line many times in a relatively small number of bars and the market cannot drift far from that trend line, then either of two things will likely happen.", "pages": "196", "book": "Trends"}, {"id": "l_market-structure_64", "theme": "market-structure", "teaching": "Gap openings (especially large ones) often lead to trend days in either direction.", "quote": "Large gap openings often lead to trend days in either direction.", "pages": "188", "book": "Trends"}, {"id": "l_market-structure_65", "theme": "market-structure", "teaching": "A trend channel is simply a sloping trading range: two-sided trading occurs even within a trend channel, and the tighter/steeper the channel, the more it behaves like a pure trend (trade only with-trend); the flatter/broader it is, the more it behaves like a trading range (tradeable both ways).", "quote": "Even in a trend channel, there is two-sided trading taking place and this is trading range behavior. In fact, a trend channel can be thought of as a sloping trading range.", "pages": "220-221 (252-253 in this chunk)", "book": "Trends"}, {"id": "l_market-structure_66", "theme": "market-structure", "teaching": "A channel that is so tight it has no pullbacks or only one or two tiny ones is a 'micro channel' and functions like a single spike on a higher timeframe chart; a broader channel often follows it and can reach a measured-move target based on the height of that tight channel/spike.", "quote": "When a channel is especially tight ... it is a sign that the trend is strong, and it can be a spike on a higher time frame chart. A broader channel may follow, which might reach a measured move target, based on the height of the tight channel.", "pages": "220 (252)", "book": "Trends"}, {"id": "l_market-structure_67", "theme": "market-structure", "teaching": "Bull/bear channels usually need at least two confirming legs before traders will draw the channel lines at all, and most channels end up with at least three pushes (three legs) before a breakout/reversal is seriously traded.", "quote": "Since a bull channel needs at least those first two legs down to confirm the existence of the channel ... bull channels usually have at least three pushes up ... many bull channels end after a third push up. Likewise, many bear channels end after a third push down.", "pages": "220-221 (252-253)", "book": "Trends"}, {"id": "l_market-structure_68", "theme": "market-structure", "teaching": "The 'vacuum effect': as price nears a channel line, both sides withhold trading because they expect the line to be tested, creating an imbalance that makes price race toward the line quickly; once there, the waiting side floods in and reverses/contains it.", "quote": "The current relative absence of selling creates a buy imbalance, and whenever there is any imbalance, the market moves quickly.", "pages": "221 (253)", "book": "Trends"}, {"id": "l_market-structure_69", "theme": "market-structure", "teaching": "The slope of a trend's final flag often approximates the slope of the subsequent new trend, though this is a minor, low-weight observation compared to other factors.", "quote": "One final minor observation is that the slope of the final flag of a trend often provides an approximation of the slope of the new trend. This has limited value to a trader.", "pages": "213 (245)", "book": "Trends"}, {"id": "l_market-structure_70", "theme": "market-structure", "teaching": "When drawing trend/channel lines, prefer the widest/best-fit version that contains the most price action over the strict two-point line through only the most recent bars; trend lines are strongest when tested by a third leg.", "quote": "The widest channel is the most certain.", "pages": "232 (264)", "book": "Trends"}, {"id": "l_market-structure_71", "theme": "market-structure", "teaching": "A doji bar signals the market is still genuinely two-sided/undecided — useful context for judging whether a channel/trend is about to continue or reverse.", "quote": "The bar after bar 8 was a doji bar, which indicates that the market is still two-sided.", "pages": "247 (279)", "book": "Trends"}, {"id": "l_market-structure_72", "theme": "market-structure", "teaching": "A first breakout attempt out of a very tight, prolonged channel usually fails and the original trend resumes, often extending to a new extreme equal to a measured move based on the height of that failed initial breakout attempt.", "quote": "Usually the first breakout of a tight, prolonged channel will fail. The trend will then resume and often break out to a new extreme and reach a measured move equal to about the height of that initial breakout.", "pages": "228 (260)", "book": "Trends"}, {"id": "l_market-structure_73", "theme": "market-structure", "teaching": "Consecutive climaxes (buy climax after buy climax, or several tight channels in a row each acting like a spike) usually lead to a larger correction than a single climax would.", "quote": "This was the third or fourth consecutive buy climax (every spike, whether it is one bar or many bars, is a climax), and it followed a strong bear spike. Consecutive climaxes usually lead to a larger correction, as they did here.", "pages": "236 (268)", "book": "Trends"}, {"id": "l_market-structure_74", "theme": "market-structure", "teaching": "Reversal-looking chart patterns (head and shoulders tops, expanding triangle tops, wedge shapes) usually resolve as with-trend continuation flags rather than actual trend reversals — the base rate favors continuation.", "quote": "Bars 3, 5, and 7 formed a head and shoulders top, and like most reversal patterns, became a large bull flag and not a reversal.", "pages": "236 (268)", "book": "Trends"}, {"id": "l_market-structure_75", "theme": "market-structure", "teaching": "A micro channel is a tight trend channel (2-10+ bars) with little to no pullback; the more bars and the stronger/less-tailed the trend bars, the stronger the channel and the less likely the first pullback reverses the trend — treat reversal attempts as likely-to-fail with-trend setups.", "quote": "The more bars, the stronger the bars... and the smaller the tails, the stronger the micro channel, and the more likely that the first pullback will fail to reverse the trend.", "pages": "281", "book": "Trends"}, {"id": "l_market-structure_76", "theme": "market-structure", "teaching": "A micro channel often functions as a spike on a higher time-frame chart and can be followed by a broader channel, forming a spike-and-channel trend with a measured-move target based on the height of the tight micro channel.", "quote": "When the micro channel is especially tight, it can be a spike on a higher time frame chart; a broader channel may follow, and it might reach a measured move target based on the height of the tight micro channel.", "pages": "283, 298", "book": "Trends"}, {"id": "l_market-structure_77", "theme": "market-structure", "teaching": "Program/momentum trading reinforces micro channels: once a trend is underway, momentum programs detect and add to it, and breakout programs begin trading once resistance/support breaks, adding to trend strength.", "quote": "Once the trend begins breaking above resistance levels, breakout programs will start trading. Some will trade in the direction of the trend and others will begin to scale in against the trend...", "pages": "281-282", "book": "Trends"}, {"id": "l_market-structure_78", "theme": "market-structure", "teaching": "When a micro trend line extends for about 10+ bars, this is climactic and unsustainable — expect a tradable reversal or at least a breakout pullback trade soon (second attempt to reverse).", "quote": "When a micro trend line extends for about 10 or more bars, the odds increase substantially that there will soon be a tradable reversal. This type of trend is unsustainable and therefore a type of climax.", "pages": "285", "book": "Trends"}, {"id": "l_market-structure_79", "theme": "market-structure", "teaching": "Most days are trading-range days; on these, prior swing highs/lows act as magnet/barrier levels where breakouts commonly fail and reverse, and second failed-breakout attempts (second higher high/lower low) are especially good fade setups because the market's midpoint acts like a magnet.", "quote": "Most days are trading range days or have a lot of trading range activity... horizontal lines across swing highs and lows often serve as barriers that result in failed breakouts and then reversals.", "pages": "301", "book": "Trends"}, {"id": "l_market-structure_80", "theme": "market-structure", "teaching": "On trend days, use horizontal support/resistance lines mainly to time with-trend pullback entries, not countertrend fades.", "quote": "On trend days, horizontal lines should generally be used only to enter on pullbacks.", "pages": "301", "book": "Trends"}, {"id": "l_market-structure_81", "theme": "market-structure", "teaching": "A trend, swing, pullback, and leg are overlapping/relative classifications defined by time frame — a pullback on one chart can be a strong trend on a smaller time frame; a single bar is itself a trend on a smaller time frame.", "quote": "A trend can be as short as a single bar (remember, a trend bar is made up of a trend on a smaller time frame) or longer than all of the bars on your screen.", "pages": "307", "book": "Trends"}, {"id": "l_market-structure_82", "theme": "market-structure", "teaching": "All trends, no matter how small, must first break a trend line (or a support/resistance line of a prior trading range) and then form trending swings (series of higher highs/lows or lower highs/lows); absent either, there is no trend.", "quote": "All trends, no matter how small, must first break a trend line from the prior trend or a support or resistance line from a prior trading range, and then have trending swings... Absent either of these, there is no trend.", "pages": "309", "book": "Trends"}, {"id": "l_market-structure_83", "theme": "market-structure", "teaching": "Especially strong trend days tend to have follow-through over the next one or more days (close near the high, next day opens/closes above open), sometimes with sharp opening sell-offs that trap bulls out and bears in before finding support at a higher-timeframe moving average.", "quote": "When a trend is especially strong, there is usually follow-through over the next one or more days... The opens often have sharp sell-offs that trap bulls out and bears in but usually find support at the 15 or 60 minute moving average.", "pages": "309-310", "book": "Trends"}, {"id": "l_market-structure_84", "theme": "market-structure", "teaching": "A trend is a series of brief spikes (odds > 50-50) alternating with trading ranges (odds back to ~50-50); the skill is anticipating and entering as the next spike begins, catching maybe 60% (or higher) odds of making X ticks before losing X ticks.", "quote": "One of the best ways to trade a trend is to anticipate when the next spike will begin and to enter on a stop as it is starting. That way, you can catch a spike with maybe a 60 percent probability or even higher of making X ticks before losing X ticks.", "pages": "310", "book": "Trends"}, {"id": "l_market-structure_85", "theme": "market-structure", "teaching": "Bull trends on higher time-frame charts tend to rally in the final 30-60 minutes (buy-into-the-close program trading), pushing the close above the open and producing a bull trend bar on the daily chart; the mirror is true for bear trends selling off into the close.", "quote": "Bull trends on higher time frame charts tend to have rallies in the final 30 to 60 minutes of trading on the 5 minute chart... When the market is in a bull trend, look for buy setups in the final hour.", "pages": "311-312", "book": "Trends"}, {"id": "l_market-structure_86", "theme": "market-structure", "teaching": "A break above a prior swing high leads to one of three outcomes — more buying/pressing (measured move follow-through), profit taking (most common), or shorting; read which is occurring from how far/fast price moves after the breakout.", "quote": "A move above a prior swing high in a bull trend will lead to predominantly one of three outcomes: more buying, profit taking (by far the most common possibility), or shorting.", "pages": "312-313", "book": "Trends"}, {"id": "l_market-structure_87", "theme": "market-structure", "teaching": "Traders don't flip from extremely bullish to extremely bearish overnight — sentiment transitions gradually (bullish -> neutral -> bearish); once enough firms make the transition, the market reverses into a deeper correction or a new trend.", "quote": "In the absence of some rare, dramatic news event, traders don't suddenly switch from extremely bullish to extremely bearish. There is a gradual transition.", "pages": "313", "book": "Trends"}, {"id": "l_market-structure_88", "theme": "market-structure", "teaching": "Most new highs (or lows) are simply profit-taking points and become bull-flag (or bear-flag) continuations, not tops — 'every new high is a potential top, but most reversal attempts fail.'", "quote": "Most new highs are followed by profit taking. Every new high is a potential top, but most reversal attempts fail and become the beginnings of bull flags, only to be followed by another new high.", "pages": "313", "book": "Trends"}, {"id": "l_market-structure_89", "theme": "market-structure", "teaching": "A breakout above the first leg of a two-legged pullback within a strong bear trend is usually met by aggressive sellers (not fresh buyers), because most traders view it as a temporary pullback destined to fail — the same logic applies symmetrically to bear-trend pullbacks in a bull trend.", "quote": "the dominant traders on the breakout will usually be aggressive sellers, instead of aggressive new buyers or profit-taking longs, and the minor bull trend will usually reverse back down into the direction of the major bear trend.", "pages": "313-314", "book": "Trends"}, {"id": "l_market-structure_90", "theme": "market-structure", "teaching": "As a trend matures, pullbacks grow larger and start behaving like trading ranges rather than flags, making new-high/new-low breakout attempts increasingly likely to fail — this is the transition zone before a full reversal or range.", "quote": "Once a strong bull begins to have pullbacks that are relatively large, the pullbacks... behave more like trading ranges than bull flags... a new high is now a breakout attempt above a trading range, and the odds are that it will fail.", "pages": "315-316", "book": "Trends"}, {"id": "l_market-structure_91", "theme": "market-structure", "teaching": "A trend that has run 30+ bars often ends with one or two unusually large climactic trend bars as the strongest traders step aside (creating a 'vacuum'), then reverse hard — weak traders read the large bar as strength and pile in the wrong direction just as smart money reverses.", "quote": "The absence of selling by the strongest traders results in a vacuum above the market, which creates one or two relatively large bull trend bars. This bull spike is just the sign that the strong traders have been waiting for... they appear as if out of nowhere and begin their selling.", "pages": "315", "book": "Trends"}, {"id": "l_market-structure_92", "theme": "market-structure", "teaching": "Reading a breakout to a new swing low: a strong continued breakdown means new selling dominates; an uncertain/choppy reaction means shorts are taking profit and buying is weak (expect a range); a strong reversal up means aggressive fresh buying dominates and the sell-off was likely just a big pullback in an ongoing bull trend.", "quote": "If there is a strong breakout, then new selling is dominant. If the market's movement is uncertain, then profit taking by the shorts and weak buying by the bulls is taking place... If there is a strong reversal up, then aggressive buying by the longs is the most important factor.", "pages": "317-318", "book": "Trends"}, {"id": "l_market-structure_93", "theme": "market-structure", "teaching": "Most trend days begin within the first hour or so; recognizing a developing trend pattern early lets you force yourself into several high-probability with-trend trades — if no such pattern is present, treat the day as a trading range and fade new extremes instead.", "quote": "Although a trend can begin with any bar during the day, the majority of trend days begin within the first hour or so. If you see a trend pattern setting up within the first hour or two of the day, there will likely be several high-probability with-trend trades that you can then make.", "pages": "318", "book": "Trends"}, {"id": "l_market-structure_94", "theme": "market-structure", "teaching": "During strong bear markets/reversals (e.g., 2008), selling becomes independent of fundamentals — driven by loss-averse investors, forced hedge-fund redemptions, and fund closures — producing outsized range days; adjust stop size down position size but keep trading standard price-action setups rather than fighting the emotional flow.", "quote": "The huge ranges offer great price action day trading opportunities but you might have to increase your stop size and therefore reduce your position size... a good price action trader can do very well just looking for standard price action setups.", "pages": "318-319", "book": "Trends"}, {"id": "l_market-structure_95", "theme": "market-structure", "teaching": "Once a trend enters its channel phase it always looks like it's reversing; most reversal attempts (roughly 80%) just evolve into with-trend flags.", "quote": "experienced traders know that 80 percent of reversal attempts fail and become bull ﬂags", "pages": "324, 330", "book": "Trends"}, {"id": "l_market-structure_96", "theme": "market-structure", "teaching": "Easy, clear, high-probability setups tend to produce small, fast scalps; big trend moves require unclear, scary-looking setups precisely because that keeps most traders sidelined/chasing.", "quote": "When a setup is easy and clear, meaning it has a high probability of success, the move is usually a small, fast scalp. If the move is going to go a long way, it has to be unclear and difﬁcult to take.", "pages": "325-326", "book": "Trends"}, {"id": "l_market-structure_97", "theme": "market-structure", "teaching": "A third consecutive push/buy climax in a spike-and-channel bull run is a classic place for at least a two-legged, 10+ bar correction back toward the moving average.", "quote": "Bar 24 was the third push up and third consecutive buy climax after the spike up from bar 14... Both expected a correction to have at least two legs and 10 bars and to penetrate the moving average.", "pages": "331-332", "book": "Trends"}, {"id": "l_market-structure_98", "theme": "market-structure", "teaching": "In the strongest trends the with-trend pullback signal bars are often weak, which discourages most traders from taking them and forces late chasing entries — this weakness of signals is a feature, not a bug, of strong trends.", "quote": "In the strongest trends, the pullbacks usually have weak signal bars, making many traders not take them, and forcing traders to chase the market.", "pages": "340-341", "book": "Trends"}, {"id": "l_market-structure_99", "theme": "market-structure", "teaching": "Numerous objective signs mark a strong trend: big gap open, trending highs/lows, mostly trend-color bars, minimal body overlap, bars with small/no tails, measuring/micro-measuring gaps, absence of big climaxes or large countertrend bars, no significant trend-channel-line overshoots, failed wedges/reversals, 20+ consecutive moving-average gap bars, small/infrequent sideways pullbacks, and repeated two-legged pullbacks.", "quote": "Here are some characteristics that are commonly found in strong trends: ... There is a big gap opening on the day. ... There are small, infrequent, and mostly sideways pullbacks.", "pages": "339-341", "book": "Trends"}, {"id": "l_market-structure_100", "theme": "market-structure", "teaching": "Large early gaps that don't reverse usually mark the start of a strong trend day that closes at or near the extreme; quiet markets with small bars/dojis often produce the biggest trends, and institutions filling large orders in pieces (not dumping at once) is why trend days grind rather than spike-and-crash.", "quote": "Quiet markets with lots of small bars, many of which are dojis, often lead to the biggest trends... they don't dump all of their buy orders onto the market at once.", "pages": "342-343", "book": "Trends"}, {"id": "l_market-structure_101", "theme": "market-structure", "teaching": "A trend day whose open is very close to its low (bull) tends to close near its high, with trend persisting into the close.", "quote": "trend from the open days that open within a few ticks of the low of the day often close within a few ticks of the high of the day, and there is often a trend into the close.", "pages": "343", "book": "Trends"}, {"id": "l_market-structure_102", "theme": "market-structure", "teaching": "When a limit order to buy at the prior bar's close repeatedly fails to fill because the next bar's low never dips to that price, that non-fill itself is evidence the trend is strong.", "quote": "When traders cannot get ﬁlled on a limit order to buy at the close of the prior bar, the trend is strong.", "pages": "348", "book": "Trends"}, {"id": "l_market-structure_103", "theme": "market-structure", "teaching": "A crowded one-sided channel (everyone who wanted to buy has already bought) sets up sharp reversals once the market starts to fall, because all trapped longs rush to exit simultaneously.", "quote": "Everyone who wanted to buy had already bought and there was no one left to buy. As the market started to fall, all of the buyers in the channel were quickly holding losing positions and then everyone rushed to the exits.", "pages": "348-349", "book": "Trends"}, {"id": "l_market-structure_104", "theme": "market-structure", "teaching": "Markets tend to attempt everything twice (two legs): pullbacks, breakouts, and trend continuations regularly subdivide into two legs; success in doing something twice often leads to trend extension, while double failure often leads to the opposite move.", "quote": "The market regularly tries to do something twice, and this is why all moves tend to subdivide into two smaller moves... If it fails in its two attempts, it will usually try to do the opposite. If it succeeds, it will often then extend the trend.", "pages": "351", "book": "Trends"}, {"id": "l_market-structure_105", "theme": "market-structure", "teaching": "A two-legged view of trend structure is more practically useful for trading than Elliott Wave theory, which Brooks calls essentially useless for most traders trying to make money.", "quote": "This two-legged view of markets makes more sense to a trader since it offers sound logic and abundant trading opportunities, unlike Elliott Wave Theory, which is essentially useless to the vast majority of traders.", "pages": "351", "book": "Trends"}, {"id": "l_market-structure_106", "theme": "market-structure", "teaching": "Every larger trend leg / pullback is itself composed of smaller legs at lower timeframes; 'leg' just means the direction of movement changed by whatever criterion you use.", "quote": "Every trend line break and every pullback is a leg, and each larger leg is made of smaller legs... The term leg is very general and simply means that the direction of movement has changed.", "pages": "353", "book": "Trends"}, {"id": "l_market-structure_107", "theme": "market-structure", "teaching": "Opening range size predicts day type: small opening range -> breakout day; opening range about half the recent-day range -> measured-move / trending-trading-range day; large opening range -> spike, likely spike-and-channel trend day.", "quote": "if the opening range is small, it will be followed by a breakout... If the opening range is large, there is usually a spike and the day will likely become a spike and channel trend day.", "pages": "356", "book": "Trends"}, {"id": "l_market-structure_108", "theme": "market-structure", "teaching": "Every trend alternates between a spike phase (urgency, breakaway-gap feel, everyone believes there's further to go) and a channel phase (worry/uncertainty, two-sided trading that always looks like it's ending yet keeps extending) — this spike-and-channel duality underlies almost every trend.", "quote": "First, there is a spike of one or more bars where the market is moving quickly... Next, there is a pullback... After the pullback, the trend converts into a channel, where there is less urgency and more a sense of worry and uncertainty. This is the wall of worry.", "pages": "357-358", "book": "Trends"}, {"id": "l_market-structure_109", "theme": "market-structure", "teaching": "After a spike, if the pullback grows beyond ~10 bars it becomes a trading range that will most often (but not always) break out in the original trend direction; roughly a third of the time it breaks out the opposite way instead.", "quote": "The second possibility occurs if the pullback extends for more than 10 bars. It will then have grown into a trading range... In general, the odds always favor the trading range breakout to be in the same direction as the original trend... in about a third of cases the market will break out of the bottom of the trading range instead of the top.", "pages": "359-360", "book": "Trends"}, {"id": "l_market-structure_110", "theme": "market-structure", "teaching": "A channel, no matter how steep, is a flag in the opposite direction: a bull channel is a bear flag and a bear channel is a bull flag; it is also the first leg of a larger, still-unfolding trading range.", "quote": "Remember that a channel, no matter how steep, is a flag in the opposite direction. A bull channel is a bear flag and a bear channel is a bull flag.", "pages": "329 (361)", "book": "Trends"}, {"id": "l_market-structure_111", "theme": "market-structure", "teaching": "A spike is a breakout/gap; the pullback to the start of the channel is therefore a test of that gap, i.e., a breakout test, and should be expected before too long even after a very strong trend.", "quote": "A spike is a breakout, which means that there will be a gap between the breakout point and the first pullback, which is the start of the channel... The test to the bottom of the channel is a test of the gap and is a breakout test.", "pages": "329 (361), 332 (364)", "book": "Trends"}, {"id": "l_market-structure_112", "theme": "market-structure", "teaching": "Every large trend bar should be conceptually treated as simultaneously a spike, a breakout, a gap, and a climax — these are different lenses on the same event, not different phenomena.", "quote": "Every large trend bar should be thought of as a spike, a breakout, a gap, and a climax.", "pages": "333 (365)", "book": "Trends"}, {"id": "l_market-structure_113", "theme": "market-structure", "teaching": "Consecutive climaxes occur because urgency drives both weak longs and weak shorts to capitulate/pile in at the market rather than wait for a pullback; once the weak side is fully exhausted on both legs, there's no one left to take the other side at that price, forcing at least a two-legged correction.", "quote": "Once these weak longs are out and the weak bears are in, there is no one left to short at these low prices and this creates an imbalance to the buy side.", "pages": "333 (365)", "book": "Trends"}, {"id": "l_market-structure_114", "theme": "market-structure", "teaching": "Spikes are cumulative — an early, less-obvious spike can be more influential in defining where a channel actually begins than the final, more visually obvious spike that triggers the move; earlier countertrend spikes should not be dismissed even if price makes a new extreme afterward.", "quote": "Just because that final spike broke below the wedge and clearly led to the bear leg does not mean that it turned the market all by itself. Those earlier spikes were also part of the transition and should not be overlooked.", "pages": "335-336 (367-368), 338 (370)", "book": "Trends"}, {"id": "l_market-structure_115", "theme": "market-structure", "teaching": "Any breakout resets trader mind-set and should be treated as the start of a new trend, even when it fails a reversal pattern (e.g., a wedge that breaks the 'wrong' way becomes the new dominant trend, typically stronger for having overrun the failed reversal).", "quote": "The breakout always resets the mind-set and should be thought of as the start of a new trend.", "pages": "336-337 (368-369)", "book": "Trends"}, {"id": "l_market-structure_116", "theme": "market-structure", "teaching": "Spike-and-channel patterns are fractal/nested: a steep channel on one timeframe often IS just a spike on a higher timeframe chart, and vice versa; be open to reinterpreting the same price action at different scales.", "quote": "When the channel is very steep, the spike and channel often together form just a spike on a higher time frame chart, and that spike will usually be followed by a channel on that higher time frame.", "pages": "334 (366), 351 (383)", "book": "Trends"}, {"id": "l_market-structure_117", "theme": "market-structure", "teaching": "A large trend bar late in a protracted trend is often a 'buy/sell vacuum,' not simply a fresh breakout leg — strong opposing and even same-side traders step aside near resistance, letting momentum buyers push price unopposed to the target, after which both profit-taking longs and fresh shorts pile in expecting a deeper corrective phase.", "quote": "it was more likely a buy vacuum. The strong bulls and bears were waiting for a bar like this to sell around its close. It always forms just below one or more resistance levels, and as the market approaches the area, the bears and many bulls step aside.", "pages": "347-348 (379-380)", "book": "Trends"}, {"id": "l_market-structure_118", "theme": "market-structure", "teaching": "A wedge (three-push) pattern that is unusually large often has its correction subdivide into more than the usual two legs, since a short correction can't adequately absorb a large wedge.", "quote": "A wedge usually has a two-legged correction, but when the wedge is large, the legs often subdivide.", "pages": "354 (386)", "book": "Trends"}, {"id": "l_market-structure_119", "theme": "market-structure", "teaching": "Trending trading range days: opening range about 1/3-1/2 of recent average daily range signals a coming breakout and roughly a doubling of the day's range, followed by a second trading range; multiple breakouts across a day should instead be treated/traded as a stronger trend day (with-trend focus only).", "quote": "If the opening range is about a third to half of the size of the recent average daily range, then look for a breakout and an approximate doubling of the range of the day... when this happens, it is usually better to consider the day as a stronger type of trend day and trade only with trend.", "pages": "359-360 (391-392)", "book": "Trends"}, {"id": "l_market-structure_120", "theme": "market-structure", "teaching": "Each trading range, having hosted two-sided trading, becomes a 'comfort zone'/value area for both bulls and bears, creating a magnetic pull that tends to draw later breakouts back into the range for a test — this is why late-day reversals through a prior range are common and tradeable.", "quote": "Since each trading range has two-sided trading, it is a comfort zone for bulls and bears, who both see the area as value. This creates a magnetic pull and tends to draw breakouts back into the range.", "pages": "362 (394)", "book": "Trends"}, {"id": "l_market-structure_121", "theme": "market-structure", "teaching": "A subtle early clue that a trading range is secretly trending: each swing high is a little higher than the prior one and each swing low is a little higher, even while the market still looks range-bound; once enough traders notice, a breakout follows.", "quote": "If you see a trading range day forming, but each swing high is a little higher than the prior one and each swing low is higher than the prior one, the market may already be trending even though it is still in a trading range.", "pages": "362 (394)", "book": "Trends"}, {"id": "l_market-structure_122", "theme": "market-structure", "teaching": "Most reversal days begin their session as trending trading range days, so recognizing a TTR day should keep a trader alert to a possible large late-day reversal swing that can span the entire day's range.", "quote": "Most reversal days begin as trending trading range days... they should always be prepared for a possible late reversal swing trade, which might become a large intraday trend trade that can cover the entire day's range.", "pages": "363 (395)", "book": "Trends"}, {"id": "l_market-structure_123", "theme": "market-structure", "teaching": "Trending trading range days are two-sided, so the trending force is weaker than other trend days; when a day is less strong it is less likely to close on its extreme, so look for reversal trades into the close.", "quote": "When a day is less strong, it is less likely to close on its low. Traders know this and look for a reversal trade going into the close.", "pages": "402", "book": "Trends"}, {"id": "l_market-structure_124", "theme": "market-structure", "teaching": "When a trend begins more than an hour into the day, that first hour was by definition a trading range, so the day often becomes (or behaves like) a trending trading range day rather than a clean trend day.", "quote": "Whenever a trend begins after an hour into the day, the day often becomes a trending trading range day", "pages": "403", "book": "Trends"}, {"id": "l_market-structure_125", "theme": "market-structure", "teaching": "Tight, horizontal areas of strong two-sided trading act as magnets that pull the market back in after a breakout.", "quote": "This was an area of strong two-sided trading, and therefore a magnet that would tend to draw the market back in after a breakout.", "pages": "403,404", "book": "Trends"}, {"id": "l_market-structure_126", "theme": "market-structure", "teaching": "A trend-from-the-open day with too much sideways action in the first two hours is a weaker, less predictable variant (trending trading range) even though it opens/closes on its extremes; a true trend-from-the-open day has few tradable countertrend swings.", "quote": "A trend from the open trend day usually doesn't have many signiﬁcant tradable countertrend swings, but a trending trading range does, and is a weaker, less predictable type of trend day.", "pages": "405", "book": "Trends"}, {"id": "l_market-structure_127", "theme": "market-structure", "teaching": "When the market fails twice at trying to do something (e.g., two failed attempts to make a new extreme), it usually then reverses and goes the other way.", "quote": "When the market fails twice at trying to do something, it usually then goes in the opposite direction.", "pages": "406", "book": "Trends"}, {"id": "l_market-structure_128", "theme": "market-structure", "teaching": "Buying above a trading range in a bear trend (or shorting below one in a bull trend) is generally a losing strategy — smart traders instead fade at the extremes in the direction of the larger trend.", "quote": "buying above a trading range in a bear trend is a losing strategy. Smart traders are doing just the opposite. They have limit orders to go short at and above the high of the prior bar", "pages": "430", "book": "Trends"}, {"id": "l_market-structure_129", "theme": "market-structure", "teaching": "A strong breakout bar after a trend establishes control usually leads to at least two more legs in that direction, often forming a wedge flag before the next leg continues.", "quote": "When there is a strong bear breakout like this, there will usually be at least two more legs down in the form of a bear channel, and those two additional legs often create a wedge bear ﬂag.", "pages": "430,431", "book": "Trends"}, {"id": "l_market-structure_130", "theme": "market-structure", "teaching": "If the first bar or two of the day is a strong trend bar, there is usually follow-through in that direction, and an attempted reversal typically only produces a lower high (in a down move) or higher low (in an up move) rather than an actual reversal.", "quote": "If the ﬁrst bar of the day is a strong trend bar (see thumbnail), there will usually be follow-through, and when the ﬁrst two bars are strong, an attempted reversal up usually becomes a lower high", "pages": "432", "book": "Trends"}, {"id": "l_market-structure_131", "theme": "market-structure", "teaching": "An inside bar following a large trend bar / climax creates a 'breakout mode' situation where, absent immediate continuation, the opposite side becomes aggressive (shorts buy back, bulls buy for a low-of-day) and the move can reverse.", "quote": "Bar 10 was a large bear trend bar and therefore a sell climax. The next bar was an inside bar and this created a breakout mode situation.", "pages": "433", "book": "Trends"}, {"id": "l_market-structure_132", "theme": "market-structure", "teaching": "Trend-from-open days have urgency and conviction from the start and are usually the strongest trend type with the smallest pullbacks; a small-pullback trend day is the strongest variant, forming once or twice a month.", "quote": "Trend from the open days have urgency and conviction from the outset and are usually the strongest trends and have the smallest pullbacks.", "pages": "415,417", "book": "Trends"}, {"id": "l_market-structure_133", "theme": "market-structure", "teaching": "A trend-from-open day develops only about 20 percent of days; buying/shorting the first bar's break expecting sustained trend is therefore inherently a low-probability bet, and first-hour reversals are far more common.", "quote": "A trend from the open day is usually the strongest form of trend pattern, but it develops in only about 20 percent of days. That means that buying above the ﬁrst bar or shorting below it...is a low-probability trade.", "pages": "416", "book": "Trends"}, {"id": "l_market-structure_134", "theme": "market-structure", "teaching": "The high or low of the day forms within the first 5 bars roughly 50% of the time, but within the opening range (which can span a couple hours) about 90% of the time.", "quote": "The high or low of the day forms within the ﬁrst ﬁve bars or so in about 50 percent of days. However, it forms within the opening range...in about 90 percent of days.", "pages": "416", "book": "Trends"}, {"id": "l_market-structure_135", "theme": "market-structure", "teaching": "A trend-from-open setup is more reliable when it forms at a strong magnet such as a trend channel line (wedge reversal) or as part of a reversal pattern like a final flag at the prior day's close.", "quote": "The setup is more reliable if it forms at a strong magnet like a trend channel line...or if it is part of a reversal pattern, like a reversal from a ﬁnal ﬂag at yesterday's close.", "pages": "416,417", "book": "Trends"}, {"id": "l_market-structure_136", "theme": "market-structure", "teaching": "A strong trend-from-open day can carry follow-through into the first hour or two of the next day; the pullback on that next-day open is often just a higher-timeframe two-legged correction (e.g., to the 15-minute MA), even though it may look like a reversal.", "quote": "This type of trend can be so strong that there can be follow-through in the ﬁrst hour or two of the next day...The pullback often is strong enough to make traders wonder if the market is reversing, but it is usually just a higher time frame, two-legged correction", "pages": "417", "book": "Trends"}, {"id": "l_market-structure_137", "theme": "market-structure", "teaching": "Unusually large consecutive trend bars breaking to a new extreme after a long-running trend usually signal climactic exhaustion rather than a new leg, and are typically followed by a roughly 10-bar, two-legged pullback.", "quote": "when a trend has gone on for a long time and then has unusual further strength, it usually signals the end of the move for the time being and the start of a two-legged pullback that will last about 10 bars or so", "pages": "417", "book": "Trends"}, {"id": "l_market-structure_138", "theme": "market-structure", "teaching": "A spike (4+ bars with no pullback, or even two large trend bars) represents a price level both sides agree shouldn't be traded at, forcing the market to quickly move on; after a spike, the three typical outcomes are exhaustive reversal, extended sideways consolidation, or a trend channel (spike and channel day).", "quote": "The spike is an area where both bulls and bears agree that very little trading should take place, and the market therefore needs to quickly move to another price level.", "pages": "419", "book": "Trends"}, {"id": "l_market-structure_139", "theme": "market-structure", "teaching": "The market has inertia: the first attempt to end a trend (first trend-line break) usually fails and often becomes a with-trend entry leading to a new trend extreme rather than a genuine reversal.", "quote": "The market has inertia and the ﬁrst attempt to end the trend usually fails...the ﬁrst break of the trend line has high odds of setting up a with-trend entry that will lead to a second trend leg", "pages": "420", "book": "Trends"}, {"id": "l_market-structure_140", "theme": "market-structure", "teaching": "A tight trading range acts as a magnet even at the close of the day: after a breakout out of it, price often comes back and closes within that range.", "quote": "Tight trading ranges are magnets and tend to pull breakouts back into them.", "pages": "435", "book": "Trends"}, {"id": "l_market-structure_141", "theme": "market-structure", "teaching": "Institutions filling large orders in pieces throughout the day (to avoid creating an exhaustive climax that could reverse against their fill price) is a mechanism behind quiet, small-pullback trend days.", "quote": "The market moved up quietly all day because institutions had buy orders to ﬁll, and they ﬁlled them in pieces during the day because they were afraid that a pullback might not come and they needed to buy.", "pages": "440", "book": "Trends"}, {"id": "l_market-structure_142", "theme": "market-structure", "teaching": "When a market forms multiple trending trading ranges in a day, traders should focus almost exclusively on with-trend trades and treat range-edge reversal attempts (final flag) as lower priority/secondary.", "quote": "When the day is forming multiple trending trading ranges...traders should concentrate on taking with-trend trades.", "pages": "403", "book": "Trends"}, {"id": "l_market-structure_143", "theme": "market-structure", "teaching": "A short is only acceptable against a strong bull channel if there is prior bear strength (e.g., a 5-10 bar pullback to the moving average) or a break of the bull trend line combined with an approach to the moving average; otherwise you are betting the market does something it hasn't done all day.", "quote": "You could only short a second signal and only if there was some prior bear strength, like a five- to 10-bar pullback to the moving average. In the absence of that, any short is a bet that the market would do something that it had not done all day.", "pages": "441", "book": "Trends"}, {"id": "l_market-structure_144", "theme": "market-structure", "teaching": "On most strong trend days there is a sharp, brief countertrend spike between 11:00 a.m. and noon (news is usually blamed but is irrelevant) that shakes out weak with-trend traders and traps eager counter-trend traders; it typically resolves back into a with-trend opportunity.", "quote": "On most strong trend days, there is usually a sharp, brief reversal between 11:00 a.m. and noon PST that shakes out weak longs and traps overly eager bears... it usually sets up a buying opportunity for those who do not get frightened by the spike down.", "pages": "442", "book": "Trends"}, {"id": "l_market-structure_145", "theme": "market-structure", "teaching": "A trend from the open often first has a double top or bottom that gets tested/broken on an early scheduled report before the real trend unleashes.", "quote": "A trend from the open can have a double top or bottom before the strong trend begins... you always have to consider the possibility that the market was just waiting for the report before it unleashed its strength.", "pages": "443", "book": "Trends"}, {"id": "l_market-structure_146", "theme": "market-structure", "teaching": "When pullbacks stay unusually small all day, treat it as a very strong trend and stay biased to that side for most/all of the day; mislabeling such a day as a mere 'trending trading range day' will cause you to take counter-trend trades and miss with-trend ones.", "quote": "When the pullbacks are this small, you are dealing with a very strong bear trend. When that is the case, it is better to make sure that you are short for most or all of the day. Thinking of this as a trending trading range day will make you take longs and often miss shorts.", "pages": "444", "book": "Trends"}, {"id": "l_market-structure_147", "theme": "market-structure", "teaching": "The first moving-average gap bar in a trend, after the trend has not touched the MA for a long stretch (e.g., ~20 bars) in a tight channel, tends to precede the final leg of that trend before a larger correction or reversal, because the approach to the MA almost always breaks the significant trend line.", "quote": "The first moving average gap bar in a bear trend often leads to the final leg down before there is a larger correction up. Since the leg up to the moving average gap bar almost always breaks a significant bear trend line, the higher low or lower low test of the bear low usually leads to a protracted correction up or even a reversal.", "pages": "444", "book": "Trends"}, {"id": "l_market-structure_148", "theme": "market-structure", "teaching": "Experienced traders should expect a strong countertrend move on a trend day after 11 a.m. PST and be ready to fade its failure (e.g., a small double top) rather than be trapped by it.", "quote": "experienced traders know that the market often has a strong countertrend move after 11 a.m. PST on a trend day and they would be ready to short the failure, like the small double top at bar 24.", "pages": "444", "book": "Trends"}, {"id": "l_market-structure_149", "theme": "market-structure", "teaching": "Watch for a pullback that begins with an unusually strong countertrend spike bar — that is the classic early warning that the pullback may grow into a full trend-channel reversal rather than remain a minor flag.", "quote": "whenever you see a pullback that has a strong countertrend spike, be aware that the trend might be reversing... make sure to consider the possibility that the bar could be a bull spike that could be followed by a relentless bull channel instead of a small bear flag.", "pages": "447-448", "book": "Trends"}, {"id": "l_market-structure_150", "theme": "market-structure", "teaching": "Consecutive climax (spike) bars usually lead to at least a several-bar pause or two-legged pullback of roughly 10 bars; a third consecutive climax typically leads to an even larger correction than after two.", "quote": "A pair of consecutive climaxes is usually followed by at least a several-bar pause or pullback... Bar 7 was then a third sell climax, and a third consecutive sell climax is usually followed by an even larger correction.", "pages": "451", "book": "Trends"}, {"id": "l_market-structure_151", "theme": "market-structure", "teaching": "The start of any channel (the point where it began) tends to get tested later, often forming a double top/bottom flag rather than a clean break.", "quote": "the beginning of a channel usually gets tested... The test may break above that high but more often forms a double top bear flag, as it did here.", "pages": "452", "book": "Trends"}, {"id": "l_market-structure_152", "theme": "market-structure", "teaching": "During the midday range in a trend-resumption setup, both sides keep scaling in until most reach max size; once a breakout begins, the losing side can't add anymore, leaving the breakout unopposed and prone to acceleration as trapped counter-trend positions capitulate.", "quote": "Once there is a breakout, the losing side cannot scale in anymore, and their only choices are hope and getting stopped out. ... As the market falls, it will often accelerate as more and more bulls give up and sell out of their losing longs, adding to the collapse into the close.", "pages": "456", "book": "Trends"}, {"id": "l_market-structure_153", "theme": "market-structure", "teaching": "Trend resumption patterns can play out over two or more days: a strong spike on one day followed by a multi-hour/multi-day trading range can resume the original trend at any point, even while intraday 5-minute swings look large; recognizing this justifies swinging a larger part of the position.", "quote": "Trend resumption patterns often take place over two or more days... If you are aware of this, you will be more likely to be willing to swing a larger part of your position for what could be a big move.", "pages": "457, 462", "book": "Trends"}, {"id": "l_market-structure_154", "theme": "market-structure", "teaching": "Any breakout is often followed by a measured move based on the height of the originating spike, typically measured from the open/low of the first spike bar to the close/high of the final spike bar.", "quote": "Any breakout often is followed by a measured move based on the spike. It is usually based on the height from the open or low of the first bar of the spike to the close or high of the final bar.", "pages": "459", "book": "Trends"}, {"id": "l_market-structure_155", "theme": "market-structure", "teaching": "Stairs often function as pullbacks/flags on a higher timeframe — a broad channel over the final hour or two can be a large flag that breaks out at the next day's open in the higher-timeframe trend direction.", "quote": "Stairs are often just pullbacks or flags in higher time frame trends... For example, a broad bull channel today might just be a large bear flag, and the bear trend could break out tomorrow.", "pages": "464", "book": "Trends"}, {"id": "l_market-structure_156", "theme": "market-structure", "teaching": "Three pushes down (or up) does not guarantee a trend reversal — if the countertrend move lacks large trend bars and strong climactic reversal bars, it won't attract enough opposing strength and the original trend resumes, often as a wedge-shaped flag.", "quote": "Three pushes down does not guarantee a trend reversal. The move down to bar 7 had very little buying pressure. There were no large bull trend bars and no strong climactic reversals... This was not how strong reversals typically look, and because of that, it did not attract enough strong bulls to reverse the market.", "pages": "466", "book": "Trends"}, {"id": "l_market-structure_157", "theme": "market-structure", "teaching": "When a wedge top/bottom fails and the market accelerates instead of reversing, expect the breakout to run to roughly a measured move (an Andrew's Pitchfork-style projection: a parallel line as far from the middle line as the middle line is from the origin line).", "quote": "The breakout should extend to about a measured move up to a parallel line that is about the same distance from the middle line as the middle line is from the bottom line (an Andrew's Pitchfork move), which it did.", "pages": "467", "book": "Trends"}, {"id": "l_market-structure_158", "theme": "market-structure", "teaching": "The market is perpetually attempting to break out, and then perpetually trying to make every breakout fail — this tension is the single most fundamental dynamic in trading.", "quote": "The market is always trying to break out, and then the market tries to make every breakout fail. This is the most fundamental aspect of all trading and is at the heart of everything that we do.", "pages": "30", "book": "Trading Ranges"}, {"id": "l_market-structure_159", "theme": "market-structure", "teaching": "Institutions generate ~90%+ of volume in large markets and are (as a group) profitable; price can only reach a level where institutions are willing to trade there, so retail stops are never 'run' — they're only hit when institutions independently choose to trade at that price.", "quote": "Ninety percent or more of all trading in large markets is done by institutions... The market will not run your stops. The market might test the price where your protective stop is, but it has nothing to do with your stop.", "pages": "17", "book": "Trading Ranges"}, {"id": "l_market-structure_160", "theme": "market-structure", "teaching": "Strong trends can have pullbacks driven by big-money buying at/below the low of the prior bar even as weak traders get stopped out there — don't assume a pullback below a prior low means the trend is reversing.", "quote": "You have to assume that the big money was buying at and below the low of that prior bar, and that is also what many experienced traders were doing.", "pages": "17", "book": "Trading Ranges"}, {"id": "l_market-structure_161", "theme": "market-structure", "teaching": "Profit-taking by early, aggressive with-trend traders — not new counter-trend selling/buying — is the primary cause of the first pullback in any strong trend.", "quote": "Profit taking is the cause of the first pullback in any strong trend.", "pages": "38", "book": "Trading Ranges"}, {"id": "l_market-structure_162", "theme": "market-structure", "teaching": "A deep pullback (roughly 75% or more retracement of the prior leg) meaningfully lowers the odds the market re-tests the prior trend extreme; at that point it's often better to treat it as a new opposite-direction trend rather than a pullback.", "quote": "In general, the odds that a pullback will get back to the prior trend's extreme fall substantially if the pullback retraces 75 percent or more.", "pages": "22", "book": "Trading Ranges"}, {"id": "l_market-structure_163", "theme": "market-structure", "teaching": "Sustained trends transition into trading ranges as pullbacks grow larger — once pullbacks start behaving like trading ranges rather than flags, new-high/new-low breakout attempts become less reliable and are more likely to fail.", "quote": "Once a strong bull trend begins to have pullbacks that are relatively large, the pullbacks... behave more like trading ranges than like bull flags... a new high is now a breakout attempt above a trading range, and the odds are that it will fail.", "pages": "33", "book": "Trading Ranges"}, {"id": "l_market-structure_164", "theme": "market-structure", "teaching": "A correction after a strong, mature trend leg typically needs at least about 10 bars and two legs to be considered a real (rather than minor) correction; three consecutive buy/sell climaxes without such a correction often precede one.", "quote": "That usually requires at least 10 bars and two legs, and sometimes can result in a trend reversal.", "pages": "34", "book": "Trading Ranges"}, {"id": "l_market-structure_165", "theme": "market-structure", "teaching": "After a breakout resolves uncertainty into a fast directional move, the market searches for a new price where both bulls and bears again see value — meaning every successful breakout eventually leads back into renewed uncertainty/a new trading range.", "quote": "A breakout is a search for a trading range, for uncertainty, and a 50 percent directional probability of an equidistant move.", "pages": "40", "book": "Trading Ranges"}, {"id": "l_market-structure_166", "theme": "market-structure", "teaching": "Crash-shaped price action (violent one-directional moves) is not a rare daily-chart phenomenon — the same 'crash' pattern shape occurs routinely and repeatedly on intraday charts and is simply a tradable bear (or bull) swing once emotion is stripped away.", "quote": "If you remove the time and price axes from a chart and focus simply on the price action, there are market movements that occur frequently on intraday charts that are indistinguishable from the patterns in a classic crash.", "pages": "24-25", "book": "Trading Ranges"}, {"id": "l_market-structure_167", "theme": "market-structure", "teaching": "'Close is close enough': a pattern that resembles a textbook setup but isn't perfect will likely behave similarly to the textbook version — trading well requires operating comfortably in this probabilistic gray zone rather than demanding exact pattern matches.", "quote": "If a pattern is setting up and is not perfect but is reasonably similar to a reliable setup, it will likely behave similarly as well. Close is usually close enough.", "pages": "21", "book": "Trading Ranges"}, {"id": "l_market-structure_168", "theme": "market-structure", "teaching": "Most breakouts fail — trading-range breakout attempts fail roughly 80% of the time, trend reversal attempts also fail roughly 80% of the time, and even the strongest trend-continuation breakouts fail about 30% of the time.", "quote": "about 80 percent of attempts to break out of a trading range fail...even the strongest breakouts fail about 30 percent of the time.", "pages": "41,43,71-72", "book": "Trading Ranges"}, {"id": "l_market-structure_169", "theme": "market-structure", "teaching": "Markets have inertia: trending markets tend to keep trending (most reversal attempts fail), and ranging markets tend to keep ranging (most breakout attempts fail).", "quote": "The market has inertia and a strong propensity to continue what it has been doing.", "pages": "67", "book": "Trading Ranges"}, {"id": "l_market-structure_170", "theme": "market-structure", "teaching": "Support and resistance act as magnets; the closer price gets to a magnet, the stronger the pull (a vacuum effect), so traders should generally trade in the direction of a nearby magnet until it is reached, then reassess.", "quote": "Support and resistance are magnets that draw the market toward them. When you become aware of a magnet not too far from the current price, trade only in the direction of the magnet until after it is reached.", "pages": "66", "book": "Trading Ranges"}, {"id": "l_market-structure_171", "theme": "market-structure", "teaching": "Unusually high volume (10-20x average) on a breakout increases the odds of follow-through, but volume is not reliable enough to actively trade on — the trend bars themselves already convey what volume would tell you, and focusing on volume tends to distract and hinder decision-making.", "quote": "Volume is not reliable enough to warrant following it, and the large trend bars that comprise the spike will already tell you whether the breakout is likely to be successful.", "pages": "42", "book": "Trading Ranges"}, {"id": "l_market-structure_172", "theme": "market-structure", "teaching": "Once broken, support becomes resistance, and once exceeded, resistance becomes support.", "quote": "Once the market falls through support, it usually becomes resistance; and once the market breaks above resistance, it usually becomes support.", "pages": "68", "book": "Trading Ranges"}, {"id": "l_market-structure_173", "theme": "market-structure", "teaching": "Any upward-sloping channel should be treated as a bear flag (and any downward-sloping channel as a bull flag) for trading purposes, regardless of the larger trend context, because its eventual breakout tends to behave like a flag breakout.", "quote": "any upward-sloping channel should be thought of as a bear flag, even if it is part of a bull market...Likewise, any downward-sloping channel should be thought of as a bull flag.", "pages": "69-70", "book": "Trading Ranges"}, {"id": "l_market-structure_174", "theme": "market-structure", "teaching": "Every trend bar functions as an intraday equivalent of a gap; the popular saying 'all gaps get filled' is better restated as 'all prior prices get tested' — gaps and breakout points act as magnets that get retested even if not fully closed.", "quote": "'All gaps will get filled' is a saying that you sometimes hear, but this saying only rarely helps traders...the saying would be more precise if it were 'all prior prices get tested.'", "pages": "59-60", "book": "Trading Ranges"}, {"id": "l_market-structure_175", "theme": "market-structure", "teaching": "After a level (support/resistance, moving average, trend line) is repeatedly tested (roughly 4-5 times) without a strong reaction, the defending side loses conviction, stops defending, and starts taking profits, increasing the odds the level eventually breaks.", "quote": "if the market tests an area of support four or five times, the likelihood of breaking through that support increases and, at some point, the breakout becomes more likely than not.", "pages": "67-68", "book": "Trading Ranges"}, {"id": "l_market-structure_176", "theme": "market-structure", "teaching": "Because computer algorithms generate roughly 70% of all trading volume (about 80% of institutional volume) and are based on mathematics, technical levels are known to everyone — there are no secret levels, which is why classic support/resistance and measured-move targets work reliably across many participants.", "quote": "computer algorithms, which generate 70 percent of all trading volume and 80 percent of institutional volume, know where they are.", "pages": "68", "book": "Trading Ranges"}, {"id": "l_market-structure_177", "theme": "market-structure", "teaching": "Trend strength can be read by what happens immediately after price breaks a prior swing extreme: if the breakout finds more buyers (sellers) and continues far enough for a scalper's profit, the trend is strong; if it reverses within a bar or two, the trend may be weakening or transitioning into a range.", "quote": "if the market moves far enough up for the breakout buyers to make at least a scalper's profit, then the breakout found more buyers than sellers. That is one of the hallmarks of a strong trend.", "pages": "50", "book": "Trading Ranges"}, {"id": "l_market-structure_178", "theme": "market-structure", "teaching": "All pullbacks are small trading ranges on the chart you're viewing, and all trading ranges are pullbacks on a higher time frame chart; most breakouts of a trading range fail, but most breakouts of a pullback succeed.", "quote": "All pullbacks are small trading ranges on the chart that you are viewing, and all trading ranges are pullbacks on higher time frame charts.", "pages": "82", "book": "Trading Ranges"}, {"id": "l_market-structure_179", "theme": "market-structure", "teaching": "About 80 percent of trend reversal attempts (and trading-range breakout attempts) fail and become continuation flags — this is the statistical basis for fading first attempts and buying/selling pullbacks with the trend.", "quote": "There will be repeated attempts by the bulls to resume the trend and by the bears to reverse the trend, and 80 percent of both fail.", "pages": "82, 87", "book": "Trading Ranges"}, {"id": "l_market-structure_180", "theme": "market-structure", "teaching": "Pullbacks end at a cluster of support/resistance levels, and the closer price gets to a well-recognized level, the stronger the 'vacuum effect' pulling it there before a sharp reversal.", "quote": "Once the market gets close to the key price, the vacuum effect often dominates... once the support is hit, the bulls come in and buy aggressively and relentlessly.", "pages": "85", "book": "Trading Ranges"}, {"id": "l_market-structure_181", "theme": "market-structure", "teaching": "A pullback that retraces 75% or more of the prior trend leg should generally be reconceived as the start of a new trend in the opposite direction rather than a pullback in the old trend.", "quote": "the odds that a pullback will get back to the prior trend's extreme fall substantially if the pullback retraces 75 percent or more.", "pages": "86", "book": "Trading Ranges"}, {"id": "l_market-structure_182", "theme": "market-structure", "teaching": "Any move with two legs — with-trend or countertrend — should be treated like a pullback/flag, since two-legged moves are the market's default corrective structure at every scale (fractal).", "quote": "Any move that has two legs should be traded as if it is a pullback, even if it is with the trend.", "pages": "83, 106, 108", "book": "Trading Ranges"}, {"id": "l_market-structure_183", "theme": "market-structure", "teaching": "There is a typical escalating sequence ('first pullback sequence') by which a trend weakens: smaller bodies → tails → overlap → doji → opposite-color bar → high1/low1 → high2/low2 → wedge (high3/low3) → minor trend line break → moving-average touch → major trend line break → moving-average gap bar → eventual trading range. Each first-of-its-kind pullback is usually followed by at least a test of the trend extreme.", "quote": "Here is the general order in which signs of weakness in a bull trend develop... A bar has a bear body... There is a break of a minor bull trend line... There is a break of a major bull trend line.", "pages": "90-91", "book": "Trading Ranges"}, {"id": "l_market-structure_184", "theme": "market-structure", "teaching": "High 1/high 2/high 3/high 4 buy setups are only valid in a bull trend or trading range, never in a clear bear trend; symmetric rule for low 1-4 shorts, which are invalid in a clear bull trend.", "quote": "If the market is in a clear bull trend, do not look for low 1 or low 2 shorts, because those are setups only in bear trends and trading ranges.", "pages": "108", "book": "Trading Ranges"}, {"id": "l_market-structure_185", "theme": "market-structure", "teaching": "Reversal setups (high 1/2/3 in a bear trend, low 1/2/3 in a bull trend) become good short/long-fade candidates when they are LOW probability, e.g. buying a high 1 in a bear trend has roughly a 40% chance of success, giving a ~60% edge to shorting above the same bar.", "quote": "buying a high 1 in a bear trend is a low-probability trade. That means that if it has only about a 40 percent chance of being a successful long, it has about a 60 percent chance of hitting the protective stop before hitting a profit-taking limit order.", "pages": "108", "book": "Trading Ranges"}, {"id": "l_market-structure_186", "theme": "market-structure", "teaching": "You can sanity-check a signal by viewing an inversely correlated instrument (e.g., an inverse ETF): if you would not take the opposite trade on the inverse chart, you shouldn't take your trade on the primary chart.", "quote": "if you would not buy on the SDS, you should not sell on the Emini.", "pages": "115", "book": "Trading Ranges"}, {"id": "l_market-structure_187", "theme": "market-structure", "teaching": "Trends and ranges have inertia: strong trends tend to keep trending and reversal attempts tend to fail; trading ranges tend to stay sideways and breakout attempts tend to fail.", "quote": "Trends tend to keep trending and reversals usually fail; trading ranges keep going sideways and breakout attempts usually fail.", "pages": "113", "book": "Trading Ranges"}, {"id": "l_market-structure_188", "theme": "market-structure", "teaching": "Big trend-bar extremes act as price magnets because traders who entered on or after the bar commonly place protective stops just beyond it; the market often works its way to run those stops before reversing back in the trend direction.", "quote": "It is fairly common for the market to work its way to those stops and then reverse back in the direction of the trend bar.", "pages": "81", "book": "Trading Ranges"}, {"id": "l_market-structure_189", "theme": "market-structure", "teaching": "The broadest, most useful definition of a trading range is any area of two-sided trading, from a single doji bar up to the whole chart; even trending channels are technically slow trading ranges since the trend side is merely 'more aggressive.'", "quote": "The broadest and most useful definition of a trading range is that it is simply an area of two-sided trading. It can be as small as a single bar (a doji bar) or larger than all of the bars on your screen.", "pages": "133", "book": "Trading Ranges"}, {"id": "l_market-structure_190", "theme": "market-structure", "teaching": "A rough personal-use rule: if you believe there's ~60%+ certainty the trend resumes soon, treat the sideways action as a pullback (trade with-trend only); if less certain, treat it as a true trading range (trade both directions).", "quote": "if you are about 60 percent or more certain that your trade will soon be followed by a resumption of the trend, then you believe that the pattern is a pullback.", "pages": "133", "book": "Trading Ranges"}, {"id": "l_market-structure_191", "theme": "market-structure", "teaching": "Every rally within a trading range functions as a bear flag and every sell-off functions as a bull flag — traders should therefore trade the top of a range exactly as they'd trade a bear flag in a bear trend, and the bottom exactly as a bull flag in a bull trend.", "quote": "Every rally in a trading range is essentially a bear flag and every selloff is effectively a bull flag.", "pages": "134", "book": "Trading Ranges"}, {"id": "l_market-structure_192", "theme": "market-structure", "teaching": "The final leg of a trading range in a bull market is usually a bear channel (a last-ditch bear attempt that functions as a bull flag); the opposite (bull channel functioning as bear flag) is true for ranges in bear markets.", "quote": "The final leg down in most trading ranges in bull markets is a bear channel, which is a last-ditch attempt by the bears to create a top and a new bear trend. A bear channel is a bull flag.", "pages": "134", "book": "Trading Ranges"}, {"id": "l_market-structure_193", "theme": "market-structure", "teaching": "All so-called reversal patterns (double tops/bottoms, head and shoulders) are actually continuation patterns that rarely fail; treating them as reversal setups leads most traders to net losses, so the better mental model is to always look first for a with-trend trade off the failed 'reversal.'", "quote": "It is a mistake to see every top or bottom as a great reversal setup, because if you take all of those countertrend entries, the majority of your trades will be losers and your occasional wins will not be enough to offset your losses.", "pages": "131-132", "book": "Trading Ranges"}, {"id": "l_market-structure_194", "theme": "market-structure", "teaching": "Trading ranges have a magnetic pull toward their middle and toward their extremes simultaneously: the market races toward the top/bottom (because both sides want the best price before committing) yet gets pulled back toward the middle after breakouts fail — explaining why most breakouts reverse.", "quote": "This is why trading ranges always race toward the top and toward the bottom and they always look like they are about to break out, only to reverse... The top and bottom of a trading range have a magnetic pull that gets greater as the market gets closer to the top or bottom.", "pages": "135", "book": "Trading Ranges"}, {"id": "l_market-structure_195", "theme": "market-structure", "teaching": "Trading ranges tend to break out away from the moving average, especially when adjacent to it; ranges far from the MA may instead be setting up a test back to it.", "quote": "They also tend to break out away from the moving average. If they are below the moving average, they usually break to the downside, and if they are above it, they tend to break out to the upside.", "pages": "137", "book": "Trading Ranges"}, {"id": "l_market-structure_196", "theme": "market-structure", "teaching": "The longer a trading range persists, the higher the odds it becomes a genuine reversal (distribution in a bull range, accumulation in a bear range) because with-trend traders lose conviction and stop adding to positions.", "quote": "the longer a trading range continues, the greater are the odds that it will become a reversal pattern (accumulation in a bear trading range, distribution in a bull trading range).", "pages": "135", "book": "Trading Ranges"}, {"id": "l_market-structure_197", "theme": "market-structure", "teaching": "The middle third of the trading day (roughly 8:30-10:30am PST) combined with price in the middle third of the range is the highest-risk, lowest-edge environment on most days — trade sparingly or not at all then.", "quote": "A trader who is not yet successful should not trade when the market is in the middle of the day while it is also in the middle of the day's range. This change to one's trading alone can mean the difference between being a loser and a winner.", "pages": "134", "book": "Trading Ranges"}, {"id": "l_market-structure_198", "theme": "market-structure", "teaching": "A single reversal bar / two-bar reversal / spike-and-channel on a lower time frame can be the equivalent of a normal (non-alarming) pullback pattern on a higher time frame chart — always keep the higher-time-frame trend context in mind before treating lower-time-frame action as a reversal.", "quote": "the pattern might look strongly bearish on the 5 minute chart, but it could be a simple high 2 or double bottom buy setup on the 60 minute chart.", "pages": "137", "book": "Trading Ranges"}, {"id": "l_market-structure_199", "theme": "market-structure", "teaching": "Naming a pattern (flag, pennant, wedge, triangle, head-and-shoulders) is irrelevant; the only thing that matters is recognizing two-sided trading is occurring and using that to look for trades in both directions.", "quote": "Many traders use descriptive names like flags, pennants, or triangles, but the name is irrelevant. All that matters is that two-sided trading is taking place.", "pages": "135", "book": "Trading Ranges"}, {"id": "l_market-structure_200", "theme": "market-structure", "teaching": "Barbwire that forms after a sell-off often becomes the final flag of the bear trend because both bulls and bears agree there is value there, drawing the market back into that price area.", "quote": "Since there is strong two-sided trading within barbwire, when barbwire forms after a sell-off it often becomes the final flag of the bear trend.", "pages": "161", "book": "Trading Ranges"}, {"id": "l_market-structure_201", "theme": "market-structure", "teaching": "Sell (buy) climaxes are emotional exhaustion events; once weak bulls (bears) are flushed out, the remaining side has a supply/demand imbalance favoring reversal.", "quote": "Sell climaxes are emotional and usually indicate bulls desperate to get out at any price, even at the market, during a collapse.", "pages": "161", "book": "Trading Ranges"}, {"id": "l_market-structure_202", "theme": "market-structure", "teaching": "Any downward-sloping wedge/bear channel functions like a bull flag regardless of whether a larger bull trend is visible on screen; direction of prior swing off-screen is irrelevant to how the pattern behaves.", "quote": "Any down wedge will behave like a large pullback in a bull trend, which means that it will behave like a bull flag.", "pages": "162", "book": "Trading Ranges"}, {"id": "l_market-structure_203", "theme": "market-structure", "teaching": "A three-push sloped pattern is not automatically a reversal signal — if the channel is tight, it will usually continue like a channel rather than reverse like a wedge.", "quote": "if the three-push pattern is in a tight channel, the pattern will usually function like a channel and continue indefinitely, and not function like a wedge and reverse.", "pages": "162", "book": "Trading Ranges"}, {"id": "l_market-structure_204", "theme": "market-structure", "teaching": "All trading ranges with three or more pushes behave essentially like triangles regardless of exact shape; the specific triangle taxonomy (ascending/descending/symmetrical/expanding) doesn't change trading implications materially.", "quote": "It does not matter what you call it, because all trading ranges behave similarly.", "pages": "162-163", "book": "Trading Ranges"}, {"id": "l_market-structure_205", "theme": "market-structure", "teaching": "Small first pullbacks in a strong one-sided spike are mostly profit-taking by with-trend traders, not new countertrend positioning by the opposite side — so fading the very first pullback in a strong spike has no sound mathematical basis.", "quote": "there is usually no good way for the bears to make profits by shorting below the low of the prior bar as the first pullback is forming in a strong bull trend", "pages": "174-175", "book": "Trading Ranges"}, {"id": "l_market-structure_206", "theme": "market-structure", "teaching": "'Failure of anything' — a breakout, flag breakout, trend-line-overshoot reversal, or failure to reach a profit target — is itself a valid, tradeable reason/setup in the opposite direction.", "quote": "Failure of anything (the market reverses before going as far as expected)... A breakout of a prior high or low. A flag breakout... A reversal from an overshoot of a trend line or a trend channel line. A failure to reach a profit target", "pages": "187", "book": "Trading Ranges"}, {"id": "l_market-structure_207", "theme": "market-structure", "teaching": "Every breakout of the prior bar's high/low is fundamentally a test, not automatically the start of a big move — most breakout attempts fail and the market usually pulls back into the prior bar's range before deciding its next direction.", "quote": "most attempts to break out fail. Unfortunately, beginning traders get caught up in the emotion of all breakouts and assume that the market is at the start of a big move.", "pages": "194", "book": "Trading Ranges"}, {"id": "l_market-structure_208", "theme": "market-structure", "teaching": "In a genuinely strong bull (bear) trend, tops (bottoms) become bull (bear) flags roughly 80% of the time rather than reversing — countertrend low1/low2 (high1/high2) signals in that context are traps, not valid setups.", "quote": "Tops in strong bull trends become bull flags in about 80 percent of the cases.", "pages": "195", "book": "Trading Ranges"}, {"id": "l_market-structure_209", "theme": "market-structure", "teaching": "Institutions are not \"running your stops\" out of malice; they make up ~94% of market volume vs ~5% from individual retail traders, and a stop being hit simply means an institution wanted to trade at that price too.", "quote"

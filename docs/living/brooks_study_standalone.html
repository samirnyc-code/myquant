hey will short a reversal setup at a lower high, a double top, or a higher high, even though they realize that the chance of a swing down might be 40 percent or less. As long as the reward is much larger than the risk, they have a positive trader's equation.", "pages": "246", "book": "Reversals"}, {"id": "l_trader's-equation_75", "theme": "trader's-equation", "teaching": "Position-size mismanagement on 'free' add-on contracts (e.g., a second contract scalped for 1 tick to cover commissions with an 8-tick stop) can secretly have a negative expectancy even while looking profitable overall, because a trader must consider the math of every leg of a position separately.", "quote": "He was risking eight ticks to make one tick on his second contract. This requires the market to move three ticks beyond the signal bar before hitting his protective stop in 90 percent of his trades just to break even...his second contract is losing money on average, even if it makes money on it 80 percent of the time!", "pages": "248-249", "book": "Reversals"}, {"id": "l_trader's-equation_76", "theme": "trader's-equation", "teaching": "Different legendary traders have different style preferences (Paul Tudor Jones: reversals; Richard Dennis: breakouts; Paul Rotter: scalping; John Henry: always-in basket approach) — any style can work if the trader's equation is positive; Brooks personally prefers high-percentage pullback entries and trading-range fades, and rates strong breakouts as having >70% follow-through probability.", "quote": "I especially like breakouts because when they are strong the probability of follow-through is often more than 70 percent. I look less often for reversal trades, because most reversal attempts fail, but I will take a strong reversal setup.", "pages": "249", "book": "Reversals"}, {"id": "l_trader's-equation_77", "theme": "trader's-equation", "teaching": "Best-trade setups cluster into two math profiles: 60-70% probability with reward roughly equal to risk, or 50-60% probability with reward at least twice the risk. Both are mathematically sound and beginners should primarily target these because they offer the biggest margin for error.", "quote": "The very best trades have either a 60 to 70 percent chance of making a reward that is at least as large as the risk or a 50 to 60 percent chance of making two or more times the risk. These are the trades that beginners should primarily take.", "pages": "252", "book": "Reversals"}, {"id": "l_trader's-equation_78", "theme": "trader's-equation", "teaching": "You can never know the true probability of a trade with precision and have very little time to decide; when uncertain, default to assuming a 50% chance the limit order gets filled before the stop, or 60/40 if confident (often the real odds are even better than 60/40).", "quote": "Since trading can be easier if you have only two choices, in general, if you are not certain, assume that there is a 50 percent chance that your limit order will be filled before your stop is hit. If you are confident about the trade, assume that the odds are 60-40 in your favor, although they are often higher.", "pages": "256", "book": "Reversals"}, {"id": "l_trader's-equation_79", "theme": "trader's-equation", "teaching": "A 'best trade' does not require high probability alone — a ~50% probability setup can still be a best trade if the reward is at least twice the risk; the trader's equation has three variables (probability, reward, risk), not just win rate.", "quote": "Even though selling in the middle of a trading range might have only about a 50 percent chance of success, if the reward is twice the size of the risk, it can be a best trade.", "pages": "278-279", "book": "Reversals"}, {"id": "l_trader's-equation_80", "theme": "trader's-equation", "teaching": "On typical days there are usually five or more setups where probability is ≥60% and reward is at least as large as risk — these are the 'best trades' to prioritize.", "quote": "There are usually five or more such setups on most days ... Remember, if traders think that a setup is probably good, they should assume that this means that the chance of success is at least 60 percent. If the reward is at least as large as the risk, this creates a positive trader's equation.", "pages": "267", "book": "Reversals"}, {"id": "l_trader's-equation_81", "theme": "trader's-equation", "teaching": "When average daily range has compressed well below its recent average (e.g., 2 points vs. a typical 10-15), odds increase that the range will expand before the close, which by itself can be reason enough to take a modest-edge trade with strong reward:risk, even without a clear directional read.", "quote": "the odds were high that today's range was going to double or triple before the close. The problem was that traders did not know if the breakout would be up or down, or both.", "pages": "279", "book": "Reversals"}, {"id": "l_trader's-equation_82", "theme": "trader's-equation", "teaching": "Trading is a zero-sum game against smart, mostly-institutional competitors, so any edge that exists is inherently small and fleeting — a trader must be better than roughly half of all other participants (i.e., win the trader's-equation more than half the time) to profit, and any edge that grows too large gets arbitraged away by institutions before it can persist.", "quote": "There is no easy set of reliable rules to make money as a trader, and everything is subjective. This is a zero-sum game with very smart players, so when an edge exists, it is small and fleeting. ... The edge can never get very large because institutions would take advantage of it as it was growing.", "pages": "280", "book": "Reversals"}, {"id": "l_trader's-equation_83", "theme": "trader's-equation", "teaching": "A stated probability (e.g. 60%) is not fixed — it varies by context (pullback near support, scaling in with larger size, using a very wide stop) and can effectively become 80-90% in the right circumstances; being flexible about coexisting probabilities improves your chance of success.", "quote": "60 percent is 60 percent in only 90 percent of the cases and can be 90 percent sometimes and 10 percent at other times.", "pages": "281", "book": "Reversals"}, {"id": "l_trader's-equation_84", "theme": "trader's-equation", "teaching": "Most countertrend setups fail and most with-trend setups succeed; trends constantly create great-looking countertrend setups and lousy-looking with-trend setups, but the math favors with-trend. Countertrend setups in strong trends almost always fail and become great with-trend setups, especially on the 1-minute chart.", "quote": "Countertrend setups in strong trends almost always fail and become great with-trend setups.", "pages": "284", "book": "Reversals"}, {"id": "l_trader's-equation_85", "theme": "trader's-equation", "teaching": "Until consistently profitable, take only trades where potential reward is at least as large as risk; you cannot risk 2 points to make 1 and expect profit unless right ~80% of the time, which very few traders are.", "quote": "The chance of winning times your potential reward has to be significantly greater than the chance of losing times your risk.", "pages": "284", "book": "Reversals"}, {"id": "l_trader's-equation_86", "theme": "trader's-equation", "teaching": "The trader's equation has three variables (probability, reward, risk); any setup with a positive expected result is a good trade, whether high-probability/reward-equals-risk or low-probability/huge-reward — or anything in between.", "quote": "Any setup with a positive result is a good trade.", "pages": "284", "book": "Reversals"}, {"id": "l_always-in_0", "theme": "always-in", "teaching": "Always-in is the concept of treating yourself as forced to hold a position (long or short) at every moment; when confident which direction you'd choose if forced, the market is 'always-in' that direction. Almost all always-in trades require a spike in the trend direction before traders gain confidence.", "quote": "If you have to be in the market at all times, either long or short, this is whatever your current position is (always in long or always in short)... Almost all of these trades require a spike in the direction of the trend before traders will have confidence.", "pages": "15", "book": "Trends"}, {"id": "l_always-in_1", "theme": "always-in", "teaching": "About 80% of reversal attempts within a trend fail and become flags/pullbacks rather than true reversals; smart traders fade the panic and trade with the still-intact trend.", "quote": "The market is always trying to reverse, but 80 percent of those reversal attempts fail and become bull flags.", "pages": "61-62(93-94)", "book": "Trends"}, {"id": "l_always-in_2", "theme": "always-in", "teaching": "After a strong break of a range/trend-line and follow-through trend bar, traders should look to trade only in the always-in direction (buy at market or on pullbacks, not fade).", "quote": "the bar 3 strong bull trend bar showed you that the always-in position was up and you should look to buy either at the market or above the bar 5 pullback... Always in... basically means that if you have to be in the market at all times, either long or short, the always-in position is whatever your current position is.", "pages": "81-82(113-114)", "book": "Trends"}, {"id": "l_always-in_3", "theme": "always-in", "teaching": "A single very strong reversal bar that closes beyond the closes and lows/highs of many prior bars can flip the always-in direction of the market outright, trapping the swing (strongest) participants who held through pullbacks and forcing them to exit at a loss, which itself fuels further movement.", "quote": "A single strong reversal that reverses many closes and lows...can flip the always-in direction.", "pages": "130", "book": "Trends"}, {"id": "l_always-in_4", "theme": "always-in", "teaching": "Weak-looking signal bars are actually a structural ingredient of strong trends: both trapped countertrend traders and eager with-trend traders keep waiting for a 'perfect' setup that never comes, creating constant urgency and small-piece order flow that keeps the trend grinding.", "quote": "The weak signal bars are an important ingredient in strong trends...Both keep selling in small pieces all day long, just in case their perfect setup never comes...and it usually doesn't.", "pages": "134,143", "book": "Trends"}, {"id": "l_always-in_5", "theme": "always-in", "teaching": "Entering late at market to match the swing-size position you would still be holding from a missed entry, with the same stop, is mathematically and psychologically identical to already holding that swing position — there is no rational reason to hesitate once always-in is clear.", "quote": "Logically, it doesn’t make any difference whether you are buying a swing-size portion now or holding a swing position from an earlier entry.", "pages": "213", "book": "Trends"}, {"id": "l_always-in_6", "theme": "always-in", "teaching": "Treat any gap opening or large trend bar as a de facto one-bar trend/breakout — since breakouts commonly fail, be ready to fade it if a countertrend setup appears.", "quote": "It is helpful to consider a gap opening and any large trend bar to be effectively breakouts and each should be treated as if it is a one-bar trend, since breakouts commonly fail and you need to be prepared to fade them if there is a setup.", "pages": "196", "book": "Trends"}, {"id": "l_always-in_7", "theme": "always-in", "teaching": "Only about 5% of bars are 'spike' bars where the vast majority of institutions are trading the same direction at once with enough size to overwhelm the opposition; the market rarely moves far unless this alignment happens.", "quote": "The only time that the vast majority of the institutions are on the same side is during the spike phase of a strong trend, and that occurs in fewer than 5 percent of the bars on the chart.", "pages": "224 (256)", "book": "Trends"}, {"id": "l_always-in_8", "theme": "always-in", "teaching": "In a tight bull channel it is rarely wise to short below the low of a bar unless there has been a strong climactic reversal after a top-of-channel breakout, and even then it's often better to wait for a lower high after the sell-off before shorting.", "quote": "In a tight bull channel, it is rarely wise to short below the low of a bar unless there has been a strong climactic reversal after a breakout of the top of the channel.", "pages": "243 (275)", "book": "Trends"}, {"id": "l_always-in_9", "theme": "always-in", "teaching": "Micro trend lines should only be used to find with-trend setups; once the larger trend reverses (e.g., after a trend line break and reversal from a higher high), then look for micro trend line countertrend setups in the new direction.", "quote": "It is critical to remember that micro trend lines should only be used to find with-trend setups. However, once the trend has reversed... you should be looking for micro trend line short setups.", "pages": "286", "book": "Trends"}, {"id": "l_always-in_10", "theme": "always-in", "teaching": "A trend has a spike phase (steep, large trend bars, little overlap, small tails — where the market becomes clearly always-in) followed by a channel phase (more two-sided, larger pullbacks) that can last far longer than expected; eventually the market evolves into a trading range that is itself just a pullback on a higher time frame chart.", "quote": "This is the spike phase of a trend... The market eventually begins to have some two-sided trading in the form of pullbacks, and the trend then transitions into the channel phase... The trading range is simply a pullback on a higher time frame chart.", "pages": "308", "book": "Trends"}, {"id": "l_always-in_11", "theme": "always-in", "teaching": "The market can flip to 'always-in long' within a bar or two of a strong reversal bar, prompting traders to swing (and even add to) their full position rather than just scalp.", "quote": "Within a bar or two after bar 11, traders saw the market as always-in long, and swung the remainder of their longs, and even added to them.", "pages": "296", "book": "Trends"}, {"id": "l_always-in_12", "theme": "always-in", "teaching": "A trader can only be successfully long or flat in a bull trend, and short or flat in a bear trend; consistently trading against a clear trend is a losing strategy for almost everyone.", "quote": "A tiny fraction of traders have the ability to consistently make money by trading against a trend, and you should assume that you are not part of that group.", "pages": "323", "book": "Trends"}, {"id": "l_always-in_13", "theme": "always-in", "teaching": "Markets overshoot toward 'excess' rather than stopping precisely at 'neutrality,' because neutrality is never clear in real time but excess (an obvious extreme/magnet) is — so reversals cluster at magnets/measured-move areas, not at a calculable fair-value midpoint.", "quote": "That clarity occurs at some magnet, and at that point everyone sees that the market has gone too far... it will usually overshoot it again because neutrality is never clear but excess is.", "pages": "331 (363)", "book": "Trends"}, {"id": "l_always-in_14", "theme": "always-in", "teaching": "Every day begins as a trend-from-the-open day the moment the first bar's high or low is exceeded; whether that initial direction persists into a real trend depends on whether the breakout grows into a larger multi-bar spike.", "quote": "As soon as a bar moves above the high of the prior bar, the day is a trend from the open bull trend day, at least for that moment.", "pages": "418,419", "book": "Trends"}, {"id": "l_always-in_15", "theme": "always-in", "teaching": "The very strongest trends generate reversal-looking patterns (wedges, small pullback flags) all day long that never quite trigger cleanly and almost always fail; when a wedge's correction is sideways instead of reversing, conclude the trend is very strong and stop looking for reversals.", "quote": "The very strongest trends tend to create reversal patterns all day long, but they somehow don't look just right... they constantly trap early bears into shorting.", "pages": "441", "book": "Trends"}, {"id": "l_always-in_16", "theme": "always-in", "teaching": "A runaway trend (large trend bars, little overlap, small tails) is a breakout and a clear always-in flip; you must enter quickly even if it looks climactic/overdone, because it will likely continue further, and you should swing most of the position.", "quote": "There are large trend bars with little overlap and mostly small tails. This is a breakout and a clear always-in flip. You must enter quickly, even if the new trend looks climactic and overdone (and it is, but it will likely continue to get much more so!), and swing most of your position.", "pages": "447", "book": "Trends"}, {"id": "l_always-in_17", "theme": "always-in", "teaching": "The always-in concept: at any moment you must mentally be long or short (never flat) — whichever position you'd confidently take now is the always-in direction, and almost all such conviction requires seeing a spike first.", "quote": "If at any time you are forced to decide between initiating a long or a short trade and are confident in your choice, then the market is in always-in mode at that moment.", "pages": "11", "book": "Trading Ranges"}, {"id": "l_always-in_18", "theme": "always-in", "teaching": "The single most important recurring decision a trader makes, after the close of every bar, is whether there will be more buyers or sellers above and below the prior bar — this determines the always-in direction and usually implies a multi-bar move, not just a scalp.", "quote": "the single most important determination that a trader makes, and he makes this after the close of every bar, is whether there will be more buyers or sellers above and below the prior bar.", "pages": "52-53,59", "book": "Trading Ranges"}, {"id": "l_always-in_19", "theme": "always-in", "teaching": "All pullbacks begin with a reversal pattern strong enough to entice countertrend traders in, but usually not strong enough to flip the always-in direction — so traders should not fade the trend on that reversal, but instead look to re-enter with the trend once the pullback shows signs of ending.", "quote": "Since the setup and the pullback are not strong enough to change the direction of the always-in trade, traders should not be looking for a countertrend trade.", "pages": "86", "book": "Trading Ranges"}, {"id": "l_always-in_20", "theme": "always-in", "teaching": "As soon as the always-in direction flips (e.g., after a convincing spike), traders should enter at least a small position immediately (at market or on a tiny pullback) rather than waiting for a full pullback that may not come before price runs far away, because the directional probability at that point is already ~60%+.", "quote": "As a general rule, as soon as traders decide that there is now a bull trend underway, they should buy at least a small position at the market or on a tiny pullback... because the directional probability of an equidistant move is probably at least 60 percent.", "pages": "145-146", "book": "Trading Ranges"}, {"id": "l_always-in_21", "theme": "always-in", "teaching": "When the trader's equation deteriorates through the life of a trade (still favorable but weaker), tighten stops or take smaller profit; if it goes negative, exit immediately at market even for a loss — the equation is recalculated every tick.", "quote": "The trader's equation of every trade changes with every tick...If it becomes negative, they should exit immediately at the market, even if that means taking a loss.", "pages": "210", "book": "Trading Ranges"}, {"id": "l_always-in_22", "theme": "always-in", "teaching": "Do not trade Countertrend until the market has broken the trendline AND gone back to test the trend's extreme; the trend continues even after the trendline break until that test fails.", "quote": "You should not be trading countertrend until the mar­ket has enough strength to break the trendline. However, even then, you should not be entering countertrend until the market first goes back to test the extreme of the trend.", "pages": "99", "book": "Reading Price Charts"}, {"id": "l_always-in_23", "theme": "always-in", "teaching": "Once a trend is confirmed strong, no setup is needed to enter — you can enter at the market any time all day with a relatively small stop; the only function of a setup is to reduce risk.", "quote": "once you realize that the market is in a strong trend, you don't need a setup to enter. You can enter any time all day long at the market if you wish with a relatively small stop. The only purpose of a setup is to minimize the risk.", "pages": "103", "book": "Reading Price Charts"}, {"id": "l_always-in_24", "theme": "always-in", "teaching": "A false breakout of a swing low/high followed by another false breakout of the opposite side, confirmed by a subsequent break of the first level again, is a classic sequence that confirms directional control and sets up high-confidence trend entries.", "quote": "A false breakout of the low (Bar 6) followed by a false breakout of the high (Bar 7) confirmed by the Bar 8 breakout of the low again made the smart shorts feel pretty good at this point.", "pages": "133", "book": "Reading Price Charts"}, {"id": "l_always-in_25", "theme": "always-in", "teaching": "Trends commonly unfold in two legs: after a strong first countertrend leg, both bulls and bears expect a test of the old extreme to fail, causing With Trend traders to exit and creating a self-fulfilling Higher Low/Lower High second leg.", "quote": "this kind of trading goes on all day long in all markets and creates a lot of two-legged moves.", "pages": "140-141", "book": "Reading Price Charts"}, {"id": "l_always-in_26", "theme": "always-in", "teaching": "After any trendline break, expect a second leg because all traders are now aware of the possibility of a Higher Low/Lower High reversal; therefore generally avoid With Trend (old trend) entries until the second attempt at reversal fails.", "quote": "Any time there is a trendline breakout, the chances are high that there will be a second leg... In general, avoid a With Trend entry until after the second attempt fails.", "pages": "151", "book": "Reading Price Charts"}, {"id": "l_always-in_27", "theme": "always-in", "teaching": "An alternative to scalping/swinging is to try to stay 'Always In' the market most of the day, trading at least two contracts (scalp one, swing one), reversing size when the opposite signal triggers, and holding through pullbacks unless the protective stop is hit.", "quote": "A good alternative to scalping and occasionally swinging a portion of the trade is to try to stay in the market most of the day, exiting on the close.", "pages": "299-300", "book": "Reading Price Charts"}, {"id": "l_always-in_28", "theme": "always-in", "teaching": "A Tight Trading Range acts like Barb Wire — a magnet pulling breakouts back to its middle; don't trust breakouts from it, fade small bars at its extremes and wait for failed breakouts or Breakout Pullbacks instead.", "quote": "A Tight Trading Range is like Barb Wire, and it acts as a magnet, drawing breakouts back toward its middle.", "pages": "331", "book": "Reading Price Charts"}, {"id": "l_always-in_29", "theme": "always-in", "teaching": "Never enter countertrend unless the countertrend side has already demonstrated some ability to control the market (i.e., a genuine trendline break with strong momentum) — the trend is still assumed in force until price actually tests and confirms.", "quote": "you do not want to enter countertrend unless the countertrend traders have already shown some ability to control the market.", "pages": "357", "book": "Reading Price Charts"}, {"id": "l_always-in_30", "theme": "always-in", "teaching": "A trendline break by itself does not flip the trend; the prior trend (e.g., a bear) remains in force — and shorts remain the higher-probability side — until price actually tests and reverses at the trend's extreme.", "quote": "Remember, breaking the trendline does not tum the trend into a bull. It is still a bear until after the market tests the low so you should still be looking for shorts.", "pages": "358", "book": "Reading Price Charts"}, {"id": "l_always-in_31", "theme": "always-in", "teaching": "In a strong bull trend you don't need a formal setup to buy — you can buy at the market almost anywhere and make money — but waiting for setups lets you use a tighter, better-defined stop.", "quote": "In a strong bull, you do not need setups to buy. You can buy at the market anywhere and make money, but setups allow you to use tighter stops.", "pages": "372", "book": "Reading Price Charts"}, {"id": "l_always-in_32", "theme": "always-in", "teaching": "All patterns eventually fail, and even the failures can fail — a failed failure resumes in the original direction as a high-probability second entry.", "quote": "All patterns fail, and the failures often fail, but a failed failure is a second entry in the original direction and has a high probability of success.", "pages": "409", "book": "Reading Price Charts"}, {"id": "l_always-in_33", "theme": "always-in", "teaching": "Classify every bar and bar series as either trend or trading range; if trend, you must take every valid with-trend trade and are barred from taking any countertrend trade until you have been taking all the with-trend ones.", "quote": "Every bar and every series of bars is either a trend or a trading range. Pick one... If it does and you are looking to take any trade, you must take every With Trend trade. Never consider taking a Countertrend trade if you haven't been taking all of the With Trend trades.", "pages": "410", "book": "Reading Price Charts"}, {"id": "l_always-in_34", "theme": "always-in", "teaching": "With Trend direction should default to the direction of the most recent 5-minute trend signal, or, more simply, whichever side most of the last 10-20 bars sit on relative to the EMA.", "quote": "Countertrend: ...In general, the direction of the most recent 5-minute signal should be assumed to be the trend's direction. Also, if most of the past 10 or 20 bars are below the EMA, With Trend is likely on the sell side.", "pages": "414, 418", "book": "Reading Price Charts"}, {"id": "l_always-in_35", "theme": "always-in", "teaching": "The always-in concept: assume you must be in the market either long or short at all times; your best-guess current stance (long or short) reveals the higher-probability direction. Almost all always-in trades require a spike in the trend direction before traders gain confidence.", "quote": "always in If you have to be in the market at all times, either long or short, this is whatever your current position is (always in long or always in short)... Almost all of these trades require a spike in the direction of the trend before traders will have confidence.", "pages": "10", "book": "Reversals"}, {"id": "l_always-in_36", "theme": "always-in", "teaching": "The always-in concept: if a trader had to be in the market at all times (long or short), a genuine reversal is marked by the point at which the majority of traders would flip their always-in position, and this almost always requires a real breakout.", "quote": "A reversal at some point makes the majority of traders believe that the always-in position has reversed, and this almost always requires some kind of breakout.", "pages": "36", "book": "Reversals"}, {"id": "l_always-in_37", "theme": "always-in", "teaching": "Buying pullbacks in bull trends / selling rallies in bear trends is statistically superior to countertrend scalping — more trades, higher win rate. Countertrend scalpers who get lucky picking exact tops/bottoms tend to scalp out early instead of riding the trend, so their edge doesn't compound (\"death by mathematics\").", "quote": "In general, buying pullbacks in bull trends and selling rallies in bear trends is a much better approach for most traders. There are far more trades, and the winning percentage is higher.", "pages": "41", "book": "Reversals"}, {"id": "l_always-in_38", "theme": "always-in", "teaching": "A break of a trend line signals a possible reversal, but if the market then rallies/sells off 5+ bars beyond the old extreme without stalling, treat the breakout as valid trend resumption and restart the reversal-search process from scratch.", "quote": "If there is a trend line break, but the move to a higher high goes five or more bars above the old bull high, traders usually should begin the process from the beginning.", "pages": "66", "book": "Reversals"}, {"id": "l_always-in_39", "theme": "always-in", "teaching": "Trends end via: (1) a countertrend move that breaks the trend line, then (2) a test of the final trend extreme (which may overshoot or undershoot); the test itself is frequently two-legged.", "quote": "Trends end with a reversal, which is a countertrend move that breaks the trend line, and then a test of the final trend extreme.", "pages": "63", "book": "Reversals"}, {"id": "l_always-in_40", "theme": "always-in", "teaching": "If an overshoot of the old trend extreme goes too far in too tight a channel, do not look for a reversal - the trend has likely resumed; restart the trend-line-break-and-test process.", "quote": "If the overshoot goes too far and is in too tight a channel, you should not be looking for a reversal. The trend has likely resumed.", "pages": "63", "book": "Reversals"}, {"id": "l_always-in_41", "theme": "always-in", "teaching": "Down spikes in bull markets and up spikes in bear markets are with-trend pullbacks that don't need to be tested (traders are eager to resume the trend); up spikes in bull markets and down spikes in bear markets are countertrend spikes that usually DO get tested because traders are less willing to believe a reversal will succeed.", "quote": "A spike pullback does not have to get tested since traders agree that the trend is resuming and they are eager to get on board, but a spike reversal usually gets tested because it is countertrend and traders are less willing to believe that a reversal will succeed.", "pages": "88-89", "book": "Reversals"}, {"id": "l_always-in_42", "theme": "always-in", "teaching": "In a strong bear (or bull) channel, smart traders buy only below prior bars, not above, because they are far more interested in shorting than buying — the with-trend side controls entries at the extremes.", "quote": "When the market is in a bear channel, smart traders are buying only below bars and not above; they are much more interested in shorting, and look to short above prior bars, not below.", "pages": "92", "book": "Reversals"}, {"id": "l_always-in_43", "theme": "always-in", "teaching": "A second high/low that fails as a low-2 (or high-2) short/long with a weak breakout above/below strongly suggests wedge-top/bottom formation; if the low-2 fails and breakout is strong, expect at least two more legs in the trend instead.", "quote": "They view the second high as a large low 2 short setup. If the low 2 fails and the breakout above the low 2 top is strong, the market will likely have at least two more legs up. If it is not strong, the market will probably form a wedge top.", "pages": "96", "book": "Reversals"}, {"id": "l_always-in_44", "theme": "always-in", "teaching": "Wedge reversal is a countertrend setup — general rule: wait for a second entry (e.g., lower high after a wedge top) unless the pattern is exceptionally strong, whereas wedge pullbacks (with-trend) are safe to enter on the first signal.", "quote": "It is important to remember that a wedge reversal is a countertrend setup. It is therefore usually better to wait for a second entry... unless you are trading a wedge pullback where you are entering in the direction of the larger trend. Then, entering on the first signal is a reliable approach.", "pages": "97", "book": "Reversals"}, {"id": "l_always-in_45", "theme": "always-in", "teaching": "Consecutive bull trend bars after a reversal convince traders the market is now always-in long, at which point they stop looking to fade the presumed bear flag and instead look for continuation setups.", "quote": "This convinced most traders that the market was now always-in long, and they were no longer looking for a breakout of a bear flag.", "pages": "120", "book": "Reversals"}, {"id": "l_always-in_46", "theme": "always-in", "teaching": "A strong bear trend bar that closes several ticks beyond a flag's extreme (a breakaway-gap-like close) is what convinces traders the market has flipped always-in in that direction and will have good follow-through.", "quote": "Bar 7 closed many ticks below the bar before it and therefore was an attempt to form a breakaway gap. Many traders shorted as soon as it closed... expecting that the market was flipping to always-in short.", "pages": "124", "book": "Reversals"}, {"id": "l_always-in_47", "theme": "always-in", "teaching": "Every failed bull setup is a sign of strength for bears and every failed bear setup is a sign of strength for bulls — failures often create excellent setups in the opposite direction because traders forced out are reluctant to re-enter the same way, making the market one-sided, and their exits with losses add fuel to the opposite move.", "quote": "Every failed bull setup is a sign of weakness by the bulls and strength by the bears... When a setup fails, it often creates an excellent setup for a trade in the opposite direction.", "pages": "130", "book": "Reversals"}, {"id": "l_always-in_48", "theme": "always-in", "teaching": "Some failures instead signal a strong trend and set up a WITH-trend trade: failure of price to dip below prior bar's low in a strong bull trend (or above prior high in strong bear trend) indicates urgency/strong trend; failure of a pullback to reach the moving average also indicates urgency; failure to reach a magnet often leads to a pullback then another attempt at the magnet.", "quote": "Failure to fall below the low of the prior bar in a strong bull trend or to rally above the high of the prior bar in a strong bear trend. This indicates urgency and a strong trend.", "pages": "130", "book": "Reversals"}, {"id": "l_always-in_49", "theme": "always-in", "teaching": "The single most reliable 'failure' is a flag within a trend: when a flag forms and countertrend traders bet it's a reversal, that's a low-probability bet because markets have inertia and trends resist reversal attempts; the failure of that countertrend bet (i.e., a with-trend continuation, e.g. a high 2 in the flag) is a great with-trend entry.", "quote": "The single most reliable failure is a flag in a trend. As a flag is forming, countertrend traders are hoping for a trend reversal, which is a low-probability bet because markets have inertia and trends resist reversal attempts.", "pages": "130", "book": "Reversals"}, {"id": "l_always-in_50", "theme": "always-in", "teaching": "The first hour or two of the day is the single most important trading period — the most likely time to find a trade offering 2-3x risk in reward, and also the easiest time to lose money if not careful.", "quote": "there is a tendency for the first hour or two to be the most likely time of the day to find a trade where you can make two to three times your risk. This is the most important time of the day.", "pages": "151", "book": "Reversals"}, {"id": "l_always-in_51", "theme": "always-in", "teaching": "Always-in is the discipline of asking, at any moment, 'if forced to be long or short right now, which would I choose?' — that answer is the always-in position, and it is different from simply asking whether the market is trending.", "quote": "If you had to be in the market at all times, either long or short, the always-in position is whatever your current position is.", "pages": "165", "book": "Reversals"}, {"id": "l_always-in_52", "theme": "always-in", "teaching": "When you cannot decide the always-in direction, the market is by definition in a trading range (uncertainty is the hallmark of a range), and the correct approach is to buy low / sell high rather than force a swing decision.", "quote": "If you simply cannot decide, then the market is in a trading range and you look to buy low and sell high.", "pages": "165", "book": "Reversals"}, {"id": "l_always-in_53", "theme": "always-in", "teaching": "The market perpetually tries to reverse and often 'almost flips' without follow-through; because roughly 80% of reversal attempts fail, with-trend traders should treat these near-misses as buying (or selling) opportunities rather than getting scared into premature countertrend entries.", "quote": "It is a costly mistake to keep betting that reversals will be successful, because 80 percent of them are not.", "pages": "166", "book": "Reversals"}, {"id": "l_always-in_54", "theme": "always-in", "teaching": "Confirmation that the always-in direction has flipped generally requires at least two consecutive strong trend bars in the new direction; the close of the second bar is the key tell (same-direction close = credible flip, doji/opposite close = weak, fade it instead).", "quote": "There usually has to have been at least two consecutive strong bull trend bars before most traders will believe that the always-in direction is long, and at least two consecutive strong bear trend bars before they will think that always in is short.", "pages": "167", "book": "Reversals"}, {"id": "l_always-in_55", "theme": "always-in", "teaching": "During the first hour, before a clear trend is established, the bar needed to flip sentiment is lower — just two consecutive trend bars of either color will make traders look for scalps in that direction.", "quote": "During the first hour, before a clear trend is established, two consecutive bull trend bars will make traders look for buy scalps, and two consecutive bear trend bars will make them look for sell scalps.", "pages": "167", "book": "Reversals"}, {"id": "l_always-in_56", "theme": "always-in", "teaching": "Always-in is a swing concept meant for trending conditions, not tight trading ranges; in a tight range it is better to scalp/fade extremes or wait for the breakout/failed breakout rather than try to call an always-in flip.", "quote": "Since this is a swing approach, traders should not use it when the market is in a tight trading range... they should either take the always-in trade that was present prior to the formation of the tight trading range and hold for a swing profit, or simply trade scalps with limit order entries, fading the extremes of the range.", "pages": "166", "book": "Reversals"}, {"id": "l_always-in_57", "theme": "always-in", "teaching": "A low 1 short is invalid (and likely to fail into a higher low) unless there was a strong bear spike AND the market is clearly already in a bear trend; shorting a low 1 immediately after a sell climax is specifically flagged as a mistake.", "quote": "Bar 9 was a bad low 1 short setup, and therefore a higher low was likely. The market had a strong bear spike, which is needed for a low 1, but it was not clearly in a bear trend, which is also needed before shorting a low 1. Also, a trader should not short a low 1 after a sell climax, and this was possibly one.", "pages": "178", "book": "Reversals"}, {"id": "l_always-in_58", "theme": "always-in", "teaching": "Big trend bars or consecutive trend bars in one direction almost always fail as sustained breakouts in the first hour — traders should wait for a confirmed breakout and a clear always-in market before switching to swing trading rather than chasing the initial move.", "quote": "They see large trend bars up or down and are afraid that they are missing a breakout, which almost always fails. They have to learn to wait for a confirmed breakout and a clear always-in market. Then they should switch to a swing approach and become willing to buy near the top when the market is always-in long, or sell near the bottom when it is always-in short.", "pages": "185", "book": "Reversals"}, {"id": "l_always-in_59", "theme": "always-in", "teaching": "Because the first hour offers the best combination of reward, risk, and probability, most traders should work hardest to catch swing trades in that window, and can even build a profitable practice trading only the first hour (or first two hours) at increased size once consistently profitable.", "quote": "In general, most traders should work very hard to take potential swing trades in the first hour or two because those trades have the best trader's equation combination of reward, risk, and probability... If you simply trade the first hour and increase your position size once you become consistently profitable, you might discover that the intensity is needed for only that hour.", "pages": "189-190", "book": "Reversals"}, {"id": "l_always-in_60", "theme": "always-in", "teaching": "A pair of consecutive strong trend bars (especially with large bodies and small tails) in the first hour is read by traders as evidence the market is 'always-in' in that direction, at least for a scalp, and this belief itself drives entries on the next with-trend pullback.", "quote": "Traders often look for a pair of consecutive bull trend bars in the first hour or so. If they are present, traders would see them as a sign that the market is always-in long, at least for a scalp.", "pages": "205, 208", "book": "Reversals"}, {"id": "l_always-in_61", "theme": "always-in", "teaching": "Traders should only use limit (countertrend-style) orders to trade in the direction they believe the market is (or is about to become) always-in; using limit orders to fade a trend when you still believe the trend's always-in direction persists has a losing trader's equation.", "quote": "Traders should only use limit orders to trade in the direction of the trend...The probability of success is simply too low when using limit orders to trade countertrend...unless you are an exceptional profitable and experienced scalper.", "pages": "247", "book": "Reversals"}, {"id": "l_always-in_62", "theme": "always-in", "teaching": "Once a trader believes the market is always-in long, the highest-quality trade is almost always buying a pullback, especially near the moving average with a bull-bodied signal bar; multiple consecutive bull trend bars, a strong spike, and minimal closes below the moving average are cumulative evidence reinforcing the always-in-long read.", "quote": "Once a trader believes that the market is always-in long, the best trade is almost always buying a pullback, especially near the moving average and when the signal bar has a bull body.", "pages": "258", "book": "Reversals"}, {"id": "l_always-in_63", "theme": "always-in", "teaching": "After a strong bear (or bull) spike with a large trend bar and immediate follow-through, the market becomes 'always-in' in that direction for most traders, who then hold/short rallies (or buy dips) until an opposing always-in signal or a break of the spike's extreme.", "quote": "Once there was a large bear breakout bar and then the immediate follow-through at bar 12, the market was always-in short for most traders, and they would assume that it would stay that way unless there was an always-in buy signal or until the market went above the top of the bear spike.", "pages": "279", "book": "Reversals"}, {"id": "l_always-in_64", "theme": "always-in", "teaching": "There are no reliable countertrend patterns; never trade countertrend unless there has first been a strong break of a significant trend line and the entry is a reasonable always-in-reversal setup. Since 80% of reversals fail, whoever is on the other side of your countertrend entry is likely the smarter trader.", "quote": "There are no reliable countertrend patterns... Since 80 percent of reversals fail, who do you think is making the money?", "pages": "282", "book": "Reversals"}, {"id": "l_always-in_65", "theme": "always-in", "teaching": "Every bar and every series of bars is either a trend or a trading range — pick one, decide the always-in direction, and take every with-trend trade; never consider a countertrend trade if you haven't been taking all the with-trend trades.", "quote": "Every bar and every series of bars is either a trend or a trading range. Pick one.", "pages": "284", "book": "Reversals"}, {"id": "l_always-in_66", "theme": "always-in", "teaching": "A strong spike that breaks out of a trading range flips the market to always-in in the breakout direction; a subsequent strong opposite spike flips it the other way.", "quote": "which broke out of a trading range and turned the market into always-in long", "pages": "222", "book": "Reversals"}, {"id": "l_math_0", "theme": "math", "teaching": "Edges in the market are always small and fleeting because a profitable edge requires a counterparty, and the market is full of smart traders who won't let an edge persist or grow large.", "quote": "edge A setup with a positive trader's equation. The trader has a mathematical advantage if he trades the setup. Edges are always small and fleeting because they need someone on the other side, and the market is filled with smart traders who won't allow an edge to be big and persistent.", "pages": "17", "book": "Trends"}, {"id": "l_math_1", "theme": "math", "teaching": "Scalping math is unfavorable: since profit target is often smaller than risk, a scalper needs to win at least 70% of the time, an unrealistic goal for most traders — trade only setups where reward is at least as great as risk unless extremely skilled.", "quote": "Since the profit is often smaller than the risk, a trader has to win at least 70 percent of the time, which is an unrealistic goal for most traders. Traders should take trades only where the potential reward is at least as great as the risk unless they are extremely skilled.", "pages": "25", "book": "Trends"}, {"id": "l_math_2", "theme": "math", "teaching": "A 'failure' in the Emini often occurs even when the objective was close: a scalper's 4-tick target usually requires a move of 6 ticks (and similarly the market must go a tick beyond a limit order for it to be filled), and a 5-tick move against a signal bar that then reverses ('five-tick failure') is itself a common setup for a trade in the opposite direction.", "quote": "Currently, a scalper's target in the Emini of four ticks usually requires a six-tick move... five-tick failure A trade in the Emini that reaches five ticks beyond the signal bar and then reverses... It is often a setup for a trade in the opposite direction.", "pages": "16-17", "book": "Trends"}, {"id": "l_math_3", "theme": "math", "teaching": "Institutional 4-tick scalping requires price to trade 6 ticks past the signal-bar extreme to fill (1 tick entry + 4 tick target + 1 tick to fill limit); a repeated 'five-tick failure' followed by heavy volume without a downtick often signals a real institutional buy expecting more than a scalp.", "quote": "If they just entered a buy, the market will usually have to move six ticks above the high of the signal bar... Sometimes when the market just keeps hitting five ticks but not six (a potential five-tick failure), there will suddenly be a trade of 250 Emini contracts and the price does not tick down.", "pages": "52(84)", "book": "Trends"}, {"id": "l_math_4", "theme": "math", "teaching": "Scalping profitably requires roughly a 70% win rate, which is essentially impossible for all but elite traders; beginners should plan to swing trade instead of scalp.", "quote": "This means that they have to win about 70 percent of the time, which is impossible for anyone except an extremely good trader.", "pages": "325", "book": "Trends"}, {"id": "l_math_5", "theme": "math", "teaching": "Small pullback trend days keep gains modest even though the day is a clear trend: because bulls buy small positions all day (never chasing in a panic) and bears are never heavily short (so no big short-covering rally), the day often does not cover as many points as a more volatile trend day despite being 'the strongest' trend type.", "quote": "even though the day is a trend day, it often does not cover too many points and the bulls do not make a windfall proﬁt, even though they were on the right side of a strong trend", "pages": "418", "book": "Trends"}, {"id": "l_math_6", "theme": "math", "teaching": "Scalping (target smaller than risk) mathematically requires an unrealistic ~70% win rate; traders should generally only take trades where potential reward is at least as large as risk unless extremely skilled.", "quote": "Since the profit is often smaller than the risk, a trader has to win at least 70 percent of the time, which is an unrealistic goal for most traders. Traders should take trades only where the potential reward is at least as great as the risk unless they are extremely skilled.", "pages": "13", "book": "Trading Ranges"}, {"id": "l_math_7", "theme": "math", "teaching": "Martingale (double-up-after-a-loss) sizing is mathematically sound in theory but practically impossible: a modest losing streak (e.g., 8 losers) would require position sizes (256x) far beyond any trader's actual risk tolerance.", "quote": "if you are comfortable trading 10 contracts, but start with just one and plan to double up and reverse with each loss... eight consecutive losers would require 256 contracts! ... This is the inherent, insurmountable, mathematical problem with this approach.", "pages": "24", "book": "Trading Ranges"}, {"id": "l_math_8", "theme": "math", "teaching": "A reasonable profit-target heuristic: expect the market to ultimately move about as far in your favor as the size of protective stop that was required to take the trade.", "quote": "A move equal to the size of the required protective stop: if an Emini trade required you to use a 12-tick protective stop to avoid getting stopped out, expect the move to ultimately reach 12 ticks in your favor.", "pages": "81", "book": "Trading Ranges"}, {"id": "l_math_9", "theme": "math", "teaching": "80% of breakout attempts out of trading ranges fail; only about 20% of any single breakout attempt succeeds, though the range does eventually break out (often, but not always, with the prior trend) roughly 60% of the time.", "quote": "A trading range is just a pullback that has lasted so long that it has lost its short-term predictive power, and 80 percent of the breakout attempts up or down will fail.", "pages": "133, 135", "book": "Trading Ranges"}, {"id": "l_math_10", "theme": "math", "teaching": "Directional probability of an equidistant move is ~50% in the middle of a range, rises toward 60%+ near the edges, and can reach 70-80% at the far edge of a range that follows a strong trend (asymmetric depending which side of the prior trend).", "quote": "Near the bottom of the range, that is reversed, and the directional probability favors a rally... instead of 60 percent in favor of a rally, maybe it is 70 to 80 percent.", "pages": "134-135", "book": "Trading Ranges"}, {"id": "l_math_11", "theme": "math", "teaching": "A tight trading range caps the directional edge at roughly 51-55%, regardless of how good the setup looks, because the range itself signals the market has lost directional conviction.", "quote": "A tight trading range trumps everything... the probability of the breakout in either direction is never more than about 55 percent.", "pages": "151-152", "book": "Trading Ranges"}, {"id": "l_math_12", "theme": "math", "teaching": "On a one-point scalp with a two-point stop, you need to win over 67% just to break even before commissions, and ~80% to be reliably profitable — a bar almost no trader can sustain.", "quote": "On one-point scalps, you have to win on over 67 percent of your trades just to break even.", "pages": "165, 177-178", "book": "Trading Ranges"}, {"id": "l_math_13", "theme": "math", "teaching": "Backtested 'high win-rate' patterns discovered by data mining are often statistical noise (like a coin landing heads 8/10 times by chance), not real edges — beware of overfitting historical distributions.", "quote": "if you test enough ideas or enough inputs in any system, you will discover that some have worked in eight out of 10 tests and others have failed in eight out of 10. That is just the distribution of outcomes under a bell curve and has nothing to do with actual likelihood.", "pages": "179-180", "book": "Trading Ranges"}, {"id": "l_math_14", "theme": "math", "teaching": "Measured-move targets often work precisely because that distance is the institutional minimum needed for a positive trader's equation on the position — not because of magic technical significance.", "quote": "Why does a measured move target often work so precisely? Because it is the minimum needed by institutions to have a positive trader's equation, and they would not otherwise take the trade.", "pages": "184", "book": "Trading Ranges"}, {"id": "l_math_15", "theme": "math", "teaching": "For the ES 5-minute chart with a 10-15 point average daily range, roughly 8 ticks works as a default stop on most days; scale stop and target sizes together (larger bars -> larger stop AND larger target) to preserve trader's equation.", "quote": "For the Emini 5 minute chart when the average daily range is 10 to 15 points, eight ticks works well on most days...If the stop is more than eight ticks, you will likely be able to increase the size of your profit target as well.", "pages": "203", "book": "Trading Ranges"}, {"id": "l_math_16", "theme": "math", "teaching": "Martingale/Monte-Carlo doubling-and-reversing on losers is mathematically appealing but practically unworkable — losing streaks of 4, 6, 7+ do happen even if rare, and position sizes escalate beyond comfort zones.", "quote": "if you double (or even triple) your position size and reverse at each loss, you will theoretically make money... four consecutive losers would require sixteen contracts and it is unlikely that you would place a trade that is larger than your comfort zone", "pages": "xxiii", "book": "Reading Price Charts"}, {"id": "l_math_17", "theme": "math", "teaching": "Measured Move projections recur throughout Brooks' analysis: the distance of a breakout beyond a channel/pattern is often approximately equal to the distance covered within the pattern (Andrew's Pitchfork-style symmetry), used to set profit expectations/targets.", "quote": "the breakout should extend to about a Measured Move up to a parallel line that is about the same distance from the middle line as the middle line is from the bottom line (an Andrew's Pitchfork move)", "pages": "122-123, 141, 143, 158", "book": "Reading Price Charts"}, {"id": "l_math_18", "theme": "math", "teaching": "A 4-tick Emini scalp requires a roughly 6-tick move (1 tick to trigger entry, 4 ticks profit, 1 tick buffer to ensure the limit order fills); analogous math applies to SPY/QQQQ where a ~10-tick target needs a ~12-tick move.", "quote": "Since a six-tick breakout is needed to make a four-tick scalp (one-tick for the stop entry, four-ticks profit, and usually one more tick to be sure the profit target limit order is filled), a move that goes only five ticks and then reverses often indicates that the trend traders have lost control.", "pages": "277-278", "book": "Reading Price Charts"}, {"id": "l_math_19", "theme": "math", "teaching": "Small consistent per-day net gains scale enormously with size: netting 1 point/day at 100 Emini contracts equals $1,000,000/year; 4 points/day equals $4,000,000/year.", "quote": "If the trader can get up to 100 contracts, he will make $1,000,000 per year. If he nets four points a day, that is $4,000,000 per year.", "pages": "282", "book": "Reading Price Charts"}, {"id": "l_math_20", "theme": "math", "teaching": "In the Emini, a 4-tick scalp typically requires the market to move 6 ticks beyond the signal bar (1 tick for stop entry + 4 ticks profit + 1 tick because the limit order usually isn't filled until price trades 1 tick through it).", "quote": "A scalper in the Eminis usually needs a six-tick move beyond the signal bar to scalp four ticks of profit.", "pages": "296, 304", "book": "Reading Price Charts"}, {"id": "l_math_21", "theme": "math", "teaching": "Measured moves are useful only as after-the-fact observations of proportionality; they should not be used as a trading target/decision input.", "quote": "Remember, however, that Measured Moves are just observations and you should not consider them while trading.", "pages": "368", "book": "Reading Price Charts"}, {"id": "l_math_22", "theme": "math", "teaching": "Small consistent per-contract edges scale to very large annual profits at institutional size (illustrative math: 25 Emini contracts netting 2 points/day = $500,000/yr; 100 contracts netting 4 points/day = $5 million/yr), underscoring that the goal is volume on best setups, not more setups.", "quote": "if you trade 25 Emini contracts and net just two points a day, you will make $500,000 a year. If you trade 100 contracts and net four points, you will make $5 million a year.", "pages": "356", "book": "Reading Price Charts"}, {"id": "l_math_23", "theme": "math", "teaching": "Very short timeframe trading (e.g., 1-minute charts) has enough win rate to feel promising but the underlying trader's-equation math is against you long-term because the best trades happen too fast to catch, leaving only the less profitable ones.", "quote": "Don't turn the market into a casino, because that kind of math is relentless and unstoppable and will destroy you... Trading off the 1-minute chart is the classic example.", "pages": "407-408", "book": "Reading Price Charts"}, {"id": "l_math_24", "theme": "math", "teaching": "A scalper's target in the Emini of 4 ticks typically requires the market to move 6 ticks (accounting for spread/fill mechanics) to actually secure it; know your real required move, not just your nominal target.", "quote": "Currently, a scalper's target in the Emini of 4 ticks requires a 6-tick move, and a target in the QQQQ of ten ticks requires a 12 cent move.", "pages": "415", "book": "Reading Price Charts"}, {"id": "l_math_25", "theme": "math", "teaching": "Directional probability of an equidistant up/down move hovers near 50/50 most of the time — a baseline reminder that raw 'will it go up or down X ticks first' odds are close to a coin flip absent other context, which is why edge must come from context/pattern quality, not direction alone.", "quote": "directional probability The probability that the market will move either up or down any number of ticks before it reaches a certain number of ticks in the opposite direction... it hovers around 50 percent most of the time.", "pages": "10", "book": "Reversals"}, {"id": "l_math_26", "theme": "math", "teaching": "Martingale doubling strategies are mathematically sound in theory but practically impossible: after just 4 losers you'd need 16x size, after 8 losers 256x — far beyond any trader's comfort zone, making the approach unsustainable.", "quote": "Four consecutive losers would require 16 contracts on your next trade and eight consecutive losers would require 256 contracts! ...This is the inherent, insurmountable, mathematical problem with this approach.", "pages": "27", "book": "Reversals"}, {"id": "l_math_27", "theme": "math", "teaching": "Traders should never take a reversal trade unless the setup is clear and strong — 'almost perfect' reversals that don't quite look right (too much overlap, too many dojis, small/weak reversal bar, no prior trend-line break, no failed channel-line breakout) are traps designed to suck in and stop out reversal traders, fueling the existing trend.", "quote": "These almost perfect reversals sucker you in and trap you, so you should never take a reversal trade unless it is clear and strong.", "pages": "44", "book": "Reversals"}, {"id": "l_math_28", "theme": "math", "teaching": "Consecutive climaxes (2nd, 3rd buy or sell climax with only brief pauses between) sharply raise the odds of a significant correction or reversal; two consecutive climaxes are effectively a double top/bottom, three are effectively a wedge top/bottom, and are traded the same way regardless of the label used.", "quote": "Two consecutive buy climaxes create two pushes up and is effectively a double top... Three consecutive buy climaxes is a wedge top... they have the same implications and can be traded the same.", "pages": "76", "book": "Reversals"}, {"id": "l_math_29", "theme": "math", "teaching": "Traditional technical analysis's emphasis on volume confirming major reversals is unreliable in large, computerized markets like ES/SPY (more true for smaller-volume stocks); price action alone on the entry timeframe is generally sufficient and often more profitable than chasing volume/oscillator divergence signals.", "quote": "Most major reversals up or down in markets like the SPY or Emini occur in the absence of clearly understandable volume patterns... Active traders who pay attention to volume will likely miss out on many good trades and make less money than if they simply traded on the price action alone.", "pages": "78", "book": "Reversals"}, {"id": "l_math_30", "theme": "math", "teaching": "After a trend has gone ~40 bars without a real pullback, the single strongest-looking trend bar of the entire move (biggest range, small tails, close beyond prior bar's high) is paradoxically MORE likely to be an exhaustion/failed-breakout climax than an ordinary continuation bar - probability of true breakout success at that point is roughly under 30%.", "quote": "If the market has the strongest breakout of the trend at this point, the market is trying to convert an overdone bull trend into an even steeper bull trend, and the chance of success is probably less than 30 percent.", "pages": "78", "book": "Reversals"}, {"id": "l_math_31", "theme": "math", "teaching": "Reversal after consecutive climaxes (e.g., two sell climaxes) is common and can involve a one-or-two-bar final flag/pause bar that acts as the pivot before a large correction or reversal — 'that bar became the one-bar final flag in the sell-off.'", "quote": "Consecutive sell climaxes in a freely falling market like this often have a one- or two-bar final flag that is followed by a large correction or even a reversal.", "pages": "119", "book": "Reversals"}, {"id": "l_math_32", "theme": "math", "teaching": "A climactic reversal has roughly a 60% chance of producing at least two legs and lasting 10+ bars — implying a 40% chance it falls short of that.", "quote": "Because the move up was a climactic reversal, it had about a 60 percent chance of having at least two legs up and lasting 10 bars. This means that it had a 40 percent chance of not reaching those goals.", "pages": "105", "book": "Reversals"}, {"id": "l_math_33", "theme": "math", "teaching": "A stop-entry trader generally needs roughly a six-tick move beyond the signal bar to be able to scalp four ticks with a profit-taking limit order (accounting for entry slippage and the spread needed to fill the limit exit).", "quote": "Remember, a trader entering on a stop usually needs a six-tick move beyond the signal bar to be able to scalp four ticks with a profit-taking limit order.", "pages": "177", "book": "Reversals"}, {"id": "l_math_34", "theme": "math", "teaching": "Reversals often happen within seconds of an economic report because institutions already had a bias/plan and simply execute against it once the report clears; individual traders cannot reliably interpret why the market moves — they can only watch price action respond.", "quote": "Reversals often happen seconds after a report is released, but an individual trader is unlikely to understand how the market will respond to a report by simply watching CNBC... The best way to know how the market will respond is simply to watch it respond and place your trades as the price action unfolds.", "pages": "187", "book": "Reversals"}, {"id": "l_math_35", "theme": "math", "teaching": "A correction after an extended spike-and-channel move (e.g., 20-30 bars) should generally have at least about half as many bars as the prior channel before the correction is considered mature/complete.", "quote": "After a bear channel that lasted 20 or 30 bars, the correction was likely to have at least half as many bars as a general rule. If the correction is too small, bears will be hesitant to short and bulls would continue to buy because they would suspect that the correction needed more bars for clarity.", "pages": "219-220", "book": "Reversals"}, {"id": "l_math_36", "theme": "math", "teaching": "Scalping for a reward smaller than the risk requires an unrealistically high win rate (around 80%) to be profitable; most traders overestimate their true win rate (often it's closer to 60%) and lose money doing tiny scalps even while 'winning' most trades, because losses are larger than wins.", "quote": "They actually have to win on about 80 percent of their tiny scalps to make a living at it...Many of their trades will actually be only 60 percent certain at best...their accounts will slowly disappear.", "pages": "248, 254", "book": "Reversals"}, {"id": "l_math_37", "theme": "math", "teaching": "It is better to win 60% of trades using a small ('I don't care') position size than to lose (psychologically/financially) on 80% of decisions using a large size that induces anxiety and rule-breaking; reduce size until indifferent to any single loss.", "quote": "It is better for a trader to win on 60 percent of his trades using 100 shares than losing on 80 percent using 500 shares because of anxiety that prevents him from following his plan.", "pages": "250", "book": "Reversals"}, {"id": "l_math_38", "theme": "math", "teaching": "The 'scalper's dilemma': a scalp risking $1 to make $0.50 needs roughly 67% win rate just to break even, but even at a 60% win rate you lose money on average once commissions are included (numeric example: 6 wins x $0.50 - 4 losses x $1.00 = net loss). Avoid scalps where risk exceeds reward unless you have a proven 80%+ edge.", "quote": "If you take this type of trade 10 times, you will probably win six times and make $3.00 and you will lose four times and lose $4.00, which means that you are losing 10 cents per trade, plus commissions. This is the scalper's dilemma and is the reason that you should avoid scalps where the risk is more than the reward.", "pages": "256", "book": "Reversals"}, {"id": "l_math_39", "theme": "math", "teaching": "Position sizing math dominates annual income far more than setup selection: netting 2 points/day on 25 Emini contracts = $500K/yr; 4 points on 100 contracts = $4M/yr; 50 cents/day on 3,000 AAPL shares = ~$300K/yr — the lesson is to master one or a few best setups deeply, then scale volume rather than adding more setups.", "quote": "If you trade 25 Emini contracts and net just two points a day, you will make $500,000 a year. If you trade 100 contracts and net four points, you will make $4 million a year...Once you are consistently netting a couple of points every day...you should focus on increasing your volume rather than adding lots of new setups.", "pages": "257", "book": "Reversals"}, {"id": "l_math_40", "theme": "math", "teaching": "In the middle of a trading range, the probability of an equidistant move (e.g., 1, 2, 3, or 4 points) up before down, or down before up, is roughly 50/50 — direction alone gives no edge there; the edge must come from reward:risk skew via limit-order targets and tight stops.", "quote": "the directional probability of an equidistant move was about 50 percent. There was about a 50 percent chance of a one-point move up before a one-point move down ... The same was true for two, three, or four points.", "pages": "279", "book": "Reversals"}, {"id": "l_math_41", "theme": "math", "teaching": "A trader needs a genuine mathematical edge to make money; that edge exists at every moment for both a long and a short trade simultaneously, but is usually unclear — when it becomes relatively clear it is also fleeting and small, and that is precisely when a trade should be placed.", "quote": "A trader needs a mathematical advantage to make money. At every moment, there is always a mathematical edge for both a long and a short trade, but the edges are usually not clear. When they are relatively clear, they are fleeting and small. However, those are the times when traders need to place their trades.", "pages": "280", "book": "Reversals"}, {"id": "l_math_42", "theme": "math", "teaching": "Institutions only take trades they believe have at least a 60 percent probability, and they need at least a measured-move target so reward equals risk, giving a positive trader's equation.", "quote": "Most institutions take trades that they believe will work, which means that the probability is at least 60 percent. They therefore need at least a measured move to have a positive trader's equation", "pages": "227", "book": "Reversals"}, {"id": "l_math_43", "theme": "math", "teaching": "Buying at the bottom of a trading range with an equidistant measured-move target (double bottom bull flag) gives a strong trader's equation: e.g. risk $5 to make $10 at 60 percent probability, for about $4 average profit per trade. Remember the 40 percent case still requires an exit if price breaks the low.", "quote": "A trader would be risking $5.00 to make $10.00 with a probability of 60 percent, which is very good. The average profit per trade would be about $4.00", "pages": "228, 229", "book": "Reversals"}, {"id": "l_math_44", "theme": "math", "teaching": "Options contain a time value that melts away every day (decay accelerates in the final week); hold a position only while your premise is still valid, otherwise exit even at a loss.", "quote": "Since options lose money every day even if the market remains unchanged, you should hold your position only if you believe that your premise is still valid. Otherwise, get out, even at a loss", "pages": "232, 235", "book": "Reversals"}, {"id": "l_math_45", "theme": "math", "teaching": "Judge an option's bid-ask spread proportionally to the stock price, not in absolute cents: a 20-cent spread on a $300 stock's call is comparable to a 2-cent spread on a $30 stock (you could buy 10 of the cheaper for each expensive one).", "quote": "A large bid-ask spread alone should not be a deterrent to buying an option, because the spread is proportional to the price of the stock", "pages": "235", "book": "Reversals"}, {"id": "l_barbwire_0", "theme": "barbwire", "teaching": "A reversal bar with too much overlap of prior bars represents a one/two-bar trading range, not a real reversal — there is 'nothing to reverse' because the market is two-sided/sideways, not trending; it may even become an opposite-direction setup if enough traders get trapped.", "quote": "If a reversal bar largely overlaps one or more of the prior bars...it might just be part of a trading range...If so, there is nothing to reverse, because the market is sideways and not trending.", "pages": "123-124", "book": "Trends"}, {"id": "l_barbwire_1", "theme": "barbwire", "teaching": "Doji entry/signal bars indicate a roughly 50/50 chance the market will trade beyond them; raising a stop to just below/above a doji entry bar is a poor practice for that reason — better to exit near breakeven if the doji itself is weak.", "quote": "the odds are 50-50 it will get hit...it is probably better to try to get out around breakeven.", "pages": "131-132", "book": "Trends"}, {"id": "l_barbwire_2", "theme": "barbwire", "teaching": "Outside bars are, by definition, one-bar trading ranges (since they fully overlap the prior bar); if the close is near the middle, treat them as pure trading-range bars rather than trend/reversal bars.", "quote": "since an outside bar totally overlaps the prior bar, every outside bar is a part of a trading range, which is two or more bars that largely overlap.", "pages": "187", "book": "Trends"}, {"id": "l_barbwire_3", "theme": "barbwire", "teaching": "Barbwire represents intense two-sided uncertainty with large institutional buy/sell programs on both sides comfortable trading there; brief overwhelms by one side tend to fail and get pulled back by the range's magnetic effect until an eventual real breakout occurs.", "quote": "Barbwire is an area of intense uncertainty and two-sided trading. Bulls buy aggressively near the low and stop buying near the high. Bears sell aggressively near the high but stop shorting near the low.", "pages": "196-197", "book": "Trends"}, {"id": "l_barbwire_4", "theme": "barbwire", "teaching": "On strong trend days, countertrend setups should be viewed only as with-trend entries placed exactly where the countertrend traders will be forced to exit at a loss; strong trends often have their best-looking reversal/trend bars countertrend, trapping traders.", "quote": "You should start to look at countertrend setups only as great with-trend setups, with you entering on a stop exactly where those countertrend traders will be forced to exit with a loss.", "pages": "339", "book": "Trends"}, {"id": "l_barbwire_5", "theme": "barbwire", "teaching": "When two spikes in opposite directions occur near each other, the market goes sideways as bulls and bears fight over the direction of the ensuing channel; the side that ultimately wins determines whether the trend resumes or reverses.", "quote": "The bulls and bears then fight to create a channel. Eventually one side will dominate and will be able to form a trend channel.", "pages": "336 (368)", "book": "Trends"}, {"id": "l_barbwire_6", "theme": "barbwire", "teaching": "When a market repeatedly tests a trend line without ever accelerating away from it, that persistent failure to accelerate is itself a tell that the market will eventually break through the line in the opposite direction.", "quote": "Whenever the market repeatedly tests a line and does not fall far from it, the market usually breaks above it.", "pages": "343 (375)", "book": "Trends"}, {"id": "l_barbwire_7", "theme": "barbwire", "teaching": "Barbwire (small tight overlapping ranges) increases the risk/uncertainty of breakout-pullback entries even when the setup pattern is otherwise reasonable.", "quote": "The high 2 long above bar 5 was a reasonable breakout pullback entry, despite the barbwire.", "pages": "404", "book": "Trends"}, {"id": "l_barbwire_8", "theme": "barbwire", "teaching": "Barbwire = 3+ largely overlapping bars where at least one has a small (doji) body and the middle bar overlaps more than half its range with the bars before/after; it is the single biggest obstacle to beginning traders' profitability.", "quote": "If you see three or more bars that largely overlap and one or more of them has a tiny body (doji), this is barbwire... Tight trading ranges are the single biggest problem for beginning traders.", "pages": "153, 155", "book": "Trading Ranges"}, {"id": "l_barbwire_9", "theme": "barbwire", "teaching": "Barbwire adjacent to the moving average tends to break out away from the moving average (bull breakout if forming above it, bear breakout if below); if straddling the MA, look elsewhere for a read.", "quote": "When barbwire forms adjacent to the moving average, it will usually break out in the direction away from the moving average.", "pages": "153", "book": "Trading Ranges"}, {"id": "l_barbwire_10", "theme": "barbwire", "teaching": "Hard rule: never buy in a barbwire/trading-range setup where the bars are mostly below the moving average, and never sell where the bars are mostly above it — this alone can save enormous money over a career.", "quote": "One very good rule is that if there is a trading range setting up and it is near the moving average, never look to buy if the bars are mostly below the moving average, and never look to sell if the bars are mostly above the moving average. This one rule will save you an enormous amount of money over the years.", "pages": "154", "book": "Trading Ranges"}, {"id": "l_barbwire_11", "theme": "barbwire", "teaching": "Beginners should restrict entries to signal bars that are trend bars in their trade's direction (a bull trend bar to buy, a bear trend bar to short) since the market has already shown pressure in that direction, raising odds of follow-through; more advanced traders can use doji/opposite-direction signal bars depending on context.", "quote": "A beginner trader should only enter when the signal bar is also a trend bar in the direction of his trade.", "pages": "11", "book": "Reading Price Charts"}, {"id": "l_barbwire_12", "theme": "barbwire", "teaching": "When bars have doji/small bodies and it's unclear which way a breakout will resolve, expect Barb Wire; wait until one side is clearly trapped or a small bar forms near the range high/low before entering, rather than guessing.", "quote": "If the bars have more of a doji look, then the market will likely enter Barb Wire, but the odds still favor a downside breakout. If you are not certain, then wait because it is likely that most traders will not be certain and Barb Wire is likely.", "pages": "82, 109", "book": "Reading Price Charts"}, {"id": "l_barbwire_13", "theme": "barbwire", "teaching": "Barb Wire (three or more overlapping bars, one or more dojis) indicates balance between bulls and bears; any breakout is likely to fail, so wait for more price action rather than trading a breakout signal out of Barb Wire (e.g. don't buy a High 2 that's really just Barb Wire noise).", "quote": "When there are three or more bars with a lot of overlap and one or more is a doji (Barb Wire), it is best to wait for more price action before initiating a trade.", "pages": "152", "book": "Reading Price Charts"}, {"id": "l_barbwire_14", "theme": "barbwire", "teaching": "Barb Wire often produces back-to-back failures — a failed breakout in one direction is quickly followed by a failed breakout in the other, so a small signal bar near the extreme of the range can still be a good trade even within choppy Barb Wire.", "quote": "Barb Wire often has back-to-back failures, and Bar 19 is therefore a good short", "pages": "157", "book": "Reading Price Charts"}, {"id": "l_barbwire_15", "theme": "barbwire", "teaching": "A Tight Trading Range is 2+ overlapping/sideways bars in close balance; treat a slightly sloped TTR the same as a flat one. In general wait for failed breakouts and Breakout Pullbacks rather than trading the initial breakout.", "quote": "When a Tight Trading Range slopes slightly up or down, it is still a Tight Trading Range, and it should be treated the same way...it is best to wait for failed breakouts and Breakout Pullbacks.", "pages": "164", "book": "Reading Price Charts"}, {"id": "l_barbwire_16", "theme": "barbwire", "teaching": "After a climax (trend channel overshoot and reversal), even a small Tight Trading Range can break out in either direction because the climax generates opposing momentum whose persistence is uncertain.", "quote": "A Tight Trading Range is usually a continuation pattern, but after a climax...the market can break out in either direction.", "pages": "165", "book": "Reading Price Charts"}, {"id": "l_barbwire_17", "theme": "barbwire", "teaching": "Barb Wire (3+ largely overlapping bars, one or more dojis) typically occurs mid-day, mid-range, near the EMA, and is notorious for sharp whipsaws — Brooks calls avoiding blind entry into it 'the most important piece of information in this book.'", "quote": "Don't touch Barb Wire, or you will be hurt.", "pages": "168", "book": "Reading Price Charts"}, {"id": "l_barbwire_18", "theme": "barbwire", "teaching": "A reliable breakout from a trading range should extend roughly three or more ticks beyond the range; a bar that only pokes one tick beyond isn't a genuine breakout and shouldn't be treated as trapping anyone.", "quote": "a reliable breakout must exte

_market-structure_355", "theme": "market-structure", "teaching": "Big institutional traders enter during the spike phase of a strong breakout regardless of pullback risk, sizing their position down so dollar risk stays constant even with a stop far below the spike's midpoint; this is why spikes can extend for many bars without a pullback.", "quote": "The institutions know this, and simply adjust their position size down to a level where their dollars at risk are the same as for any other trade.", "pages": "42", "book": "Reversals"}, {"id": "l_market-structure_356", "theme": "market-structure", "teaching": "Trend reversals often start slow with overlapping small bars, deceiving traders into thinking a flag is forming rather than a reversal — most trend reversal setups have <50% chance of success precisely because the strongest ones are camouflaged early.", "quote": "Although the best reversals have strong momentum and go a long way, they often are very slow to start and can have several small bars before the sharp moves begin. The result is that most trend reversal setups have a less than 50 percent chance of success.", "pages": "42", "book": "Reversals"}, {"id": "l_market-structure_357", "theme": "market-structure", "teaching": "The best reversal setup is not a reversal at all in the classic sense — it's a with-trend flag breakout (a bull flag breaking out in a bull trend, or a bear flag reversing back down in a bear trend). True major reversals are rarer because most reversal attempts fail and become flags/continuation patterns instead.", "quote": "So what is the best reversal setup? It is the end of a pullback when the short-term countertrend move is ending and reversing back into the direction of the major trend... Major reversals are less common since most reversal attempts fail and become flags.", "pages": "43", "book": "Reversals"}, {"id": "l_market-structure_358", "theme": "market-structure", "teaching": "Trading ranges/continuation patterns (H&S, double tops/bottoms, triangles) are correctly thought of as flags that rarely fail, not as 'reversal patterns'; treating every top/bottom pattern as a reliable reversal signal leads to a majority of losing trades.", "quote": "It is a mistake to see every top or bottom as a great reversal setup, because if you take all of those countertrend entries, the majority of your trades will be losers and your occasional wins will not be enough to offset your losses.", "pages": "43", "book": "Reversals"}, {"id": "l_market-structure_359", "theme": "market-structure", "teaching": "A trading range at the top of a bull trend is an 'area of distribution' (bulls selling out/taking profits, bears accumulating shorts); a trading range at the bottom of a bear trend is an 'area of accumulation' (bulls building longs, bears covering/distributing shorts).", "quote": "Since there is a trading range top, the bulls are said to be distributing their longs... When there is a trading range bottom, the bulls are said to be accumulating their longs.", "pages": "43", "book": "Reversals"}, {"id": "l_market-structure_360", "theme": "market-structure", "teaching": "Days that reverse on the daily chart are frequently 'trending trading range days' intraday on the 5-minute chart — e.g. a bear trending range day that later breaks back into the upper range and closes near the day's high becomes a bull reversal day on the daily chart.", "quote": "Many days that become reversal days on the daily chart are trending trading range days on the 5 minute chart.", "pages": "44", "book": "Reversals"}, {"id": "l_market-structure_361", "theme": "market-structure", "teaching": "The final 30-60 minutes of the day tends to reflect the higher-timeframe trend: a bull-trend day rallying into the close raises odds the daily bar is a bull trend bar; a sell-off into the close in a bull trend can signal a transition toward a pullback/bear trend, since it reflects fund liquidation/programs.", "quote": "Pay attention to what the market does in the final 30 to 60 minutes, because it often is a reflection of the higher time frame trend.", "pages": "44", "book": "Reversals"}, {"id": "l_market-structure_362", "theme": "market-structure", "teaching": "Market-leader stocks (e.g. AAPL vs SPY) often top out days before the broader index — institutions overweighted in high-flying names take profits first when they anticipate a broader correction, causing leaders to fall fastest in the correction too.", "quote": "If the market leaders are selling off, the market might be topping... This can cause the stocks that rose the fastest in the bull trend to fall the fastest in the correction.", "pages": "44-45", "book": "Reversals"}, {"id": "l_market-structure_363", "theme": "market-structure", "teaching": "The market is not a true zero-sum game despite ~95% of institutional participants being profitable in most years — the economy grows and creates real wealth over time, so most firms can be net winners in expansion years even though a majority lose money during contraction years.", "quote": "This is because it is not really a zero-sum game. Our economy grows and therefore creates wealth.", "pages": "57", "book": "Reversals"}, {"id": "l_market-structure_364", "theme": "market-structure", "teaching": "A trend-line break does NOT itself reverse the trend — it is only the first significant sign that countertrend traders are gaining strength. The correct sequence is: keep trading with-trend through the break, wait for the test of the old extreme, and only take a countertrend trade if a reversal setup actually develops on/near that test.", "quote": "The trend line break does not reverse the trend. It is simply the first significant sign that countertrend traders are getting strong enough that you should soon begin to trade in their direction... You should take a countertrend trade only if a reversal setup develops during this test.", "pages": "60", "book": "Reversals"}, {"id": "l_market-structure_365", "theme": "market-structure", "teaching": "All trends move within channels; until there is a strong break of the channel, bet against any attempted breakout beyond the trend line, and treat countertrend trades as scalps only. True V-shaped tops/bottoms without a channel-line overshoot/reversal are rare enough to ignore.", "quote": "Remember, all trends are in channels, and until there is a strong breakout of the channel, the best bet is against any attempt to break out beyond the trend line... True V bottoms and tops in the absence of trend channel line overshoots and reversals are so rare that they are not worth considering.", "pages": "60", "book": "Reversals"}, {"id": "l_market-structure_366", "theme": "market-structure", "teaching": "When price breaks above a prior high in a bull trend, there are three possible outcomes to diagnose from subsequent price action: (1) continued buying/measured move up (strong bulls pressing), (2) sideways action (profit-taking, bulls looking to re-buy lower), (3) hard reversal down (strong bears dominated, expect a couple legs down over 10+ bars).", "quote": "A move above a prior high in a bull trend will generally lead to one of three outcomes: more buying, profit taking, or shorting.", "pages": "60", "book": "Reversals"}, {"id": "l_market-structure_367", "theme": "market-structure", "teaching": "Micro patterns scale fractally with timeframe: a double bottom on a 5-min chart appears as a micro double bottom (2-3 bars apart) on a higher timeframe chart, and vice versa — a micro pattern on the 5-min chart would be a full/perfect trend reversal pattern on a small-enough (lower) timeframe chart.", "quote": "The relationship between traditional double tops and bottoms and their micro versions on higher time frame charts is the same as it is for all micro patterns.", "pages": "60", "book": "Reversals"}, {"id": "l_market-structure_368", "theme": "market-structure", "teaching": "Major reversals from bear markets tend to be climactic/volatile with multiple sell climaxes (traders repeatedly think the bottom is in, get shaken out, sell again) before a true low forms, often ending in a large-range bar with a failed flag or three-push pattern; tops are more often gradual trading-range distributions than violent climaxes, though either can occur at either type of extreme.", "quote": "Major reversals from bear markets are often volatile with large bars and several pushes up and down creating one to several sell climaxes... Climactic reversals with big bars and huge volume are more common at bottoms than at tops.", "pages": "44", "book": "Reversals"}, {"id": "l_market-structure_369", "theme": "market-structure", "teaching": "Traders transition gradually from bullish to bearish (or vice versa) rather than switching suddenly absent major news; this gradualness is what creates trading ranges and eventual trend reversals as 'measures of excess' are reached firm by firm.", "quote": "In the absence of some rare, dramatic news event, traders don't suddenly switch from extremely bullish to extremely bearish. There is a gradual transition.", "pages": "61", "book": "Reversals"}, {"id": "l_market-structure_370", "theme": "market-structure", "teaching": "Once a strong trend's pullbacks become relatively large, those pullbacks start behaving like trading ranges rather than simple flags, and a new high/low becomes a breakout attempt from a range that is more likely to fail.", "quote": "Once a strong bull trend begins to have pullbacks that are relatively large, the pullbacks... behave more like trading ranges than bull flags.", "pages": "62", "book": "Reversals"}, {"id": "l_market-structure_371", "theme": "market-structure", "teaching": "Pullbacks in a strong trend that break out above/below a minor swing in the pullback direction usually fail and reverse back toward the major trend, because most traders read the move as 'just a pullback' and become aggressive counter-traders on the breakout.", "quote": "The minor bull trend will usually reverse back down into the direction of the major bear trend after breaking out above the first or second swing high in the pullback.", "pages": "61", "book": "Reversals"}, {"id": "l_market-structure_372", "theme": "market-structure", "teaching": "A protracted trend often produces an unusually large/strong-looking trend bar right before reversing - this 'exhaustive climax' bar traps weak bulls/bears who read it as continuation, while smart money uses it to reverse.", "quote": "A protracted trend will often have an unusually strong breakout, but it can be an exhaustive climax.", "pages": "62", "book": "Reversals"}, {"id": "l_market-structure_373", "theme": "market-structure", "teaching": "Every trading range exists within a bull or bear trend context, and there will always eventually be a breakout from the range that defines the resumed trend direction.", "quote": "Every trading range is within either a bull trend or a bear trend.", "pages": "62", "book": "Reversals"}, {"id": "l_market-structure_374", "theme": "market-structure", "teaching": "As a trend matures and reaches the 'tipping point,' most big traders stop buying/selling small pullbacks and instead look to fade rallies/sell rallies (or buy dips) - once that mindset shift is dominant, a large correction or trend reversal is likely.", "quote": "The market has reached the tipping point, and most traders have stopped looking to buy small pullbacks and instead are looking to sell rallies.", "pages": "62", "book": "Reversals"}, {"id": "l_market-structure_375", "theme": "market-structure", "teaching": "Momentum of the test of a trend's extreme matters more than the fact that a trend line broke: a tight, steep, low-overlap test rally/selloff favors trend resumption; an overlapping, multi-legged, wedge-shaped test with a shallower slope favors a lower high/higher low and possible reversal or at least a trading range.", "quote": "If the rally is in a very tight, steep channel with no pullbacks... the odds are increased that the bull trend will resume... In contrast, if the rally has many overlapping bars, several large bear trend bars, two or three clear pullbacks, maybe a wedge shape...then the odds are that the test... will result in either a lower high or a slightly higher high.", "pages": "63", "book": "Reversals"}, {"id": "l_market-structure_376", "theme": "market-structure", "teaching": "Markets have inertia and tend to continue doing what they've been doing, which is why most trend reversal attempts fail; when a reversal does succeed, a trading range is more likely than an immediate trend in the opposite direction.", "quote": "Markets have inertia and tend to continue to do what they have been doing. This causes most trend reversals to fail.", "pages": "63", "book": "Reversals"}, {"id": "l_market-structure_377", "theme": "market-structure", "teaching": "In a bull reversal, if the test forms a higher low, that higher low IS the start of the second leg (not the first); if it instead forms a lower low, that lower low is the start of the first leg and a subsequent pullback/second leg is likely. Mirror logic for bear reversals.", "quote": "If a bull reversal has a higher low for the test of the bear low, it will also be the start of the second leg. However, if it forms a lower low for the test, that low will be the start of the first leg.", "pages": "63-64", "book": "Reversals"}, {"id": "l_market-structure_378", "theme": "market-structure", "teaching": "Pattern classification (major trend reversal, pullback, new trend, etc.) is entirely relative to the timeframe/chart you're trading; the same price legs can be a 'major trend reversal' on a 1-minute chart, a mere 'pullback' on 5-minute, and invisible on 15-minute. Use terms appropriate to the chart in front of you.", "quote": "Everything is relative to the chart in front of you and looks different on higher and smaller time frame charts.", "pages": "64", "book": "Reversals"}, {"id": "l_market-structure_379", "theme": "market-structure", "teaching": "Most tradable reversals begin with at least a micro double top/bottom, a traditional double top/bottom, or a final-flag reversal (a species of double top/bottom) - but the pattern alone is not sufficient; context (what came before, e.g. six bars up + sell climax) determines whether the reversal trade should actually be taken.", "quote": "Most tradable reversals begin with at least a micro double bottom or top... Just because a market forms a double bottom or top does not mean that a reversal trade should be taken. The decision has to be based on context.", "pages": "71-72", "book": "Reversals"}, {"id": "l_market-structure_380", "theme": "market-structure", "teaching": "The market is always trying to break out, and then trying to make every breakout fail - this failed-breakout/successful-breakout duality is 'the most fundamental aspect of all trading' and underlies every trade decision.", "quote": "The market is always trying to break out, and then the market tries to make every breakout fail. This is the most fundamental aspect of all trading and is at the heart of everything that we do... All trading comes down to this decision.", "pages": "72", "book": "Reversals"}, {"id": "l_market-structure_381", "theme": "market-structure", "teaching": "Any trend bar or series of trend bars with little overlap is technically a climax, even a single bar; most climaxes are simply followed by a pause/trading range rather than a climactic reversal, and the trend usually resumes rather than reverses.", "quote": "A climax is simply any market that has gone too far, too fast in the eyes of traders... Most climaxes are usually followed by a trading range that lasts one or more bars, instead of by a spike in the opposite direction, and the trend often resumes instead of reverses.", "pages": "75-76", "book": "Reversals"}, {"id": "l_market-structure_382", "theme": "market-structure", "teaching": "Spikes (in either direction, in trends or ranges) function as tests of the resolve of countertrend traders vs. with-trend traders; strong with-trend traders love countertrend spikes because they know most fail, giving them a brief, high-value opportunity to add to positions.", "quote": "All spikes, up and down, in bull or bear trends or in trading ranges, are simply tests of the determination of the countertrend traders and the resolve of the with trend traders.", "pages": "73", "book": "Reversals"}, {"id": "l_market-structure_383", "theme": "market-structure", "teaching": "Every pullback is a small trend, and every trend is itself just a pullback on a higher timeframe chart - even major historical crashes (1987, 2008-2009) were just pullbacks relative to the monthly bull trend line.", "quote": "Every pullback is a small trend, and every trend is just a pullback on a higher time frame chart. This includes the 1987 and 2008-2009 stock market crashes, which were just pullbacks to the monthly bull trend line.", "pages": "73", "book": "Reversals"}, {"id": "l_market-structure_384", "theme": "market-structure", "teaching": "Institutional/value-based stock traders routinely buy strong bear spikes into bull trend support even without a confirmed reversal, on the belief the market is temporarily mispricing the stock and it will soon self-correct.", "quote": "Stock traders routinely buy strong bear spikes in bull trends because they see the spike as a value play.", "pages": "74", "book": "Reversals"}, {"id": "l_market-structure_385", "theme": "market-structure", "teaching": "A trend-line break signals a possible reversal (trend weakening); a trend-CHANNEL-line break signals the opposite - the trend has gotten stronger/steeper. Channel-line breakouts fail within about 5 bars roughly 70%+ of the time and the market re-enters the channel, usually poking out the opposite side (breaking the trend line).", "quote": "The break of a trend line means that a possible trend reversal is underway, but breaking a trend channel line means that the trend has increased in strength and is now steeper. However, most trend channel line breakouts fail within about five bars.", "pages": "76", "book": "Reversals"}, {"id": "l_market-structure_386", "theme": "market-structure", "teaching": "When a trend channel line fails (price breaks through rather than bouncing off it), assume the trend is stronger than believed and look for with-trend entries - but stay alert that this channel-line breakout itself could soon fail and reverse, so be ready to exit a breakout pullback quickly.", "quote": "Whenever a trend channel line fails (the market breaks through it instead of bouncing off it), you should assume that the trend is much stronger than you thought and you should look for with-trend entries.", "pages": "77", "book": "Reversals"}, {"id": "l_market-structure_387", "theme": "market-structure", "teaching": "Simple heuristic for post-spike behavior: a large spike/move up immediately followed by a large spike/move down (even within one bar as a huge tail) creates confusion that typically resolves into a trading range for a while, not a clean trend.", "quote": "As a general rule, big up + big down = confusion = trading range, at least for a while.", "pages": "80", "book": "Reversals"}, {"id": "l_market-structure_388", "theme": "market-structure", "teaching": "After a buy climax (spike up then spike down), a failed bull channel commonly transitions into a bear channel; consecutive spikes in opposite directions represent the market flipping control from bulls to bears.", "quote": "After a buy climax..., there will often be a bull channel that fails, and then the market will form a bear channel.", "pages": "83", "book": "Reversals"}, {"id": "l_market-structure_389", "theme": "market-structure", "teaching": "Major reversal points tend to occur at a confluence of magnets (measured moves, trend channel line overshoots, prior swing lows/highs) rather than at an arbitrary price.", "quote": "The bottom is always at a confluence of magnets.", "pages": "84", "book": "Reversals"}, {"id": "l_market-structure_390", "theme": "market-structure", "teaching": "In a steep/strong bear channel, smart bears place limit shorts at or above the high of the prior bar (where overly eager bulls are buying) rather than chasing.", "quote": "When a bear channel is steep like this, smart bears will have limit orders to short at or above the high of the prior bar, exactly where overly eager bulls are buying.", "pages": "89", "book": "Reversals"}, {"id": "l_market-structure_391", "theme": "market-structure", "teaching": "Increased slope in a trend indicates increased emotion/acceleration and typically means the trend is about to correct because the emotional (impulsive) traders have already exited and no one new is willing to enter until a pullback occurs.", "quote": "Once the slope increases, the trend is accelerating and probably about to correct. This is because the increased slope indicates increased emotion.", "pages": "90", "book": "Reversals"}, {"id": "l_market-structure_392", "theme": "market-structure", "teaching": "All three-push reversal patterns (wedge, micro wedge, parabolic wedge, wedge with 4th push, triangle, expanding triangle, triple top/bottom, double top/bottom pullback, head-and-shoulders, failed breakout of double top/bottom) are manifestations of the same underlying market behavior and should be traded identically regardless of exact shape.", "quote": "All three push patterns are manifestations of the same underlying market behavior, regardless of the shape that the pattern takes... It is not useful for a trader to draw subtle distinctions among the variations because there are enough similarities that they trade the same.", "pages": "94-95", "book": "Reversals"}, {"id": "l_market-structure_393", "theme": "market-structure", "teaching": "In the Emini specifically, a wedge top pullback often tests the top of the wedge to the exact tick, forming a perfect double top — a good second-entry short opportunity; in stocks/ETFs like SPY the pullback often overshoots by a few ticks without invalidating the pattern.", "quote": "In the Emini, if there is a wedge top and then a brief sell-off, the pullback often tests the top of the wedge to the exact tick, forming a perfect double top.", "pages": "99", "book": "Reversals"}, {"id": "l_market-structure_394", "theme": "market-structure", "teaching": "Every reversal is simply a failed breakout of something — a core Brooksian axiom for interpreting all reversal patterns.", "quote": "Remember, every reversal is simply a failed breakout of something.", "pages": "103", "book": "Reversals"}, {"id": "l_market-structure_395", "theme": "market-structure", "teaching": "Rallies/selloffs reach resistance/support areas (measured moves, trend lines) where computers (algorithmic trading) systematically buy/sell, which is why moves tend to stall or reverse at those levels.", "quote": "The reason moves end at targets is that most trades are being done by computers, and their algorithms are based on math and logic. They only buy at support and sell at resistance.", "pages": "104", "book": "Reversals"}, {"id": "l_market-structure_396", "theme": "market-structure", "teaching": "A trend channel line that steepens from one segment to the next (a parabolic move) is a classic warning sign that the move is overextended and vulnerable to reversal.", "quote": "The trend channel line from bar 4 to bar 7 was steeper than the one from bar 2 to bar 4, which means that the move up was parabolic.", "pages": "104", "book": "Reversals"}, {"id": "l_market-structure_397", "theme": "market-structure", "teaching": "When a wedge (or other three-push pattern) fails to reverse, the resulting move typically covers an approximate measured move equal to the height of the wedge/pattern.", "quote": "When a wedge fails, the move will usually be an approximate measured move equal to the height of the wedge.", "pages": "105-106", "book": "Reversals"}, {"id": "l_market-structure_398", "theme": "market-structure", "teaching": "Never be frightened out of a position by a single big trend bar against you; every trend bar is technically a breakout attempt, and most breakout attempts fail.", "quote": "Never be frightened by a single big bear trend bar. Always view every trend bar as a breakout, and realize that most breakout attempts fail.", "pages": "102", "book": "Reversals"}, {"id": "l_market-structure_399", "theme": "market-structure", "teaching": "An expanding triangle is a series of progressively greater higher highs and lower lows that repeatedly trap breakout traders on both sides until all traders end up on the same side, creating a strong trend/reversal.", "quote": "The salient point is that it is a series of progressively greater higher highs and lower lows that continue to trap breakout traders, and at some point they capitulate and then all of the traders are on the same side, creating a trend.", "pages": "109", "book": "Reversals"}, {"id": "l_market-structure_400", "theme": "market-structure", "teaching": "All expanding triangles are variants of major trend reversals because the final reversal leg always follows a strong prior leg that breaks a significant trend line.", "quote": "All expanding triangles are variants of major trend reversals, because the final reversal always follows a strong leg.", "pages": "109", "book": "Reversals"}, {"id": "l_market-structure_401", "theme": "market-structure", "teaching": "Two-legged moves out of flags often set up a major reversal that typically has at least two legs itself; when a two-legged move is in a tight channel, the entire channel usually becomes the first leg of a larger pattern.", "quote": "Two-legged moves out of flags often set up a major reversal that typically has at least two legs. ... When the two-legged move is in a tight channel, the entire channel usually becomes the first leg.", "pages": "117", "book": "Reversals"}, {"id": "l_market-structure_402", "theme": "market-structure", "teaching": "Sideways trading ranges exert a 'magnetic pull' — most breakout attempts from a range fail and get drawn back into it, because bulls/bears adjust aggressiveness (both buy less/sell less as price nears their perceived extreme, and more aggressively near the opposite extreme), pulling price back to the middle.", "quote": "Any sideways trading has a magnetic pull. Since breakouts usually fail, the market usually gets drawn back into the range where both bulls and bears agree that there is value.", "pages": "112-113", "book": "Reversals"}, {"id": "l_market-structure_403", "theme": "market-structure", "teaching": "When the market tries twice to break out to a new extreme and fails both times (e.g., two failed attempts at a new high), it usually then trends in the opposite direction.", "quote": "When the market tries to do something twice and fails both times, it usually trends in the opposite direction.", "pages": "119", "book": "Reversals"}, {"id": "l_market-structure_404", "theme": "market-structure", "teaching": "Any single trend bar or series of trend bars technically constitutes a breakout, a spike, a gap, and a climax — these are just different lenses on the same underlying price action.", "quote": "Any trend bar or series of trend bars forms a breakout, a spike, a gap, and a climax.", "pages": "119", "book": "Reversals"}, {"id": "l_market-structure_405", "theme": "market-structure", "teaching": "When a breakout above (or below) a channel is followed by a strong reversal back into the channel, there is about a 50% chance the countertrend swing continues and breaks through the opposite side of the channel; failures of such breakouts, when they occur, typically resolve within about 5 bars.", "quote": "Whenever there is a breakout above a bull channel and then a strong reversal back into the channel, there is about a 50 percent chance that the bear swing will continue and break below the bottom of the bull channel... When a breakout is going to fail, it usually does so within about five bars of breaking above the channel.", "pages": "103", "book": "Reversals"}, {"id": "l_market-structure_406", "theme": "market-structure", "teaching": "A final flag is any flag near the end of a trend whose breakout goes against the trend, even if it never had a with-trend breakout attempt at all — the failure of a strong bull/bear spike to make a with-trend breakout is itself a bearish/bullish sign.", "quote": "That made the move from bar 20 to bar 22 the final flag of the bull trend, even though it never had a bull breakout.", "pages": "121", "book": "Reversals"}, {"id": "l_market-structure_407", "theme": "market-structure", "teaching": "Consecutive sell (buy) climaxes are opportunities to buy (sell); after two climaxes the strength of the momentum usually leads to a test of the low/high within a day or two.", "quote": "Traders look for consecutive sell climaxes as opportunities to buy.", "pages": "122", "book": "Reversals"}, {"id": "l_market-structure_408", "theme": "market-structure", "teaching": "A climax followed by a brief flag followed by a breakout of that flag is often strong enough to constitute another climax; consecutive climaxes tend to be followed by a reversal lasting about 10 bars with about two legs, and can be stronger at major support/resistance.", "quote": "Once there is a climax, then a brief flag, and then a breakout of that flag, the breakout is often strong enough to be another climax. Consecutive climaxes are prone to be followed by a reversal that can last about 10 bars and have about two legs.", "pages": "125", "book": "Reversals"}, {"id": "l_market-structure_409", "theme": "market-structure", "teaching": "Major trend reversals are more often followed by a trading range than by a trend in the opposite direction.", "quote": "Major trend reversals are more often followed by trading ranges instead of trends in the opposite direction.", "pages": "124", "book": "Reversals"}, {"id": "l_market-structure_410", "theme": "market-structure", "teaching": "Loose/subjective pattern definitions (triple bottoms/tops, triangles, wedges) are more useful for trading than strict tick-exact definitions, because arrogant rigid definitions cost money — 'when something resembles a reliable pattern, it will likely trade like the reliable pattern.'", "quote": "Traders will make much more money by using loose definitions. When something resembles a reliable pattern, it will likely trade like the reliable pattern.", "pages": "126", "book": "Reversals"}, {"id": "l_market-structure_411", "theme": "market-structure", "teaching": "It does not matter which named pattern (triple bottom, triangle, H&S, final flag, double bottom pullback) you think is 'more important' — as long as they're all pointing the same direction (all are buy or all are sell setups), the significance is the same.", "quote": "It does not matter what shape the three-push top takes because the significance is the same.", "pages": "126, 129", "book": "Reversals"}, {"id": "l_market-structure_412", "theme": "market-structure", "teaching": "A canonical checklist of common failures that flip into opposite-direction trades: failed high1/high2/low1/low2, failed breakout of any swing/trendline/channel line, failure to break through a magnet (measured move, prior swing, trend line), failed final flag, failed wedge, failed signal/entry bar, failed one-tick breakout, failed reversal pattern (double top/bottom, H&S), and failure to reach a profit target (5,9,17-tick ES / 11,51,99,101-cent stock failures).", "quote": "Here are some of the common failures that often lead to trades in the opposite direction: Failed high 1, high 2, low 1, or low 2...", "pages": "130", "book": "Reversals"}, {"id": "l_market-structure_413", "theme": "market-structure", "teaching": "One-tick failed breakouts are extremely common on the 5-minute ES chart specifically because they often resolve/extend on higher timeframes (a 5-min one-tick failure often just becomes a multi-bar pullback that later re-breaks on the 60-min chart, masking the failure at higher timeframes).", "quote": "A one-tick failed breakout on the 5 minute chart when it occurs in a trading range is often also a one-tick failed breakout on a higher time frame... That is because many of the one-tick failed breakouts pull back for many bars on the 5 minute chart and then break out again.", "pages": "131", "book": "Reversals"}, {"id": "l_market-structure_414", "theme": "market-structure", "teaching": "A huge trend bar with a tiny/no tail attracts protective stops just beyond its extreme; the market commonly works its way against the trend bar over the next 5-10 bars specifically to hit those stops before reversing back in the trend-bar's direction — sophisticated traders view the stop-hunt zone as a great counter-entry (i.e., a great short if it's a bull trend bar).", "quote": "It is common for the market to work its way down over the next five to 10 bars, hit the stops and trap traders out, and then reverse back up in the direction of the trend bar.", "pages": "131", "book": "Reversals"}, {"id": "l_market-structure_415", "theme": "market-structure", "teaching": "Comparable scalper-target failure dynamics occur in heavily-scalped instruments beyond the ES (SPY, QQQ, individual stocks with round-number profit targets like $1.00) — the mechanism (trapped scalpers exit and fuel the opposite move) generalizes across markets.", "quote": "There are comparable failures in other markets that have many scalpers, like the SPY and the QQQ.", "pages": "132", "book": "Reversals"}, {"id": "l_market-structure_416", "theme": "market-structure", "teaching": "In a trading range, experienced traders expect breakouts to fail and trade to fade them (sell strength, buy weakness); in a strong trend, they instead expect breakouts to succeed and trade with them (buy strength above range top, etc.) — the same breakout event is traded opposite ways depending on established context.", "quote": "Most breakout attempts fail, especially when the market is in a trading range... In a strong trend, they do the opposite. For example, if the market is in a bull trend, traders instead will buy on a stop above the top of the range, since they expect another leg up.", "pages": "133", "book": "Reversals"}, {"id": "l_market-structure_417", "theme": "market-structure", "teaching": "In two-sided volatile trading (big tails, overlapping bars after a climax), traders should default to treating the day as a trading range day until a trend clearly proves itself, and fade breakouts of swing highs/lows rather than trust them.", "quote": "Since this had not proven itself yet to be a bull trend day, it should have been traded as a trading range day.", "pages": "136", "book": "Reversals"}, {"id": "l_market-structure_418", "theme": "market-structure", "teaching": "Going above any prior swing high (even one that was part of the prior down-leg) is a sign of strength that draws in shorts' stops, breakout buyers, and new shorts — making it a good fade candidate on a trading-range day precisely because so many participants are drawn to trade there.", "quote": "going above any prior swing high is a sign of strength and a potential fade on a trading range day (look for breakouts to fail and signs of strength to lack follow-through)", "pages": "136", "book": "Reversals"}, {"id": "l_market-structure_419", "theme": "market-structure", "teaching": "Trading ranges that follow a strong prior move (rather than forming from scratch) are usually continuation patterns, so 'failed' countertrend attempts within them that align with the prior trend are often actually good trades, not true failures.", "quote": "trading ranges following a strong move... are usually continuation patterns", "pages": "139", "book": "Reversals"}, {"id": "l_market-structure_420", "theme": "market-structure", "teaching": "Outside bars are essentially one-bar trading ranges; entering on a breakout beyond both extremes of an outside bar carries excessive risk (stop must be at the opposite extreme, which is large), so traders should only rarely trade outside-bar breakouts and instead prefer treating a 2-bar reversal around an outside bar as a smaller, safer entry.", "quote": "outside bars are basically one-bar trading ranges, and most trading range breakout entries fail. You should only rarely enter on a breakout of an outside bar because the risk is too great.", "pages": "140", "book": "Reversals"}, {"id": "l_market-structure_421", "theme": "market-structure", "teaching": "A strong bull or bear trend has inertia and will resist reversal attempts; the stronger the established trend, the more aggressively counter-trend spikes should be faded (with the trend), not treated as reversal signals.", "quote": "When a bull trend is strong ... it has inertia and will resist attempts to end.", "pages": "144", "book": "Reversals"}, {"id": "l_market-structure_422", "theme": "market-structure", "teaching": "Bear spikes can occur without follow-through (\"failures\") and this failure to follow through is itself a sign of underlying trend strength, not weakness.", "quote": "Failures Can Sometimes Be a Sign of Strength", "pages": "144", "book": "Reversals"}, {"id": "l_market-structure_423", "theme": "market-structure", "teaching": "Huge volume alone (even 10-15x average) does not guarantee a reversal; climactic volume must be accompanied by genuinely bullish (or bearish) price action / a strong reversal bar to be tradable.", "quote": "climactic volume in the absence of bullish price action is no reason to fade a strong bear trend", "pages": "146", "book": "Reversals"}, {"id": "l_market-structure_424", "theme": "market-structure", "teaching": "On a 1-minute chart in a strong bear trend, a single huge-volume bar (~25,000 contracts) is unlikely to mark the end of the trend; it more often signals a coming pullback after one or two further lower lows on declining (divergent) volume.", "quote": "if there is a huge volume bar (about 25,000 contracts), it is unlikely to be the end of the bear trend, but often is a sign that a pullback will come soon", "pages": "148", "book": "Reversals"}, {"id": "l_market-structure_425", "theme": "market-structure", "teaching": "Volume should rarely if ever be used on intraday charts because it has unreliable predictive value there; the 5-minute chart should be the trader's main chart.", "quote": "You should rarely if ever look at volume on intraday charts because of its unreliable predictive value on the 5 minute chart", "pages": "148", "book": "Reversals"}, {"id": "l_market-structure_426", "theme": "market-structure", "teaching": "Prefer trading liquid, institutionally-popular stocks/futures to minimize slippage and the chance of manipulation by a specialist or market maker.", "quote": "It is best to trade stocks that are popular with institutions, because you want to reduce the chance of manipulation ... and you want minimal slippage.", "pages": "150", "book": "Reversals"}, {"id": "l_market-structure_427", "theme": "market-structure", "teaching": "The middle third of the day (roughly 8:30-11:00/11:30 a.m. PST) tends toward two-sided trading ranges/channels, which is a terrible environment for stop entries; the smart-money approach there mirrors institutional buy-low/sell-high scalping via limit orders.", "quote": "The middle third of the day ... is more prone to two-sided trading, like trading ranges or channels. This is a terrible environment for entering on stops.", "pages": "151", "book": "Reversals"}, {"id": "l_market-structure_428", "theme": "market-structure", "teaching": "The day's price action often forms a trend-resumption pattern across its three thirds (e.g., up-down-up or down-up-down), though the pattern is not always obvious.", "quote": "The three periods of the day often create a trend resumption pattern.", "pages": "152", "book": "Reversals"}, {"id": "l_market-structure_429", "theme": "market-structure", "teaching": "The market often makes a notable directional move around 11:15-11:30 a.m. PST as institutions begin their final trading of the day; this move can be either a trend resumption or a fresh breakout/reversal.", "quote": "traders know that the market often makes some move around 11:30 a.m. that will often carry into the close of the day. The move can be a reversal, but it can also be a breakout.", "pages": "152", "book": "Reversals"}, {"id": "l_market-structure_430", "theme": "market-structure", "teaching": "Most reversal days begin their session as trending trading range days before the actual directional break/reversal occurs.", "quote": "Remember, most reversal days begin as trending trading range days.", "pages": "153", "book": "Reversals"}, {"id": "l_market-structure_431", "theme": "market-structure", "teaching": "Different timeframes can show opposing trends simultaneously (e.g., bull on the daily chart vs. bear on the 1-minute); a trader should not try to reconcile all timeframes, but pick one timeframe and trade the price action in front of them.", "quote": "It is too confusing to try to reconcile all of this, and it is a waste of time to wait for all time frames to be going in the same direction ... Just pick one time frame, and trade the price action that is in front of you.", "pages": "156", "book": "Reversals"}, {"id": "l_market-structure_432", "theme": "market-structure", "teaching": "All chart construction methods (time, tick, volume bars) are simply different portrayals of the same underlying human behavior and are equally tradable; what matters is a trader's ability to read and manage trades in real time, not the chart type chosen.", "quote": "What takes place on all of the charts is just an expression of our genes, and it does not matter which portrayal of that expression you use. All charts show the same behavior.", "pages": "157-158", "book": "Reversals"}, {"id": "l_market-structure_433", "theme": "market-structure", "teaching": "On trading-range days, the strongest bear (or bull) spikes often occur right near the low (high) of the range because of a 'sell vacuum' — strong bulls stop buying in anticipation of a test of the low, creating an imbalance that produces a sharp, misleading spike that should be faded rather than chased as a fresh trend.", "quote": "On trading range days, the strongest bear spikes often form near the low of the day because of a sell vacuum... Instead of looking for shorts, they would look to buy the failed breakout attempt.", "pages": "166", "book": "Reversals"}, {"id": "l_market-structure_434", "theme": "market-structure", "teaching": "Reducing time-frame resolution (using a 15-minute or 10,000-tick chart instead of 5-minute) sharply cuts the number of always-in decisions a trader must make per day while still capturing enough signals to make a living, at the cost of needing wider stops and correspondingly smaller position size.", "quote": "A 5 minute chart... has 81 bars and more than 20 reversals on most days. Traders who are uncomfortable making that many decisions about the always-in direction can reduce the number of decisions by reducing the number of bars on the chart... Since the bars are bigger, stops have to be larger to give the trade a chance to work.", "pages": "170", "book": "Reversals"}, {"id": "l_market-structure_435", "theme": "market-structure", "teaching": "Postmarket moves around earnings reports are usually too fast to read and place orders correctly, have large stop slippage, big pullbacks, and reversals — most traders should not attempt to trade them despite their apparent profit potential.", "quote": "these moves are very difficult to scalp and most traders should not attempt it. The moves are frequently too fast to read and allow proper order placement, have big slippage on stop entries, have pullbacks that are large, and have reversals.", "pages": "162", "book": "Reversals"}, {"id": "l_market-structure_436", "theme": "market-structure", "teaching": "Day-session trend lines/channel lines extending over two or more days are considered more reliable than Globex (24-hour) lines; the day session chart alone is usually adequate for day trading signals, though many use Globex throughout the day too.", "quote": "I prefer the day session chart, since trend lines and trend channel lines that extend over two or more days are very reliable on the day session charts, and important to my trading.", "pages": "162", "book": "Reversals"}, {"id": "l_market-structure_437", "theme": "market-structure", "teaching": "Countertrend fades of a strong trend should only be attempted after there has first been a trend-line break, and in a strong trend a countertrend reversal needs confirmation on a larger time frame (e.g., 5-minute, not 1- or 3-minute) bar.", "quote": "Fade a strong trend only if there was first a trend line break. Also, a countertrend trade in a strong trend needs a 5 minute (not a 3 or 1 minute) reversal bar.", "pages": "163", "book": "Reversals"}, {"id": "l_market-structure_438", "theme": "market-structure", "teaching": "After a bear channel overshoots its channel line and reverses up, that reversal usually leads to at least a two-legged rally back through the top of the channel — a general rule for post-channel-break behavior.", "quote": "When a bear channel breaks to the downside and reverses up, it usually leads to at least a two-legged rally that goes through the top of the channel.", "pages": "161", "book": "Reversals"}, {"id": "l_market-structure_439", "theme": "market-structure", "teaching": "A wedge bottom (three pushes down / triple bottom / triangle) typically leads to two legs up, but traders must be prepared to hold through the pullback after the first leg to realize the profit.", "quote": "A wedge bottom (or three pushes down, or any of many other names for this pattern) usually leads to two legs up.", "pages": "163", "book": "Reversals"}, {"id": "l_market-structure_440", "theme": "market-structure", "teaching": "Consecutive buy (or sell) climaxes are usually followed by a larger sideways-to-down (or up) correction; if the bulls/bears are so aggressive that they place limit orders above/below the moving average rather than waiting to touch it, that itself is a sign of a very strong trend.", "quote": "Bars 9 and 10 were also large bull trend bars, but as such they were buy climaxes, and consecutive buy climaxes are usually soon followed by a larger sideways to down correction... the bulls were so aggressive that they had buy limit orders several ticks above the moving average... This is a sign of a very strong bull market.", "pages": "171", "book": "Reversals"}, {"id": "l_market-structure_441", "theme": "market-structure", "teaching": "A magnet price level (e.g., moving average, prior swing) is not considered a completed test by most traders until price actually touches it, even by a single tick — getting close is not enough to trigger confident with-trend entries.", "quote": "When the market gets within a tick or so of a magnet, traders do not feel confident about the test unless the market gets that extra tick and actually touches the magnet.", "pages": "178", "book": "Reversals"}, {"id": "l_market-structure_442", "theme": "market-structure", "teaching": "The high or low of the day forms within roughly the first 90 minutes of the session on about 90% of days, so every plausible early reversal attempt (especially a sell/buy climax in that window) should be treated as a serious candidate for the extreme of the day.", "quote": "since the high or low of the day forms in the first 90 minutes or so in about 90 percent of days, traders had to look at every possible early reversal as a possible extreme of the day.", "pages": "177", "book": "Reversals"}, {"id": "l_market-structure_443", "theme": "market-structure", "teaching": "A large trend bar occurring after an established trend has run for a while carries elevated odds of representing exhaustion (a climax) rather than simple continuation strength — the last weak with-trend traders pile in and the last weak counter-trend traders capitulate right at that bar's close.", "quote": "Whenever there is a large bull trend bar after a bull trend has gone on for a while, the odds favor it representing exhaustion, with the last weak bulls buying, the last weak shorts covering, and the strong bulls and bears waiting for the close of a large bull trend bar like this to sell.", "pages": "179", "book": "Reversals"}, {"id": "l_market-structure_444", "theme": "market-structure", "teaching": "The first hour (opening range) is simultaneously the easiest time to make money (because reversals are common and reliable to fade) and the easiest time to lose money (because beginners chase large trend bars late, at spike extremes, and there are more variables to process quickly).", "quote": "It is the easiest time to make money... It is the easiest time to lose money. Beginners see large trend bars and are afraid of missing a huge breakout. They buy late, at the top of strong bull spikes, and short late, at the bottom of strong bear spikes, only to take repeated losses.", "pages": "183", "book": "Reversals"}, {"id": "l_market-structure_445", "theme": "market-structure", "teaching": "Yesterday's always-in direction going into the close often carries over into today's open.", "quote": "Yesterday's always-in direction going into the close often carries over into the open of today.", "pages": "183", "book": "Reversals"}, {"id": "l_market-structure_446", "theme": "market-structure", "teaching": "The first bar of the day is the high or low of the day only about 20% of the time, so there is no need to rush into a trade on the second bar; waiting for the always-in direction to clarify raises the probability of a successful trade.", "quote": "The first bar of the day is the high or low of the day only about 20 percent of the time, so don't feel a need to enter on the second bar. In fact, there is no need to rush to take any trade, because before long the always-in direction will be clear, and the probability of a successful trade will be higher.", "pages": "183", "book": "Reversals"}, {"id": "l_market-structure_447", "theme": "market-structure", "teaching": "A bull channel functions as a bear flag and a bear channel functions as a bull flag; traders should watch for either a reversal or a continuation breakout off any channel from the prior day at today's open.", "quote": "Remember, a channel is just a flag, so a bull channel is a bear flag and a bear channel is a bull flag. Also, if the market ended clearly always-in long or short, traders should assume that the trend will continue on the open until they see evidence to the contrary.", "pages": "186", "book": "Reversals"}, {"id": "l_market-structure_448", "theme": "market-structure", "teaching": "The character of the opening bars often foreshadows the type of day: a doji in the middle of a tight range with a flat moving average favors a trading-range day; a trend bar with prominent tails suggests a one-bar trading range likely to fail on its first breakout attempt; a large gap with trend for the first four bars favors a genuine trend day.", "quote": "If it is a doji in the middle of a tight trading range from the final hour of yesterday and the moving average is flat, the odds favor a trading range day. If the bar is a trend bar but has prominent tails, it is a one-bar trading range... If there is a large gap opening and the market trends for the first four bars, the odds of a trend day are good.", "pages": "189", "book": "Reversals"}, {"id": "l_market-structure_449", "theme": "market-structure", "teaching": "Institutional order flow explains why the market frequently opens away from an institution's true buy/sell zone and then reverses sharply into it: institutions wait for a 'vacuum' sell-off (or rally) that pushes price into their value area before aggressively filling orders, creating the high or low of the day.", "quote": "The lack of buying by the bullish institutions creates a sell vacuum that can quickly suck the market down into their buy zone, which is always at an area of support, where they will buy aggressively and relentlessly, often creating the low of the day.", "pages": "187", "book": "Reversals"}, {"id": "l_market-structure_450", "theme": "market-structure", "teaching": "About 70% of all trading is now automated/algorithmic, ranging from simple statistical rules to complex fundamental/news-driven systems (e.g., Dow Jones Lexicon); computers have an overwhelming speed advantage immediately around reports, so don't compete on speed — wait for that edge to fade.", "quote": "About 70 percent of all trading is automated, and this computer-generated buying and selling will become increasingly important... When your opponent has the edge of speed, don't compete. Wait for their edge to disappear and trade when speed is no longer important.", "pages": "184, 188", "book": "Reversals"}, {"id": "l_market-structure_451", "theme": "market-structure", "teaching": "The 5-minute chart is the easiest and most reliable timeframe; the 3-minute chart trades well (especially in the first hour) but produces more losing trades, so traders who prioritize win rate and lower emotional cost should stick to 5-minute.", "quote": "Although the 5 minute chart is the easiest to read and the most reliable, the 3 minute chart trades well, particularly in the first hour. However, it is prone to more losers, and if you like the highest winning percentage and don't want the negative emotion that comes from losing, you should stick to trading the 5 minute chart.", "pages": "189", "book": "Reversals"}, {"id": "l_market-structure_452", "theme": "market-structure", "teaching": "The 15-minute bar close falls on the third 5-minute bar; a breakout of that third bar can carry extra significance because it also represents a 15-minute-chart breakout, but it should not be traded in isolation — only in confluence with other supporting price action.", "quote": "The first 15 minute bar closes at the close of the third 5 minute bar and therefore activity around this third bar will influence the appearance of the first 15 minute bar... Do not place a trade on the third bar alone on most days, but be aware of its extra significance.", "pages": "189", "book": "Reversals"}, {"id": "l_market-structure_453", "theme": "market-structure", "teaching": "When a market gaps and the day-session moving average briefly conflicts with the (nearly 24-hour) Globex moving average, favor momentum/actual price action over the day-session moving average during the first 30-90 minutes, since the day-session average can be temporarily unreliable after a large gap.", "quote": "If you look at only the day session and see a large gap and the market is trending strongly to close off the open, look at the momentum and not the moving average, since the momentum is a reflection of the actual price action that is taking place... Traders who watch only the day session have to be aware that the moving average is often unreliable for the first hour or so.", "pages": "194", "book": "Reversals"}, {"id": "l_market-structure_454", "theme": "market-structure", "teaching": "Opening reversals are driven by institutional order-imbalance 'vacuum' effects: if institutions expect a better fill soon, they withhold orders and let price get 'sucked' quickly to a support/resistance level before they act in size, producing a sharp reversal.", "quote": "This creates a sell vacuum, and the market can move down quickly since the institutional bulls are simply waiting to buy at a more favorable price...This is the vacuum effect; the market got sucked down quickly to a level where there were lots of strong buyers waiting.", "pages": "204", "book": "Reversals"}, {"id": "l_market-structure_455", "theme": "market-structure", "teaching": "The high or low of the day usually comes from some type of double top or double bottom (the two tops/bottoms are often not at exactly the same price), and it typically forms within the first hour or two of trading.", "quote": "The high of the day usually comes from some kind of double top, even though the two highs are often not at the same price, and the low of the day usually comes from a double bottom...Either the high or the low forms within the first five bars or so in 50 percent of days, and it forms within the first hour or two in 90 percent of days.", "pages": "204", "book": "Reversals"}, {"id": "l_market-structure_456", "theme": "market-structure", "teaching": "The size of the opening range relative to the recent average daily range is a strong predictive signal for how the rest of the day will unfold (small range -> breakout/trend from open; medium range -> trend day with measured-move breakout; large range/large gap -> spike-and-channel trend or climactic reversal).", "quote": "The opening range often gives clues to how the day will unfold, provides support and resistance for the rest of the day, and leads to measured move projections.", "pages": "205-207", "book": "Reversals"}, {"id": "l_market-structure_457", "theme": "market-structure", "teaching": "The most common way a reversal day forms is: breakout of the opening range roughly to a measured move, a later test/retracement of the breakout point, and then a strong reversal back through and beyond the opening range that closes on the opposite side.", "quote": "It will usually come back and test the breakout point later in the day, and it often then breaks back into the earlier range. If the reversal back into the opening range is strong and the market closes at the opposite side of that earlier range, the day becomes a reversal day. This is in fact the most common way that reversal days form.", "pages": "206", "book": "Reversals"}, {"id": "l_market-structure_458", "theme": "market-structure", "teaching": "A bear (bull) channel is functionally a bull (bear) flag — its eventual breakout in the opposite direction should be treated as a with-trend breakout-pullback setup, not fought.", "quote": "A bear channel is a bull flag, and a breakout above it on the open is often followed by a breakout pullback buy signal.", "pages": "201-202, 210", "book": "Reversals"}, {"id": "l_market-structure_459", "theme": "market-structure", "teaching": "Patterns and levels from the prior day (its channel, trend line, high/low, close) almost always influence price action in the first hour of the new day.", "quote": "Patterns from the prior day almost always influence the first hour.", "pages": "201-203", "book": "Reversals"}, {"id": "l_market-structure_460", "theme": "market-structure", "teaching": "The character of the first bar and first hour is diagnostic: a doji first bar inside yesterday's closing range raises trading-range-day odds; a large gap with a 3-4 bar spike of large-body/small-tail trend bars raises trend-day odds.", "quote": "If the first bar is a doji bar in the middle of yesterday's closing range, then the bar is a one-bar trading range, and the odds of a trading range day are increased...if there is a gap up or down and then a three- or four-bar bear spike within the first hour and the trend bars are large with little overlap and only small tails, the odds of a bear trend day increase.", "pages": "205, 217", "book": "Reversals"}, {"id": "l_market-structure_461", "theme": "market-structure", "teaching": "A gap opening should conceptually be treated as one single, invisible large trend bar (a spike); what follows it (channel, reversal, trading range) should be read the same way any spike is read.", "quote": "The gap should be looked at as if it is one huge, invisible trend bar.", "pages": "214, 216", "book": "Reversals"}, {"id": "l_market-structure_462", "theme": "market-structure", "teaching": "The market has a statistical tendency to reverse a breakout of the prior day's high or low, which raises the odds that such a breakout will fail and become a final flag rather than continue.", "quote": "The market often reverses a breakout of the high or low of the prior day. This tendency increased the odds that the barbwire would become a final flag.", "pages": "213", "book": "Reversals"}, {"id": "l_market-structure_463", "theme": "market-structure", "teaching": "The 'opening range' concept shouldn't be limited to the first hour or two on the clock — a new trend can legitimately begin or a key reversal can occur around 8:30 a.m. PST (a common economic-release time), and traders should be ready for it regardless of how they label it.", "quote": "Although most traders think of the opening range as lasting only an hour or two, the market often begins a trend around 8:30 a.m. PST, as it did here...What is important is that a trend often begins or reverses around 8:30 a.m.", "pages": "211", "book": "Reversals"}, {"id": "l_market-structure_464", "theme": "market-structure", "teaching": "Shorting below a bear-bodied bar at the top of a trading range is a more reliable short entry than shorting below a bull-bodied bar in the same location, because a bull bar leaves more risk that the range could still break the other way.", "quote": "It was safer to short below the bear bar that followed bar 3 rather than shorting below the bar 3 bull trend bar, because there was too much risk that the market might go sideways and then make another attempt to break out above the bars 1 and 2 double top. Shorting below a bear bar at the top of a trading range is more reliable than shorting below a bull trend bar.", "pages": "211", "book": "Reversals"}, {"id": "l_market-structure_465", "theme": "market-structure", "teaching": "On a strong with-trend spike, the first pullback that returns to the very start of the spike (the original entry point) often triggers a wave of breakeven/profitable exits, since early entrants scaled in along the move and become willing sellers exactly at their first fill.", "quote": "The bear spike and channel formation was likely to retrace to around the bar 3 start of the channel, which it did. Longs often take profits there. This is the area where some started to scale in, and once the market gets back to their very first entry, they often exit their entire position.", "pages": "219-220", "book": "Reversals"}, {"id": "l_market-structure_466", "theme": "market-structure", "teaching": "The market is fundamentally one-dimensional (price only); all chart embellishments (color, volume-width, indicators) just add visual dimensions to something that is intrinsically simple: it moves up or down searching for the best current price.", "quote": "The market itself is one-dimensional...The recurring theme of these books is that the market is basically simple.", "pages": "245", "book": "Reversals"}, {"id": "l_market-structure_467", "theme": "market-structure", "teaching": "Every trading range is an area of agreement the market is trying to break out of into a trend (disagreement), and every breakout attempt is met by opposite-belief traders trying to make it fail — this dynamic repeats fractally on every time frame and bar count.", "quote": "The market always trying to break out from a trading range...into a trend...Every breakout attempt is met by traders holding the opposite belief, and they will try to make the breakout fail...This is true on every time frame and on every bar and series of bars.", "pages": "245", "book": "Reversals"}, {"id": "l_market-structure_468", "theme": "market-structure", "teaching": "A trading range is simply a pullback viewed on a higher time frame chart; a steep spike-and-channel on the 5-minute chart is just a simple spike on the 15- or 60-minute chart.", "quote": "Traders realize that a trading range is simply a pullback on a higher time frame chart...The trading range on the 5 minute chart is usually just a pullback on a 15 or 60 minute chart.", "pages": "245", "book": "Reversals"}, {"id": "l_market-structure_469", "theme": "market-structure", "teaching": "The overall market process is a fractal, repeating cycle: trend -> channel -> trading range -> breakout (success or failure) -> new trend, happening continuously on every time frame.", "quote": "If there is a successful breakout of the top of the entire trading range, the process starts all over again...This same process happens all day long in every market and on every time frame.", "pages": "245-246", "book": "Reversals"}, {"id": "l_market-structure_470", "theme": "market-structure", "teaching": "The best trading choices for a beginner are trends developing in the opening range, strong trend reversals, and pullbacks in strong trends.", "quote": "The best choices for a trader starting out are trends that develop in the opening range, strong trend reversals, and pullbacks in strong trends.", "pages": "247", "book": "Reversals"}, {"id": "l_market-structure_471", "theme": "market-structure", "teaching": "A 5-minute chart of any major market typically offers between five and 10 truly 'best' trades a day; focusing on a single market/timeframe and mastering spotting those best setups beats chasing hundreds of setups across many markets and timeframes.", "quote": "The 5 minute chart of any major market has between five and 10 best trades a day, traders stand a better chance of consistently making money in the long term if they just focus on a single market and time frame.", "pages": "249", "book": "Reversals"}, {"id": "l_market-structure_472", "theme": "market-structure", "teaching": "The market alternates between certainty it's mispriced (trending, searching for agreement) and being in an area of agreement waiting for the next disagreement (breakout); the math favors breakout success about half the time and failure-and-reversal the other half — the trader's job is assessing which side has enough edge.", "quote": "The math favors the breakout in about half of the cases, and the failed breakout and reversal in the other half. The key to trading is being able to assess if one side has enough of an edge to create a positive trader's equation.", "pages": "249", "book": "Reversals"}, {"id": "l_market-structure_473", "theme": "market-structure", "teaching": "Markets have inertia: about 80% of attempted trend reversals fail and instead become flags (continuation patterns) — a pullback in a trend is essentially a failed reversal attempt. This is why pullback-trading is the dominant, most reliable strategy among successful traders.", "quote": "The market has inertia, and as such, when it is trending, about 80 percent of attempted trend reversals fail to reverse the trend and become flags (continuation patterns)...Therefore, trading pullbacks is a reliable approach to trading, and it is the approach used most by the majority of successful traders.", "pages": "254", "book": "Reversals"}, {"id": "l_market-structure_474", "theme": "market-structure", "teaching": "When it's unclear whether the market is trending or ranging, entering on pullbacks from strong spikes works in both regimes and is therefore the single best general-purpose approach for most traders.", "quote": "When traders cannot tell if the market is in a trend or in a trading range, they should look to enter on pullbacks from strong spikes, which is an approach that works well in both trends and trading ranges and is why it is the best approach for most traders.", "pages": "254", "book": "Reversals"}, {"id": "l_market-structure_475", "theme": "market-structure", "teaching": "The market spends most of its time in the middle of a range, where probability of most trades sits near 50%; when the market reaches an extreme it typically does so via a strong-looking spike that convinces most traders a breakout is imminent, but the probability is 60-80% it reverses and tests the opposite side.", "quote": "The market spends most of its time in the middle of the range where the probability of most trades is about 50 percent, and when it is at the top or bottom, it usually gets there in a strong spike...the probability is 60 to 80 percent that the market will soon reverse and test the opposite end of the range.", "pages": "255", "book": "Reversals"}, {"id": "l_market-structure_476", "theme": "market-structure", "teaching": "Channels are inherently hard to trade because a stop-entry trader in a bull channel is always being forced to buy at local tops; tight channels rarely offer best trades — wait for the bear breakout of a tight bull channel and assess breakout strength before acting, or wait for broader-swing channels which do create legitimate pullback setups.", "quote": "A bull channel is always forcing traders to buy at the top...A bull channel is a weak bull trend...and the trader's equation is rarely better than marginal when buying at the top of a weak bull trend...When it is tight, most traders should wait for the bear breakout of the bull channel, and then assess the strength of the breakout.", "pages": "256", "book": "Reversals"}, {"id": "l_market-structure_477", "theme": "market-structure", "teaching": "On any 5-minute chart there are often ~15 setups a day where a stop entry would net 2 points, and another 20-30 where a limit entry would net 2 points — but most happen too fast or unclear to trade; a trader cannot and should not try to take 40 trades a day; realistically expect 3-5 genuinely tradable best setups.", "quote": "There are often 15 trades where a stop entry order would result in a two-point profit and another 20 to 30 where a limit order would result in a two-point profit, but the majority of these happen too quickly or are unclear...A trader should not try to take 40 trades a day.", "pages": "257", "book": "Reversals"}, {"id": "l_market-structure_478", "theme": "market-structure", "teaching": "The market perpetually tries to keep probability near 50% because there must always be an institutional counterparty willing to take the other side of any trade, and no counterparty wants to offer you a 60% edge — yet the market cannot perfectly contain probabilities, so genuine 60% edges do appear.", "quote": "The market is always trying to keep the probability around 50 percent, because then the bulls and bears are balanced...However, it is unable to contain the probabilities perfectly, and they often reach 60 percent, giving traders a strong trader's equation.", "pages": "259", "book": "Reversals"}, {"id": "l_market-structure_479", "theme": "market-structure", "teaching": "A gap bar within an established bear trend often leads to a test of the prior bear low, followed by a bounce with roughly ten bars and two legs as minimum objectives — a useful sizing heuristic for reversal-attempt trades after a gap.", "quote": "Bar 4 was a gap bar in a bear trend, and that often leads to a test of the bear low (bar 2, as this point) and then a rally that has about ten bars and two legs as minimum objectives.", "pages": "259", "book": "Reversals"}, {"id": "l_market-structure_480", "theme": "market-structure", "teaching": "Buy climaxes are cumulative — a huge trend bar after a long run (10-20+ bars) usually represents exhaustion (late weak longs buying, last weak shorts covering), and consecutive buy/sell climaxes are usually followed by at least a two-legged correction.", "quote": "Whenever there is a trend of 10 or 20 or more bars and it then has a huge bull trend bar, the bar often represents exhaustion. ... Consecutive buy climaxes are usually followed by at least a two-legged correction.", "pages": "267,276", "book": "Reversals"}, {"id": "l_market-structure_481", "theme": "market-structure", "teaching": "When the market tries to break through a level twice and fails both times, it usually then tries to move in the opposite direction.", "quote": "When the market tries to do something twice and fails both times, it usually then tries to go in the opposite direction.", "pages": "267", "book": "Reversals"}, {"id": "l_market-structure_482", "theme": "market-structure", "teaching": "Buying pressure or selling pressure is cumulative across many bars with small bodies/tails — eventually it can wear down the opposing side and flip control of the market, even without one dramatic reversal bar.", "quote": "Those large bull trend bars with small tails signify that the bulls are willing to buy. That buying pressure is cumulative and, at some point, it can wear down the bears enough so that the bulls can take control of the market.", "pages": "269", "book": "Reversals"}, {"id": "l_market-structure_483", "theme": "market-structure", "teaching": "A sharp rally straight to the top of a trading range is often just a buy vacuum (an inertial move testing the range top) rather than the start of a new trend; markets in trading ranges see most breakout attempts fail, so shorting only makes sense once price actually reaches the range extreme, not before.", "quote": "A sharp rally to the top of a trading range is usually due to a buy vacuum instead of a new trend. The market has inertia, and when it is in a trading range, most attempts to break out fail.", "pages": "273", "book": "Reversals"}, {"id": "l_market-structure_484", "theme": "market-structure", "teaching": "On a small-pullback bear (or bull) trend day, the first rally (or dip) to the moving average usually fails, and the market then re-tests the trend's extreme — don't assume the market 'has gone too far' and is due for a reversal.", "quote": "On small pullback bear trend days like this, the first rally to the moving average usually fails and then the market tests the low. Don't convince yourself that the market has gone too far and is due for a rally.", "pages": "265", "book": "Reversals"}, {"id": "l_market-structure_485", "theme": "market-structure", "teaching": "Every type of first pullback in a trend is usually followed by a test of the trend's extreme (e.g., the low of the day in a bear trend).", "quote": "Every type of first pullback is usually followed by a test of the trend's extreme (here, the low of the day).", "pages": "265", "book": "Reversals"}, {"id": "l_market-structure_486", "theme": "market-structure", "teaching": "In a strong trend, you don't need a strong setup to enter profitably — you can buy (or sell) at the market almost anywhere and make money; the value of waiting for a proper setup (like a high 2) is that it lets you use a much tighter, better-defined stop.", "quote": "In a strong bull trend, you do not need strong setups to buy. You can buy at the market anywhere and make money, but setups allow you to use tighter stops.", "pages": "261", "book": "Reversals"}, {"id": "l_market-structure_487", "theme": "market-structure", "teaching": "General rule: buy low and sell high most of the time — except in a strong trend, where the correct approach flips to buying high and exiting higher (bull) or selling low and exiting lower (bear).", "quote": "In general, always look to buy low and sell high, except in a strong trend where you buy high and exit higher in a bull trend or sell low and exit lower in a bear trend.", "pages": "267", "book": "Reversals"}, {"id": "l_market-structure_488", "theme": "market-structure", "teaching": "Nothing in price action is perfectly clear — everything is read through a 'gray fog' of ambiguity; if a pattern looks close enough to a reliable one, treat it as reliable rather than waiting for textbook perfection.", "quote": "Everything that you see is in a gray fog. Nothing is perfectly clear. Close is close enough. If something looks like a reliable pattern, it will likely trade like a reliable pattern.", "pages": "280", "book": "Reversals"}, {"id": "l_market-structure_489", "theme": "market-structure", "teaching": "The single most important determination a trader makes after every bar closes is whether there will be more buyers or sellers above and below the prior bar's extremes — this especially governs whether breakouts and failed breakouts will determine the always-in direction for many points, not just a scalp.", "quote": "The single most important determination that a trader makes, and he makes this after the close of every bar, is whether there will be more buyers or sellers above and below the prior bar.", "pages": "280", "book": "Reversals"}, {"id": "l_market-structure_490", "theme": "market-structure", "teaching": "Every stop entry has a counterparty taking the opposite side with a limit order — remind yourself the edge is always small because smart participants believe the opposite of your read.", "quote": "Every time you buy above the high of the prior bar on a stop, someone else is shorting there with a limit order. ... Always remember that nothing is certain, and the edge is always small because there are smart people who believe the exact opposite of what you do.", "pages": "280", "book": "Reversals"}, {"id": "l_market-structure_491", "theme": "market-structure", "teaching": "The market has inertia and tends to continue doing what it has been doing: in a trend, ~80% of reversal attempts fail and become a flag then trend resumption; in a trading range, ~80% of breakout attempts fail.", "quote": "If it is in a trend, 80 percent of the attempts to reverse it will fail and lead to a flag and then a resumption of the trend.", "pages": "281", "book": "Reversals"}, {"id": "l_market-structure_492", "theme": "market-structure", "teaching": "Price is truth; fundamentals and outside experts are nearly useless for a day trader because the market is rarely more than 60% certain of anything, so anyone speaking with certainty is ignoring the math.", "quote": "Price is truth. Never argue with what the market is telling you.", "pages": "281", "book": "Reversals"}, {"id": "l_market-structure_493", "theme": "market-structure", "teaching": "Price action reflects human behavior (genetic basis), which is why it works across all markets, countries, and time frames, and has always worked.", "quote": "Price action is based on human behavior and therefore has a genetic basis.", "pages": "282", "book": "Reversals"}, {"id": "l_market-structure_494", "theme": "market-structure", "teaching": "The market is never certain it has gone far enough but is always certain when it has gone too far; most reversals require some excess/overshoot before traders believe the reversal will work, because market inertia can only be stopped by excess.", "quote": "Market inertia can be stopped only by excess.", "pages": "282", "book": "Reversals"}, {"id": "l_market-structure_495", "theme": "market-structure", "teaching": "Being early is always worse than being late: since most reversals and breakouts fail, an early entry likely fails; since most trends run a long way, a late with-trend entry is usually still good.", "quote": "Too early is always worse than too late.", "pages": "282", "book": "Reversals"}, {"id": "l_market-structure_496", "theme": "market-structure", "teaching": "A spike and a wedge (or spike and channel) pattern usually has two more pushes in the trend direction before a meaningful correction; a strong climactic spike (largest trend bar/two-bar spike after a long trend) signals possible exhaustion and a likely two-legged reversal of at least 10 bars.", "quote": "Spike and wedge patterns usually have two more pushes up before a correction down, as this one did", "pages": "221", "book": "Reversals"}, {"id": "l_market-structure_497", "theme": "market-structure", "teaching": "A large bear (or bull) trend bar into a reversal traps late traders on the wrong side and traps weak traders out of the right side, fueling the reversal.", "quote": "The large bear trend bar trapped bears into shorts and trapped weak bulls out of longs", "pages": "221", "book": "Reversals"}, {"id": "l_market-structure_498", "theme": "market-structure", "teaching": "A doji trading range right after a spike is a bad entry in the spike's direction because there is too much risk of sideways-to-opposite price action.", "quote": "Bar 2 was a doji trading range after the bar 1 spike up and therefore a bad buy setup. There was too much risk of more sideways to down price actio

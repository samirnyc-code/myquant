nd about three or more ticks beyond the trading range.", "pages": "169", "book": "Reading Price Charts"}, {"id": "l_barbwire_19", "theme": "barbwire", "teaching": "The cardinal rule for Barb Wire: never enter on the breakout itself; always look to fade, especially small bars near the top/bottom of the range, and prefer stop entries (with momentum) over limit entries against momentum for psychological/stress reasons even when a limit fade is logically sound.", "quote": "The cardinal rule for trading in Bar Wire is never enter on a breakout. Instead, always be looking to fade...It is preferable to miss a few signals than to experience the anxiety that comes from trading outside of your comfort zone.", "pages": "171-172", "book": "Reading Price Charts"}, {"id": "l_barbwire_20", "theme": "barbwire", "teaching": "Barb Wire/protracted TTR at an extreme of the day after a breakout usually becomes a continuation pattern (With Trend), often resolving via a false breakout that quickly fails (Failed Failure).", "quote": "When Barb Wire or a protracted Tight Trading Range forms at an extreme of the day after a breakout, it often becomes a continuation pattern.", "pages": "172", "book": "Reading Price Charts"}, {"id": "l_barbwire_21", "theme": "barbwire", "teaching": "Barb Wire (three or more overlapping bars, at least one a doji) is usually a continuation pattern; never buy at its high or sell at its low — instead fade small bars at its extremes and wait for a trend-bar breakout of the pattern to fail before entering with the fade.", "quote": "this is Barb Wire, which is usually a continuation pattern, and you should never buy at its high or sell at its low. You fade small bars at its extremes, and you wait for a trend bar breakout to fail.", "pages": "226, 239", "book": "Reading Price Charts"}, {"id": "l_barbwire_22", "theme": "barbwire", "teaching": "Barb Wire is the single most important trade type to avoid, especially when it sits mid-range, near the EMA, on the wrong side of the EMA, on a day that is not clearly and strongly trending.", "quote": "The single most important trade to avoid until you are a skilled, profitable trader is Barb Wire, especially when it is in the middle of the day's range, near the EMA and on the wrong side of the EMA, and the day is not a clear and strong trend day.", "pages": "353", "book": "Reading Price Charts"}, {"id": "l_barbwire_23", "theme": "barbwire", "teaching": "Tight Trading Ranges should be avoided by all but very experienced traders, and even most experienced traders should still look elsewhere.", "quote": "only very experienced traders should be considering trades in Tight Trading Ranges and even most of them would look elsewhere. Do not trade here!", "pages": "374", "book": "Reading Price Charts"}, {"id": "l_barbwire_24", "theme": "barbwire", "teaching": "Barbwire is a tight trading range of three-plus largely overlapping bars, at least one a doji, with prominent tails and often relatively large bars — a chop signature to be recognized and generally avoided for entries.", "quote": "barbwire A trading range of three or more bars that largely overlap and one or more is a doji. It is a type of tight trading range with prominent tails and often relatively large bars.", "pages": "10", "book": "Reversals"}, {"id": "l_barbwire_25", "theme": "barbwire", "teaching": "A countertrend scalp within a channel is not a reversal trade — channels perpetually look like they're about to reverse, trapping traders into low-probability countertrend stop entries that lose ~70% of the time with a worse average loss than average win.", "quote": "They will lose money on 70 percent or more of their countertrend scalps, and their average loser will be larger than their average winner... Channels always look like they are about to reverse, suckering traders into countertrend trades using stop entries.", "pages": "36", "book": "Reversals"}, {"id": "l_barbwire_26", "theme": "barbwire", "teaching": "Most traders should wait for a second signal after an entry in a barbwire pattern, since first entries in barbwire frequently fail.", "quote": "Bar 7 was the first setup at a new low, but it failed, as was expected since the entry was in a barbwire pattern and most traders would have waited for a second signal.", "pages": "111", "book": "Reversals"}, {"id": "l_barbwire_27", "theme": "barbwire", "teaching": "Barbwire (a tight range with overlapping bars and prominent tails) represents intense two-sided trading and uncertainty; when it forms early in the day it is often followed by a tradable countertrend swing later, and early barbwire raises the odds of an overall trading-range day.", "quote": "Barbwire represents two-sided trading, and when it develops in the first hour, it often will be followed by a day where bulls and bears alternate control of the market. If there is a trend after the barbwire, there will usually be a tradable countertrend setup at some point.", "pages": "189", "book": "Reversals"}, {"id": "l_barbwire_28", "theme": "barbwire", "teaching": "Within barbwire/tight overlapping ranges it is generally better to buy breakouts near the bottom of the range and short breakouts near the top, rather than trade in the middle where most breakout attempts fail.", "quote": "It is usually better to buy breakouts near the bottom of barbwire and short breakouts near the top.", "pages": "182", "book": "Reversals"}, {"id": "l_barbwire_29", "theme": "barbwire", "teaching": "Barbwire (flat MA, big overlapping bars with prominent tails, no safe fade location) requires patience: wait for one side to get trapped by a breakout, then fade that breakout, since barbwire breakouts usually fail and barbwire often serves as a final flag.", "quote": "This is barbwire and should be traded like all barbwire; it requires patience. Wait for one side to be trapped with a trend bar breakout and then look to fade the breakout. Because breakouts from barbwire usually fail, barbwire is often a final flag.", "pages": "213", "book": "Reversals"}, {"id": "l_barbwire_30", "theme": "barbwire", "teaching": "Tight trading ranges override every other logical reason to trade — using stop entries in a tight trading range is a losing strategy even though every individual setup looks tempting; wait for the breakout and assess its strength before acting.", "quote": "If the market enters a tight trading range, wait for the breakout, because tight trading ranges trump everything, including every logical reason to take a trade. Using stop entries in a tight trading range is a losing strategy.", "pages": "245", "book": "Reversals"}, {"id": "l_barbwire_31", "theme": "barbwire", "teaching": "In a genuine trading range, spikes to the top or bottom look certain to break out and traders instinctively want to chase them, but roughly 80% of such spikes/tests fail; the correct posture is to sell the top and buy the bottom (fade), not chase.", "quote": "Experienced traders understand that the spikes are simply tests and that 80 percent fail...Selling at the top of a trading range and buying at the bottom of a trading range is a reasonable approach.", "pages": "255", "book": "Reversals"}, {"id": "l_barbwire_32", "theme": "barbwire", "teaching": "When the market enters a tight trading range or tight channel, most traders — especially beginners — should stop trading; entering on stops in that environment is the opposite of what institutions are doing and results in repeated losses.", "quote": "When the market enters a tight trading range or a tight channel, most traders should stop trading. ... Never trade in a tight trading range until you are consistently profitable, and even then it is better to wait.", "pages": "263", "book": "Reversals"}, {"id": "l_barbwire_33", "theme": "barbwire", "teaching": "Beginners should avoid trading the middle of the day's range, especially with a flat moving average and a tight, tailed (barbwire) range; before any trade, ask if it's one of the best setups of the day — if not and you're not yet consistently profitable, skip it.", "quote": "A tight trading range trumps everything... force yourself to not take any trades, even if you don't trade for hours.", "pages": "284", "book": "Reversals"}, {"id": "l_risk-management_0", "theme": "risk-management", "teaching": "Martingale (doubling size after each loss) is mathematically sound but practically unworkable because required position sizes after a realistic losing streak (even 4-8 losers) exceed any trader's comfort zone / capital.", "quote": "if you are comfortable trading 10 contracts, but start with just one and plan to double up and reverse with each loss, four consecutive losers would require 16 contracts on your next trade and eight consecutive losers would require 256 contracts!", "pages": "54-55", "book": "Trends"}, {"id": "l_risk-management_1", "theme": "risk-management", "teaching": "When a valid signal requires an unusually large stop (bigger than typical for the instrument's recent range), take the trade at reduced/half size rather than skipping it, if the price action clearly supports it.", "quote": "If traders were nervous, they could have just traded half size, but they must take a strong setup like this one and plan on swinging half.", "pages": "171-172", "book": "Trends"}, {"id": "l_risk-management_2", "theme": "risk-management", "teaching": "Scaling into a countertrend position in a channel during the final couple of hours of the day is risky — traders often run out of time and get forced to exit a growing loser at the close.", "quote": "it is risky to scale into a countertrend position in a channel in the second half of the day, because you will often run out of time. You will find yourself holding an ever-larger losing position.", "pages": "331-332 (363-364)", "book": "Trends"}, {"id": "l_risk-management_3", "theme": "risk-management", "teaching": "Trading against a broad channel by scaling in ahead of price at measured distances (based on prior swing sizes) is a valid but advanced technique reserved for experienced traders; beginners should only use stop entries so the market is already confirmed to be moving in their favor before they're filled.", "quote": "This style of trading is only for experienced traders. Beginners should restrict themselves to stop entries, so that the market is already going their way.", "pages": "466", "book": "Trends"}, {"id": "l_risk-management_4", "theme": "risk-management", "teaching": "When a valid strong setup requires an unusually large stop (e.g., 3 points vs the typical 2 in the Emini), take the trade anyway but reduce size (trade half) rather than skip it — the price action dictates the necessary stop.", "quote": "If you are nervous, just trade half-size, but you must take a strong setup like this one and plan on swinging half.", "pages": "70", "book": "Reading Price Charts"}, {"id": "l_risk-management_5", "theme": "risk-management", "teaching": "Large, well-capitalized stocks behave more predictably with less overnight-gap risk than small/volatile names, so a countertrend trade in a mega-cap has a smaller chance of failing than in a volatile stock — but also less profit potential.", "quote": "a Countertrend trade in WMT has a smaller chance of failing than in CHK. However, the profit potential is also less.", "pages": "357", "book": "Reading Price Charts"}, {"id": "l_risk-management_6", "theme": "risk-management", "teaching": "When trading countertrend on a daily chart against a strong trend, target only a 1-2% scalp since most countertrend trades just become pullbacks that resolve With Trend.", "quote": "When trading counter to a strong trend, the goal should be a scalp of 1 or 2 percent, since most Countertrend trades just result in pullbacks that become With Trend entries.", "pages": "357", "book": "Reading Price Charts"}, {"id": "l_risk-management_7", "theme": "risk-management", "teaching": "Daily-chart pullbacks rarely show classic reversal bars, meaning more uncertainty/risk than 5-minute setups; size down and consider scaling into positions (adding lower in a bull pullback before bears prove control, or adding higher after a Higher Low confirms trend resumption).", "quote": "Pullbacks on daily charts rarely have classic reversal bars, leaving traders with more uncertainty than when trading 5-minute charts. Uncertainty means risk, and when there is more risk, position sizes need to be smaller.", "pages": "358", "book": "Reading Price Charts"}, {"id": "l_risk-management_8", "theme": "risk-management", "teaching": "In a rare huge-freefall/limit-down scenario, options (buying calls/puts) can be safer than futures/stock because broker order-processing delays during overload can turn a small intended risk into a large uncontrolled loss with futures.", "quote": "Because their system can get overloaded and your orders might not get processed for 30 minutes or more... You could easily lose 10 points in the Emini. An alternative is to buy calls, so that you will be certain of your risk.", "pages": "347-348", "book": "Reading Price Charts"}, {"id": "l_risk-management_9", "theme": "risk-management", "teaching": "On extreme-range days, cutting position size (e.g., to 20% of normal) to keep dollar risk constant while using a smaller point target can still produce an above-average day's profit — size down, don't skip the day.", "quote": "If you cut your position size down to just 20 percent of normal because you had to risk about 10 points on each Emini trade, you could still end the day with more profit than on an average day by using a 4-point profit target.", "pages": "366", "book": "Reading Price Charts"}, {"id": "l_risk-management_10", "theme": "risk-management", "teaching": "Risk-on/risk-off regime awareness: when traders expect market weakness they rotate into safe havens (JNJ, MO, PG, USD, CHF) and sell volatile names/currencies; when confident, they rotate into higher-beta stocks and currencies (AUD, SEK) — a macro context filter for expected volatility and directional bias.", "quote": "risk off When traders think that the stock market will fall, they become risk averse, sell out of volatile stocks and currencies, and transition into safe-haven investments... risk on When traders think that the stock market is strong, they are willing to take more risks and invest in stocks that tend to rise faster than the overall market.", "pages": "14", "book": "Reversals"}, {"id": "l_risk-management_11", "theme": "risk-management", "teaching": "When conviction is high but the logical stop is far away (e.g., far beyond the signal bar), keep total dollar risk constant by cutting position size proportionally (e.g., to a quarter of normal size for 4x the normal stop distance, or even 10% if very uncertain) rather than skipping the trade.", "quote": "If that means you have to risk eight points and you normally risk only two, then take only a quarter of your normal position size... If the risk is four times bigger than normal, trade no more than one quarter normal size. If they are still afraid, trade just 10 percent normal size.", "pages": "169, 174", "book": "Reversals"}, {"id": "l_risk-management_12", "theme": "risk-management", "teaching": "Traders should size positions so that a single trade risks a fixed dollar amount consistent with account risk tolerance (example: $500 max risk), calculating share/contract size from stop distance.", "quote": "If they normally don't risk more than $500 on a trade, then they could only have traded 200 shares.", "pages": "265", "book": "Reversals"}, {"id": "l_risk-management_13", "theme": "risk-management", "teaching": "Always keep a protective stop in the market — the greatest danger a trader faces is not the market itself but their own inadequacies (denial, arrogance, lack of discipline).", "quote": "That danger is not the market... It is yourself, and all of your inadequacies as a trader.", "pages": "282", "book": "Reversals"}, {"id": "l_probability_0", "theme": "probability", "teaching": "Roughly 80% of attempts to reverse a trend fail, and roughly 80% of breakout attempts from a trading range fail — markets have inertia and tend to continue doing what they've been doing.", "quote": "Depending on how you define a trend and a reversal attempt, about 80 percent of attempts to reverse a trend will fail... about 80 percent of breakout attempts will fail.", "pages": "309", "book": "Trends"}, {"id": "l_probability_1", "theme": "probability", "teaching": "When you sense a directional imbalance in a market, even without certainty, a reasonable working assumption is at least a 60 percent probability of the move continuing to the equidistant target before the equidistant stop is hit.", "quote": "whenever you feel that there is an imbalance, you should assume that it is at least 60 percent", "pages": "401", "book": "Trends"}, {"id": "l_probability_2", "theme": "probability", "teaching": "Absent a clear trend, directional probability of an equidistant move hovers near 50/50; this 50/50 uncertainty is the defining hallmark of a trading range, so when uncertain, assume you're in a range.", "quote": "The market gravitates toward uncertainty... When the market is 50-50, it is uncertain and you cannot rationally have an opinion about its direction. This is the hallmark of a trading range, so whenever you are uncertain, assume that the market is in a trading range.", "pages": "21", "book": "Trading Ranges"}, {"id": "l_probability_3", "theme": "probability", "teaching": "During a strong trend directional probability can rise to 60-70%, but it cannot persist — the market always gravitates back toward 50/50 uncertainty near support/resistance and measured-move levels.", "quote": "During a strong trend, it might be 60 or even 70 percent, but that cannot last long because it will gravitate toward uncertainty and a 50-50 market.", "pages": "21", "book": "Trading Ranges"}, {"id": "l_probability_4", "theme": "probability", "teaching": "Once a trend is established, roughly 80% of reversal attempts will fail and evolve into flags/continuation — making most countertrend stop entries against a real trend a losing strategy for most traders.", "quote": "Once you believe there is a trend, you must accept that 80 percent of reversal attempts will fail and evolve into flags.", "pages": "209", "book": "Trading Ranges"}, {"id": "l_probability_5", "theme": "probability", "teaching": "Three pushes in a tight, strong channel are more likely to be followed by a fourth or fifth push than by a reversal; do not assume three pushes alone signals reversal.", "quote": "When the three pushes are in a tight bull channel, it is more likely that there will be a fourth or fifth push up than a reversal.", "pages": "101", "book": "Reversals"}, {"id": "l_probability_6", "theme": "probability", "teaching": "After a strong bull breakout following a failed low 2, a second push up (leg) occurs more than 60% of the time.", "quote": "With that much strength after the failed low 2 at bar 4, most traders correctly assumed that there would be a second push up, which happens in over 60 percent of the cases.", "pages": "104", "book": "Reversals"}, {"id": "l_probability_7", "theme": "probability", "teaching": "Most trend reversal attempts fail; a single strong reversal-looking bar or spike is not sufficient evidence that a trend has ended.", "quote": "Most reversal attempts look great and most fail.", "pages": "143-144", "book": "Reversals"}, {"id": "l_probability_8", "theme": "probability", "teaching": "When the market attempts something (e.g., a bullish reversal off a lower-high) twice and fails both times, the odds favor a move in the opposite direction.", "quote": "When the market tries to do something twice and it fails both times, it usually will go in the opposite direction.", "pages": "210", "book": "Reversals"}, {"id": "l_probability_9", "theme": "probability", "teaching": "Within a trading range, most trade probabilities hover around 50%, only occasionally reaching 60%, so there are few genuinely high-probability setups and traders must accept many low-probability events (including reversals that look bad but still swing big, and strong spikes with no follow-through).", "quote": "Within a trading range, the probability for most trades hovers around 50 percent, and only occasionally gets to around 60 percent...there are few high-probability setups.", "pages": "246", "book": "Reversals"}, {"id": "l_probability_10", "theme": "probability", "teaching": "A trader who believes a setup 'looks good and has a good chance of working' should, by definition, assume the probability is at least 60% — and 70% when especially confident — because genuine confidence in a discretionary read implies that threshold.", "quote": "How do you know if a trade has a 60 percent probability of success? If you believe that the setup looks good and has a good chance of working, you should assume you could not have that belief unless the probability is at least 60 percent.", "pages": "254", "book": "Reversals"}, {"id": "l_probability_11", "theme": "probability", "teaching": "On any given 5-minute chart there is at least a 90% chance that some trade during the day will offer reward >=2x risk with probability >=50%; these are always obvious in hindsight on a printed chart but rarely look as good while forming in real time — the skill is spotting them live.", "quote": "If you trade a 5 minute chart, there is at least a 90 percent chance that there will be at least one trade every day where the reward can be at least twice the risk and the chance of success is at least 50 percent...as they are happening they rarely look as good as you would like.", "pages": "256", "book": "Reversals"}, {"id": "l_entry-mechanics_0", "theme": "entry-mechanics", "teaching": "False one-tick breakouts occurring in the first minute or two of a countertrend 5-minute bar are less reliable than breakouts occurring in the final minute of the bar, which carry momentum directly into the next bar.", "quote": "Breakouts that occur in the final minute of the bar tend to be more reliable because you then have momentum right at the end of the bar.", "pages": "189", "book": "Trading Ranges"}, {"id": "l_entry-mechanics_1", "theme": "entry-mechanics", "teaching": "Entering on stops is the single most reliable, safest entry method because the market is already moving in your favor as you get filled — beginners should restrict themselves to stop entries until consistently profitable.", "quote": "One of the best ways to trade using price action is to enter on a stop, because you are being carried into the trade by the market's momentum... This is the single most reliable entry approach, and beginners should restrict themselves to it until they become consistently profitable.", "pages": "191", "book": "Trading Ranges"}, {"id": "l_entry-mechanics_2", "theme": "entry-mechanics", "teaching": "A scalper typically needs about a six-tick move beyond the signal bar to net a four-tick profit in the Emini (one tick for stop-entry beyond the bar, four ticks for target, one more tick because limit orders usually need price to move one tick beyond the order to fill).", "quote": "It usually takes a six-tick move beyond the signal bar to net a four-tick scalp and a ten-tick move to make an eight-tick scalp in the Eminis.", "pages": "191, 194", "book": "Trading Ranges"}, {"id": "l_entry-mechanics_3", "theme": "entry-mechanics", "teaching": "There are roughly twice as many valid limit-order setups each day as stop-order setups, but limit orders are inherently countertrend (short-term) and require more experience to evaluate correctly; stop entries remain the safer default.", "quote": "On any given day, there might be about 10 reasonable stop entry setups and 20 or more limit order setups... Entering on stops is a safer approach in general because the market is moving in your direction as you enter.", "pages": "194-195", "book": "Trading Ranges"}, {"id": "l_entry-mechanics_4", "theme": "entry-mechanics", "teaching": "Avoid scalping stocks with average daily ranges under about $3 (commissions eat too much of a small scalp and volume required is too high), though price-action entries still work on them.", "quote": "you should not often scalp stocks with average daily ranges under three dollars, but price action entries still work. You have to trade far more volume and even a $1 commission eats up too much of a 10 cent scalp.", "pages": "339", "book": "Reading Price Charts"}, {"id": "l_entry-mechanics_5", "theme": "entry-mechanics", "teaching": "Daily/weekly/monthly-chart signals occur too infrequently for a day trader and should generally be ignored/not occupy trading-day attention, since missing 5-minute trades while nursing a small daily-chart position can offset any gain from the longer time frame.", "quote": "Although daily, weekly, and monthly charts can generate intraday signals, they occur so infrequently that they become a distraction for a day trader and should be ignored.", "pages": "357", "book": "Reading Price Charts"}, {"id": "l_entry-mechanics_6", "theme": "entry-mechanics", "teaching": "On daily-chart gap opens, it's safer to wait for a failed gap-pullback (reversal back toward the original direction) rather than chasing the open; if you can't watch the stock intraday on a gap day, it's probably best to pass on the trade.", "quote": "if you cannot watch the stock intraday and there is a gap open, it is probably best to pass on the trade... watch for a gap pullback, and then enter on the failed pullback into the gap.", "pages": "357-358", "book": "Reading Price Charts"}, {"id": "l_sizing_0", "theme": "sizing", "teaching": "When scaling into a trend against you, plan position sizing in advance so total dollar risk stays constant; it's easy to end up with too large a position and too wide a stop.", "quote": "Scaling into the direction of the trend as the market moves against you. If you scale in, plan out in advance what size each order has to be to keep your total risk the same as with a typical trade.", "pages": "322", "book": "Trends"}, {"id": "l_sizing_1", "theme": "sizing", "teaching": "Once consistently profitable, a trader's priority should shift from finding more/lower-probability entries to increasing position size on the best entries (quoting Buffett: \"if it's worth a penny, then it's worth a dime\").", "quote": "Once consistently profitable traders have decided that they have a valid entry, they need to be prepared to trade a reasonable number of contracts.", "pages": "150", "book": "Reversals"}, {"id": "l_sizing_2", "theme": "sizing", "teaching": "If you keep missing consecutive Emini trades that would have worked, you are likely trading too large a position size; trade a size where you're comfortable taking every decent signal and can still take the next trade after 2-3 losses in a row. If unsure between position sizes, trade the smaller one.", "quote": "If you think that you can comfortably trade three Emini contracts per trade, then you should trade just one.", "pages": "282", "book": "Reversals"}, {"id": "l_sizing_3", "theme": "sizing", "teaching": "If fear of a wide stop keeps you from taking a great trade, cut position size (e.g. to a quarter of normal) so total dollar risk matches your usual trade — but only after confirming it's genuinely a good setup, not as an excuse to take weak setups.", "quote": "If you are afraid of taking a great trade because your stop would have to be too far, reduce your position size.", "pages": "282", "book": "Reversals"}, {"id": "l_sizing_4", "theme": "sizing", "teaching": "Beginners should consider trading SPY (200-500 shares, ~1/500 to 1/2 of an Emini) instead of the Emini to allow scaling with low risk; move up to the Emini once trading 1,000-1,500 SPY shares comfortably, since at Emini size you can scale out without much slippage.", "quote": "When starting out, you should consider trading the SPY instead of the Emini.", "pages": "283", "book": "Reversals"}, {"id": "l_sizing_5", "theme": "sizing", "teaching": "Focus on increasing position size rather than number of trades or variety of setups used — making just two Emini points a day at 50 contracts is a seven-figure annual income.", "quote": "Work on increasing your position size rather than on the number of trades or the variety of setups that you use.", "pages": "286", "book": "Reversals"}, {"id": "l_trendlines_0", "theme": "trendlines", "teaching": "Trendlines mainly generate with-trend pullback entries; trend channel lines mainly generate reversal trades. Curved lines are too subjective for fast trading decisions.", "quote": "Trendlines most often set up With Trend trades, and trend channel lines are most helpful finding tradable reversals. Curved lines are too subjective", "pages": "77", "book": "Reading Price Charts"}, {"id": "l_trendlines_1", "theme": "trendlines", "teaching": "Once a trend is established, the most profitable trades remain in the trend direction until the trendline actually breaks; every pullback to the trendline (even if it under/overshoots) should be looked at for a with-trend reversal entry.", "quote": "the most profitable trades are in the direction of the trendline until the trendline is broken.", "pages": "77-78", "book": "Reading Price Charts"}, {"id": "l_trendlines_2", "theme": "trendlines", "teaching": "A trendline break is the single most important signal that one side no longer fully controls the market and two-sided trading is more likely; after a break, the trend extreme is usually tested (continuation, reversal, or range can follow), and successive trendlines get flatter as momentum fades until opposite-direction trendlines matter more.", "quote": "The single most important point about a trendline break is that it is the first sign that the market is no longer being controlled by just one side... Typically, each successive line has a smaller slope, indicating that the trend is losing momentum.", "pages": "78", "book": "Reading Price Charts"}, {"id": "l_trendlines_3", "theme": "trendlines", "teaching": "Failed trendline breakouts repeatedly create new, shallower trendlines; eventually a failed breakout's own failure (a Breakout Pullback) allows drawing of an opposite-direction trendline, and once the major trendline is broken, the opposite trendlines become primary — signaling the trend has likely reversed.", "quote": "Eventually failed breakouts fail, creating Breakout Pullbacks, and these allow for the drawing of trendlines in the opposite direction. After the major trendline is broken, the trendlines in the opposite direction become more important", "pages": "79", "book": "Reading Price Charts"}, {"id": "l_execution_0", "theme": "execution", "teaching": "In a large-enough (non-tight) range, avoid buying too close to the top or shorting too close to the bottom relative to range height — there must be enough room left to hit a scalper's profit before hitting the opposite extreme's resistance.", "quote": "if the trading range is 10 ticks tall, you do not want to buy six ticks above the low of the range, since the odds of the market going six ticks further up are not great.", "pages": "134", "book": "Trading Ranges"}, {"id": "l_execution_1", "theme": "execution", "teaching": "Only trade a breakout leg on stops if it's in a tight micro channel and about to test the range extreme; otherwise wait for a breakout pullback of that micro channel rather than shorting/buying directly into strong momentum.", "quote": "if you are looking to trade and the leg that is testing the top or bottom of the range is a tight channel, it is better to wait for a breakout pullback, which is a second entry.", "pages": "138", "book": "Trading Ranges"}, {"id": "l_execution_2", "theme": "execution", "teaching": "Be suspicious of a 'good fill' (a price better than expected) — it often means a bad trade; conversely a 'bad fill' does not necessarily mean a bad trade.", "quote": "Good fill, bad trade. ... The corollary of bad fill, good trade is not as reliable.", "pages": "283", "book": "Reversals"}, {"id": "l_scaling_0", "theme": "scaling", "teaching": "Scaling into a trade that is moving against you is only sound when you have strong conviction in the bigger picture (e.g., a growing pullback within a clear, established trend) and you set the full risk/plan in advance — never scale into a reversal attempt.", "quote": "The key premise to scaling into a trade that is moving against you is that you believe that the market will soon turn in your direction...Scaling into a potential reversal is very risky; it is usually better to exit if the market goes against you and then look for a second entry.", "pages": "212", "book": "Trading Ranges"}, {"id": "l_scaling_1", "theme": "scaling", "teaching": "\"Never add to a losing position\" applies to countertrend trades, not with-trend scaling; institutions routinely scale into with-trend positions in pieces (like dollar-cost averaging) because no one can pick exact turning points.", "quote": "'Never add to a losing position.' That is one of the most fundamental rules on Wall Street. However, it is misleading because institutions do it all the time...the adage refers to countertrend trades and the institutions are scaling into with trend trades.", "pages": "212", "book": "Trading Ranges"}, {"id": "l_scaling_2", "theme": "scaling", "teaching": "In a strong trend with only shallow pullbacks (e.g., 1-2 points on a day with 12-15 point average range), experienced traders can scale into with-trend limit orders at successive small pullback increments (e.g., 1pt then 2pt lower) sized as a fraction of the average range, using one combined stop on the whole position.", "quote": "If they are trading the Emini and the recent average daily range has been about 12 to 15 points and the largest pullback in the past couple of hours has only been two points, they might buy a small position on a one-point pullback and buy more at one and two points lower (10 to 20 percent of the average daily range) and then maybe use a stop on the entire position another couple of points down.", "pages": "169", "book": "Reversals"}, {"id": "l_with-trend_0", "theme": "with-trend", "teaching": "Default trend-direction heuristic: assume the direction of the most recent 5-minute chart signal is the trend direction; also, if most of the past 10-20 bars are above the moving average, favor buy-side setups (and vice versa for below).", "quote": "In general, the direction of the most recent 5 minute chart signal should be assumed to be the trend's direction. Also, if most of the past 10 or 20 bars are above the moving average, trend setups and trades are likely on the buy side.", "pages": "29", "book": "Trends"}, {"id": "l_with-trend_1", "theme": "with-trend", "teaching": "You will not make money until you start trading with-trend pullbacks.", "quote": "You will not make money until you start trading with-trend pullbacks.", "pages": "284", "book": "Reversals"}, {"id": "l_discretion_0", "theme": "discretion", "teaching": "Perfect textbook setups are rare; a pattern that is reasonably similar to a reliable setup will likely behave similarly. Trading well requires operating comfortably in this 'gray fog' rather than demanding black-and-white rules.", "quote": "If a pattern is setting up and is not perfect but is reasonably similar to a reliable setup, it will likely behave similarly as well. Close is usually close enough.", "pages": "44", "book": "Trends"}, {"id": "l_discretion_1", "theme": "discretion", "teaching": "Named trend-day patterns (spike and channel, trending trading range, trend from the open) are just labels for recurring price behavior; the underlying reading skill is identical, and recognizing the pattern mainly boosts confidence to swing a larger part of the trade.", "quote": "The names are meaningless because all that a trader needs to know is how to read the price action, which is the same for any pattern.", "pages": "355", "book": "Trends"}, {"id": "l_news_0", "theme": "news", "teaching": "Never watch financial news during the trading day; the chart already reflects institutional interpretation of any news, and reporters/pundits have no reliable predictive edge (media picks a convincing pundit essentially at random with respect to future direction).", "quote": "Never watch the news during the trading day. If you want to know what a news event means, the chart in front of you will tell you.", "pages": "46-48", "book": "Trends"}, {"id": "l_news_1", "theme": "news", "teaching": "A big gap or move on bullish/bearish news does not guarantee continuation — in a bear market, a huge up move on 'great' news is probably just a bear flag unless confirmed by a series of higher highs/higher lows.", "quote": "To a price action trader, a huge up move in a bear market is probably just a bear flag, unless the move is followed by a series of higher lows and higher highs.", "pages": "51", "book": "Trends"}, {"id": "l_barwise-signs-of-strength_0", "theme": "barwise-signs-of-strength", "teaching": "Strong trends show minimal bar overlap, small/no tails, trend bar bodies opening/closing near extremes, occasional micro/measuring gaps, no significant channel-line overshoots, sideways (not deep) corrections after trend-line breaks, few profitable countertrend trades, and pullbacks that stay small relative to average range.", "quote": "There are bars with no tails or small tails in either direction, indicating urgency... There are small, infrequent, and mostly sideways pullbacks.", "pages": "58-60", "book": "Trends"}, {"id": "l_barwise-signs-of-strength_1", "theme": "barwise-signs-of-strength", "teaching": "In the strongest trends the with-trend pullback signal bars are often weak (e.g., small bull bars in a bear trend's low-2 setups), which forces traders to chase; the countertrend setups usually look deceptively better than the with-trend ones and should be avoided.", "quote": "In the strongest trends, the pullbacks usually have weak signal bars, making many traders not take them, and forcing traders to chase the market... The countertrend setups almost always look better than the with-trend setups.", "pages": "59,60", "book": "Trends"}, {"id": "l_institutional-behavior_0", "theme": "institutional-behavior", "teaching": "Price action is largely the visible signature of institutional order flow (they can't hide their buying/selling); price action entries let a retail trader piggyback early on institutional moves that are already underway.", "quote": "The price action that traders see during the day is the result of institutional activity and much less the cause of the activity... a price action entry lets a trader just jump onto the wave early on.", "pages": "43,75", "book": "Trends"}, {"id": "l_institutional-behavior_1", "theme": "institutional-behavior", "teaching": "Institutions often keep buying/selling into extremes (even the exact high/low of a trend) because their statistical systems are profitable overall even though any single trade near the extreme may lose; individual retail traders are responsible for less than 5% of volume at major turning points.", "quote": "Remember, all of their systems lose between 30 and 70 percent of the time, and this is one of those times... individual traders... are responsible for less than 5 percent of the volume at major turning points.", "pages": "75-76", "book": "Trends"}, {"id": "l_breakout_0", "theme": "breakout", "teaching": "Every breakout, successful or failed, is eventually followed by a trading range as both sides reach a new area of agreement/equilibrium.", "quote": "Every breakout, whether it is successful or fails, is eventually followed by a trading range.", "pages": "80(112)", "book": "Trends"}, {"id": "l_breakout_1", "theme": "breakout", "teaching": "Overlapping bars within a rally/selloff indicate two-sided hesitation (profit-taking + scaling-in counter-trend) and mark the start of a weaker move likely to become a trading range/flag.", "quote": "This overlap of bars represents a hesitation by the bulls where the market was now able to trade down for a few ticks and a few minutes before moving higher... This channel is a weaker bull move, and channels are usually the start of a trading range.", "pages": "80-81(112-113)", "book": "Trends"}, {"id": "l_multi-timeframe_0", "theme": "multi-timeframe", "teaching": "Every reversal on a smaller timeframe is embedded within a reversal bar or two-bar reversal on some larger timeframe (e.g., two consecutive similar-sized 5-min opposite trend bars form a 10-min reversal bar) — but the higher-timeframe pattern is only clean about 50% of the time because of alignment/timing.", "quote": "These two bars create a 10 minute reversal bar, but the reversal bar is evident on the 10 minute chart only 50 percent of the time", "pages": "134-135", "book": "Trends"}, {"id": "l_multi-timeframe_1", "theme": "multi-timeframe", "teaching": "Watching multiple timeframe charts simultaneously can cause a trader to be whipsawed/stopped out on a smaller timeframe's stop run right before the larger timeframe's setup plays out as planned; it's better to trade off one chart to avoid reconciling inconsistencies.", "quote": "It is always better to just watch and trade off one chart because sometimes things happen too quickly for a trader to think fast enough to place his orders if he is watching two charts", "pages": "71", "book": "Reading Price Charts"}, {"id": "l_pattern-evolution_0", "theme": "pattern-evolution", "teaching": "Reliable price-action patterns fail roughly 40% of the time, and a failed pattern very often morphs/evolves into a larger pattern (e.g., a failed low 2 becomes a wedge top; a failed final flag becomes a breakout pullback, then a wedge, then a larger trading range/final flag) that itself is tradeable — read what is currently in front of you rather than clinging to the original pattern label.", "quote": "Reliable patterns fail about 40 percent of the time and often evolve into larger patterns that set up entries in either direction.", "pages": "185-187, 217-219", "book": "Trends"}, {"id": "l_pattern-evolution_1", "theme": "pattern-evolution", "teaching": "When a failed pattern instead just goes sideways for many bars before a new pattern forms, treat the new pattern as independent — there aren't enough still-trapped traders left from the old failure to fuel a move.", "quote": "If the failure just goes sideways for a number of bars and then a new pattern develops, it makes more sense to simply regard the new pattern as being independent of the first.", "pages": "217", "book": "Trends"}, {"id": "l_signal-bar-quality_0", "theme": "signal-bar-quality", "teaching": "A reversal bar is stronger/more tradeable when its body is large and in the direction of the intended trade (a bull reversal bar with a strong bull body, not just a big lower tail); small-bodied reversal bars are riskier and often need a second signal.", "quote": "the risk of the trade is small (one tick beyond the other side of the small bar)... if the reversal bar is much smaller than the last several bars... it is a riskier signal bar", "pages": "41", "book": "Reading Price Charts"}, {"id": "l_signal-bar-quality_1", "theme": "signal-bar-quality", "teaching": "A reversal bar can 'fail' in the final seconds before the bar closes — a strong reversal can collapse into a strong trend bar closing on its extreme, trapping early countertrend entrants. Never rely on a bar's mid-formation appearance; wait for the close.", "quote": "in the final few seconds before the bar closes, the price collapses and the bar closes on its low... all of the traders who entered early... are now trapped", "pages": "41, 68-69", "book": "Reading Price Charts"}, {"id": "l_signs-of-strength_0", "theme": "signs-of-strength", "teaching": "Comprehensive checklist of ~20 signs of a strong bull (mirror for bear) reversal: strong reversal bar w/ small tails; next 2-3 bars also trend-bodied and average+ size; spike runs 5-10 bars without >1-bar pullback and reverses many prior swings/flags; bars in spike show lows near prior close, opens above prior close, closes near highs; context favors reversal (higher/lower low test after trend-line break); early breakout bar closes above many prior highs; first pullback comes only after 3+ bars, lasts only 1-2 bars, doesn't hit breakeven stop; spike breaks MA/swing highs/trend lines by many ticks; growing bar spends most time near its high with pullbacks <25% of its height; sense of urgency/FOMO; signal is a second attempt (second signal); reversal began from a trend-channel-line overshoot; reverses a significant swing high/low; H1/H2 pullbacks have strong reversal signal bars; trending closes/highs/lows/bodies; small sideways pullbacks; prior trend-line breaks already occurred; test pullback lacks momentum (overlapping, many trend bars against it); test fails at MA or old trend line; breakout bar's close (not just high/low) reverses many prior bars' closes.", "quote": "There are a number of characteristics that are common in strong bull reversals... The more that are present, the more likely a countertrend trade will be profitable and the more aggressive traders should be in their decision about how much of their position they should swing.", "pages": "56-57", "book": "Reversals"}, {"id": "l_signs-of-strength_1", "theme": "signs-of-strength", "teaching": "When countertrend against a very strong trend, demand more signs of reversal strength before acting; when the prior trend was weak/two-sided, a weaker reversal setup is tradable; at the top of a trading range you may not even need a reversal bar to short; in a wedge bull flag you might even buy above a bear trend bar.", "quote": "If traders are looking to short a very strong bull trend, they will want to see as many signs of a strong reversal as possible. In contrast, if the bull trend has been very two-sided, they will be comfortable shorting a weaker reversal setup.", "pages": "57", "book": "Reversals"}, {"id": "l_trend-line-discipline_0", "theme": "trend-line-discipline", "teaching": "When a channel is steep, it's a losing strategy to buy every reversal from a trend-channel-line overshoot; wait for a strong breakout of the channel and then buy the breakout pullback instead.", "quote": "When a channel is steep, it is a losing strategy to buy every reversal from a trend channel line overshoot. Instead wait until there is a strong breakout of the channel.", "pages": "89", "book": "Reversals"}, {"id": "l_trend-line-discipline_1", "theme": "trend-line-discipline", "teaching": "A wedge is distinguished from a parallel channel by the second pullback: if the trend line drawn from the bottoms of the first two pullbacks is steeper than the original trend channel line, the market is forming a wedge, meaning both sides feel increasing urgency.", "quote": "What first distinguishes a wedge from a channel where the lines are parallel is the second pullback... they now see that it is steeper than the trend channel line above and they begin to believe that the market is forming a wedge.", "pages": "95-96", "book": "Reversals"}, {"id": "l_trapped-traders_0", "theme": "trapped-traders", "teaching": "When one side is suddenly trapped, the reliability of a scalp in the opposite direction increases, because trapped traders are forced out just as you enter and will likely wait before re-entering in their original direction.", "quote": "When you see that one side is suddenly trapped, the reliability of a scalp in the opposite direction goes up.", "pages": "282", "book": "Reversals"}, {"id": "l_trapped-traders_1", "theme": "trapped-traders", "teaching": "A stop run (traders trapped OUT of a trade) followed by resumption of the trend is as reliable a signal as traders getting trapped IN a trade, and is good for at least a scalper's profit.", "quote": "If the market suddenly runs stops and then resumes its trend, this is a reliable setup for at least a scalper's profit.", "pages": "282", "book": "Reversals"}, {"id": "l_definitions_0", "theme": "definitions", "teaching": "'Likely,' 'probably,' and 'usually' are Brooks' own calibrated language meaning at least 60% certain; 'unlikely' means at most 40% certain — these are his implicit probability thresholds used throughout the book's setup descriptions.", "quote": "likely At least 60 percent certain. ... probably At least 60 percent certain. ... usually At least 60 percent certain. ... unlikely At most 40 percent certain.", "pages": "20, 22, 27, 26", "book": "Trends"}, {"id": "l_philosophy_0", "theme": "philosophy", "teaching": "Brooks' core method: minimize inputs to a single price chart (plus a 20-EMA) rather than combining indicators, multiple time frames, or fundamentals; indicators are mostly derived from price action anyway and add distraction/latency at decision time.", "quote": "All I need is a single chart on my laptop computer with no indicators except a 20-bar exponential moving average (EMA)...", "pages": "41-44", "book": "Trends"}, {"id": "l_fractal_0", "theme": "fractal", "teaching": "The same chart patterns (including 'crash'-shaped moves) recur at every time frame; price action principles and setups are fractal and apply identically on 1-minute, 5-minute, daily, weekly charts.", "quote": "every pattern subdivides into standard price action patterns in smaller time frame charts, and trading decisions based on price action analysis therefore work in all time frames.", "pages": "55-56", "book": "Trends"}, {"id": "l_breakout-strength_0", "theme": "breakout-strength", "teaching": "Strong breakouts feature a large-bodied trend bar with small/no tails, high relative volume (10-20x average), several bars of continued same-direction bodies, spikes lasting 5-10 bars without a pullback greater than about a bar, first pullback delayed (after 3+ bars), shallow (1-2 bars) and not reaching the breakout point/breakeven stop, and context that makes the breakout likely (trend resumption, higher-low/lower-high tests).", "quote": "The more of the following characteristics that a bull breakout has, the more likely the breakout will be strong... The breakout bar has a large bull trend body and small tails or no tails. The larger the bar, the more likely the breakout will succeed.", "pages": "60-62", "book": "Trends"}, {"id": "l_reversal-bar-quality_0", "theme": "reversal-bar-quality", "teaching": "A minimally valid reversal bar just needs a close beyond its open or midpoint in the reversal direction; the best reversal bars additionally have: open near/beyond prior close, a tail 1/3-1/2 the bar height opposite the reversal direction, minimal overlap with prior bars, a strong (non-doji, non-inside) entry bar following, and a close that reverses more than one prior bar's close/extreme.", "quote": "The best-known signal bar is the reversal bar and the minimum that a bull reversal bar should have is either a close above its open (a bull body) or a close above its midpoint.", "pages": "62-63", "book": "Trends"}, {"id": "l_reversal-strength_0", "theme": "reversal-strength", "teaching": "Strong reversals share most of the same strength characteristics as strong breakouts, plus: the signal is often a second attempt to reverse within a few bars (a 'second signal'), the reversal originates from an overshoot of a trend channel line, and it reverses a significant/prior swing high or low.", "quote": "The signal is the second attempt to reverse within the past few bars (a second signal). The reversal began as a reversal from an overshoot of a trend channel line from the old trend.", "pages": "63-65", "book": "Trends"}, {"id": "l_stop-placement_0", "theme": "stop-placement", "teaching": "Institutions often defend a key protective-stop price exactly (e.g., a failed high-2 long's stop level) — price frequently tests an entry bar's extreme to the tick without exceeding it, revealing institutional-size defense of that level.", "quote": "It is fairly common to see a pullback that comes down exactly to the low of that entry bar but not one tick lower. This means that the stops were not run, and that there must be institutional size volume protecting the stops.", "pages": "76", "book": "Trends"}, {"id": "l_trend-strength_0", "theme": "trend-strength", "teaching": "The stronger the trend, the less important a strong signal bar is for a with-trend entry, and the more important a strong signal bar is for any countertrend attempt. In a strong bull trend you can buy for almost any reason (even above a bear trend bar) if the stop is wide enough.", "quote": "The stronger the trend, the less important it is to have a strong signal bar for a with-trend trade and the more important it is to have a strong signal bar for a countertrend trade.", "pages": "123", "book": "Trends"}, {"id": "l_trap_0", "theme": "trap", "teaching": "Bull (or bear) flags of 3+ large, mostly-overlapping bars just above (below) the moving average are usually traps for with-trend late entrants — even a strong-looking trend bar signal there has roughly a 60% chance of failing.", "quote": "Bull flags just above the moving average where there are three or more large bars that mostly overlap are usually traps...the odds are that a short below will result in a loss.", "pages": "132,136", "book": "Trends"}, {"id": "l_trend-structure_0", "theme": "trend-structure", "teaching": "If a pullback setup in a trend looks 'perfect and easy,' that is itself a warning sign the trend is not strong — so many traders take the obvious trade that it becomes the final flag leading to a larger correction.", "quote": "If a pullback setup looks perfect and easy, it usually means that the trend is not strong...it often becomes the final flag in the trend, leading to a bigger correction.", "pages": "134", "book": "Trends"}, {"id": "l_channel-mechanics_0", "theme": "channel-mechanics", "teaching": "In a strong bull channel, bulls place limit buy orders at/below the low of the prior bar while bears place limit sell orders at/above the high of every bar and every swing high; bulls also place buy stops above pullback-bar highs while bears place sell stops below bar lows at the channel top (mirrored in a bear channel). This order-flow structure is why 'all bars in a channel' can act as signal bars.", "quote": "When there is a strong bull channel, bulls will place limit orders to buy at or below the low of the prior bar, and bears will place limit orders to short at or above the high of every bar and above every swing high.", "pages": "139", "book": "Trends"}, {"id": "l_trend-line/measured-move_0", "theme": "trend-line/measured-move", "teaching": "A strong spike down (or up) is usually followed by a measured move based on the size of the spike, projected from the top (or bottom) of the first pullback; multiple candidate measured-move targets should be checked, and confluence among them increases confidence.", "quote": "Whenever there is a strong spike down, it is usually followed by a measured move down based on some aspect of the spike, usually the distance from the open or high of the first bar to the close or low of the last bar of the spike.", "pages": "167", "book": "Trends"}, {"id": "l_momentum_0", "theme": "momentum", "teaching": "After a strong momentum move (e.g., 4+ consecutive trend bars, or 2-3 large trend bars), do not fade the first countertrend attempt — wait for a second reversal attempt; if no second attempt develops, there was no trade and that's a save, not a miss.", "quote": "It is better to wait for an entry, not take it, wait for the trend to resume for a bar or two, and then enter on the market’s second attempt to reverse.", "pages": "209-211", "book": "Trends"}, {"id": "l_chart-technique_0", "theme": "chart-technique", "teaching": "Don't leave trend lines drawn on the chart for more than a few seconds while trading — draw to check a test, then erase; focus on how bars behave near the line, not on the line itself, to avoid distraction.", "quote": "You don’t want lines on your chart for more than a few seconds when trading, because you don’t want distractions. You need to focus on the bars and see how they behave once near the line, and not focus on the line.", "pages": "197", "book": "Trends"}, {"id": "l_instrument-comparison_0", "theme": "instrument-comparison", "teaching": "The SPY trades essentially tick-for-tick with the ES Emini, and its smaller tick size can sometimes make patterns easier to read; on triple-witching days the SPY may gap due to a price adjustment even though the Emini doesn't — don't be concerned by that disparity.", "quote": "they then pretty much trade tick for tick, like on any other day, so don’t be concerned by the gap and just trade the price action as the day unfolds.", "pages": "173-175", "book": "Trends"}, {"id": "l_timeframe_0", "theme": "timeframe", "teaching": "In a runaway trend it's usually best to trade only off the 5-minute chart to be sure you catch every with-trend entry; only very experienced traders should add the 3-minute (and even less so the 1-minute, which introduces confusing countertrend setups) chart for extra scalps.", "quote": "Since you need to be making sure that you catch every with-trend entry, it is best to trade only off the 5 minute chart in a runaway trend.", "pages": "341", "book": "Trends"}, {"id": "l_reversal-bars_0", "theme": "reversal-bars", "teaching": "Reversal bars must be judged in context: if a reversal bar overlaps the prior two bars too much, it is really part of a small trading range and not functioning as a true reversal bar, regardless of how strong it looks.", "quote": "Reversal bars always have to be judged in context, and when they overlap the prior bars by too much they are part of a small trading range", "pages": "430", "book": "Trends"}, {"id": "l_news/discipline_0", "theme": "news/discipline", "teaching": "Never act on a news-driven bar before it closes — an apparent large trend bar early in its formation can become a doji or even close as a reversal bar by the time it finishes.", "quote": "You should wait for the bar to close, because what appears as a large bear trend bar at four minutes into the bar can become a doji bar or even a bull reversal bar by the time the bar closes.", "pages": "442", "book": "Trends"}, {"id": "l_breakout-mode_0", "theme": "breakout-mode", "teaching": "An opening range noticeably smaller than the recent average daily range (roughly under a third) puts the market into breakout mode, raising the odds of a several-fold range expansion; an opening range larger than about 30% of the recent average range is NOT a good breakout-mode setup.", "quote": "The opening range was less than a third of the size of the range of recent days, and this put the market in breakout mode.", "pages": "443, 449-450", "book": "Trends"}, {"id": "l_reversal-day_0", "theme": "reversal-day", "teaching": "Reversal days share three characteristics: the day trends one way then reverses into the close; most start as trending trading range days; and if the late reversal is strong, it tends to have follow-through into the next day(s).", "quote": "The day trends in one direction and then it trends in the opposite direction into the close. Most start as trending trading range days. If the reversal starts in the last couple of hours and is strong, it will usually have follow-through on the next day and often the next several days.", "pages": "447", "book": "Trends"}, {"id": "l_trend-resumption_0", "theme": "trend-resumption", "teaching": "Trend resumption days: strong trend in the first hour, then hours-long (often very tight) trading range that lulls traders into thinking the day is done, then the trend resumes in the final hour or two, with the second leg often similar in size to the first; a late breakout that appears to reverse the trend is usually a trap, especially when the range was unusually tight, followed by a breakout in the original direction.", "quote": "The day has a strong trend in the first hour or so and then enters a trading range. ... The trend resumes in the final hour or two. ... There is often a breakout from the trading range late in the day that tries to reverse the trend, but it is usually a trap.", "pages": "455", "book": "Trends"}, {"id": "l_barbwire/stairs_0", "theme": "barbwire/stairs", "teaching": "A stairs day is a variant trending trading range with at least three broad trending swings; nearly every breakout is followed by a pullback (breakout test) that overlaps back into the prior range, enabling two-sided trading around the channel's edges.", "quote": "A stairs day is a variant of a trending trading range day where there are at least three trading ranges. ... Almost every breakout is followed by a pullback (a breakout test) beyond the breakout point, so that there is some overlap between consecutive swings.", "pages": "431, 463", "book": "Trends"}, {"id": "l_edge_0", "theme": "edge", "teaching": "Real trading edges are always small and short-lived because they require a counterparty, and the market is full of smart traders who won't let an edge persist.", "quote": "Edges are always small and fleeting because they need someone on the other side, and the market is filled with smart traders who won't allow an edge to be big and persistent.", "pages": "11", "book": "Trading Ranges"}, {"id": "l_probability-language_0", "theme": "probability-language", "teaching": "Brooks' own probabilistic vocabulary: 'likely'/'probably'/'usually' = at least 60% certain; 'unlikely' = at most 40% certain; these are his working thresholds throughout the book.", "quote": "likely At least 60 percent certain. ... unlikely At most 40 percent certain. ... usually At least 60 percent certain.", "pages": "12, 15", "book": "Trading Ranges"}, {"id": "l_pattern-recognition_0", "theme": "pattern-recognition", "teaching": "A pattern that is close to a textbook example (even if imperfect) will usually behave like the textbook pattern, so near-miss setups (e.g., a near-breakout-pullback without an actual breakout) should generally be traded as if the textbook version occurred.", "quote": "Remember that when something is close to a textbook pattern, it will usually behave like a textbook pattern.", "pages": "53", "book": "Trading Ranges"}, {"id": "l_bar-counting_0", "theme": "bar-counting", "teaching": "Bar/leg counting becomes unreliable exactly when trading ranges get tight — the tighter and more confident you are that it's a range, the less trustworthy your count becomes, so avoid count-based trades in tight ranges unless very confident.", "quote": "The more certain you are that the market is in a tight trading range, the less certain you will be about your bar counting... it is better not to take trades based on bar counts in tight trading ranges unless you are very confident with your count.", "pages": "121", "book": "Trading Ranges"}, {"id": "l_trend-day-types_0", "theme": "trend-day-types", "teaching": "On a trending trading range day, once the market breaks the first-half range, it typically travels a further measured move roughly equal to that range's height before forming a new balance/reversal.", "quote": "When a breakout occurs after the first hour or two, the market usually reaches about a measured move down and then bounces as it begins to form a lower trading range.", "pages": "167, 185", "book": "Trading Ranges"}, {"id": "l_low-probability-systems_0", "theme": "low-probability-systems", "teaching": "A low-probability, high-reward strategy is only viable if you take every qualifying signal without cherry-picking — humans systematically pick the losing 'cherries' and skip the rare huge winner needed to make the system profitable overall.", "quote": "To trade a low probability system, you have to take every strong signal, because if you cherry pick, you will invariably pick the wrong cherries, and will often miss that one great trade that you need to overcome your earlier losses.", "pages": "176", "book": "Trading Ranges"}, {"id": "l_context-first_0", "theme": "context-first", "teaching": "Reversal bars/signal bars are meaningless without supporting context; a bar that largely overlaps several prior bars represents a two-sided (trading-range) market and 'there was nothing to reverse.'", "quote": "Reversal Bar 1 largely overlaps the four prior bars, indicating a two-sided market so there was nothing to reverse. This is not a long setup bar.", "pages": "41", "book": "Reading Price Charts"}, {"id": "l_trading-range-rule_0", "theme": "trading-range-rule", "teaching": "Never buy at the top of a trading range/flag or sell at the bottom of one, even in a trend — 'buy low, sell high' is the guiding principle; only fade the extremes in a trading range.", "quote": "Smart traders will look to sell near the high, and they would only buy near the low if the setup was strong.", "pages": "42, 45", "book": "Reading Price Charts"}, {"id": "l_doji-caution_0", "theme": "doji-caution", "teaching": "Dojis are one-bar trading ranges and are rarely good signal bars (especially small dojis near a flat EMA between roughly 9-11am Barb Wire) — they have a high failure rate and demand more price action before trading, except near the extreme of a larger range as a second entry.", "quote": "doji bars are rarely good signal bars because they are one bar trading ranges... a small doji... near the EMA and occurring approximately between 9 A.M. and 11:00 A.M. PST in a Barb Wire pattern. These have a very high failure rate", "pages": "44, 47, 61", "book": "Reading Price Charts"}, {"id": "l_signal-bar-taxonomy_0", "theme": "signal-bar-taxonomy", "teaching": "Beyond the classic reversal bar, many other bar patterns yield reliable signals: inside bar, ii/iii, small bar near a big bar's extreme, outside bar, Double Top/Bottom Twins, Opposite (Up Down/Down Up) Twins, failed reversal bars, shaved bars, exhaustion bars — all must be judged in context, and are stronger as trend bars in the trade direction.", "quote": "Although a classic reversal bar is one of the most reliable signal bars, most reversals occur in their absence.", "pages": "43-44", "book": "Reading Price Charts"}, {"id": "l_exhaustion_0", "theme": "exhaustion", "teaching": "Unusually large trend bars in a trend can represent climactic exhaustion (last buyers/sellers exhausted), often followed by at least a two-legged correction; big breakout trend bars often fail on the very next bar, trapping traders, especially on quiet trading-range days.", "quote": "if a bar is unusually large, it often represents a climactic exhaustion... Big trend bars on breakouts often fail on the next bar, trapping traders into the wrong side of the market.", "pages": "47", "book": "Reading Price Charts"}, {"id": "l_countertrend-precondition_0", "theme": "countertrend-precondition", "teaching": "You cannot sell in a strong bull (or buy in a strong bear) unless there has been a prior trendline break demonstrating some opposite-side strength first; countertrend trades need a prior trendline break plus a good signal bar — both are required.", "quote": "You cannot sell in a strong bull if there has not been a prior bull trendline break.", "pages": "49-50", "book": "Reading Price Charts"}, {"id": "l_climax_0", "theme": "climax", "teaching": "A climactic selloff/rally (e.g., 16 of 17 bars each making a lower high) is unsustainable and is usually followed by a two-legged correction lasting many bars (at least an hour on a 5-min chart).", "quote": "A climax is usually followed by a two-legged correction that lasts for many bars (at least an hour on a 5-minute chart).", "pages": "54-55", "book": "Reading Price Charts"}, {"id": "l_outside-bar-risk_0", "theme": "outside-bar-risk", "teaching": "It is almost always unwise to enter on the breakout of a 5-minute outside bar because the stop is too distant/risky; if you must, use a fixed money stop or reduce size. A 1-minute outside-bar breakout is more tradeable.", "quote": "it is almost always unwise to enter on a breakout of a 5-minute outside bar, especially if the outside bar is large... because of the greater risk that the distant stop entails", "pages": "62", "book": "Reading Price Charts"}, {"id": "l_decisiveness_0", "theme": "decisiveness", "teaching": "When uncertain about an ambiguous bar (like an outside bar), the best decision is simply to wait for more price action rather than force a trade.", "quote": "The single most important thing to remember about outside bars is that whenever a trader is uncertain about what to do, the best decision is to wait for more price action to develop.", "pages": "64", "book": "Reading Price Charts"}, {"id": "l_tools_0", "theme": "tools", "teaching": "Related ETFs (e.g., SPY vs SDS inverse) or alternate chart types can clarify ambiguous price action; if a pattern (e.g., bull flag) doesn't look right, check the inverse instrument's chart for confirmation before trading.", "quote": "if it does, you would be wise not to buy the Emini flag and instead wait for more price action to unfold", "pages": "71", "book": "Reading Price Charts"}, {"id": "l_second-entry-psychology_0", "theme": "second-entry-psychology", "teaching": "'Good fill, bad trade' — if the market lets you in at a BETTER price than earlier entrants (e.g., a cheaper second entry), be suspicious you're reading the chart wrong and it may be a trap; most good second entries occur at the same or worse price.", "quote": "Most of the time, a good fill equals a bad trade (and a bad fill equals a good trade!).", "pages": "73-74", "book": "Reading Price Charts"}, {"id": "l_momentum-and-second-entries_0", "theme": "momentum-and-second-entries", "teaching": "When fading a move that already had 4+ strong trend bars (too much one-directional momentum), don't take the first countertrend signal — wait, let it fail, and take the second (or with a Wedge, third) attempt to reverse instead.", "quote": "if one fails, assume that you are reading the market incorrectly and do not take a third entry unless it is a Wedge (a failed trend channel line breakout).", "pages": "73, 74", "book": "Reading Price Charts"}, {"id": "l_late-entry_0", "theme": "late-entry", "teaching": "It is never too late to enter a strong trend: entering late at market with the position size and stop you would still be holding from the original entry is mathematically identical to having held the original trade — hesitating due to 'it's already moved' is an emotional/logical error.", "quote": "Entering late and using the original stop is absolutely identical to being long the swing portion of the original position, using the same protective stop.", "pages": "75-76", "book": "Reading Price Charts"}, {"id": "l_breakouts_0", "theme": "breakouts", "teaching": "Treat any gap opening or large trend bar as a one-bar 'breakout' / one-bar trend — since breakouts commonly fail, be ready to fade them if a valid signal bar appears after sideways bars 'break' that one-bar trendline.", "quote": "It is helpful to consider a gap opening and any large trend bar to effectively be breakouts and each one should be treated as if it is a one-bar trend, since breakouts commonly fail", "pages": "78", "book": "Reading Price Charts"}, {"id": "l_dueling-lines_0", "theme": "dueling-lines", "teaching": "When a trendline and a trend channel line (drawn from opposite sides) both point to a reversal at the same area, this 'Dueling Lines' confluence strengthens the trade.", "quote": "the Bar 6 short an example of a Dueling Lines trade (trendline and trend channel lines intersecting and in opposite directions)", "pages": "79", "book": "Reading Price Charts"}, {"id": "l_outside-bars_0", "theme": "outside-bars", "teaching": "An outside bar occurring mid-trading-range is meaningless for generating a breakout trade unless followed by a small fade bar near its high or low.", "quote": "If an outside bar is in the middle of a trading range, it is meaningless and should not be used to generate trades, unless it is followed by a small bar near the high or low of the outside bar, setting up a fade.", "pages": "63", "book": "Reading Price Charts"}, {"id": "l_trend_0", "theme": "trend", "teaching": "In a strong trend, every tick is effectively a With Trend entry — you can enter at market at any point using swing size and a reasonable swing stop and expect profit, though risk/reward is worse than entering on pullbacks.", "quote": "In a strong trend, every tick is a With Trend entry, so you can simply enter at the market at any point using your swing size and use a reasonable swing stop.", "pages": "181-182", "book": "Reading Price Charts"}, {"id": "l_magnets_0", "theme": "magnets", "teaching": "Chapter framed explicitly as background, not trading basis: magnets (Measured Moves, Fibonacci, prior failed-reversal signal-bar levels, trendlines, swing highs/lows, emotional round numbers, etc.) are guides to keep you trading With Trend until tested/overshot — do not fade them with limit orders, and do not go countertrend at a magnet without prior countertrend strength (e.g., a trendline break).", "quote": "When you become aware of a magnet, trade the market as if it is trending toward the magnet, and do not trade Countertrend until after the magnet is tested, unless there is a clear trendline break and then a test of the extreme.", "pages": "191,198-199", "book": "Reading Price Charts"}, {"id": "l_trade-selection_0", "theme": "trade-selection", "teaching": "Focus primarily on the best two to five entries each day (typically second entries at new swing highs/lows on non-trending days, ~80% of days, and With-Trend pullbacks on trend days); once consistently profitable, grow position size rather than adding lower-probability entries.", "quote": "A trader should focus primarily on taking only the best two to five entries each day...Once a trader is consistently profitable, the next goal should be to increase the position size rather than adding lower probability entries.", "pages": "282", "book": "Reading Price Charts"}, {"id": "l_gray-zone/probability_0", "theme": "gray-zone/probability", "teaching": "Setups are never textbook-perfect; traders must operate in a probabilistic 'gray zone' where a close-enough pattern behaves similarly to the textbook version, and reliable fixed rules cannot exist in a zero-sum game because any consistently-working rule would be arbitraged away.", "quote": "If a pattern is setting up and is not perfect but is reasonably similar to a reliable setup, it will likely behave similarly as well. Close is usually close enough... it is impossible to have a zero-sum game where rules consistently work.", "pages": "23-24", "book": "Reversals"}, {"id": "l_day-typing_0", "theme": "day-typing", "teaching": "Identify early (often by the 3rd or 4th bar) whether the session is a trend-from-the-open day; a large trend bar dropping/rising far from the open on one of the first few bars is a strong tell, and confidence should build once price breaks below/above the first bar.", "quote": "You would have suspected it by the third bar of the day (a large bear trend bar, dropping far from the open), and you would have been very confident by the time the market broke below bar 1.", "pages": "265", "book": "Reversals"}, {"id": "l_breakout-pullback_0", "theme": "breakout-pullback", "teaching": "All patterns can fail, and failures can themselves fail — when a failure fails, it creates a breakout pullback in the original direction with a high probability of success.", "quote": "All patterns fail and the failures often fail, and when they do, they create a breakout pullback in the original direction and have a high probability of success.", "pages": "282", "book": "Reversals"}, {"id": "l_beginner-method_0", "theme": "beginner-method", "teaching": "Beginners should start on the 5-minute chart, entering on pullbacks with stop orders: buy above a bull bar at the moving average in a bull trend, short below a bear bar at the moving average in a bear trend; scale out at a limit near the prior trend extreme and move the stop to breakeven on the remainder.", "quote": "When the market is in a bull trend, look to buy above a bull bar at the moving average.", "pages": "283", "book": "Reversals"}, {"id": "l_trend-following_0", "theme": "trend-following", "teaching": "Buy low, sell high — except in a clear, strong trend, where you buy high-2 setups even at the day's high in a bull trend (or sell low-2 setups in a bear trend). But the market is in a trading range most of the time, so before buying high ask whether the pattern truly matches an established strong bull trend pattern; if not, don't buy high even if momentum looks great.", "quote": "Buy low and sell high, except in a clear and strong trend... In a bull trend, buy high 2 setups even if they are at the high of the day.", "pages": "283", "book": "Reversals"}, {"id": "l_trading-range_0", "theme": "trading-range", "teaching": "When you (as a trader) feel uncertain/confused, the market is likely in a trading range — only buy low/sell high or scalp; if uncertain, prefer shorting after 5-10 bars up and buying after 5-10 bars down, since most breakout attempts fail.", "quote": "When a trader is uncertain or confused, the market is in a trading range and he should only buy low and sell high.", "pages": "283", "book": "Reversals"}, {"id": "l_time-of-day_0", "theme": "time-of-day", "teaching": "The first hour is usually the easiest time to make money (larger swings, fewer doji bars) but also easiest to lose money because of overconfidence and rule-breaking; swing setups in the first hour typically have under 50% win rate but reward at least twice the risk. Experienced traders can scalp.", "quote": "The first hour is usually the easiest time to make money... The first hour is the easiest time to lose money as well.", "pages": "284", "book": "Reversals"}, {"id": "l_signal-bar_0", "theme": "signal-bar", "teaching": "The best signal bars are trend bars in the direction of the trade; doji bars are one-bar trading ranges and usually terrible signal bars — you'll usually lose buying above or selling below a trading range.", "quote": "The best signal bars are trend bars in the direction of your trade... You will usually lose if you buy above a trading range or sell below one.", "pages": "284", "book": "Reversals"}, {"id": "l_scalping_0", "theme": "scalping", "teaching": "You won't make consistent money trading countertrend scalps — risk is usually as large as the profit target, requiring about six winners to recover four losses; realistically scalp only if you can win 60%+ of the time, and beginners should scalp only with the trend.", "quote": "You will not make consistent money until you stop trading countertrend scalps.", "pages": "284", "book": "Reversals"}, {"id": "l_always-in-reversal_0", "theme": "always-in-reversal", "teaching": "You will not make money trading reversals until you wait for a break of a significant trend line and then a strong reversal bar on a test of the trend's extreme.", "quote": "You will not make money trading reversals until you wait for a break of a significant trend line and then for a strong reversal bar on a test of the trend's extreme.", "pages": "284", "book": "Reversals"}, {"id": "l_deliberate-practice_0", "theme": "deliberate-practice", "teaching": "To truly learn price action, print out the 5-minute chart every day (and stock charts if trading stocks) and annotate every setup you see, doing this for years until you can instantly read any chart.", "quote": "Print out the 5 minute Emini chart every day... and write on the chart every setup that you see.", "pages": "285", "book": "Reversals"}, {"id": "l_two-legs_0", "theme": "two-legs", "teaching": "Always look for two legs; when the market tries something twice and fails both times, that is a reliable signal it will likely succeed doing the opposite.", "quote": "When the market tries to do something

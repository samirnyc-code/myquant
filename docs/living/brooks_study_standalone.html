: "Institutions could care less about us and are not out there running our stops, trying to devour the little guy. If your stop gets hit, it has nothing to do with you.", "pages": "204", "book": "Trading Ranges"}, {"id": "l_market-structure_210", "theme": "market-structure", "teaching": "Most trading-range breakout attempts fail; roughly 60% chance of failure vs 40% success is Brooks' rule-of-thumb baseline probability for an unconfirmed breakout attempt out of a range.", "quote": "Since most trading range breakout attempts fail, there was a 60 percent chance that the market would trade down and only a 40 percent chance that the breakout would be successful...60-40 is a good rule of thumb when it comes to trading range breakout attempts.", "pages": "205", "book": "Trading Ranges"}, {"id": "l_market-structure_211", "theme": "market-structure", "teaching": "Pullbacks/reversals begin with profit-taking by the trend side, not new opposite-side aggression; watch for large trend bars followed by small bars/pullbacks as evidence that a breakout attempt has failed.", "quote": "All pullbacks and reversals begin with profit taking...This is why so many large trend bars, which are breakout attempts, are followed by small bars and pullbacks, which means that the breakouts failed.", "pages": "209", "book": "Trading Ranges"}, {"id": "l_market-structure_212", "theme": "market-structure", "teaching": "The market frequently runs obvious round-number/logical protective-stop levels (e.g., a 2-3 point stop at a new high) to the exact tick before reversing — experienced scale-traders place their adds just inside where the crowd's stops sit.", "quote": "The market often hits obvious protective stops to the tick and then reverses...an astute trader looking to scale in would have placed a limit order to short more...one tick below the three-point stop.", "pages": "218", "book": "Trading Ranges"}, {"id": "l_market-structure_213", "theme": "market-structure", "teaching": "Individual traders can get trapped into bad trades or out of good ones even though most volume is institutional/algorithmic, because institutional models operate on different logic (hedging, scaling, unrelated timeframes) and aren't concerned with small 5-minute-chart moves.", "quote": "What appears on the chart is the distilled product of a huge number of traders who are basing their decisions on a huge number of different and unknowable reasons. The result is that individual traders sometimes get trapped into or out of the market.", "pages": "220", "book": "Trading Ranges"}, {"id": "l_market-structure_214", "theme": "market-structure", "teaching": "Price action is largely the visible footprint of institutional order flow (which controls the market), not the cause; individual/retail price-action trades are effectively piggyback scalps on institutional activity that tends to defend its position rather than reverse the market immediately after your entry.", "quote": "The price action that traders see during the day is the result of institutional activity and much less the cause of the activity.", "pages": "4-5", "book": "Reading Price Charts"}, {"id": "l_market-structure_215", "theme": "market-structure", "teaching": "Trades often fail off institutional entries near round-number tick counts (e.g., stalling at 5 ticks then surging past 6) because large (100+ contract) institutional orders are actively defending/adding at those levels — a practical tell for scalp continuation.", "quote": "In general, anything over 100 contracts should be considered institutional in today's Emini market... almost certainly that 250 lot order was an institutional buy.", "pages": "5-6", "book": "Reading Price Charts"}, {"id": "l_market-structure_216", "theme": "market-structure", "teaching": "Whenever the market tries something twice (e.g., pushing to a new extreme) and fails both times, it usually then tries the opposite direction — this is the underlying logic behind double tops/bottoms and why traders wait for a test of the old extreme before committing to a reversal.", "quote": "Whenever the market tries to do something twice and fails, it usually then tries the opposite. This is why double tops and bottoms work", "pages": "14", "book": "Reading Price Charts"}, {"id": "l_market-structure_217", "theme": "market-structure", "teaching": "Every bar is classifiable as either a trend bar (body present, one side in control) or a doji/nontrend bar (tiny/no body, bulls and bears in equilibrium); the distinction is relative to recent bar sizes and the specific market/timeframe, not absolute.", "quote": "it is most useful to think of all bars as being either trend bars or nontrend (trading range) bars... it is simpler to refer to all nontrend bars as dojis", "pages": "7-8", "book": "Reading Price Charts"}, {"id": "l_market-structure_218", "theme": "market-structure", "teaching": "A trend bar breakout does not guarantee a trend is starting, and conversely a series of dojis can itself display a trend if each has trending closes/highs/lows — a doji or trend bar's meaning is always contextual, not automatic.", "quote": "Just like dojis don't always mean the market is trendless, a trend bar does not always mean that the market is trending.", "pages": "9-10", "book": "Reading Price Charts"}, {"id": "l_market-structure_219", "theme": "market-structure", "teaching": "In a trend (even within a trading-range day), a small pullback bar can set up either a with-trend continuation entry or, at swing points with supporting factors (trendline break, High/Low 2, new swing extreme), a countertrend entry — but in a pure pullback it is only ever a with-trend setup.", "quote": "In a trend, a small bar on a pullback is only a With Trend setup.", "pages": "48", "book": "Reading Price Charts"}, {"id": "l_market-structure_220", "theme": "market-structure", "teaching": "Trend, swing, pullback, and leg are overlapping, relative classifications — what is a pullback on one timeframe can be a strong trend on a smaller one; the terms are guidelines, not rigid categories.", "quote": "a pullback in a bull on a 60-minute chart might be a strong bear trend on a I-minute chart", "pages": "71-73", "book": "Reading Price Charts"}, {"id": "l_market-structure_221", "theme": "market-structure", "teaching": "A trend cannot exist without both (1) a break of the trendline from the prior trend/range and (2) trending swings (e.g., series of Higher Highs and Higher Lows in a bull). Absent either, there is no trend.", "quote": "All trends, no matter how small, must first break a trendline from the prior trend or trading range and then have trending swings...Absent either of these, there is no trend.", "pages": "99", "book": "Reading Price Charts"}, {"id": "l_market-structure_222", "theme": "market-structure", "teaching": "Trend channel line overshoots reverse because sophisticated/institutional participants use the same technical extremes as exit/reversal points, not because retail traders finally capitulate — volume at turning points is too large to be explained by small traders alone.", "quote": "Smart traders won't trade Countertrend until either there is a pullback from a strong trendline break or there is a reversal from a trend channel line over­shoot...Look at the volume at key turning points. It's huge.", "pages": "90-91", "book": "Reading Price Charts"}, {"id": "l_market-structure_223", "theme": "market-structure", "teaching": "Checklist of signs of a strong trend: big gap opening; trending highs/lows; no climaxes/large bars (largest bars often countertrend, a trap); no significant trend-channel overshoots (minor ones only cause sideways corrections); failed Wedges; 2-hour-no-EMA-touch (2HM); few/no profitable Countertrend trades; small pullbacks relative to average range; sideways (not deep) corrections after trendline breaks; repeated High/Low 2 and M2B/M2S entries; no two consecutive closes on the opposite side of the EMA; bars with small/no tails.", "quote": "Here are some characteristics of that are commonly found in strong trends: Big gap opening. Trending highs and lows (swings). No Climaxes and not many large bars...", "pages": "103", "book": "Reading Price Charts"}, {"id": "l_market-structure_224", "theme": "market-structure", "teaching": "An outside bar or trap that appears to run stops and push traders out of a strong trend often precedes a strong continuation leg, as trapped traders are forced to chase back in.", "quote": "An outside bar that traps traders out of a trend often leads to a strong trend leg as traders are forced to chase the market up.", "pages": "111", "book": "Reading Price Charts"}, {"id": "l_market-structure_225", "theme": "market-structure", "teaching": "When a market retraces a strong trend leg, the first price target is typically the earlier Countertrend entry points (the signal-bar extremes of failed opposite-direction trades along the way).", "quote": "When a market retraces a strong move, the first target is always the earlier Coun­tertrend entry points.", "pages": "89, 115", "book": "Reading Price Charts"}, {"id": "l_market-structure_226", "theme": "market-structure", "teaching": "Trendlines are most reliable/tradable when tested by a third touch/leg; a trendline built from only two points that are far apart, tested by a close third point, is a weaker basis for a trade.", "quote": "Trendlines work best when they are tested by a third leg, and here Bars 5 and 6 were essentially still part of the same leg...", "pages": "93", "book": "Reading Price Charts"}, {"id": "l_market-structure_227", "theme": "market-structure", "teaching": "The start (origin) of a Spike-and-Channel move typically gets tested within a day or two of the channel breaking, so Countertrend/target setups should be anticipated around that origin price on subsequent sessions.", "quote": "since the start ofthe channel often gets tested within a day or two, make sure to con­sider Countertrend setups on the next day.", "pages": "118-119", "book": "Reading Price Charts"}, {"id": "l_market-structure_228", "theme": "market-structure", "teaching": "The slope of the final flag of an old trend often approximates the slope of the new trend that follows the reversal, though this has limited standalone trading value.", "quote": "One final observation is that the slope of the final flag of a trend often provides an approximation of the slope of the new trend.", "pages": "91, 92", "book": "Reading Price Charts"}, {"id": "l_market-structure_229", "theme": "market-structure", "teaching": "A day can shift between trend day and trading range day (or reverse trend direction) at any time; accept the regime change and adapt rather than fighting it.", "quote": "a trend day can turn into a trading range day or a trend in the opposite direction at any time. When it happens, don't question it or be upset by it. Just accept it and trade it.", "pages": "82", "book": "Reading Price Charts"}, {"id": "l_market-structure_230", "theme": "market-structure", "teaching": "A pullback is technically a bar moving at least a tick against the trend, but functionally any pause (inside bar, opposite trend bar, or sideways action) should be treated as a pullback. Like any trend, a pullback itself usually has at least two legs (an ABC correction).", "quote": "Since a pullback itself is a trend... it will commonly have at least two legs.", "pages": "125-126", "book": "Reading Price Charts"}, {"id": "l_market-structure_231", "theme": "market-structure", "teaching": "Any move with two legs should be traded as if it's a pullback, even if it's actually With Trend (e.g., the final leg of a trend can be a two-legged With Trend move to a new extreme).", "quote": "Any move that has two legs should be traded as if it is a pullback, even if it is With Trend", "pages": "125", "book": "Reading Price Charts"}, {"id": "l_market-structure_232", "theme": "market-structure", "teaching": "If a trend ends in a genuine climax (trend channel line overshoot and reversal, or a significant reversal pattern), stop looking for pullback entries in the old trend — it's over, at least for an hour or the rest of the day.", "quote": "if there is a Wedge top or a Lower High after a break of the bull trendline, you should now be looking for shorts and not pullbacks in the old bull.", "pages": "126", "book": "Reading Price Charts"}, {"id": "l_market-structure_233", "theme": "market-structure", "teaching": "Pullbacks in a trend progress through an escalating hierarchy — bar (High/Low 1), minor trendline, EMA, EMA Gap, major trendline — each being the 'First Pullback' of its type, and each First Pullback is usually followed by at least a test of the trend extreme (often a new extreme) until the major trendline finally breaks.", "quote": "each type of \\\"first\\\" Countertrend move will therefore likely be followed by another leg in the trend.", "pages": "127-128", "book": "Reading Price Charts"}, {"id": "l_market-structure_234", "theme": "market-structure", "teaching": "Higher-timeframe (15/30/60min, daily) chart points of significance matter, but it's not worth watching them directly while trading the 5-minute chart — the 5-minute pullbacks tend to naturally end at those higher-timeframe points anyway, and watching multiple charts is a distraction that causes missed 5-minute signals.", "quote": "Although it is not worth the effort to pay attention to higher timeframe charts when trading on a 5-minute chart, it is likely that the larger 5-minute pullbacks end at 15, 30, or 60-minute... chart points of significance", "pages": "128", "book": "Reading Price Charts"}, {"id": "l_market-structure_235", "theme": "market-structure", "teaching": "Double top/bottom flags are structurally reversal-looking patterns but function as With Trend continuation setups — by ending the pullback they 'reverse' it, but the net effect is trend continuation. In a trend, most reversal patterns fail and most continuation patterns succeed.", "quote": "In a trend, most reversal patterns fail and most continuation patterns succeed.", "pages": "131-132", "book": "Reading Price Charts"}, {"id": "l_market-structure_236", "theme": "market-structure", "teaching": "Recognizing any one of several overlapping/coexisting chart patterns (e.g., Double Bottom, Spike and Trading Range Reversal) is reason enough to take the trade — you don't need to correctly label which pattern it 'really' is.", "quote": "Many patterns resemble one another and often coexist. All you need to do is recognize one of the patterns because by itself, it is a valid entry.", "pages": "132", "book": "Reading Price Charts"}, {"id": "l_market-structure_237", "theme": "market-structure", "teaching": "A 'gap' in Brooks' broader usage includes any bar failing to reach the EMA (e.g., a bull bar's high remaining below the EMA); in trending/sideways markets these EMA gaps tend to fill, and a second attempt to fill an unfilled gap (EMA Gap 2 Bar) has excellent odds.", "quote": "if the high of a bar is below the EMA, then there is a gap between that bar and the EMA... there is a good chance that the market will move to fill that gap", "pages": "134-135", "book": "Reading Price Charts"}, {"id": "l_market-structure_238", "theme": "market-structure", "teaching": "After a climactic/parabolic move devolves into a Tight Trading Range, risk/reward is poor — better to trade elsewhere until a breakout with strong trend bars occurs, then look for a failed breakout or Breakout Pullback.", "quote": "It is best to look to trade other stocks after a climax devolves into a Tight Trading Range, because the risk reward ratio is poor.", "pages": "138", "book": "Reading Price Charts"}, {"id": "l_market-structure_239", "theme": "market-structure", "teaching": "After a climactic move, don't take With Trend EMA pullback entries unless the pullback has been long (roughly an hour or more) and the setup is strong — an unusually long, undisrupted run (e.g., 20 bull bars with only 1 pullback bar) is itself a climax and unsustainable.", "quote": "unusual behavior is not sustainable and therefore a form of a climax... traders should not look to enter With Trend on an EMA pullback unless the pullback has been long", "pages": "137-138", "book": "Reading Price Charts"}, {"id": "l_market-structure_240", "theme": "market-structure", "teaching": "Corrections don't always have exactly two legs — sometimes four (or three, as in Wedges); the underlying principle (traps, failed reversal attempts) still applies regardless of the exact count.", "quote": "Corrections Sometimes Have Four Legs and Not Two", "pages": "153-154", "book": "Reading Price Charts"}, {"id": "l_market-structure_241", "theme": "market-structure", "teaching": "A Wedge pullback typically has three pushes but functionally behaves as a two-legged pullback, with the second and third pushes being subdivisions of the second leg.", "quote": "A Wedge Has Three Pushes But Is Often Two Legs", "pages": "157-158", "book": "Reading Price Charts"}, {"id": "l_market-structure_242", "theme": "market-structure", "teaching": "Complex, hard-to-count corrections on the 5-minute chart often simplify into an obvious High/Low 1 or 2 on a higher timeframe chart, but it's not worth switching timeframes to check — trade what's evident on the 5-minute chart and avoid missing signals.", "quote": "complex corrections on the 5-minute chart often appear as simple High/Low 1 or 2 corrections on higher timeframe charts. It is not worth looking at the higher timeframe charts", "pages": "145", "book": "Reading Price Charts"}, {"id": "l_market-structure_243", "theme": "market-structure", "teaching": "When the market is clearly trending strongly in one direction, don't bother looking to fade with Low 1/Low 2 (in a bull) or High 1/High 2 (in a bear) setups against the dominant trend — only trade the with-trend counts.", "quote": "Although many are labeled, when the market is clearly trending up, you should not be looking to sell most Low 1 and Low 2 setups.", "pages": "147", "book": "Reading Price Charts"}, {"id": "l_market-structure_244", "theme": "market-structure", "teaching": "Three-legged corrections in trends are common and are often really just two legs where the second leg itself contains two smaller legs; when leg-counting gets too hard, stop analyzing and focus on trend direction and price relative to the EMA.", "quote": "When it gets this hard to think about it, stop thinking about anything other than the trend and the market's inability to get much above the EMA.", "pages": "161", "book": "Reading Price Charts"}, {"id": "l_market-structure_245", "theme": "market-structure", "teaching": "Trading ranges are generally continuation patterns — they more often break out in the direction of the trend that preceded them, and tend to break out away from the EMA (below EMA -> break down; above EMA -> break up), especially when adjacent to the EMA.", "quote": "In general, all trading ranges are continuation patterns, meaning that they more often than not break out in the direction of the trend that preceded them. They also tend to break out away from the EMA.", "pages": "163", "book": "Reading Price Charts"}, {"id": "l_market-structure_246", "theme": "market-structure", "teaching": "The longer a trading range persists, the greater the odds it becomes a reversal pattern (accumulation in a bear range, distribution in a bull range) rather than a simple continuation.", "quote": "the longer a trading range continues, the greater are the odds that it will become a reversal pattern (accumulation in a bear trading range, distribution in a bull trading range)", "pages": "163", "book": "Reading Price Charts"}, {"id": "l_market-structure_247", "theme": "market-structure", "teaching": "Weak-hand traders (who barely move the market on a small breakout attempt) are distinct from institutional traders (whose entries are followed by large, decisive trend bars); institutional conviction is what actually drives sustained moves.", "quote": "The Bar 5 longs were institutional traders who bought with conviction, as evidenced by the large bull trend bars that followed.", "pages": "170", "book": "Reading Price Charts"}, {"id": "l_market-structure_248", "theme": "market-structure", "teaching": "Two legs commonly lead to a reversal, and breaking yesterday's low/high while forming the second leg increases the chance of a reversal.", "quote": "it is also the second leg down, and two legs commonly lead to a reversal. Also, it took out yesterday's low, so again there is an increased chance of a reversal upward.", "pages": "173", "book": "Reading Price Charts"}, {"id": "l_market-structure_249", "theme": "market-structure", "teaching": "A big up move fully retraced by a big down move (or vice versa) usually forms a trading range, but may instead be the start of a new trend; the presence/absence of a clear reversal pattern at the end of the second leg is the deciding factor, and lacking one, an approximate first target for continuation is twice the height of the first leg.", "quote": "If there is a reversal pattern at the end of the second move...there should be at least a reversal scalp. If not, the second leg may just keep trending, and an approximate first target is twice the height of the first leg.", "pages": "176", "book": "Reading Price Charts"}, {"id": "l_market-structure_250", "theme": "market-structure", "teaching": "Spike-and-Channel moves, no matter how strong, are usually followed by a test of the start of the channel.", "quote": "Spike and Channel bulls, no matter how strong they appear, are usually followed by a test of the beginning of the channel.", "pages": "177-178", "book": "Reading Price Charts"}, {"id": "l_market-structure_251", "theme": "market-structure", "teaching": "Trend reversals commonly form out of the FINAL trading range of a Trending Trading Range day, in the last hour or two; reversal of the entire day is rare. Reversal-type small ranges at bottoms tend to have larger bars/tails than at tops (though this asymmetry is not itself actionable).", "quote": "These are common in Trending Trading Range days, where there usually is a reversal of at least the final trading range in the final hour or two and rarely even a reversal of the entire day.", "pages": "178", "book": "Reading Price Charts"}, {"id": "l_market-structure_252", "theme": "market-structure", "teaching": "A pair of big opposite-direction range bars, or one/more big-range dojis, at an extreme of the day signals two-sided trading; it is not prudent to buy the high of day or sell the low of day in that context — prefer to wait for a trap/small-bar setup.", "quote": "when there are a pair of big range bars of opposite direction or one or more big range dojis at an extreme of the day, it is usually better to look for a reversal entry because...when there is two-sided trading, it is not prudent to be buying at the high of the day or selling at the low.", "pages": "179", "book": "Reading Price Charts"}, {"id": "l_market-structure_253", "theme": "market-structure", "teaching": "If there was already a strong move/first leg earlier in the day, a later With Trend breakout is more likely to succeed and failures will likely fail-again into a Breakout Pullback; if the day has been mostly trendless with brief two-way breakouts, breakout failures are more likely to become genuine reversals.", "quote": "If there was a strong move or a first leg of a trend earlier in the day, then a With Trend breakout later in the day is more likely to be successful...However, if most of the day has been trendless...the odds of a failure leading to a reversal are increased.", "pages": "185", "book": "Reading Price Charts"}, {"id": "l_market-structure_254", "theme": "market-structure", "teaching": "Two strong trend legs (a completed Measured Move) can represent the end of a higher-timeframe correction rather than just the end of a single 5-min trend; expect at least a protracted countertrend move of two-plus legs (sometimes a full new opposite trend) that will likely retest the trading range at the middle of the Measured Move.", "quote": "Two legs often complete a move and usually result in at least a protracted Countertrend move of at least two smaller legs, and sometimes a new, opposite trend.", "pages": "192", "book": "Reading Price Charts"}, {"id": "l_market-structure_255", "theme": "market-structure", "teaching": "After a breakout, either a 'thin area' (no/minimal bar overlap from strong momentum) or a 'fat area' (small trading range) tends to form; the midpoint of either is a rough guide to the midpoint of the overall leg, usable for Measured Move projections.", "quote": "A breakout often forms either a thin area...or a fat area...The midpoint of both often becomes the midpoint of the move.", "pages": "193-194", "book": "Reading Price Charts"}, {"id": "l_market-structure_256", "theme": "market-structure", "teaching": "Protective stops clustered just beyond huge trend bars (small tails) are a common magnet — price commonly works its way to run those stops before reversing back in the trend's direction.", "quote": "It is fairly common for the market to work its way to those stops and then reverse back in the direction of the trend bar.", "pages": "199-200", "book": "Reading Price Charts"}, {"id": "l_market-structure_257", "theme": "market-structure", "teaching": "The single most important rule: never even think about trading against a trend until after a significant trendline has broken; even then, look for With-Trend trades first because the market usually goes back to test the old trend extreme before truly reversing.", "quote": "The single most important rule in this book is that you should never even be thinking about trading against a trend until after there has been a break of a significant trendline.", "pages": "201", "book": "Reading Price Charts"}, {"id": "l_market-structure_258", "theme": "market-structure", "teaching": "Whenever the market tries twice to do something and fails both times, it usually then tries the opposite (basis for trading the second failed test of an extreme).", "quote": "whenever the market tries twice to do something and fails, it usually tries the opposite.", "pages": "201, 217", "book": "Reading Price Charts"}, {"id": "l_market-structure_259", "theme": "market-structure", "teaching": "A 'reversal' in practical trading terms need not meet strict technician criteria (a series of confirmed HH/HL or LH/LL); a trader believes a reversal has occurred as soon as they are willing to trade against the prior trend, e.g., buying in a bear believing price won't trade a tick lower.", "quote": "Once a trader is initiating trades in the opposite direction to the trend, that trader believes that the trend has reversed even thought the strict criteria have not yet been met.", "pages": "201-202", "book": "Reading Price Charts"}, {"id": "l_market-structure_260", "theme": "market-structure", "teaching": "Two technical requirements for a trend reversal: (1) absolute requirement — break of the prior trend's trendline; (2) usual (not required) — a successful test of the old trend's extreme after the break.", "quote": "Most would agree on two requirements for a trend reversal. The first is an absolute requirement: the move has to break a trendline from the prior trend. The second requirement happens most of the time but is not required: after the trendline break, the market comes back and successfully tests the extreme of the old trend.", "pages": "202", "book": "Reading Price Charts"}, {"id": "l_market-structure_261", "theme": "market-structure", "teaching": "Most trends end with a breakout of the trend channel line, either via an overshoot-then-reversal (typically followed by two legs down/up with the first pullback forming a Lower High/Higher Low), or by falling straight through the trendline without overshooting first (test can be Higher High or Lower High, occurring about equally often).", "quote": "Either there is an overshoot of the bull trend channel line that fails and is followed by a reversal down and then a break below the bull trendline, or the market can fall through the bull trendline without first overshooting the trend channel line.", "pages": "202-203", "book": "Reading Price Charts"}, {"id": "l_market-structure_262", "theme": "market-structure", "teaching": "Trends last much longer than most traders imagine; as a result most reversal patterns fail (some even become continuation setups) while most continuation patterns succeed.", "quote": "An important point is that trends last much longer than most traders would ever imagine. Because of that, most reversal patterns fail (and some become continuation setups), and most continuation patterns succeed.", "pages": "203", "book": "Reading Price Charts"}, {"id": "l_market-structure_263", "theme": "market-structure", "teaching": "A large share of extreme-tick volume in modern markets is computer/algorithm driven; some models keep buying right to the high tick or shorting to the very low tick because that maximizes their own profit equation (e.g., delta-neutral options spreads), not because they're 'wrong' about direction.", "quote": "A large percentage and possibly the majority of the day's volume is driven by mathematical models, and some of those models will continue to buy until there is a clear trend change...", "pages": "203-204", "book": "Reading Price Charts"}, {"id": "l_market-structure_264", "theme": "market-structure", "teaching": "Typically, entries in trend pullbacks look bad but are profitable, while entries in reversals look good but are losers; countertrend reversal trades should only be taken if the setup is clear and strong.", "quote": "Typically, entries in trend pullbacks look bad but are profitable, and entries in reversals look good but are losers...you should never take a reversal trade unless it is clear and strong.", "pages": "206-207", "book": "Reading Price Charts"}, {"id": "l_market-structure_265", "theme": "market-structure", "teaching": "Major reversals off strong bear markets are often volatile with large bars and multiple false starts ('Oops, I'm too early'), which is why many major reversals end with large-range bars and either a Failed Flag or a Three Push pattern.", "quote": "This can happen several times before the final bottom is in and accounts for why so many major reversal end with large range bars and either a Failed Flag or a Three Push pattern.", "pages": "207", "book": "Reading Price Charts"}, {"id": "l_market-structure_266", "theme": "market-structure", "teaching": "Signs of strength of a trendline break (first leg of a possible reversal): move covers many points; goes well past the EMA; extends beyond the last swing point of the old trend; lasts 10-20+ bars; occurs after prior strong trendline breaks; the test-back to the old extreme lacks momentum/has overlapping bars; the test fails at the EMA/old trendline without reaching the extreme.", "quote": "Here are many characteristics of strong reversals: Strong reversal bar. Second entry signal. Trap Bar...Began as a reversal from an overshoot of a trend channel line...", "pages": "211-215", "book": "Reading Price Charts"}, {"id": "l_market-structure_267", "theme": "market-structure", "teaching": "A test of a prior trend's extreme after a trendline break can overshoot (start of the FIRST leg of the new trend, e.g. a Lower Low in a new bull) or undershoot (start of the SECOND leg, e.g. a Higher Low in a new bull); this distinction tells you which leg count you're in.", "quote": "Since a Countertrend move after a trendline break usually has at least two legs, if a bull reversal has a Higher Low for the test of the bear low, it will also be the start of the second leg...if it forms a Lower Low for the test, that low will be the start of the first leg...", "pages": "217", "book": "Reading Price Charts"}, {"id": "l_market-structure_268", "theme": "market-structure", "teaching": "Most sharp momentum spikes get tested eventually even after deep, lengthy retracements — especially if the spike is in a trading range or in the direction of the larger trend; a spike that is the FIRST countertrend move within a strong trend usually does NOT get tested (it just traps the countertrend traders).", "quote": "the extremes of most of those sharp momentum spikes that have deep, lengthy retracements still end up being tested, and most are exceeded...it is not likely if it is the first Countertrend move in a strong trend.", "pages": "217, 219-220", "book": "Reading Price Charts"}, {"id": "l_market-structure_269", "theme": "market-structure", "teaching": "Climax reversals (trend channel line overshoot/reversal, climactic Failed Final Flag) don't require a pullback test of the extreme; climaxes are far more common on smaller timeframes (several per day on a 1-minute chart vs. a couple per month on 5-minute).", "quote": "Climaxes are much more common on smaller time frame charts. For example, a 1-minute chart often has several each day, whereas a 5-minute chart might only have a couple each month.", "pages": "217", "book": "Reading Price Charts"}, {"id": "l_market-structure_270", "theme": "market-structure", "teaching": "Named chart patterns (Head and Shoulders, Triple Bottom/Top with strict tick-identical definitions, Measured Moves) are of minor reliability/importance; bar-by-bar price action close to the entry location deserves far more attention than the named pattern itself, and loose/approximate versions of reliable patterns still tend to trade like the reliable pattern.", "quote": "Also, most Head and Shoulder patterns fail and are not nearly as reliable as the bar-by-bar price action...Traders will make much more money by using loose definitions. When something resembles a reliable pattern, it will likely trade like the reliable pattern.", "pages": "212, 228, 236", "book": "Reading Price Charts"}, {"id": "l_market-structure_271", "theme": "market-structure", "teaching": "Measured Moves are minor and not terribly reliable and should generally be ignored as a primary trading signal; only worth considering as a minor confirming factor once a strong trend reaches that area AND there's still a good independent setup.", "quote": "Measured Moves are of minor importance and not terribly reliable and in general should be ignored.", "pages": "221", "book": "Reading Price Charts"}, {"id": "l_market-structure_272", "theme": "market-structure", "teaching": "In a Trending Trading Range Day, don't short near the bottom of the range (or buy near the top) unless there is a genuinely strong reversal setup — a weak Double Top/Bottom Pullback that doesn't retrace close enough to the pattern is unreliable there.", "quote": "it is not wise to short near the bottom of a trading range unless there is a strong setup, and this is not.", "pages": "232", "book": "Reading Price Charts"}, {"id": "l_market-structure_273", "theme": "market-structure", "teaching": "Any breakout beyond a swing high or low — even one that belongs to an earlier, opposite trend — is a sign of strength and a potential trade setup worth noting.", "quote": "Breaking out beyond any swing high or low, even if it was part of an earlier and opposite trend, is a sign of strength and a potential trade setup.", "pages": "238", "book": "Reading Price Charts"}, {"id": "l_market-structure_274", "theme": "market-structure", "teaching": "An Expanding Triangle traps traders on both sides progressively (each swing larger than the last) until all traders capitulate to the same side and a trend begins; after completing, it often reverses into an Expanding Triangle flag (continuation) in the opposite direction.", "quote": "The salient point is that it is a series of progressively greater Higher Highs and Lower Lows that continue to trap breakout traders, and at some point they capitulate, and then all of the traders are on the same side, creating a trend.", "pages": "242", "book": "Reading Price Charts"}, {"id": "l_market-structure_275", "theme": "market-structure", "teaching": "A trendline break signals a possible trend reversal; a trend-channel-line break signals the trend has gotten stronger/steeper — the two breaks have opposite implications and should be traded oppositely.", "quote": "The break of a trendline means that a possible trend reversal is underway, but breaking a trend channel line means that the trend has increased in strength and is now steeper.", "pages": "260", "book": "Reading Price Charts"}, {"id": "l_market-structure_276", "theme": "market-structure", "teaching": "If a trade only reaches a scalper's profit before reversing (rather than being stopped out), there is far less fuel for a countertrend move, because far fewer traders are truly trapped and many scalpers already exited at breakeven with tighter stops.", "quote": "If a trade makes a scalper's profit...and then comes back and takes out the original signal or entry bar stops, there is much less fuel left in the market to drive the market in this new direction because there are far fewer traders who are trapped.", "pages": "221", "book": "Reading Price Charts"}, {"id": "l_market-structure_277", "theme": "market-structure", "teaching": "The single most reliable minor reversal is one at the end of a pullback in a strong trend, especially near the EMA, since you enter with the larger trend and can expect at least a test of the prior trend extreme.", "quote": "The single most reliable minor reversal is one that takes place at the end of a pullback in a strong trend, especially near the EMA, because you are then entering in the direction of a larger trend.", "pages": "221-222", "book": "Reading Price Charts"}, {"id": "l_market-structure_278", "theme": "market-structure", "teaching": "One-tick (or a few tick) failed breakouts are extremely common, especially in the Eminis, because traders place protective stops one tick beyond signal/entry bars; when hit, the resulting move is usually strong and big enough for at least a scalper's profit in the opposite direction, since only one side (the trapped side) remains active.", "quote": "A One-Tick Failure is a reliable sign that the market is going the other way, so look for setups that allow you to enter.", "pages": "223-226", "book": "Reading Price Charts"}, {"id": "l_market-structure_279", "theme": "market-structure", "teaching": "Second tests of the EMA should normally be closer to or penetrate the EMA more than the first test; when a reversal begins before the pullback reaches the EMA, the setup is missing the fuel that a proper EMA-touching pullback would have provided.", "quote": "Normally, second tests of the EMA are closer to the EMA or penetrate it more than the first...When the reversal begins before this happens, it will be missing the fuel that those shorts would have provided.", "pages": "254", "book": "Reading Price Charts"}, {"id": "l_market-structure_280", "theme": "market-structure", "teaching": "On a small, sideways, range-bound day, betting on any single breakout becoming a trend is a low-probability bet; better to fade breakouts or trade strong Breakout Pullbacks instead.", "quote": "This is always a low-probability bet on a small day, and it is much better to fade the breakouts or look for strong Breakout Pullbacks.", "pages": "233", "book": "Reading Price Charts"}, {"id": "l_market-structure_281", "theme": "market-structure", "teaching": "A horizontal trading range/flag is a magnet — it represents balance between buyers and sellers, so any breakout tends to get pulled back to re-test that balance area before a real trend resumes.", "quote": "A horizontal area is an area of two-sided trading where the buyers and sellers are evenly balanced, and therefore this area acts as a magnet that pulls each little move up or down back to the center or opposite side.", "pages": "269", "book": "Reading Price Charts"}, {"id": "l_market-structure_282", "theme": "market-structure", "teaching": "Choose a market/instrument that can absorb your full desired size without slippage; the 5-minute ES/Emini is essentially unlimited in this regard, which is why it's the preferred instrument as size grows.", "quote": "The 5-minute S&P Emini futures contract can handle any order size that an individual trader can place; you will never outgrow it.", "pages": "282", "book": "Reading Price Charts"}, {"id": "l_market-structure_283", "theme": "market-structure", "teaching": "The 5-minute chart is the 'sweet spot' timeframe: enough trades (about a dozen a day), enough time to read and place orders, and a materially higher winning percentage than 1- or 3-minute charts, which tend to induce cherry-picking and missed high-quality trades.", "quote": "The 5-minute is the sweet spot and it offers at least 10 trades a day and gives you time to think about the setups and to place your orders.", "pages": "282, 286", "book": "Reading Price Charts"}, {"id": "l_market-structure_284", "theme": "market-structure", "teaching": "Never trade Countertrend on the 1-minute chart — apparent 1-minute reversals against a strong 5-minute trend are usually just shorts/longs covering into the with-trend crowd's entries, and countertrend 1-minute trades lose money.", "quote": "Trading Countertrend on the I-minute will cost you money. In fact, those three long setups are at exactly the price that the I-minute shorts would cover...", "pages": "287", "book": "Reading Price Charts"}, {"id": "l_market-structure_285", "theme": "market-structure", "teaching": "Heavy bar overlap with the prior bar after a large reversal bar can indicate a trading range forming; don't buy at the top of that range — instead look for trapped traders, small bars, and second entries.", "quote": "Bar 2 was a large bull reversal bar but whenever there is a lot of overlap with the prior bar, a trading range might be forming and you should never be looking to buy at the top of a range. Instead, look for trapped traders, small bars, and second entries.", "pages": "289", "book": "Reading Price Charts"}, {"id": "l_market-structure_286", "theme": "market-structure", "teaching": "The market usually tries to test gaps, so traders should look for opportunities to trade toward the gap after a failed breakout.", "quote": "a short on a failed breakout to a new high on a gap up day that could lead to a test of the gap (the market usually tries to test gaps so traders should look for opportunities to trade in that direction).", "pages": "291", "book": "Reading Price Charts"}, {"id": "l_market-structure_287", "theme": "market-structure", "teaching": "Premarket/Globex extremes often get tested during the day session, but there is little benefit to watching Globex directly — day-session price action alone gives the same signals with less risk of confusion/mistakes.", "quote": "Nothing was gained by watching both charts, and trying to do so increases the chances that you will not be quick enough to take all of the available trades and make mistakes in your order placement.", "pages": "293, 317-318", "book": "Reading Price Charts"}, {"id": "l_market-structure_288", "theme": "market-structure", "teaching": "An investor holds for fundamentals over months/years; a (position/swing) trader holds days off daily charts with partial profits and a breakeven stop; a day-trade scalper holds 1-15 minutes for one small leg with no tolerance for a pullback into a loss; a day-trade swing trader holds through pullbacks for 2-4 larger swings a day.", "quote": "In the eyes of a trader or investor using daily to monthly time frames, all day trading is scalping.", "pages": "295, 296", "book": "Reading Price Charts"}, {"id": "l_market-structure_289", "theme": "market-structure", "teaching": "Entering on a stop is preferable because it means you are being carried into the trade by the market's own momentum, i.e. trading in the direction of at least a tiny trend.", "quote": "One of the best ways to trade using price action is to enter on a stop because you are being carried into the trade by the market's momentum and therefore are trading in the direction of at least a tiny trend (at least one tick long).", "pages": "303-304", "book": "Reading Price Charts"}, {"id": "l_market-structure_290", "theme": "market-structure", "teaching": "One-tick false breakouts in the first minute or two of a countertrend 5-minute entry bar are common and less reliable than breakouts occurring in the final minute of the bar, which carry momentum into the next bar.", "quote": "Breakouts that occur in the final minute of the bar tend to be more reliable because you then have momentum right at the end of the bar.", "pages": "306", "book": "Reading Price Charts"}, {"id": "l_market-structure_291", "theme": "market-structure", "teaching": "In a Tight Trading Range, do not enter in either direction until there is a large trend bar breaking out of the pattern by at least 3-4 ticks, then wait for that bar to fail — or fade a small bar right at the top/bottom of the range.", "quote": "In a Tight Trading Range like this, you should never enter in either direction until after there is a large trend bar that breaks out of the pattern by at least 3 or 4 ticks, and then wait for that bar to fail, or unless there is a small bar that you can fade near the top or bottom of the trading range.", "pages": "306", "book": "Reading Price Charts"}, {"id": "l_market-structure_292", "theme": "market-structure", "teaching": "Institutions defend their entries: price will often probe one tick shy of a heavily-populated stop level repeatedly rather than trigger it, because triggering it would change the market's character (turning a strong second entry into a failed one).", "quote": "Everyone knows that there are many protective stops just one tick below that entry bar low . . . why isn't the smart money gunning for it? Because if those stops are hit, the character of the market will have changed.", "pages": "309-310, 313-314", "book": "Reading Price Charts"}, {"id": "l_market-structure_293", "theme": "market-structure", "teaching": "During the first hour, volatility is higher and patterns run further and reversals can look weak (two or three doji bars) before breaking out — don't scratch out of a correctly-read trade just because it looks weak initially.", "quote": "It is common for reversals to look weak and have two or three doji bars before the trend breaks out. Realize that this is common, and if you entered and see this weakness, don't scratch out.", "pages": "315", "book": "Reading Price Charts"}, {"id": "l_market-structure_294", "theme": "market-structure", "teaching": "Opening price is a brief equilibrium, not set deliberately by any firm; institutions with large orders to fill often prefer the market to move away from their desired price first (creating a false move) so they can fill aggressively at a better price once price reverses back toward value, which is one explanation for common Opening Reversals.", "quote": "If the institutions have a large amount of buying planned for the day, why would the market ever open above yesterday's close and then selloff before rallying to a new high?", "pages": "316-317", "book": "Reading Price Charts"}, {"id": "l_market-structure_295", "theme": "market-structure", "teaching": "The vast majority of opens relate to the final hour or so of the prior day's price action and take the form of a breakout, failed breakout, breakout pullback, or trend from the open — anticipate these setups before the open by reviewing yesterday's close.", "quote": "The vast majority of opens are related to the price action of the final hour or so of the prior day and take the form of a breakout, a failed breakout, a breakout pullback, or a trend from the open, and any of these can move very fast.", "pages": "317, 319", "book": "Reading Price Charts"}, {"id": "l_market-structure_296", "theme": "market-structure", "teaching": "A two-legged countertrend move in the final hour or two of the prior day that breaks a major trendline commonly signals a trend reversal attempt on today's open (Higher Low or Lower Low).", "quote": "A two-legged Countertrend move in the final hour or two that breaks a major trendline is a common pattern. It alerts you to look for a trend reversal on the open in the form of a Higher Low or a Lower Low.", "pages": "319", "book": "Reading Price Charts"}, {"id": "l_market-structure_297", "theme": "market-structure", "teaching": "The EMA can be misleading right at the open when price opens far from it and then reverses strongly against the EMA's slope; price action should be trusted over the indicator in that situation.", "quote": "Although the EMA is often helpful in the first hour, the price action is more important so do what the market is telling you and not what the indicator is saying.", "pages": "320", "book": "Reading Price Charts"}, {"id": "l_market-structure_298", "theme": "market-structure", "teaching": "A trap of the crowd at the start of a strong trend (e.g., bulls trapped long right before a big up move) is common at trend starts and signals the trend will likely go far.", "quote": "A trap like this is common at the start of a strong trend and is a sign that the trend will likely go far.", "pages": "321", "book": "Reading Price Charts"}, {"id": "l_market-structure_299", "theme": "market-structure", "teaching": "After a strong move ends in Three Pushes and then sells off with less momentum (shallower slope, smaller bars, more tails), the high of the Three Pushes is likely to be exceeded shortly — it's probably a higher-time-frame Higher Low, not a real top.", "quote": "the odds are high that the high of the Three Pushes will be exceeded shortly because this is likely a higher time frame Higher Low.", "pages": "324", "book": "Reading Price Charts"}, {"id": "l_market-structure_300", "theme": "market-structure", "teaching": "A gap should conceptually be treated as one giant invisible trend bar for pattern-reading purposes (e.g., a gap up plus a channel rally = a Gap Spike and Channel Bull).", "quote": "The gap should be looked at as if it were one huge, invisible trend bar.", "pages": "330", "book": "Reading Price Charts"}, {"id": "l_market-structure_301", "theme": "market-structure", "teaching": "A Big-Up-Big-Down sequence (strong move one way fully reversed) usually ends in a trading range for the rest of the day.", "quote": "Big Up (to Bar 7), Big Down usually ends in a trading range, as it did on this day.", "pages": "331", "book": "Reading Price Charts"}, {"id": "l_market-structure_302", "theme": "market-structure", "teaching": "A market turning up from a failed Low 2 (or similarly a failed breakdown) often rallies for at least two more legs; since big gap days often become trend days, such a reversal can be the start of a large move.", "quote": "A market that turns up from a Low 2 often rallies for at least two more legs, and since big gap days often become trend days, this could be, and was, the start of a big move.", "pages": "331", "book": "Reading Price Charts"}, {"id": "l_market-structure_303", "theme": "market-structure", "teaching": "On strong trend days, countertrend Pullback Bars (Low 1, Low 2 against a bull, etc.) appearing right after entry indicate more bullish/bearish price action confirmation is still needed before the leg extends — traders should stay biased toward the dominant trend and largely ignore counter-trend buy/sell signals.", "quote": "in strong bear trend days, it is often wise to ignore the buys to make sure that you catch the shorts.", "pages": "333", "book": "Reading Price Charts"}, {"id": "l_market-structure_304", "theme": "market-structure", "teaching": "The third 5-minute bar of the day coincides with the close of the first 15-minute bar, so institutional traders watching 15-minute charts pay extra attention to it; don't trade it alone, but be aware of its added significance when other price action supports a trade there.", "quote": "the first 15-minute bar closes at the close of the third 5-minute bar... trading the breakout of the third bar of the day often leads to a big move... Do not place a trade on the third bar alone.", "pages": "336", "book": "Reading Price Charts"}, {"id": "l_market-structure_305", "theme": "market-structure", "teaching": "A strong trend off the open — even if later reversed — shows traders were willing to be aggressive in that direction and are likely to act aggressively again later in the day if a reversal falters.", "quote": "A strong trend off the open, even if it is reversed, still means that there were traders willing to trade aggressively in that direction, and they will be quick to trade again in that direction later in the day if the reversal falters.", "pages": "338", "book": "Reading Price Charts"}, {"id": "l_market-structure_306", "theme": "market-structure", "teaching": "A strong series of trend bars off the open followed by a partial pullback that gets retested 5-10 bars later forms a Double Top/Bottom Flag entry with a good chance of a new extreme and a trend.", "quote": "If there is a series of strong trend bars off the open and then a partial pullback that gets tested 5 to 10 bars later... this forms a Double Bottom or Top Flag entry and has a good chance of leading to a new extreme on the day and often leads to a trend.", "pages": "338", "book": "Reading Price Charts"}, {"id": "l_market-structure_307", "theme": "market-structure", "teaching": "Countertrend moves are often composed of exactly two legs; after a climactic move, expect a two-legged countertrend correction.", "quote": "Countertrend moves are often made of two legs... after a climax... there is often a two-legged Countertrend move.", "pages": "335, 343", "book": "Reading Price Charts"}, {"id": "l_market-structure_308", "theme": "market-structure", "teaching": "In a strong trend, only the first pullback that actually breaks a meaningful trendline counts as 'the First Pullback'; minor sideways bars before that are still part of the first leg and should be traded With Trend, not treated as pullback/reversal risk.", "quote": "Only after a trendline is broken has there been a significant pullback, and the first leg has likely ended... all the With Trend entries before then are simply part of the first leg of the trend.", "pages": "347-348", "book": "Reading Price Charts"}, {"id": "l_market-structure_309", "theme": "market-structure", "teaching": "On very strong trend days with no clear pullback, it is reasonable to buy/sell full swing size at the market at almost any point, trusting the trend will make a new extreme before any pullback goes far — an unclear pullback means countertrend traders are weak.", "quote": "on strong days like this you can just buy your swing size position at the market at any point... an unclear pullback means the Countertrend traders are very weak.", "pages": "350", "book": "Reading Price Charts"}, {"id": "l_market-structure_310", "theme": "market-structure", "teaching": "Price action's underlying 'fingerprint' (the patterns and behaviors) has remained essentially unchanged across history and markets — the same setups appear on a 1933-34 Dow daily chart as on modern intraday charts.", "quote": "Price action is the cumulative result of a large number of traders acting independently for countless reasons to make as much money as they can. Because of that, its fingerprint has remained unchanged.", "pages": "358", "book": "Reading Price Charts"}, {"id": "l_market-structure_311", "theme": "market-structure", "teaching": "Two consecutive failed attempts by one side to push through a level is a strong signal that a big move in the opposite direction is coming.", "quote": "When two attempts at something fail, expect a big move in the opposite direction.", "pages": "363", "book": "Reading Price Charts"}, {"id": "l_market-structure_312", "theme": "market-structure", "teaching": "When a market has been so strong that it fails to come back and test the expected retracement levels of several prior patterns, the eventual correction, when it finally comes, tends to be much deeper and longer-lasting than anyone anticipates.", "quote": "Whenever the market has so much strength that it does not come back to test the expected prices for several patterns as it did here... when the correction finally comes, it will usually last longer and be much deeper than anyone anticipates.", "pages": "369", "book": "Reading Price Charts"}, {"id": "l_market-structure_313", "theme": "market-structure", "teaching": "Corrections that follow a channel move usually lead to a trading range rather than an immediate resumption or sharp reversal.", "quote": "Corrections after channels usually lead to trading ranges, and since this is a weekly chart, we may go largely sideways for several more years.", "pages": "369", "book": "Reading Price Charts"}, {"id": "l_market-structure_314", "theme": "market-structure", "teaching": "The term 'Head and Shoulders' should be avoided because most H&S patterns fail (become continuation, not reversal) while most Double Bottom/Top Pullbacks — which look similar — succeed; conflating the two terms hides the distinction that matters.", "quote": "Most Double Bottom Pullbacks are Head and Shoulders Bottoms, but since most Head and Shoulder patterns fail... and most Double Bottom Pullbacks succeed, you should distinguish them and never bother with the term 'Head and Shoulders.'", "pages": "367", "book": "Reading Price Charts"}, {"id": "l_market-structure_315", "theme": "market-structure", "teaching": "Volume should almost never be used on intraday (5-minute) charts because it has unreliable predictive value there; the 5-minute chart is the one you should trade exclusively.", "quote": "You should rarely if ever look at volume on intraday charts because of its unreliable predictive value on the 5-minute chart, which is the chart that you should be using exclusively for trading.", "pages": "370", "book": "Reading Price Charts"}, {"id": "l_market-structure_316", "theme": "market-structure", "teaching": "Strong trending conditions occur only about 20% of the time or less; most markets/most of the time are non-trending, which is why trend pullback setups (High2/Low2 at the EMA) are so valuable when present.", "quote": "Most markets are in a strong trend maybe 20 percent of the time or less.", "pages": "356", "book": "Reading Price Charts"}, {"id": "l_market-structure_317", "theme": "market-structure", "teaching": "Always be alert to buy the first Higher Low that forms after a possible major Lower Low (and symmetrically, short the first Lower High after a possible major Higher High) — these are the highest-value early confirmation entries of a reversal.", "quote": "You always need to be looking to buy that first Higher Low after a possible major Lower Low.", "pages": "359", "book": "Reading Price Charts"}, {"id": "l_market-structure_318", "theme": "market-structure", "teaching": "Always look to short the first Lower High that follows a Higher High which could be marking a major reversal (mirror-image extension of the 'first Higher Low' rule).", "quote": "You always must look to short the first Lower High after a Higher High that could be a major reversal.", "pages": "363", "book": "Reading Price Charts"}, {"id": "l_market-structure_319", "theme": "market-structure", "teaching": "Identify trend days as early as the first couple of hours (often obvious by the third bar); once identified, stop looking for countertrend entries and trade only with-trend for the rest of the day.", "quote": "Every day, you should be examining the chart throughout the day and especially in the first couple of hours to determine if the day is a trend day... If it is, you should not be trading Countertrend.", "pages": "403", "book": "Reading Price Charts"}, {"id": "l_market-structure_320", "theme": "market-structure", "teaching": "Every type of first pullback in a trend is usually followed by a test of the trend's extreme (the day's high or low); expect this test and don't be shaken out by it.", "quote": "Every type of first pullback is usually followed by a test of the trend's extreme (here, the low of the day).", "pages": "405", "book": "Reading Price Charts"}, {"id": "l_market-structure_321", "theme": "market-structure", "teaching": "When the market attempts something twice and fails both times, it is likely to do the opposite next.", "quote": "When two attempts at anything fail, it is likely that the market will do the opposite (here, rally). It is also a Wedge.", "pages": "405, 409", "book": "Reading Price Charts"}, {"id": "l_market-structure_322", "theme": "market-structure", "teaching": "Every single bar is a potential signal bar in both directions; stay open to trend beginning on the very next bar without denial or hesitation when a surprise occurs.", "quote": "Every bar is a signal bar for both directions and the market can begin a trend up or down on the next bar... when the surprise happens, don't question or deny it. Just read it and trade it.", "pages": "407", "book": "Reading Price Charts"}, {"id": "l_market-structure_323", "theme": "market-structure", "teaching": "Beginners often trade too large a position when even a couple of winning trades feel like a small win — sizing to smaller instruments (e.g., SPY instead of Emini) can improve psychology and confidence while learning.", "quote": "If you find that you did not take a couple Emini trades in a row and they worked, you are likely trading too large a position size.", "pages": "409", "book": "Reading Price Charts"}, {"id": "l_market-structure_324", "theme": "market-structure", "teaching": "Buy low / sell high is the default rule EXCEPT in a clear, strong, established trend; you must be able to convincingly classify the day as one of the book's established trend patterns before buying high or selling low, otherwise assume trading-range behavior and fade the extremes instead.", "quote": "Buy low, sell high, except in a clear and strong trend... However, the market is in a trading range for the vast majority of the time... if you cannot convince yourself that it is, don't buy high, even if the momentum looks great, since the odds are great that you will be trapped.", "pages": "409", "book": "Reading Price Charts"}, {"id": "l_market-structure_325", "theme": "market-structure", "teaching": "Almost every chart segment can be classified under more than one named pattern simultaneously and the patterns typically point the same direction — you only need to recognize one of the overlapping labels to justify a trade.", "quote": "Every segment of every chart commonly can be classified as more than one pattern, and almost always the patterns will point in the same direction. All you have to see is just one to place a trade.", "pages": "409", "book": "Reading Price Charts"}, {"id": "l_market-structure_326", "theme": "market-structure", "teaching": "Good with-trend pullback entries deliberately look like terrible entries (following a mini-climax) in order to trap traders out of taking them, while genuine reversal setups look attractively clean specifically to trap countertrend traders in.", "quote": "Trends are always forming pullbacks that look like terrible entries but are profitable and reversals that look good but are losers.", "pages": "409-410", "book": "Reading Price Charts"}, {"id": "l_market-structure_327", "theme": "market-structure", "teaching": "The first 90 minutes is the easiest window to make money, with failed breakouts and breakout pullbacks of yesterday's patterns being especially easy to spot; beginners should avoid the middle of the day and the middle of the day's range.", "quote": "The easiest time to make money is in the first 90 minutes, and some of the easiest trades to spot are failed breakouts and breakout pullbacks of patterns from the prior day. Beginners should avoid trading in the middle of the day and in the middle of the day's range.", "pages": "410", "book": "Reading Price Charts"}, {"id": "l_market-structure_328", "theme": "market-structure", "teaching": "The best signal bars are trend bars in the direction of the trade; doji bars (one-bar trading ranges) are terrible signal bars, and buying above/selling below a doji against the trend tends to lose.", "quote": "The best signal bars are trend bars in the direction of your trade. Doji bars are one bar trading ranges and therefore terrible signal bars. You will lose if you buy above a trading range in a bear or sell below one in a bull.", "pages": "410", "book": "Reading Price Charts"}, {"id": "l_market-structure_329", "theme": "market-structure", "teaching": "Always look for two-legged moves; when the market fails twice at the same thing, expect success in the opposite direction on the next attempt.", "quote": "Always look for two legs. Also, when the market tries to do something twice and fails both times, that is a reliable signal that it will likely succeed in doing the opposite.", "pages": "411", "book": "Reading Price Charts"}, {"id": "l_market-structure_330", "theme": "market-structure", "teaching": "A '2HM' (market hasn't touched the EMA for two-plus hours, not necessarily the first two hours of the day) is a sign of a strong trend.", "quote": "2HM: The market has not touched the EMA for two or more hours. It is a sign of a strong trend, and it does not have to be the first two hours of the day.", "pages": "413", "book": "Reading Price Charts"}, {"id": "l_market-structure_331", "theme": "market-structure", "teaching": "A climax is a move that has gone too far too fast and reverses into either a trading range or an opposite trend, most often ending with a trend-channel-line overshoot.", "quote": "climax: A move that has gone too far too fast and has now reversed directions to either a trading range or an opposite trend. Most climaxes end with trend channel overshoots and reversals.", "pages": "414", "book": "Reading Price Charts"}, {"id": "l_market-structure_332", "theme": "market-structure", "teaching": "A trading range is a pullback on a higher time frame chart and will usually ultimately break out in the direction of the (higher-timeframe) trend, even though on the current chart it looks like neither side is in control.", "quote": "trading range ... It will usually ultimately break out in the direction of the trend, and is a pullback on a higher time frame chart.", "pages": "15", "book": "Reversals"}, {"id": "l_market-structure_333", "theme": "market-structure", "teaching": "Every price-action pattern is a fractal: any pattern seen on the current chart is a micro version of the same pattern on a higher time frame, and every standard pattern is itself a micro pattern of a still-higher time frame — patterns repeat across all time frames.", "quote": "fractal Every pattern is a fractal of a pattern on a higher time frame chart. This means that every pattern is a micro pattern on a higher time frame and every micro pattern is a standard pattern on a smaller time frame.", "pages": "11", "book": "Reversals"}, {"id": "l_market-structure_334", "theme": "market-structure", "teaching": "Traditional gaps (breakout, measuring, exhaustion) seen on daily charts have intraday equivalents in the form of moving-average gaps — a bar failing to touch the EMA is functionally the same signal as a daily chart gap.", "quote": "Traditional gaps (breakout, measuring, and exhaustion) on daily charts have intraday equivalents in the form of moving average gap bars.", "pages": "11", "book": "Reversals"}, {"id": "l_market-structure_335", "theme": "market-structure", "teaching": "The market is dominated by institutions; virtually every trade you place has an institution profitably taking the other side, and price can only move to/through a level where institutions are willing to trade there — individual traders' stops get hit only when it's independently profitable for institutions to trade at that price, not because 'the market ran your stop.'", "quote": "No trade can take place without one institution willing to take one side and another willing to take the other... The market will not run your stops. The market might test the price where your protective stop is, but it has nothing to do with your stop.", "pages": "17", "book": "Reversals"}, {"id": "l_market-structure_336", "theme": "market-structure", "teaching": "You can infer institutional behavior after the fact just by looking at bar-by-bar direction: whenever price goes up, more institutional money was net buying, and whenever it goes down, more was net selling — study every bar, not just the obvious swings, to see the repeatable patterns.", "quote": "The answer is simple: whenever the market went up, the bulk of institutional money was buying, and whenever the market went down, more money went into selling. Just look at any segment of the chart... and study every bar, and you will soon notice many repeatable patterns.", "pages": "17", "book": "Reversals"}, {"id": "l_market-structure_337", "theme": "market-structure", "teaching": "Strong trends routinely have pullbacks where big money is actually buying (in an uptrend) even as price briefly trades below the prior bar's low and weaker traders get stopped out; don't assume a trade-through of the prior low means selling is in control during a strong trend.", "quote": "You have to assume that the big money was buying at and below the low of that prior bar... Once you get comfortable with the idea that strong trends often have pullbacks and big money is buying them rather than selling them, you will be in a position to make some great trades.", "pages": "17", "book": "Reversals"}, {"id": "l_market-structure_338", "theme": "market-structure", "teaching": "Price-action patterns look the way they do because they emerge from countless traders/institutions placing orders based on sound logic in an efficient market; the patterns are essentially unchanged over 80+ years of charts (same shapes in Depression-era and WWII-era weekly Dow charts as in modern charts), and won't be arbitraged away because price action is rooted in stable human (now largely programmatic-but-statistically-derived) behavior.", "quote": "Price action is a manifestation of human behavior and therefore actually has a genetic basis. Until we evolve, it will likely remain largely unchanged, just as it has been unchanged for the 80 years of charts that I have reviewed.", "pages": "20", "book": "Reversals"}, {"id": "l_market-structure_339", "theme": "market-structure", "teaching": "A vacuum effect explains sharp, fast moves toward a price magnet: strong bears (in a buy vacuum) wait to short until price reaches a magnet above, so price is 'sucked' up quickly with one or more bull trend bars until strong bears finally sell aggressively there and turn the market down (mirror case for sell vacuums).", "quote": "vacuum A buy vacuum occurs when the strong bears believe that the price will soon be higher so they wait to short until it reaches some magnet above the market. The result is that there is a vacuum that sucks the market quickly up to the magnet...", "pages": "16", "book": "Reversals"}, {"id": "l_market-structure_340", "theme": "market-structure", "teaching": "A wedge's converging trend line/trend channel line increases the statistical chance of a successful trade versus an arbitrary three-push pattern, which is why Brooks singles wedges out even though any three-push pattern trades similarly.", "quote": "For a trader, the wedge shape increases the chances of a successful trade, but any three-push pattern trades like a wedge and can be considered one.", "pages": "16", "book": "Reversals"}, {"id": "l_market-structure_341", "theme": "market-structure", "teaching": "Melt-ups and meltdowns are momentum moves within a spike or tight channel that extend further than fundamentals would justify, without significant pullbacks — recognizing these as a distinct extreme-momentum regime (versus a normal trend) matters for risk management and target-setting.", "quote": "meltdown A sell-off in a bear spike or a tight bear channel without significant pullbacks and that extends further than the fundamentals would dictate. melt-up A rally in a bull spike or a tight bull channel without significant pullbacks and that extends further than the fundamentals would dictate.", "pages": "12", "book": "Reversals"}, {"id": "l_market-structure_342", "theme": "market-structure", "teaching": "Shrinking stairs (each successive breakout to a new trend extreme is smaller in ticks than the prior one) is a momentum-waning tell within a trending trading-range/broad-channel trend, similar in implication to a wedge but not required to look like one.", "quote": "shrinking stairs A stairs pattern where the most recent breakout is smaller than the previous one... indicating waning momentum. It can be a three-push pattern, but it does not have to resemble a wedge.", "pages": "14", "book": "Reversals"}, {"id": "l_market-structure_343", "theme": "market-structure", "teaching": "20+ consecutive bars without touching the moving average (20 moving average gap bars) is itself a notable extended-trend condition; once price finally touches the average, it usually sets up a test of the trend's extreme.", "quote": "20 moving average gap bars Twenty or more consecutive bars that have not touched the moving average. Once the market finally touches the moving average, it usually creates a setup for a test of the trend's extreme.", "pages": "16", "book": "Reversals"}, {"id": "l_market-structure_344", "theme": "market-structure", "teaching": "When traders focus on indicator divergences during a strong trend they repeatedly fight the trend and lose; the fix is to trust that a strong trend line break followed by a test of the extreme is the real signal for a reversal, not a bare divergence.", "quote": "Placing a trade because of a divergence in the absence of a prior countertrend momentum surge that breaks a trend line is a losing strategy.", "pages": "21", "book": "Reversals"}, {"id": "l_market-structure_345", "theme": "market-structure", "teaching": "A trend with strong momentum (large bars, minimal overlap) will pull back, but the odds favor resumption and an eventual test/exceeding of the trend's extreme, as long as the pullback doesn't itself become a new opposite trend past the start of the original trend.", "quote": "Any trend that covers a lot of points in very few bars... will eventually have a pullback... the odds favor resumption of the trend after the pullback and then a test of the trend's extreme.", "pages": "27", "book": "Reversals"}, {"id": "l_market-structure_346", "theme": "market-structure", "teaching": "A pullback that retraces 75% or more of a trend leg substantially reduces the odds that price will get back to the prior trend's extreme; at that point it's better treated as a new trend in the opposite direction.", "quote": "The odds that a pullback will get back to the prior trend's extreme fall substantially if the pullback retraces 75 percent or more.", "pages": "27", "book": "Reversals"}, {"id": "l_market-structure_347", "theme": "market-structure", "teaching": "Crashes are not special/rare phenomena requiring emotional handling — the same bear-swing shape recurs constantly at every timeframe (daily, 5-min, 1-min); removing time/price axes shows crash patterns are common and tradable intraday.", "quote": "If you remove the time and price axes from a chart and focus simply on the price action, there are market movements that occur frequently on intraday charts that are indistinguishable from the patterns in a classic crash.", "pages": "28", "book": "Reversals"}, {"id": "l_market-structure_348", "theme": "market-structure", "teaching": "Price action patterns are fractal — the same setups recur across all timeframes from monthly down to a single bar, so principles learned on one timeframe transfer to all others.", "quote": "The concept that the same patterns appear on all time frames means that... every pattern subdivides into standard price action patterns in smaller time frame charts, and trading decisions based on price action analysis therefore work in all time frames.", "pages": "28", "book": "Reversals"}, {"id": "l_market-structure_349", "theme": "market-structure", "teaching": "Every trend bar is itself a breakout, and every breakout is instantly contested — there are buyers and sellers positioned at both the top and bottom of every trend bar, no matter how strong it looks; the market is 'always in breakout mode.'", "quote": "Remember, every trend bar is a breakout, and there are buyers and sellers at the top and bottom of every bull and bear trend bar, no matter how strong the bar appears. A breakout of anything is the same.", "pages": "36", "book": "Reversals"}, {"id": "l_market-structure_350", "theme": "market-structure", "teaching": "When a trading range breaks out, roughly 80% of the time the breakout continues in the direction of the larger trend; expect with-trend breakouts far more often than reversal breakouts.", "quote": "You should expect the breakout from the trading range to be in the direction of the trend because that is what happens in about 80 percent of cases.", "pages": "36", "book": "Reversals"}, {"id": "l_market-structure_351", "theme": "market-structure", "teaching": "A trend has strong inertia (like a huge ship) and resists changing direction; because of this, virtually all patterns during a trend are continuation patterns, and apparent 'reversal patterns' usually just become new flags.", "quote": "A trend is like a huge ship that takes a lot of force applied over time to change its direction... there is really no such thing as a trend reversal pattern.", "pages": "36", "book": "Reversals"}, {"id": "l_market-structure_352", "theme": "market-structure", "teaching": "You should never contemplate a countertrend trade until there has been a breakout beyond a significant trend line, and even then only with a strong signal bar; after the first countertrend surge, price almost always goes back to test the old trend extreme, and only a failed second test justifies a genuine countertrend swing trade.", "quote": "The single most important rule in these books is that you should never be thinking about trading against a trend until after there has been a breakout of the channel... Only rarely is the trend line break on such strong momentum that the test won't be tradable.", "pages": "36", "book": "Reversals"}, {"id": "l_market-structure_353", "theme": "market-structure", "teaching": "A bull trend typically ends one of two ways: (1) an overshoot above the channel that fails within 1-5 bars and reverses back through the channel with at least a two-legged correction, or (2) a break below the trend line without first overshooting the channel, followed by a higher-high or lower-high test of the bull high roughly equally often, with two legs down happening about two-thirds of the time.", "quote": "A bull trend typically ends in one of two ways. First, there can be a breakout above the channel... This only rarely succeeds and usually fails within one to five bars... Alternatively, the market can break below the bull trend line without first overshooting the trend channel line.", "pages": "38", "book": "Reversals"}, {"id": "l_market-structure_354", "theme": "market-structure", "teaching": "Institutions trading on fundamentals act as the counterweight that stops technically-driven trends: as a technical-driven trend pushes price to an extreme, fundamental buyers/sellers see 'value' and overwhelm the technical flow, causing reversals to cluster at recognizable support/resistance levels.", "quote": "Trend reversals on all time frames always happen at support and resistance levels, because technical traders and programs look for them as areas where they should stop pressing their bets and begin to take profits.", "pages": "33-34", "book": "Reversals"}, {"id": "l

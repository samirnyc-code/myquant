reversal is strong, buy it regardless of higher-timeframe confirmation; if it's not strong, don't buy even if higher-timeframe support is visible.", "quote": "If the 5 minute reversal was strong, traders would buy based on that reversal, whether or not they saw support on the daily or 60 minute chart. Also, traders would not buy at that low, even if they saw the higher time frame support, unless there was evidence on the 5 minute chart that it was forming a bottom.", "pages": "74", "book": "Reversals"}, {"id": "l_discipline_137", "theme": "discipline", "teaching": "Fading a strong trend (shorting buy climaxes / buying sell climaxes) should only be attempted by very experienced traders, since it's easy to misread ordinary strong trend behavior as an exhaustion/reversal pattern.", "quote": "Only very experienced traders should short buy climaxes because it is easy to misread the price action and end up shorting a strong bull where there really is no significant climax or reversal pattern.", "pages": "76", "book": "Reversals"}, {"id": "l_discipline_138", "theme": "discipline", "teaching": "A break of a trend line alone is not sufficient reason to anticipate a reversal - the break must be strong (reach the moving average, etc.); if a rally back to the old trend line only barely breaks it, keep looking for shorts (or longs), not a reversal.", "quote": "A break of a trend line alone is not enough reason to look for a reversal. The break has to be strong before traders will believe that the bulls will be able to sustain a strong move up.", "pages": "80", "book": "Reversals"}, {"id": "l_discipline_139", "theme": "discipline", "teaching": "When a climax pattern fails to generate any countertrend momentum, assume you read the market wrong and are trading in the wrong direction — reassess rather than force the reversal thesis.", "quote": "When a climax pattern fails to form any countertrend momentum, assume that you read the market wrong and are looking to trade in the wrong direction.", "pages": "92", "book": "Reversals"}, {"id": "l_discipline_140", "theme": "discipline", "teaching": "Wedge reversals are countertrend and reversals in general are unreliable — in strong bear trends, treating every wedge bottom as a pullback (and buying) is a losing strategy; only look for shorts until there is a confirmed higher low with a strong trend-line break.", "quote": "Unfortunately, when the market is in a bear trend, overly eager bulls treat all wedge bottoms as pullbacks, but most are reversals... Trying to scalp longs in a strong bear trend is a losing strategy.", "pages": "92", "book": "Reversals"}, {"id": "l_discipline_141", "theme": "discipline", "teaching": "Whenever you find yourself drawing multiple trend channel lines, you are blinded by anxiety over what you can't believe is happening; assume any channel will last forever until it clearly, unmistakably does not.", "quote": "Whenever you find yourself drawing multiple trend channel lines, you are invariably blinded to what is in front of you by your anxiety over what you can't believe is happening... Always assume that any channel will last forever, and once it finally does not, then change your mind.", "pages": "92", "book": "Reversals"}, {"id": "l_discipline_142", "theme": "discipline", "teaching": "Don't trade what you believe should be happening — only trade what is actually happening, even if it seems impossible (e.g., a channel lasting far longer than 'reasonable').", "quote": "Don't trade what you believe should be happening. Only trade what is happening, even if it seems impossible.", "pages": "92", "book": "Reversals"}, {"id": "l_discipline_143", "theme": "discipline", "teaching": "In strong trends, it's a mistake to keep looking for wedge-top/bottom reversals on every pullback — instead, buy (or sell) the pullback from each new high/low, because reversal attempts mostly fail when the trend is strong; a wedge correcting sideways (not down) is itself a sign of trend strength (sets up a reliable high-2/low-2).", "quote": "It is a mistake to be looking for reversals in strong trends, because most reversal attempts fail. Instead of seeing everything as a possible wedge top, look to buy the pullback from each new high.", "pages": "99", "book": "Reversals"}, {"id": "l_discipline_144", "theme": "discipline", "teaching": "Wedges most often fail as reversal trades when traders are overly eager to enter countertrend without waiting for a clear trend-line break and confirmed countertrend strength, fading the first small three-push pattern that appears. Small three-push patterns rarely reverse a trend absent a prior trend-line break or major trend-channel overshoot.", "quote": "Wedges most often fail when traders are overly eager to enter countertrend, do not wait for a clear trend line break and countertrend strength, and fade the first small three-push pattern that appears.", "pages": "99", "book": "Reversals"}, {"id": "l_discipline_145", "theme": "discipline", "teaching": "In a strong trend, do not base a trade on the belief that the market is 'overdue' for a correction — trends can extend far beyond what most traders imagine, and overlapping bars represent acceptance (continuation), not rejection.", "quote": "Basing a trade on a belief that the market is overdue for a correction is a losing approach to trading. Trends can go much further than most traders could ever imagine.", "pages": "107", "book": "Reversals"}, {"id": "l_discipline_146", "theme": "discipline", "teaching": "Never buy the first breakout attempt of a tight bear channel (or sell the first breakout of a tight bull channel) — most such attempts fail before going far enough for a scalp; wait for at least a second entry.", "quote": "You should never buy the first breakout attempt of a tight bear channel since most fail before going far enough to make a scalp. At best, you should wait for a second entry before buying.", "pages": "107", "book": "Reversals"}, {"id": "l_discipline_147", "theme": "discipline", "teaching": "When bullish (or bearish) momentum is exceptionally strong, it's better to look only for with-trend setups and avoid counter-trend shorts (or longs) until the opposite side shows a significant sign of strength.", "quote": "When the bullish momentum is exceptionally strong, it is better to look only for buy setups and not shorts until after there has been some significant sign of strength by the bears.", "pages": "118", "book": "Reversals"}, {"id": "l_discipline_148", "theme": "discipline", "teaching": "Computers have a clear speed edge right after scheduled reports; do not compete with that speed — wait for the edge to disappear (after the first one to three bars) before trading.", "quote": "When your competition has a big advantage, don't compete. Wait for their edge to disappear and trade when speed is no longer important.", "pages": "151, 160", "book": "Reversals"}, {"id": "l_discipline_149", "theme": "discipline", "teaching": "Despite the emotional volatility reports create (big bars, outside bars, reversals), price action setups remain reliable through them; always swing part of any position taken around a report with a breakeven stop since the resulting move can go far beyond expectation.", "quote": "Despite the emotion that the rapid moves and big bars generate in all traders, price action setups are still very reliable. In general, always swing part of the position with a breakeven stop because sometimes a swing will go much farther than you could ever imagine.", "pages": "160", "book": "Reversals"}, {"id": "l_discipline_150", "theme": "discipline", "teaching": "Do not trade into the raw seconds after a report release — slippage can turn a planned 8-tick-risk trade into a 16+ tick loss; wait roughly one to ten minutes for price action to normalize since computers have an insurmountable speed edge in that window.", "quote": "If you enter on the report, you might find that you got a few ticks of slippage on the entry, and then the market violently reverses and you get additional slippage on your exit... Most traders should not trade in the seconds after a report but should wait for the price action to return to normal, which often takes one to about 10 minutes.", "pages": "187-188", "book": "Reversals"}, {"id": "l_discipline_151", "theme": "discipline", "teaching": "Don't try to rationalize why a reversal is happening (e.g., a bullish report followed by a new low) — simply trade the standard price-action setup mechanically once it appears; the reasons are irrelevant to execution.", "quote": "Don't give it any thought. Instead, just look for standard price action setups and trade them mindlessly without giving any consideration to the reasons why the reversal is taking place. All that you need to know is that it is in fact taking place and you must enter.", "pages": "188-189", "book": "Reversals"}, {"id": "l_discipline_152", "theme": "discipline", "teaching": "Watching two charts at once (e.g., Globex overnight session and the day session) rarely adds edge and increases the chance of missing trades or making order-placement mistakes; pick one chart to trade.", "quote": "Nothing is gained by most traders who watch both charts, and doing so usually increases the chances that a trader will not be quick enough to take all of the available trades and will make mistakes in order placement.", "pages": "195", "book": "Reversals"}, {"id": "l_discipline_153", "theme": "discipline", "teaching": "Reversals are often sharp and give little time to build conviction; if the signal bar is a strong trend bar, force yourself to take the trade (at least a partial position) rather than waiting for more confirmation, then add on the first pullback.", "quote": "However, if there is a strong trend bar for the signal bar, the chances of success are good and you must take the trade. If you feel like you need more time to assess the setup, at least take a half or a quarter position because the trade might suddenly move very far very fast and you need to be involved, even if in only a small way. Then look to add on at the first pullback.", "pages": "206", "book": "Reversals"}, {"id": "l_discipline_154", "theme": "discipline", "teaching": "When trading against a bear (or bull) trend in a countertrend position, exit on a valid low 2 (or high 2) with-trend signal unless it is already clear the trend has reversed and that signal is likely to fail; don't hold countertrend hoping through a fresh with-trend signal.", "quote": "Countertrend traders trying to buy in a bear trend should always exit on a low 2 signal, unless the trend has clearly already reversed and the low 2 setup is likely to fail.", "pages": "219", "book": "Reversals"}, {"id": "l_discipline_155", "theme": "discipline", "teaching": "Beginners should follow a strict checklist until consistently profitable: reward >= risk (ideally 2x), only take setups believed >=60% probable, enter only on stops, always keep a protective stop in the market, use a profit-taking limit order, buy only above bull bars/short only below bear bars, trade small size, take only 3-5 trades a day, and favor simple, clear strategies.", "quote": "Here are some guidelines that beginners should consider following until they are consistently profitable...Take a trade only where you are going for a reward that is at least as large as your risk...Trade only a small position size...Look for only three to five reasonable trades a day.", "pages": "247", "book": "Reversals"}, {"id": "l_discipline_156", "theme": "discipline", "teaching": "If the market is moving too fast to consider the math of the current setup, do not take the trade — wait to enter later, and only enter once convinced the strategy has a positive trader's equation.", "quote": "If the market is moving too fast for a trader to consider the math of the current setup, he should not take the trade.", "pages": "249", "book": "Reversals"}, {"id": "l_discipline_157", "theme": "discipline", "teaching": "Avoiding countertrend scalps entirely can be the single biggest lever on profitability; a trader can lose money for years and then become a millionaire simply by eliminating countertrend scalping.", "quote": "A friend once told me that he lost money for many years and never made money until he stopped taking countertrend scalps. He now makes over a million dollars a year.", "pages": "250", "book": "Reversals"}, {"id": "l_discipline_158", "theme": "discipline", "teaching": "Countertrend scalps are most tempting in weak channels, where reversal bars appear at every new extreme and traders grow anxious from not having traded in a while — but these reversal bars are usually just profit-taking scalpers, and buying/selling against them loses on ~70% of trades with a worse average loss than average win.", "quote": "An impatient trader who buys above the bull reversal bar on a stop will consistently lose money, because he will lose on 70 percent of his trades and his average loss will be larger than his average win.", "pages": "250", "book": "Reversals"}, {"id": "l_discipline_159", "theme": "discipline", "teaching": "Trading on 1-minute or smaller/tick/volume charts is a common mistake: setups are easy to see in hindsight but hard to trade in real time — the best 1-minute setups happen too fast to catch, leaving traders with only the weak, low-probability ones, and shorting a 1-minute top within a 5-minute bull trend routinely loses.", "quote": "A trader who just shorted a 1 minute top in a 5 minute bull trend will invariably lose and end up missing the 5 minute buy signal that the failed 1 minute top will create. If your goal is to make money...take only the best trades and avoid 1 minute charts.", "pages": "250", "book": "Reversals"}, {"id": "l_discipline_160", "theme": "discipline", "teaching": "To reduce the overwhelming number of decisions in live trading, beginners should standardize: always stop-enter with-trend, use the same position size, same-size stop, and same-size target on every trade, and never change the plan mid-trade (e.g., turning a scalp into a swing or vice versa).", "quote": "He should also begin by trading the same position size, the same size protective stop, and the same size profit target on every trade. He should not change his plan once he is in the trade.", "pages": "250", "book": "Reversals"}, {"id": "l_discipline_161", "theme": "discipline", "teaching": "When a trader is uncertain about a setup, treat that confusion as a signal that the market is in or entering a trading range, at which point only buy low and sell high.", "quote": "When he has any doubt about a setup, he should assume that the confusion is his radar telling him that the market is in or about to enter a trading range, at which point he should only buy low and sell high.", "pages": "250", "book": "Reversals"}, {"id": "l_discipline_162", "theme": "discipline", "teaching": "Most markets are in a genuinely strong trend only about 20% of the time or less, so recognizing when a chart qualifies (rising from lower-left to upper-right with minimal bear legs below the midpoint) is a critical, relatively rare skill worth acting on decisively.", "quote": "Most markets are in a strong trend maybe 20 percent of the time or less.", "pages": "254", "book": "Reversals"}, {"id": "l_discipline_163", "theme": "discipline", "teaching": "The single worst thing a trader can do after gaining confidence is start trading tight trading ranges in the middle of the day near a flat moving average — they look deceptively simple but consistently damage accounts and psyche.", "quote": "The absolute worst thing to do is to start trading in tight trading ranges...They will damage your account and your psyche.", "pages": "254, 257", "book": "Reversals"}, {"id": "l_discipline_164", "theme": "discipline", "teaching": "If not currently profitable, seriously consider cutting to just 1-3 trades a day, restricted strictly to the very best setups (two-legged pullback in a strong trend, strong opening reversal, trend reversal after a very strong trend line break, or entering on a very strong spike).", "quote": "You should give serious thought to reducing the number of trades that you are taking and to just trying for one to three trades a day. Also, those trades should be the very best trades, like a two-legged pullback in a strong trend, a strong opening reversal, a trend reversal after a very strong trend line break, or entering on a very strong spike.", "pages": "257", "book": "Reversals"}, {"id": "l_discipline_165", "theme": "discipline", "teaching": "The single most important trade to avoid until you are a skilled, profitable trader is any setup within a tight trading range, especially mid-day near a flat moving average on a day that isn't a clear strong trend day.", "quote": "The single most important trade to avoid until one is a skilled, profitable trader is any setup in a tight trading range, especially when it is in the middle of the day's range, near a flat moving average, and the day is not a clear and strong trend day.", "pages": "257", "book": "Reversals"}, {"id": "l_discipline_166", "theme": "discipline", "teaching": "When starting a new approach, first backtest by printing out weeks of charts of the intended timeframe/market to validate the setups appear reliably; then trade minimum size (1 contract/100 shares) regardless of account size, and even after gaining confidence trade only about a quarter of your eventual target size until consistently profitable for weeks to months.", "quote": "The first thing that traders should do when trying a new approach is to print out weeks of charts...and see if their setups appear to be valid. When they begin to trade, they should trade only one futures contract or 100 shares of stock...If they think they can trade 10 Emini contracts, they should trade only two or three.", "pages": "257", "book": "Reversals"}, {"id": "l_discipline_167", "theme": "discipline", "teaching": "There is no single 'best' pattern to specialize in exclusively — waiting only for one perfect setup means missing far more money than trading all good setups from reliable patterns as they arise; any setup can be the best trade when conditions are right.", "quote": "No one pattern is best. They all can be the best when the conditions are right. As long as a trade has a strong trader's equation, a trader will make more money trading it than by waiting patiently for the absolute perfect trade that might come only once a week. You make money by trading, not by waiting.", "pages": "257-258", "book": "Reversals"}, {"id": "l_discipline_168", "theme": "discipline", "teaching": "On a clear trend-from-the-open day, do not trade countertrend; wanting a reversal and looking for a countertrend scalp is a low-probability bet that traders should do the math on — most countertrend scalps fail and losses on them outweigh the occasional winner.", "quote": "By definition, you are thinking countertrend and looking for countertrend scalps on a strong trend day. You are afraid to sell near the low and instead are hoping for a trend reversal, which is a low-probability bet. Do the math. Most countertrend scalps will fail, and the amount you lose on each one will be too great to make up with the eventual winner or two.", "pages": "265", "book": "Reversals"}, {"id": "l_discipline_169", "theme": "discipline", "teaching": "Trading guidelines are deliberately called 'guidelines,' not rules, because absolute, easy, objective rules that consistently worked would quickly be arbitraged away by other market participants once discovered.", "quote": "Why guidelines and not rules? Because 'rules' imply absolutes and easy trading if only you follow them. However, trading is subjective, your edge is always going to be small... If there were clear, objective rules and they consistently resulted in profitable trades, everyone would soon discover them ... and the rules would then stop working.", "pages": "280", "book": "Reversals"}, {"id": "l_discipline_170", "theme": "discipline", "teaching": "Reading charts well is only half the skill needed to make money — actually executing trades (order placement, sizing, holding through adversity) is a separate, equally difficult skill that must be practiced independently.", "quote": "Reading charts well is difficult, but it is only half of what you need to know to make money. You also need to learn to trade, which is just as difficult.", "pages": "280", "book": "Reversals"}, {"id": "l_discipline_171", "theme": "discipline", "teaching": "When evaluating a setup, always also consider the mirror-image trade: what looks like a buy setup at the signal bar might actually be an even better sell setup if the market instead breaks the opposite end of the signal bar, trapping longs who will be forced to cover below its low.", "quote": "Every time you look to enter a setup, make sure to consider what the market is telling you if instead it breaks out of the opposite end of the signal bar. Sometimes that buy setup that you see might in fact also be a great sell setup because it will trap longs who will cover below the low of the signal or entry bars.", "pages": "280", "book": "Reversals"}, {"id": "l_discipline_172", "theme": "discipline", "teaching": "Assess whether a breakout is likely to succeed, meet profit-taking/pullback, or reverse by weighing signs of strength and weakness against each other; a setup that failed to take an opportunity to do something strong is weaker.", "quote": "Look for signs of strength and weakness and weigh them to determine if they give you an edge.", "pages": "281", "book": "Reversals"}, {"id": "l_discipline_173", "theme": "discipline", "teaching": "The single most important task all day is talking yourself out of bad trades, e.g. not buying a strong bull trend bar or high 1 near the top of a range on a trading-range day.", "quote": "The single most important thing that you can do all day is talk yourself out of bad trades.", "pages": "281", "book": "Reversals"}, {"id": "l_discipline_174", "theme": "discipline", "teaching": "Trade the trade the market is offering, not the one you rationally expect — take a strong sell setup even if you think the market 'should' be going up.", "quote": "Trade the trade that you have and not the one that you want or expect.", "pages": "281", "book": "Reversals"}, {"id": "l_discipline_175", "theme": "discipline", "teaching": "Mastery means everything makes sense in real time; the goal is to read price action fast enough to understand what's happening as it happens, not just on an end-of-day printout.", "quote": "If you know how to read price action, nothing will surprise you.", "pages": "281", "book": "Reversals"}, {"id": "l_discipline_176", "theme": "discipline", "teaching": "Never make a quick decision to place a trade on a sudden large trend bar breaking out of a range after you've lost touch with the market (e.g., after 30-60 minutes of no signals) — the odds are against these trades even though some will win; a review of all such trades shows net losses.", "quote": "Never make a quick decision to place a trade on a sudden, large trend bar. ... if you review all of the times that you took these trades, you will discover that you lost money.", "pages": "283", "book": "Reversals"}, {"id": "l_discipline_177", "theme": "discipline", "teaching": "Simple is better: trade one chart, no indicators, and only the very best setups until consistently profitable. Using two charts causes you to reject most good signals because they rarely align across both.", "quote": "Simple is better. You don't need indicators, and you should look at only one chart.", "pages": "283", "book": "Reversals"}, {"id": "l_discipline_178", "theme": "discipline", "teaching": "Decide if trading is a hobby or a job; if a hobby, it will be too expensive and dangerously addictive — most trading addicts who aren't disciplined end up broke.", "quote": "Decide whether this is a hobby or a job.", "pages": "283", "book": "Reversals"}, {"id": "l_discipline_179", "theme": "discipline", "teaching": "Don't lose discipline late in the day and take risky trades you'd never take in the first couple hours — doing so invariably gives back earlier gains that fooled you into overconfidence.", "quote": "You will invariably give back those earnings from earlier in the day that fooled you into thinking that you are a better trader than you really are.", "pages": "285", "book": "Reversals"}, {"id": "l_discipline_180", "theme": "discipline", "teaching": "Never cherry-pick trades — the best trades catch you by surprise and are easy to miss, leaving you with only the mediocre and bad ones; either swing trade the 2-3 best setups of the day, or scalp and take every valid setup (harder, suited only to unusual personalities).", "quote": "Never cherry-pick, because you will invariably pick enough rotten cherries to end up a loser.", "pages": "285", "book": "Reversals"}, {"id": "l_discipline_181", "theme": "discipline", "teaching": "Discipline is the most important trait of winning traders — trading is easy to understand but hard to do consistently; develop discipline to take only the best trades, even if only achievable for the first hour of the day at first.", "quote": "Discipline is the most important characteristic of winning traders.", "pages": "285", "book": "Reversals"}, {"id": "l_discipline_182", "theme": "discipline", "teaching": "The second most important trait of great traders is the ability to do nothing for hours — don't let boredom convince you it's been too long since the last trade.", "quote": "The second most important trait of great traders is the ability to do nothing for hours at a time.", "pages": "285", "book": "Reversals"}, {"id": "l_discipline_183", "theme": "discipline", "teaching": "High-beta / small-company stocks have huge unpredictable moves; the risk forces small position sizes that erase the gains, so most traders should avoid them.", "quote": "When you add the stress of the unpredictability, most traders should not bother with these stocks", "pages": "223", "book": "Reversals"}, {"id": "l_discipline_184", "theme": "discipline", "teaching": "Special situations with huge news-driven moves (e.g. biotech up 800-2000 percent) force such small size that any gain is offset; your goal is to make a lot of money, not an emotional rush from a small position after a rare big move.", "quote": "your goal is to make a lot of money, not to get an emotional rush or a meaningless sense of power after making a little money from a small position after a rare big move", "pages": "231", "book": "Reversals"}, {"id": "l_discipline_185", "theme": "discipline", "teaching": "Most profitable traders focus on just one of options, futures, or stocks rather than dividing attention among all three.", "quote": "most profitable traders usually choose to focus on either options, futures, or stocks and not divide their attention among all three", "pages": "233", "book": "Reversals"}, {"id": "l_discipline_186", "theme": "discipline", "teaching": "Test whether your option premise is still valid by asking, if you weren't holding the position, would you put on that exact position right now? If not, exit immediately.", "quote": "imagine that you are not holding the position. Next, ask yourself if you would put on that exact position. If you would not, then your premise is invalid and you should exit immediately", "pages": "235", "book": "Reversals"}, {"id": "l_discipline_187", "theme": "discipline", "teaching": "A common beginner mistake is holding a winning option position too long; option profits disappear quickly, so if the market races to your target take most or all profits immediately.", "quote": "Option profits disappear quickly, so it is very important to take them once you have them", "pages": "235", "book": "Reversals"}, {"id": "l_psychology_0", "theme": "psychology", "teaching": "News should be ignored entirely by a day trader reading price action — it's unrelated to trading and impossible to properly evaluate in real time.", "quote": "news Useless information generated by the media for the sole purpose of selling advertising and making money for the media company. It is unrelated to trading, is impossible to evaluate, and should always be ignored.", "pages": "21", "book": "Trends"}, {"id": "l_psychology_1", "theme": "psychology", "teaching": "Traders get 'trapped in a trade' (an open loser they'll likely exit at a loss on further adverse movement) and 'trapped out of a trade' (scared out by a pullback that then fails and the move resumes, forcing them to chase at a worse price) — both are common emotional traps to recognize.", "quote": "trapped in a trade A trader with an open loss on a trade that did not result in a scalper's profit, and if there is a pullback beyond the entry or signal bars, the trader will likely exit with a loss.", "pages": "27", "book": "Trends"}, {"id": "l_psychology_2", "theme": "psychology", "teaching": "Focus on trading the absolute best setups, avoid the absolute worst ones, always use a reward at least as large as risk, and work on increasing position size over time — this is described as the single most important message of the book.", "quote": "The most important message that I can deliver is to focus on the absolute best trades, avoid the absolute worst setups, use a profit objective (reward) that is at least as large as your protective stop (risk), and work on increasing the number of shares that you are trading.", "pages": "6", "book": "Trends"}, {"id": "l_psychology_3", "theme": "psychology", "teaching": "Wide stops don't solve the core discipline problem of cutting winners short/avoiding losses — traders using wide stops eventually hit big losses that scare them out of the approach entirely, so risk sizing/stop placement must be sustainable, not just wide.", "quote": "Using wide stops solves that to some extent, but invariably traders will soon hit a few big losses that will put them into the red and make them too scared to continue using that approach.", "pages": "38", "book": "Trends"}, {"id": "l_psychology_4", "theme": "psychology", "teaching": "Trading is a zero-sum game between mostly-smart institutional participants, so reliable, static rules cannot exist for long — if a rule worked for everyone, there'd be no counterparty; only flexible, adaptive guidelines survive.", "quote": "If you think about it, trading is a zero-sum game and it is impossible to have a zero-sum game where rules consistently work.", "pages": "45", "book": "Trends"}, {"id": "l_psychology_5", "theme": "psychology", "teaching": "Trading is not gambling when approached with discipline and a sound method (everyone dealt the 'same cards', skill determines long-run results); trading without discipline/without a sound method is gambling.", "quote": "In trading, everyone is dealt the same cards so the game is always fair and, over time, you get rewarded or penalized entirely due to your skill as a trader.", "pages": "52-53", "book": "Trends"}, {"id": "l_psychology_6", "theme": "psychology", "teaching": "Patience is the shared virtue of great poker players and great traders: wait for only the best hands/setups rather than acting on marginal ones.", "quote": "traders make more when they have the patience to wait for the very best setups.", "pages": "53", "book": "Trends"}, {"id": "l_psychology_7", "theme": "psychology", "teaching": "Roughly 40% of the time the exact opposite of your read will happen (most scalps are only ~60% certain); always have a plan for that outcome — usually to exit, sometimes to reverse.", "quote": "It is always most important to be aware that the exact opposite of what you believe will happen in about 40 percent of your trades.", "pages": "72", "book": "Trends"}, {"id": "l_psychology_8", "theme": "psychology", "teaching": "Ignore your own recent P&L/mistakes when reading the next bar — 'trading through the rearview mirror' by dwelling on past trades has no bearing on future price action and leads to poor decisions.", "quote": "Trading through the rearview mirror is a sure way to lose money. You have to keep looking ahead, not worrying about the mistakes you just made.", "pages": "69", "book": "Trends"}, {"id": "l_psychology_9", "theme": "psychology", "teaching": "Extreme/unusual price behavior (relative to any measure) attracts institutional fading, but a trader should not fade a trend just because it looks extreme unless very confident, since the market can remain extreme longer than an account can survive.", "quote": "Anything that is extreme cannot last long... unless you are very confident in your read, do not fade the trend, because the market can sustain its unusual behavior longer than you can sustain your account.", "pages": "49-50(81-82)", "book": "Trends"}, {"id": "l_psychology_10", "theme": "psychology", "teaching": "Never be fully convinced of market direction — for every trade there is an equally smart trader on the other side; probability of being right is rarely much above 50-60% and can flip quickly.", "quote": "Never be convinced of anything, and always be open to the possibility that the market will do the exact opposite of what you believe... you can rarely be 60 percent certain of the market's direction, and that can quickly change to 50–50 or even 60 percent in the other direction.", "pages": "59(91),65(97)", "book": "Trends"}, {"id": "l_psychology_11", "theme": "psychology", "teaching": "Great traders think several bars ahead like chess players, constantly forming hypotheses about why price might move up or down next, so they are ready to act the instant a real setup appears.", "quote": "Just like the best chess players think several moves in advance, the best traders are constantly thinking about reasons why the market might go up or down on the next bar", "pages": "122", "book": "Trends"}, {"id": "l_psychology_12", "theme": "psychology", "teaching": "Traders should not invest emotional energy in confusing or complicated trade setups (like simultaneous dual breakout orders or reverse-on-stop orders), because doing so leaves them less prepared mentally to act decisively on the next clear trade.", "quote": "Traders should not invest too much emotion in a confusing trade because they will likely be less ready to take a clear trade that may soon follow.", "pages": "140", "book": "Trends"}, {"id": "l_psychology_13", "theme": "psychology", "teaching": "Trapped traders' forced exits (stop-outs) add fuel to the move in the opposite direction, and their recent loss makes them hesitant to re-enter, increasing follow-through odds for the new direction.", "quote": "there were also trapped bulls who bought above the back-to-back two-bar reversal bottom attempts, and once the low 2 triggered, they would exit their longs with a loss. Their selling adds to the selling of the new bears and increases the chance of success.", "pages": "164", "book": "Trends"}, {"id": "l_psychology_14", "theme": "psychology", "teaching": "Institutions deliberately engineer traps: they sell into a range to trigger retail shorts and stop out trapped longs, then buy aggressively below the low, profiting as both the trapped shorts cover and the trapped longs chase the market back up.", "quote": "you try to create the trap by selling until the short entry is triggered and then you buy aggressively as all those bear traders get short and the longs exit with losses... Once you've trapped them all, you can buy aggressively all the way up.", "pages": "189-190", "book": "Trends"}, {"id": "l_psychology_15", "theme": "psychology", "teaching": "When both sides of the market want the same thing (e.g., a pullback to enter/exit more favorably), that pullback often does NOT come, because both sides start buying (or selling) even tiny 2-3 tick dips, preventing normal 2-3 bar pullbacks until the trend has moved very far.", "quote": "When everyone wants the same thing, it will not happen because both sides will start buying even two- or three-tick pullbacks, preventing a two- or three-bar pullback from developing until the trend has gone very far.", "pages": "189,199", "book": "Trends"}, {"id": "l_psychology_16", "theme": "psychology", "teaching": "Pattern names don't matter; what matters is correctly reading the current price action in front of you and trading it, ignoring the pattern label that just completed.", "quote": "Names are never important. Just make sure that you read correctly what is in front of you and place your trade, ignoring the pattern that completed a couple of bars earlier.", "pages": "217", "book": "Trends"}, {"id": "l_psychology_17", "theme": "psychology", "teaching": "Beginners/inconsistent traders should trade channels with-trend only and wait for only the very best with-trend setups, even at the cost of missing most of the trend; do not fall for the 'regression to the mean' fallacy that an extended-looking trend must be due to reverse.", "quote": "If traders are just starting out, they should wait for the very best setups, even if that means missing the entire trend. ... Do not fall into the regression toward the mean mind-set ... The market can continue its unsustainable behavior much longer than you can sustain your account.", "pages": "222-223 (254-255)", "book": "Trends"}, {"id": "l_psychology_18", "theme": "psychology", "teaching": "Institutional/smart money will not fade a strong trend until either a strong pullback follows a trend-line break, or a reversal follows a trend-channel-line overshoot; retail logic about panic-driven blow-offs is not necessary to explain reversals — in large liquid markets like the E-mini, price action is the footprint of large numbers of smart participants independently seeking the best price.", "quote": "Smart traders won't trade countertrend until either there is a pullback from a strong trend line break or there is a reversal from a trend channel line overshoot.", "pages": "212 (244)", "book": "Trends"}, {"id": "l_psychology_19", "theme": "psychology", "teaching": "Volume is unreliable as a trade-decision input, but is often huge at key turning points/climaxes — it's a byproduct, not a signal to use directly for entries.", "quote": "Although you do not need to look at volume when deciding whether to place a trade since it is so unreliable, it is often huge at key turning points, especially at bottoms.", "pages": "212 (244)", "book": "Trends"}, {"id": "l_psychology_20", "theme": "psychology", "teaching": "Financial media routinely misattribute sharp intraday moves to news/fundamentals when they are actually driven by program trading feeding on itself (momentum buy/sell programs); traders should ignore news narratives and trade the price action instead.", "quote": "The television pundits will attribute the sharp upside breakout to some news item ... The vast majority of all intraday price movement is due to programs, yet the reporters don't have a clue.", "pages": "225 (257)", "book": "Trends"}, {"id": "l_psychology_21", "theme": "psychology", "teaching": "The best setups look bad and trigger too fast to take; losing trades tend to set up slowly and give plenty of time to enter, tempting traders into more losers than winners.", "quote": "Invariably the best setups look bad but set up and trigger too fast to take them, whereas the losers give you plenty of time to get in.", "pages": "294", "book": "Trends"}, {"id": "l_psychology_22", "theme": "psychology", "teaching": "With-trend entries near an 'overdone' extreme are scary but exactly why they work — everyone believes the market will keep going, so no one waits for a better price, and larger pullbacks simply don't form.", "quote": "The with-trend entries are scary because the market always looks overdone... However, that is exactly why it is!", "pages": "309", "book": "Trends"}, {"id": "l_psychology_23", "theme": "psychology", "teaching": "Institutions buy all the way up a spike because they fear missing the move more than they fear the size of the pullback; they simply size their position down so dollar risk stays constant, unlike beginners who fixate on a large-looking stop.", "quote": "The institutions know this, and simply adjust their position size down to a level where their dollars at risk are the same as for any other trade.", "pages": "310", "book": "Trends"}, {"id": "l_psychology_24", "theme": "psychology", "teaching": "The 'computer screen illusion' — a bull trend near the top of your screen or bear trend near the bottom psychologically looks like there's no more room to run, but that has nothing to do with the market; countertrend traders drawn in by this illusion get driven out at a loss, fueling the trend further.", "quote": "The result is that many traders won't take a great buy signal at the top of a bull trend or sell signal at the bottom of a bear trend and will instead look for reversals. But that computer screen illusion has nothing to do with the market.", "pages": "312", "book": "Trends"}, {"id": "l_psychology_25", "theme": "psychology", "teaching": "Weak traders trade on emotion (chasing strength, panicking on speed) and are competing against emotionless computer algorithms, which is why they take the big losses at the end of an overdone trend.", "quote": "These weak traders are trading on emotion and are competing against computers, which do not have emotion as one of the variables in their algorithms.", "pages": "315", "book": "Trends"}, {"id": "l_psychology_26", "theme": "psychology", "teaching": "A common ruinous mistake is starting a trade with one plan (scalp vs swing) and switching to the other mid-trade based on recent emotional results.", "quote": "a trader begins with one plan and, once in the trade, manages it based on a different plan", "pages": "324", "book": "Trends"}, {"id": "l_psychology_27", "theme": "psychology", "teaching": "Constantly fading a strong trend on the belief the market is 'overdone' is the single surest way beginners lose money all day; winning requires accepting every reversal top as a probable start of a bull flag (or bottom as a bear flag) instead.", "quote": "There is one sure way to consistently lose money on a day like this, and all traders know it... Beginners do not stop losing until they are able to stop themselves from looking for shorts in bull trends.", "pages": "329-330, 368", "book": "Trends"}, {"id": "l_psychology_28", "theme": "psychology", "teaching": "When everyone is waiting for a pullback that never comes, it's precisely because both bulls (buying small pieces in case there's no pullback) and bears (waiting for a better short price) are acting the same way — this collective behavior is what prevents the pullback and keeps price grinding higher.", "quote": "When everyone wants a pullback, it usually will not come for a long time... So the strong bears are not shorting and the strong bulls are buying in small pieces, in case there is no pullback for a long time. What is the result? The market keeps working higher.", "pages": "336-337", "book": "Trends"}, {"id": "l_psychology_29", "theme": "psychology", "teaching": "A climax can last far longer than a trader's account can sustain a countertrend bet, so never short (or fade) a very strong trend just because you know intellectually it cannot last indefinitely.", "quote": "a climax can last longer than you can sustain your account, so never look to short such a strong bull trend, even though you know it cannot last indefinitely.", "pages": "346 (378)", "book": "Trends"}, {"id": "l_psychology_30", "theme": "psychology", "teaching": "Institutional and large-account traders can profitably scale into countertrend positions expecting a channel-start test, but this is explicitly not recommended for most/retail-sized traders, who should stay with-trend until a clear reversal sign appears.", "quote": "Institutions and traders who have large enough accounts can scale into a countertrend position, expecting the market to test the start of the channel, but most traders should trade only with trend until there is a clear sign of a reversal.", "pages": "331-332 (363-364)", "book": "Trends"}, {"id": "l_psychology_31", "theme": "psychology", "teaching": "Large gap openings combined with an urgent-looking strong first bar increase the odds of a trend day; traders should short/buy early and swing part of the position.", "quote": "Since large gap openings often lead to trends and this bear bar was a sign of urgency on the part of the bears, today could become a bear trend day", "pages": "405,406", "book": "Trends"}, {"id": "l_psychology_32", "theme": "psychology", "teaching": "Taking a countertrend scalp against the developing trend not only risks losing the trade but also puts you in the wrong mental frame to take the far higher-probability with-trend breakout trade that follows.", "quote": "You will not only lose on the scalp, but your mind-set will be that of a buyer. You will not be mentally prepared to short the breakout of the bear ﬂag", "pages": "430", "book": "Trends"}, {"id": "l_psychology_33", "theme": "psychology", "teaching": "Traders take partial profits even in a strong trend because a deep pullback could otherwise erase a large unrealized gain or even turn it into a loss; profit-taking is what creates most pullbacks.", "quote": "Why do traders ever take proﬁts when a trend is strong? Because no matter how strong a trend is, it can have a deep pullback...If they did not take at least partial proﬁts, they would then watch their big proﬁt disappear and even turn into a loss.", "pages": "433", "book": "Trends"}, {"id": "l_psychology_34", "theme": "psychology", "teaching": "On extreme gap days, if there is no immediate follow-through in the gap's direction, the market tends to reverse quickly to undo the extreme dislocation, because everyone recognizes the behavior as extreme.", "quote": "When the gap is this large, everyone knows that the behavior is extreme and if there is no immediate follow-through, the market will reverse quickly to undo this extreme situation.", "pages": "433", "book": "Trends"}, {"id": "l_psychology_35", "theme": "psychology", "teaching": "In strong trends, frequent countertrend trend bars and spikes are a deliberate trap: beginners keep shorting bull flags that look weak and losing, which conditions them to avoid the next (winning) buy setup, while every 'bad-looking' bull flag succeeds.", "quote": "Each bad-looking bull ﬂag is successful, and is followed by another good-looking short setup that fails.", "pages": "416", "book": "Trends"}, {"id": "l_psychology_36", "theme": "psychology", "teaching": "The hardest part of trading the strongest trend days is that they don't look strong: pullbacks are small, signal bars look weak, and there are many countertrend trend bars — beginners misread this as weakness while experienced traders correctly read it as extraordinary strength.", "quote": "What beginners fail to see is that the pullbacks are all small...Experienced traders see all of these things as signs that the bull trend is very strong", "pages": "420", "book": "Trends"}, {"id": "l_psychology_37", "theme": "psychology", "teaching": "In a strong trend, persistent countertrend pressure (weak buy signals, many opposite-colored trend bars) traps discretionary traders into repeatedly shorting what are actually the starts of bull flags, forcing them to chase the trend later at worse prices.", "quote": "they continue to short sell setups that don't quite look right. They don't look right because they are the start of bull ﬂags, not reversals.", "pages": "420,421", "book": "Trends"}, {"id": "l_psychology_38", "theme": "psychology", "teaching": "Even after a clear reversal pattern (e.g., a wedge top) is unfolding, the strong prior trend into the close conditions beginning traders to expect continuation and deny the reversal; always be ready for the opposite of the expected outcome, since it happens roughly 40% of the time.", "quote": "Always be ready for the opposite of what might appear likely, because it will happen in about 40 percent of the time.", "pages": "437", "book": "Trends"}, {"id": "l_psychology_39", "theme": "psychology", "teaching": "Strong trend days constantly trick traders into exiting with-trend positions too early and into taking counter-trend trades; traders stopped out of counter-trend bets must buy/sell back, and traders trapped out of with-trend positions chase the market, both adding fuel to the trend's continuation.", "quote": "Strong trend days constantly trick traders into exiting longs early and into taking shorts. The bears have to buy back their shorts, which adds to the buying pressure... Also, the bulls who were just trapped out will chase the market as it goes up, adding to the buying.", "pages": "442", "book": "Trends"}, {"id": "l_psychology_40", "theme": "psychology", "teaching": "No matter how strong a trend is, pullbacks occur simply because with-trend traders take profits to protect gains that could otherwise evaporate or reverse into a loss.", "quote": "Pullbacks happen when bulls take profits. Why do traders ever take profits when a trend is strong? Because no matter how strong a trend is, it can have a deep pullback... and sometimes the trend can reverse.", "pages": "449", "book": "Trends"}, {"id": "l_psychology_41", "theme": "psychology", "teaching": "Ignore financial news and TV pundits entirely during the trading day — the chart already reflects what institutions are doing with the news, and pundits/reporters have no accountable edge in predicting short-term direction.", "quote": "Never watch the news during the trading day. If you want to know what a news event means, the chart in front of you will tell you.", "pages": "21", "book": "Trading Ranges"}, {"id": "l_psychology_42", "theme": "psychology", "teaching": "Trading is not gambling if approached with discipline and rules; deviating from your rules — especially to 'get back' losses — is what turns trading into gambling, and it typically compounds losses.", "quote": "Whenever traders deviate from those rules for any reason, they are trading on hope rather than logic and are then gambling.", "pages": "23-24", "book": "Trading Ranges"}, {"id": "l_psychology_43", "theme": "psychology", "teaching": "Unlike a coin flip, market behavior has momentum: when trending, most reversal attempts fail; when range-bound, most breakout attempts fail — the opposite of gambler's-fallacy 'regression to the mean' thinking.", "quote": "When a market is trending, most attempts to reverse fail. When it is in a trading range, most attempts to break out fail. This is the opposite of coin flips, where the odds are always 50-50.", "pages": "24", "book": "Trading Ranges"}, {"id": "l_psychology_44", "theme": "psychology", "teaching": "Trends deliberately keep entries feeling unclear or scary to keep traders on the sidelines chasing; easy, obvious setups are usually small scalps, while setups that will lead to big moves are typically difficult to take.", "quote": "Trends do everything that they can to keep traders out, which is the only way they can keep traders chasing the market all day. When a setup is easy and clear, the move is usually a small, fast scalp.", "pages": "47", "book": "Trading Ranges"}, {"id": "l_psychology_45", "theme": "psychology", "teaching": "Ignore news content beyond knowing its release time; trade the chart, since price is truth and leads the news — news is typically most bullish at market tops and most bearish at market bottoms.", "quote": "You should never pay attention to the news...The chart tells you all that you need to know.", "pages": "47,68", "book": "Trading Ranges"}, {"id": "l_psychology_46", "theme": "psychology", "teaching": "Nothing is ever 100% certain; once a trade looks reasonably good by the math, you must trust the trader's equation and take it, accepting that you will lose some percentage of the time — like a .300 hitter being a superstar.", "quote": "You are never going to be 100 percent certain of any trade, but when you are reasonably confident that a trade looks good, you have to trust the math, take the trade, and simply accept the reality that you will lose some of the time.", "pages": "84", "book": "Trading Ranges"}, {"id": "l_psychology_47", "theme": "psychology", "teaching": "Trading is zero-sum; institutions create the reversal/pullback pattern themselves as their with-trend arm takes profits and their countertrend arm scales in — understanding this program-driven mechanics of pullback formation helps you trade with (not against) the flow.", "quote": "institutions create the reversal pattern as the with-trend institutions take profits and the countertrend institutions begin to scale into reversal trades.", "pages": "88", "book": "Trading Ranges"}, {"id": "l_psychology_48", "theme": "psychology", "teaching": "After a series of winning with-trend pullback trades, be suspicious of renewed strength appearing 'too easy' without a larger pullback first — it may be a trap (final flag) setting up; better to miss a trade than to trade overconfidently.", "quote": "After a series of winning trades, you should be suspicious of renewed strength without first seeing a larger pullback, since this strength might be a trap setting up... It is better to wait for more price action and miss a possible trap than to feel invincible.", "pages": "91", "book": "Trading Ranges"}, {"id": "l_psychology_49", "theme": "psychology", "teaching": "If you are emotionally able to reverse a losing countertrend position when it triggers a strong opposing with-trend signal (e.g., a high 2/3 against your short, or a low 2/3 against your long), you usually should.", "quote": "if you ever buy early, always get out and even reverse if the market triggers a low 2 or 3 short, especially if there is a strong bear signal bar... If you are emotionally able to reverse, you usually should.", "pages": "112", "book": "Trading Ranges"}, {"id": "l_psychology_50", "theme": "psychology", "teaching": "Experienced traders' dominant emotional axis is uncertainty vs. urgency (not fear vs. greed); a felt sense of uncertainty signals a trading range, a felt sense of urgency signals a trend/spike.", "quote": "Another pair of emotions is much more common with them, and also much more useful: uncertainty and urgency... If you have a sense of uncertainty, the market is more likely in a trading range; if instead you have a sense of urgency and you are hoping for a pullback, then the market is more likely in a trend.", "pages": "135-136", "book": "Trading Ranges"}, {"id": "l_psychology_51", "theme": "psychology", "teaching": "A trade that looks 'too good to be true' and gets one tick of slippage on entry, without racing immediately to target, is a probable trap — exit at breakeven rather than fight it.", "quote": "Whenever something looks too good to be true, so obvious that everyone will look to enter, the odds are high that it is exactly as it appears to be—not true.", "pages": "136", "book": "Trading Ranges"}, {"id": "l_psychology_52", "theme": "psychology", "teaching": "Trading-range signal bars (reversal bars at range extremes) are legitimately allowed to be weaker/less 'perfect' than trend-reversal signal bars — a bull body at the top of a range can still be an acceptable short signal bar, since perfection matters less the more two-sided the market already is.", "quote": "the appearance of the signal bar is less important for trading range reversals than for trend reversals. Short setups at the top of the range often have signal bars with bull bodies, and buy setups near the bottom of the range often have bear bodies.", "pages": "138", "book": "Trading Ranges"}, {"id": "l_psychology_53", "theme": "psychology", "teaching": "Trends are inherently uncertain while they are happening — that uncertainty is precisely what keeps most traders out, so a trend that looks 'obvious' in hindsight was never obvious in real time.", "quote": "all big moves are uncertain as they are unfolding, and this traps traders out of the strongest trends.", "pages": "167", "book": "Trading Ranges"}, {"id": "l_psychology_54", "theme": "psychology", "teaching": "Probability is not fixed: a 60% setup is only truly 60% about 90% of the time — the underlying certainty of any read fluctuates, so traders must accept variable, imperfect probability estimates rather than treating them as precise.", "quote": "60 percent is 60 percent in only 90 percent of the cases and can be 90 percent sometimes and 10 percent at other times.", "pages": "184", "book": "Trading Ranges"}, {"id": "l_psychology_55", "theme": "psychology", "teaching": "Repeatedly drawing trend channel lines while a strong trend runs against you (hoping for a wedge reversal) is usually a sign you are simply missing the trend and looking for trades in the wrong direction.", "quote": "Whenever you find yourself repeatedly drawing trend channel lines as the market is falling, you are usually totally missing a strong trend and looking for trades in the wrong direction.", "pages": "200", "book": "Trading Ranges"}, {"id": "l_psychology_56", "theme": "psychology", "teaching": "Don't tighten stops prematurely after small doji bars near your entry — a doji is a one-bar trading range and price commonly pokes a tick or two beyond it without invalidating the trade premise.", "quote": "Don't tighten your protective stop after small doji bars that form within a few bars of entry. They are one-bar trading ranges, and it is common for the market to reverse beyond them for a tick or two.", "pages": "208", "book": "Trading Ranges"}, {"id": "l_psychology_57", "theme": "psychology", "teaching": "When top-picking with a short and a strong high-2 buy signal appears at the moving average, always exit the short (and consider reversing long) rather than holding onto the original bias.", "quote": "Whenever traders are top picking and then see a high 2 buy signal at the moving average with a bull signal bar, they should always exit the short and reverse to long.", "pages": "205", "book": "Trading Ranges"}, {"id": "l_psychology_58", "theme": "psychology", "teaching": "Averaging down repeatedly into a falling market to lower cost basis (classic amateur mistake) typically ends with an outsized loss at the exact bottom, right before the rally the trader was hoping for.", "quote": "Invariably, his position has become so large that he decides that he has to get out on the next bear trend bar...his exit is at the bottom of the market just before a huge rally.", "pages": "212-213", "book": "Trading Ranges"}, {"id": "l_psychology_59", "theme": "psychology", "teaching": "Trading decisions must be made in shades of gray/probability, not black-and-white certainty; a near-textbook setup will likely behave similarly to the textbook version ('close is usually close enough').", "quote": "If something resembles a textbook setup, the trade will likely unfold similarly to the trade from the textbook setup. This is the art of trading, and it takes years to become good at trading in the gray zone.", "pages": "xviii-xix", "book": "Reading Price Charts"}, {"id": "l_psychology_60", "theme": "psychology", "teaching": "Reversing your directional opinion instantly and without ego when new price action appears is essential; do not trade 'through the rearview mirror' (dwelling on the last trade/loss).", "quote": "Everything is relative, and everything can change into the exact opposite in an instant... Trading through the rearview mirror is a sure way to lose money.", "pages": "2", "book": "Reading Price Charts"}, {"id": "l_psychology_61", "theme": "psychology", "teaching": "Fibonacci retracements/extensions and Elliott Wave are not reliable standalone trading tools for an active price-action day trader — if a Fib level works it's because it coincides with an independently valid chart pattern.", "quote": "since most are just approximations and most fail, do not use them for trading. If one is good, it will be associated with a chart pattern that is reliable and tradable on its own", "pages": "6-7", "book": "Reading Price Charts"}, {"id": "l_psychology_62", "theme": "psychology", "teaching": "Complicated/emotional order setups (double breakout orders, reversal orders) should be skipped if they feel confusing — overinvesting emotion in a marginal trade degrades readiness for the next clear trade.", "quote": "A trader cannot invest too much emotion in a confusing trade because he will likely be less ready to take a clear trade that may soon follow.", "pages": "45", "book": "Reading Price Charts"}, {"id": "l_psychology_63", "theme": "psychology", "teaching": "With Trend entries near an overdone extreme feel scary and unlikely to work, which is exactly why they are the most reliable trades — the market draws in Countertrend traders whose forced exits push price further in the trend direction.", "quote": "The With Trend en­tries are scary because the market always looks overdone and it's hard to imagine that selling near the low of an overdone bear or buying near the high of an overdone bull could ever be profitable. However, that is exactly why it is!", "pages": "71, 97, 108-109", "book": "Reading Price Charts"}, {"id": "l_psychology_64", "theme": "psychology", "teaching": "On trend days, the best-looking reversal bars and biggest trend bars are frequently Countertrend, trapping traders into the wrong side; lack of great With Trend signal bars pushes traders to chase and enter late.", "quote": "One interesting phenomenon in trend days is that on many of the days, the best reversal bars and the biggest trend bars tend to be Countertrend, trapping traders into the wrong direction.", "pages": "76-77, 102-103", "book": "Reading Price Charts"}, {"id": "l_psychology_65", "theme": "psychology", "teaching": "Bear-market capitulation dynamics (retail panic selling regardless of fundamentals, hedge fund forced redemption liquidation independent of value) can push markets far past fundamental value, producing outsized trend/range days that are still tradable with standard price-action setups.", "quote": "The result of people selling regardless of fundamentals is that the mar­ket often falls in huge bear trend days, dropping much further than what the fundamentals warrant...a good price action trader can do very well just looking for standard price action setups.", "pages": "73-75, 99-101", "book": "Reading Price Charts"}, {"id": "l_psychology_66", "theme": "psychology", "teaching": "A strong trend keeps forming reversal patterns all day that keep failing; these traps work as great With Trend setups because they trap both With Trend traders (who exit) and Countertrend traders (who enter and later must cover), fueling the continuation.", "quote": "one of the hallmarks of a strong trend is that it keeps forming reversals all day and they all fail. The reversals trap With Trend traders out and Countertrend traders in.", "pages": "126", "book": "Reading Price Charts"}, {"id": "l_psychology_67", "theme": "psychology", "teaching": "Institutions benefit from stop-run spikes because they let them add to positions at better prices before the close; retail traders can piggyback on the resulting failed reversal.", "quote": "If you were an institutional trader who wanted to load up going into the close and you wanted to enter at much better prices... you would be looking to contribute to any rumor in any way that you could.", "pages": "138-139", "book": "Reading Price Charts"}, {"id": "l_psychology_68", "theme": "psychology", "teaching": "When the market lacks clarity after conflicting failed breakouts, always wait for a second entry rather than acting on the first ambiguous signal — second entries after Barb Wire chop are unusual to fail.", "quote": "when the market lacks clarity, it is always best to wait for a second entry.", "pages": "170", "book": "Reading Price Charts"}, {"id": "l_psychology_69", "theme": "psychology", "teaching": "If an entry looks 'too good to be true' mid-day and doesn't race to target within seconds, you're likely trapped — get out at breakeven rather than hoping.", "quote": "Whenever something looks too good to be true, so obvious that everyone will look to enter, the odds are high that it is exactly as it appears to be...not true.", "pages": "175", "book": "Reading Price Charts"}, {"id": "l_psychology_70", "theme": "psychology", "teaching": "Fibonacci retracement levels are essentially meaningless as precise predictive tools because virtually any pullback can retrospectively be called 'close enough' to some Fibonacci number.", "quote": "every pullback is \"close enough\" to some Fibonacci number, making the Fibonacci numbers essentially meaningless most of the time.", "pages": "167,192", "book": "Reading Price Charts"}, {"id": "l_psychology_71", "theme": "psychology", "teaching": "The best reversals often start slowly with several small/overlapping bars that trap traders out before the sharp move begins; the market is trying to shake weak hands so late entrants have to chase, fueling the move. A confident reader can enter early and move to breakeven once momentum starts.", "quote": "The market is trying to trap you out of the trade so that you will have to chase the move and add fuel to it...Some of the strongest trends come from these traps...", "pages": "206", "book": "Reading Price Charts"}, {"id": "l_psychology_72", "theme": "psychology", "teaching": "Ignore the news; it only creates a distance between the trader and the required action, forcing extra thought that must be reconciled with the chart, reducing profit. The chart already contains everything relevant.", "quote": "You should never pay attention to the news because it creates a distance between you and what you have to do...The chart tells you all that you need to know.", "pages": "225", "book": "Reading Price Charts"}, {"id": "l_psychology_73", "theme": "psychology", "teaching": "Candle-pattern traps: a large bar with a long tail and small body in a strong trend without a prior trendline break is a trading-range-in-a-single-bar (e.g., a doji is a one-bar trading range), not a reversal signal — you cannot buy above a trading range in a bear; candle novices who buy such bars get trapped and their stops fuel the trend continuation.", "quote": "a doji bar is a one-bar trading range and you cannot buy above a trading range in a bear. Since the doji is a trading range, it is a bear flag and not a reversal pattern.", "pages": "227", "book": "Reading Price Charts"}, {"id": "l_psychology_74", "theme": "psychology", "teaching": "Failures create opportunity because traders who were just stopped out become hesitant to re-enter in the same direction, making the market temporarily one-sided; as they exit with losses they add fuel to the opposite move.", "quote": "Failures are often excellent setups for trades in the opposite direction, since the traders who were just forced out will be hesitant to re-enter in the same direction, making the market one-sided.", "pages": "221", "book": "Reading Price Charts"}, {"id": "l_psychology_75", "theme": "psychology", "teaching": "Novice traders commonly lose money buying/selling exactly where smart traders are fading them — typically buying countertrend before any sign of bullish strength, buying above a doji-topped Barb Wire, or misreading a bear flag as a reversal out of eagerness.", "quote": "Almost invariably, he was buying Countertrend before there was a sign of bullish strength, like a prior surge above a bear trendline.", "pages": "224", "book": "Reading Price Charts"}, {"id": "l_psychology_76", "theme": "psychology", "teaching": "Most days are trading-range days, so fading failed swing-high/low breakouts is a core repeatable edge; on trend days you can still fade new extremes but only after a minor trendline break and with a strong reversal bar.", "quote": "Most days are trading range days and offer many entries on failed swing high and low breakouts. You can also fade new swing highs and lows on trend days after a minor trendline break and when there is a strong reversal bar.", "pages": "229", "book": "Reading Price Charts"}, {"id": "l_psychology_77", "theme": "psychology", "teaching": "Overlapping bars in a trend mean the market is accepting the current price level, not rejecting it — acceptance, not rejection, usually implies continuation rather than reversal, so wait for a genuine rejection signal before countertrend entries.", "quote": "Overlapping bars mean that the market is accepting these lower prices, not rejecting them. You need a sign of rejection before you buy in a bear.", "pages": "275-276", "book": "Reading Price Charts"}, {"id": "l_psychology_78", "theme": "psychology", "teaching": "Repeated scalping with too many unsuccessful attempts is tiring and can cause a trader to lose focus and miss the genuinely profitable trades — manage effort/fatigue, not just individual trade logic.", "quote": "Clearly, however, there were many other profitable scalps, but it is tiring to scalp if there are too many unsuccessful trades, often making a trader lose focus and then miss profitable trades.", "pages": "280", "book": "Reading Price Charts"}, {"id": "l_psychology_79", "theme": "psychology", "teaching": "Despite emotional, high-volatility conditions around reports (e.g., FOMC), standard price-action setups remain reliable; stick to the rules rather than reacting to the emotion of big/outside bars.", "quote": "However, despite the emotion that the rapid moves and big bars generate in all traders, price action setups are still very reliable.", "pages": "289", "book": "Reading Price Charts"}, {"id": "l_psychology_80", "theme": "psychology", "teaching": "Reasons for a reversal (news, reports) are irrelevant to the trade; the market can react either way to any given report, so watch price action unfold and trade the reaction, not the narrative.", "quote": "The market can rally or selloff in response to either a bullish or bearish report, and a trader is simply not qualified to reliably interpret a report in the absence of price action. The best way to know how the market will respond is simply to watch it respond and place your trades as the price action unfolds.", "pages": "317", "book": "Reading Price Charts"}, {"id": "l_psychology_81", "theme": "psychology", "teaching": "After being stopped out on the first entry of the day, the second entry usually more than makes up for the loss — don't be afraid to reverse and try again.", "quote": "Usually the second entry will more than make up for the loss on the first trade.", "pages": "329", "book": "Reading Price Charts"}, {"id": "l_psychology_82", "theme": "psychology", "teaching": "Don't spend excessive time trying to force a trade in a stock that isn't behaving as expected — the urge to 'make it back' on the same name after a loss is emotional weakness, not skill; great traders accept losses and move on.", "quote": "There is a natural tendency to want to make back your money on the same stock after a loss, but this is a sign of your emotional weakness... Great traders accept their losses and move on.", "pages": "358", "book": "Reading Price Charts"}, {"id": "l_psychology_83", "theme": "psychology", "teaching": "Climactic/huge volume alone, without accompanying bullish (or bearish) price action such as a strong reversal bar, is not a valid reason to fade a strong trend.", "quote": "Climactic volume in the absence of bullish price action is no reason to fade a strong bear trend.", "pages": "371", "book": "Reading Price Charts"}, {"id": "l_psychology_84", "theme": "psychology", "teaching": "Real-time trading is hard because a trader always feels like one more bar of confirmation is needed, but by the time that bar forms, the best entry price is already gone.", "quote": "It is especially difficult to do real time when you always feel like you need one more bar to be sure, but once that bar forms, you've missed the best entry.", "pages": "355", "book": "Reading Price Charts"}, {"id": "l_psychology_85", "theme": "psychology", "teaching": "An outside bar can be a valid entry when it clearly traps traders on the wrong side, but if the trapped-trader read is not clear, wait for more price action rather than forcing the trade.", "quote": "Bar 8 was a bull outside bar, which can be an entry when there are clearly trapped traders. When it is not clear, it is better to wait for more price action.", "pages": "358", "book": "Reading Price Charts"}, {"id": "l_psychology_86", "theme": "psychology", "teaching": "Reversal trades are trickier for beginners than trend trades because most reversal attempts fail and beginners tend to jump in too eagerly on weak setups; only take a reversal trade if it has every required component (strong trendline break, strong first leg, successful test of the extreme, strong reversal signal bar).", "quote": "these are trickier for beginners because most reversals fail, and beginners tend to be overly eager and enter on weak setups... If the setup does not have every one of these components, do not take the trade.", "pages": "374", "book": "Reading Price Charts"}, {"id": "l_psychology_87", "theme": "psychology", "teaching": "Being willing to hold a minority opinion and think independently of media/expert commentary (which is irrelevant to a day trader's timeframe and income) is a valuable trait, even though such macro/political views have no direct use for day trading decisions.", "quote": "None of this is useful to a day trader, but it is an example of being willing to think differently from the experts and being comfortable holding a minority opinion. Never be afraid to see things differently from everyone else, especially the experts on television.", "pages": "340", "book": "Reading Price Charts"}, {"id": "l_psychology_88", "theme": "psychology", "teaching": "Never trade Countertrend on a clear strong trend day; the math of repeated countertrend scalps against a strong trend is a losing strategy even though individual entries look tempting.", "quote": "Simply breaking a trend channel line is not a sufficient demonstration of bullish strength, and until that strength is present, any Countertrend trade is a scalp, which is a losing strategy against a strong trend.", "pages": "402", "book": "Reading Price Charts"}, {"id": "l_psychology_89", "theme": "psychology", "teaching": "Full mastery of price-action reading means nothing surprises you — you understand what the market is doing in real time, not just in retrospect on a printout.", "quote": "If you know how to read price action, nothing will surprise you because you will understand what the market is doing.", "pages": "407", "book": "Reading Price Charts"}, {"id": "l_psychology_90", "theme": "psychology", "teaching": "When one side of the market is suddenly trapped (in or out of a position), the reliability of a scalp in the opposite/resumption direction increases because trapped traders are forced to act at the same time you enter, temporarily removing them as opposing pressure.", "quote": "When you see that one side is suddenly trapped, the reliability of a scalp in the opposite direction goes up... Seeing traders getting trapped out of a trade on a stop run is as reliable a signal as seeing them getting trapped in a trade.", "pages": "407", "book": "Reading Price Charts"}, {"id": "l_psychology_91", "theme": "psychology", "teaching": "Trading is inherently boring for most of the time; overtrading from a desire for excitement destroys accounts, while the best traders tolerate long stretches of inaction.", "quote": "Many beginners want excitement and tend to overtrade. Many great traders find trading to be lonely and boring, but very profitable.", "pages": "407", "book": "Reading Price Charts"}, {"id": "l_psychology_92", "theme": "psychology", "teaching": "Decide explicitly whether trading is a hobby or a job; treating it as a hobby is dangerously expensive and addictive without the discipline of professional treatment.", "quote": "Decide if this is a hobby or a job. If it is a hobby, find another one because this one will be too expensive and it is dangerously addictive.", "pages": "407", "book": "Reading Price Charts"}, {"id": "l_psychology_93", "theme": "psychology", "teaching": "Be suspicious of unexpectedly good fills, but take the trade anyway if the setup itself is sound; a bad fill on a good trade is a less reliable danger signal than a good fill.", "quote": "Good fill, bad trade. Always be suspicious if the market lets you in or out at a price that is better than you anticipated, but if the setup is good, take it. The corollary of bad fill, good trade is not as reliable.", "pages": "409", "book": "Reading Price Charts"}, {"id": "l_psychology_94", "theme": "psychology", "teaching": "Ignore financial news/TV commentary; the most successful traders are too busy trading to be pundits, so trading ideas from media personalities are inherently suspect.", "quote": "Those who talk don't know and those who know don't talk. Don't watch TV or read any news.", "pages": "410", "book": "Reading Price Charts"}, {"id": "l_psychology_95", "theme": "psychology", "teaching": "Long-term profitability requires matching your trading style to your personality well enough to execute your rules with minimal stress or uncertainty; persistent stress signals you haven't found your style or haven't mastered yourself.", "quote": "You will not make money long term until you know enough about your personality to find a trading style that is compatible... if you feel stress while trading, then either you haven't yet found your style or yourself.", "pages": "411", "book": "Reading Price Charts"}, {"id": "l_psychology_96", "theme": "psychology", "teaching": "The second-most-important trait after discipline is the ability to do nothing for hours; don't let boredom convince you it's 'been too long' since the last trade and force an entry.", "quote": "The second-most-important trait of great traders is the ability to do nothing for hours at a time. Don't succumb to boredom and let it convince you that it's been too long since the last trade.", "pages": "412", "book": "Reading Price Charts"}, {"id": "l_psychology_97", "theme": "psychology", "teaching": "Early entries (entering as a signal bar is forming rather than waiting for its close and using a stop above/below it) are named and implicitly discouraged practices ('early longs'/'early shorts') distinct from disciplined stop-entry technique.", "quote": "early longs: Traders who buy as a bull reversal or trend bar is forming rather than waiting for it to close and then entering on a buy stop at one tick above its high.", "pages": "414", "book": "Reading Price Charts"}, {"id": "l_psychology_98", "theme": "psychology", "teaching": "Getting trapped out of a good trade by a scary pullback that then fails is emotionally costly because it forces the trader to chase a worse price to get back in — anticipate this dynamic rather than reacting to it.", "quote": "Trapped Out of a Trade: A pullback that scares a trader into exiting a trade, but then the pullback fails... making it difficult emotionally for the trader to get back in at the worse price that is now available. He will have to chase the market.", "pages": "417", "book": "Reading Price Charts"}, {"id": "l_psychology_99", "theme": "psychology", "teaching": "Al Brooks personally targets an 80% probability of making a profit within 1-10 minutes on little risk on every trade he takes, and considers himself a trend trader because every entry is via stop order that sweeps him in only if the market is already moving his way.", "quote": "All he wants to know is whether he has an 80 percent chance of making a profit in the next 1 to 10 minutes with little risk. Since all of his entries are on stops, he considers himself a trend trader because he gets swept into a trade by the market going i

n the direction he needs it to go to make a profit.", "pages": "422", "book": "Reading Price Charts"}, {"id": "l_psychology_100", "theme": "psychology", "teaching": "Countertrend scalping — entering against the trend believing a pullback is due, purely to grab a small profit — is a losing habit and should be avoided.", "quote": "countertrend scalp A trade taken in the belief that there is more to go in the trend but that a small pullback is due; you enter countertrend to capture a small profit as that small pullback is forming. This is usually a mistake and should be avoided.", "pages": "10", "book": "Reversals"}, {"id": "l_psychology_101", "theme": "psychology", "teaching": "Traders who are 'trapped in a trade' (an open loss without a scalper's profit) will likely exit at a loss if there's a pullback beyond entry/signal bars — recognizing this dynamic in other traders is itself a source of edge/setups (e.g., trapped-trader reversals).", "quote": "trapped in a trade A trader with an open loss on a trade that did not result in a scalper's profit, and if there is a pullback beyond the entry or signal bars, the trader will likely exit with a loss.", "pages": "16", "book": "Reversals"}, {"id": "l_psychology_102", "theme": "psychology", "teaching": "Being 'trapped out' of a trade (stopped/scared out by a pullback that then fails and the move resumes) forces the trader to chase price at a worse level — a psychological trap distinct from being trapped in.", "quote": "trapped out of a trade A pullback that scares a trader into exiting a trade, but then the pullback fails. The move quickly resumes in the direction of the trade, making it difficult emotionally for the trader to get back in at the worse price that is now available.", "pages": "16", "book": "Reversals"}, {"id": "l_psychology_103", "theme": "psychology", "teaching": "News is irrelevant to price-action trading — it's generated to sell advertising, is impossible to evaluate for trading purposes, and should always be ignored in favor of what the chart shows.", "quote": "news Useless information generated by the media for the sole purpose of selling advertising and making money for the media company. It is unrelated to trading, is impossible to evaluate, and should always be ignored.", "pages": "13", "book": "Reversals"}, {"id": "l_psychology_104", "theme": "psychology", "teaching": "Don't overthink or apply too much logic against what the tape is showing — if price is going up, institutions are net buying even during pullbacks that feel like they should be sold; the job is to follow behavior, not argue with it.", "quote": "If the market is going up, institutions are buying constantly, even at times when you think that you should stop yourself out of your long with a loss. Your job is to follow their behavior and not use too much logic to deny what is happening right in front of you.", "pages": "17-18", "book": "Reversals"}, {"id": "l_psychology_105", "theme": "psychology", "teaching": "Price action alone (read carefully, bar by bar) is sufficient; indicators, oscillators, multi-timeframe overlays, Fibonacci, and wave counts add noise, slow decision-making, and are unnecessary distractions for a discretionary trader.", "quote": "Price action is far more important than any other information, and if you sacrifice some of what it is telling you to gain information from something else, you are likely making a bad decision.", "pages": "21-23", "book": "Reversals"}, {"id": "l_psychology_106", "theme": "psychology", "teaching": "Never watch or trade off news, TV pundits, or other traders' opinions — the chart already reflects all information and reacts before the story is understood; news reporting is systematically biased toward extremity and always most bullish at tops / most bearish at bottoms.", "quote": "Only look at the chart and it will tell you what you need to know... the news is always the most bullish at market tops and most bearish at market bottoms.", "pages": "25-28,35", "book": "Reversals"}, {"id": "l_psychology_107", "theme": "psychology", "teaching": "A huge move against a larger trend (e.g., stock gapping up on buyout news within a larger bear trend) should be treated as just a flag until proven otherwise by a genuine series of higher highs/higher lows (or lower highs/lows).", "quote": "To a price action trader, a huge up move in a bear market is probably just a bear flag, unless the move is followed by a series of higher lows and higher highs.", "pages": "27", "book": "Reversals"}, {"id": "l_psychology_108", "theme": "psychology", "teaching": "Do not drop to a lower timeframe (e.g., 1-minute) to tighten stops on a 5-minute-based trade — it tempts cherry-picking and destroys discipline; rely on the timeframe you analyzed the setup on for stops and targets.", "quote": "Do not dial down to a 1 minute chart and tighten your stop, because you will lose... you must therefore rely on your five-minute stops and targets.", "pages": "26", "book": "Reversals"}, {"id": "l_psychology_109", "theme": "psychology", "teaching": "Trading is best compared to chess, not gambling or poker — nothing is hidden (unlike cards), and outcome depends purely on skill in reading what's on the chart (analogous to the board) versus your competitors.", "quote": "In chess nothing is hidden and it is simply your skill compared to that of your opponent that determines the outcome... Your ability to read what is in front of you and determine what will likely follow is a great asset both to a chess player and to a trader.", "pages": "28", "book": "Reversals"}, {"id": "l_psychology_110", "theme": "psychology", "teaching": "In a strong trend, beginners keep fading the extreme because price 'spends so much time' near the high/low and 'never pulls back,' but experienced traders take the opposite side, buying the weak pullback dip / selling the weak rally, and the trend resumes in a quick breakout that stops out the fading beginners.", "quote": "Experienced traders take the other side of this trade... The bull trend then resumes again in a quick breakout, and they are on the sidelines, watching, feeling sad, and a little bit poorer.", "pages": "39", "book": "Reversals"}, {"id": "l_psychology_111", "theme": "psychology", "teaching": "Options-holding longs in a downtrend will use bounces to finally exit once their puts near expiration, adding fresh supply into rallies and reinforcing a second leg down — a structural, not purely technical, reason multi-leg reversals/corrections form.", "quote": "Once expired, the traders no longer have downside protection... Instead, they will look to sell out of their positions. Their supply will limit the rally... and will create a second leg down.", "pages": "38", "book": "Reversals"}, {"id": "l_psychology_112", "theme": "psychology", "teaching": "Deviating from your trading rules after a loss (revenge trading to 'get back' money) converts trading into gambling; discipline means sticking to the same criteria regardless of recent results.", "quote": "Whenever traders deviate from those rules for any reason, they are trading on hope rather than logic and are then gambling.", "pages": "28", "book": "Reversals"}, {"id": "l_psychology_113", "theme": "psychology", "teaching": "If a trader enters early into a hesitant, overlapping-bar move but the majority of bars are trend bars in the right direction, that's a sign of strength, not a concern — a good trader enters before the crowd sees it, moves the stop to breakeven quickly, and doesn't need consensus to have a valid trade.", "quote": "If you are confident in your read, take your trade, and don't worry that no one else sees what you see yet. They eventually will.", "pages": "42", "book": "Reversals"}, {"id": "l_psychology_114", "theme": "psychology", "teaching": "Trading a reversal is much harder in real time than it looks on an end-of-day chart because the strong signal spike occurs in an emotional market where beginners are still in denial about the old trend, having just lost money on earlier countertrend attempts — this fear causes them to miss the early entry and then be too scared to enter on the pullback either.", "quote": "Trends do everything that they can to keep traders out, which is the only way they can keep traders chasing the market all day. When a setup is easy and clear, the move is usually a small, fast scalp. If the move is going to go a long way, it has to be unclear and difficult to take.", "pages": "53", "book": "Reversals"}, {"id": "l_psychology_115", "theme": "psychology", "teaching": "Weak/emotional traders buy strength and sell weakness at exactly the wrong moments (chasing large trend bars at trend exhaustion) because they are trading on emotion, competing against unemotional algorithms - this dooms them to losses on climactic bars.", "quote": "These weak traders are trading on emotion and are competing against computers, which do not have emotion as one of the variables in their algorithms.", "pages": "62,79", "book": "Reversals"}, {"id": "l_psychology_116", "theme": "psychology", "teaching": "A reduced dollar-risk stop on a smaller timeframe chart does not by itself make a trade worth taking - the probability of success drops even more than the risk drops, netting a losing strategy overall (trader's equation math).", "quote": "A 1 minute chart allows for smaller stops, but the reduced risk alone does not make a trade worth taking. Remember the trader's equation. The chance of success also drops, and in fact this more than offsets the reduced risk; the result is a losing strategy.", "pages": "70", "book": "Reversals"}, {"id": "l_psychology_117", "theme": "psychology", "teaching": "At an exhaustion climax, both under-invested bulls (afraid of missing the move) and weak bears (panicking, buying back shorts) do the opposite of what institutions are doing and are 'doomed to lose money'; smart traders fade likely climaxes rather than buying in a panic.", "quote": "Today's smart traders don't buy in a panic, and instead fade likely climaxes. Most breakouts fail, and sometimes the strongest breakout attempts are the most likely to fail.", "pages": "78-79", "book": "Reversals"}, {"id": "l_psychology_118", "theme": "psychology", "teaching": "Strong (smart) bulls and bears understand climaxes/excess: strong bears only re-short near where they originally shorted (top of the prior channel), and strong bulls wait to buy at the best perceived value (the bottom), not simply because the market is falling.", "quote": "The strong bulls saw the collapse and stepped aside. They knew that the market was going lower, so there was no incentive for them to buy until they believed that the market was as low as it would go.", "pages": "83", "book": "Reversals"}, {"id": "l_psychology_119", "theme": "psychology", "teaching": "Institutions are 'smart money' but still lose 30-70% of the time on any given trade/system; heavy institutional volume at an extreme is usually a mix of profit-taking bulls and bears, not a unified directional conviction.", "quote": "Remember, all of their systems lose between 30 and 70 percent of the time, and this is one of those times.", "pages": "86", "book": "Reversals"}, {"id": "l_psychology_120", "theme": "psychology", "teaching": "Retail/individual traders are responsible for less than 5% of volume at major turning points; heavy volume there is institutional, not retail-driven.", "quote": "The volume is not from small individual traders, because they are responsible for less than 5 percent of the volume at major turning points.", "pages": "86", "book": "Reversals"}, {"id": "l_psychology_121", "theme": "psychology", "teaching": "Markets often reverse after a test of the trend's extreme — as a bull trend weakens, strong bulls shift from buying breakouts to buying only pullbacks, and strong bears begin dominating at new highs, trying to convert the higher high into the top of the rally.", "quote": "As the bull trend weakens and gets more two-sided trading, the strong bulls will see a new high as a place to take profits instead of a good location for more longs, and they will buy only on a pullback.", "pages": "96", "book": "Reversals"}, {"id": "l_psychology_122", "theme": "psychology", "teaching": "Many trades end with smaller profit or loss than expected when entered; good traders take what the market gives and move to the next trade rather than clinging to the original plan.", "quote": "Traders always have a plan when they enter a trade, but if the premise changes, they change their plan... Good traders just take what the market gives them and then move on to the next trade.", "pages": "105", "book": "Reversals"}, {"id": "l_psychology_123", "theme": "psychology", "teaching": "Final flags recur because a trend that has run dozens of bars causes both trend traders (take profits) and countertrend traders (get aggressive) to believe a correction/reversal is imminent, and this shared belief becomes self-fulfilling via a magnetic two-sided trading range.", "quote": "The flag occurs in a trend that has gone on for dozens of bars; therefore the trend traders might begin to take profits and the countertrend traders might become more aggressive. Both will believe that the trend is overdone...", "pages": "112", "book": "Reversals"}, {"id": "l_psychology_124", "theme": "psychology", "teaching": "After a breakout that traps traders offside (e.g., closing above the highs/closes of many prior bars), those trapped traders must cover, and are unwilling to re-enter counter-trend for several bars — this one-sidedness itself fuels an extended, multi-leg move.", "quote": "Traders who shorted during those bars either had to cover their shorts or were holding losing positions... they would not have been looking to short again for at least several bars... This made the market one-sided, which usually leads to a rally that has at least 10 bars and two legs.", "pages": "116", "book": "Reversals"}, {"id": "l_psychology_125", "theme": "psychology", "teaching": "Institutions/smart money do not sell below the lows of bars within a rising channel — the fact that price keeps rising through a channel is itself proof that buying (not selling) is happening there.", "quote": "Institutions would not be selling below the lows of bars in a channel, because that is not what they do. How can I be sure? Because if they did, the market would go down, but since it is going up, they must be buying.", "pages": "120", "book": "Reversals"}, {"id": "l_psychology_126", "theme": "psychology", "teaching": "Institutions defending (not running the stops of) a prior low/high, rather than running the stops, indicates they believe the market will go the other way (accumulation/distribution signal).", "quote": "The institutions were defending the bar 1 low instead of attempting to run the stops, indicating that they believed that the market was going up.", "pages": "128", "book": "Reversals"}, {"id": "l_psychology_127", "theme": "psychology", "teaching": "Two-bar reversals whose bars completely overlap the prior two bars and enter at the top of a small range are often bull (or bear) traps: novice traders buy the breakout while experienced traders are shorting right where the novices buy.", "quote": "This type of two-bar reversal is usually a bull trap, and they are likely shorting where the novice traders are buying.", "pages": "131", "book": "Reversals"}, {"id": "l_psychology_128", "theme": "psychology", "teaching": "When a pattern fails, the trapped traders will exit at the same price level where smart traders are placing their entry stops — so placing your entry exactly where trapped traders' stops are located makes you a natural, low-risk counter-trader.", "quote": "Place your entry stop order at exactly the same place that these trapped traders are placing their protective stops, and you will get in where they will get out. They won't be eager to enter again in their original direction, which makes the market one-sided in your direction.", "pages": "132-133", "book": "Reversals"}, {"id": "l_psychology_129", "theme": "psychology", "teaching": "After a long single-direction sell-off with no bullish strength shown (e.g., 7 straight bear bars), it's better to wait for a second entry on the eventual long rather than take the first higher low, because the first attempt is likely to fail/go nowhere.", "quote": "The sell-off to bar 9 was seven bars long with no bullish strength, so it would have been better to wait for a second entry, despite bar 9 being a higher low. It was likely to fail to go far.", "pages": "139", "book": "Reversals"}, {"id": "l_psychology_130", "theme": "psychology", "teaching": "Beginning traders tend to lose money specifically in the middle third of the day; if that pattern holds, they should consider not trading that period at all rather than trying to force it, since the goal is to make money, not to trade all day.", "quote": "If a person owns two stores and one makes a lot of money, but the other consistently loses money no matter what the owner does ... should he continue to operate both stores? ... Your goal is to make money, not to trade all day long.", "pages": "151-152", "book": "Reversals"}, {"id": "l_psychology_131", "theme": "psychology", "teaching": "Traders get tired, bored, or distracted over the course of a session and should refrain from trading when not at their best, since edges are thin; computers do not suffer this disadvantage.", "quote": "Traders can get tired, bored, or distracted at any time during the day and should not trade until they are back to normal. The computers don't get tired and trade into the close as well as they did all day long.", "pages": "152", "book": "Reversals"}, {"id": "l_psychology_132", "theme": "psychology", "teaching": "Traders often rationalize away good always-in trades by convincing themselves the probability is only 50% ('coin flip') when it is actually 60%+, giving themselves a plausible but incorrect excuse to skip the trade out of fear.", "quote": "The trader's equation is excellent for shorting, even if the probability only feels like it is 50 percent. It is actually at least 60 percent, but traders often are frightened and are in denial... This gives them a plausible, but incorrect, reason to not take the trade.", "pages": "174", "book": "Reversals"}, {"id": "l_psychology_133", "theme": "psychology", "teaching": "It's important to get positioned with institutions during a run-away trend because run-away trends have the strongest trader's equations, even though it feels emotionally uncomfortable to chase.", "quote": "It is important to get short when the institutions are shorting so aggressively, because run-away trends have the strongest trader's equations.", "pages": "174", "book": "Reversals"}, {"id": "l_psychology_134", "theme": "psychology", "teaching": "Beginners fear that a strong breakout out of a trading range has 'run too far already' and might not have much room left; experienced traders instead know a strong successful range breakout usually reaches at least its measured-move target, leaving plenty of room for profit.", "quote": "Beginners are afraid that there might not be much left to the move, but experienced traders know that a strong successful breakout from a trading range will usually reach a measured move target at a minimum and provide plenty of room for a profit.", "pages": "166", "book": "Reversals"}, {"id": "l_psychology_135", "theme": "psychology", "teaching": "It is far better to accept many small wins/losses (a low-probability but favorable-equation swing setup) than to keep hoping to finally 'figure out' how to trade the first hour profitably while alternating between bad scalps and missed swings.", "quote": "It is far better to win a little, but win frequently, than it is to lose several times a day while hoping to finally figure out how to trade the first hour profitably.", "pages": "185", "book": "Reversals"}, {"id": "l_psychology_136", "theme": "psychology", "teaching": "Hindsight makes setups look far clearer than they were in real time; traders who lost on early attempts often become afraid to re-enter once the trend is obviously strong, and then chase late or freeze, compounding the original loss.", "quote": "At the end of the day, they print the chart out and cannot believe how clear the setups actually were. But hindsight is very different from real time.", "pages": "185", "book": "Reversals"}, {"id": "l_psychology_137", "theme": "psychology", "teaching": "A strong initial move at the open that later reverses is not 'erased' — it signals real strength on that side of the market, and a trader should watch for that side to reassert itself later in the day even if a countertrend has since taken hold.", "quote": "That initial downside strength indicates that bears were willing to aggressively short the market earlier in the day and may look for another opportunity later in the day, despite the bull trend. So if there is a strong correction in the bull trend, do not ignore the possibility that it could be another trend change taking place, this time back to a bear trend.", "pages": "206", "book": "Reversals"}, {"id": "l_psychology_138", "theme": "psychology", "teaching": "Traders should stay open to every reversal possibility and act on strong signals rather than freezing because a reversal happened suddenly; the difficulty is emotional/time-pressure, not analytical.", "quote": "Be open to all possibilities and try to take every signal, especially if it is strong. One of the difficulties is that reversals often are sharp and traders might not have enough time to convince themselves that a reversal setup could actually lead to a reversal.", "pages": "206", "book": "Reversals"}, {"id": "l_psychology_139", "theme": "psychology", "teaching": "Swing traders comfortable buying near the top of a weak bull channel (low-probability, high-reward setups) can profit because reward vastly exceeds risk, but most traders can't stomach this and instead wait for high-probability setups, sometimes missing entire trends as a result — and that is an acceptable, disciplined choice as long as they stay in their comfort zone.", "quote": "Traders who only want to take high-probability trades often sit back and watch the trend grind higher for many bars...This is acceptable because traders should always stay in their comfort zone.", "pages": "245", "book": "Reversals"}, {"id": "l_psychology_140", "theme": "psychology", "teaching": "Trading involves long, boring stretches punctuated by brief high-stakes moments; traders must train themselves like firefighters to act immediately and correctly the instant the trade sets up, without becoming complacent during the wait.", "quote": "The long, boring stretches, interrupted by brief moments of anxiety and uncertainty, are inescapable components of the job...Firefighters wait for days, never knowing when the alarm will sound, but when it does, they have to act immediately and perfectly.", "pages": "249", "book": "Reversals"}, {"id": "l_psychology_141", "theme": "psychology", "teaching": "A 60% win-rate setup still has a real, dangerous 40% failure rate; overconfidence in a 'good' setup must not translate into skipping the protective stop, since someone with only a 40% chance of hitting you is still a serious threat.", "quote": "Remember, a 60 percent chance of success means a 40 percent chance of failure, and someone shooting at you with only a 40 percent chance of hitting you is still a source of great danger. Always recognize that the 40 percent is very real and dangerous, and always use a protective stop.", "pages": "254", "book": "Reversals"}, {"id": "l_psychology_142", "theme": "psychology", "teaching": "A great baseball hitter fails 70% of the time yet still earns millions from the other 30% — traders with a positive equation should likewise expect to lose often (even 40-50% of trades) and trust the math rather than seeking a high win rate.", "quote": "Remember, a great baseball hitter fails 70 percent of the time, but still makes millions of dollars from that other 30 percent. An experienced trader can win 60 percent or more of the time and have an average win that is larger than the risk, and sometimes two or more times larger. Be patient, but when the setup that you have waited for finally arrives, learn to take the trade and trust the math.", "pages": "254", "book": "Reversals"}, {"id": "l_psychology_143", "theme": "psychology", "teaching": "In a tight/choppy environment, institutions buy below the prior bar's low and sell above the prior bar's high using limit orders and scale in; retail traders using only stop entries should simply not trade there rather than hoping for a breakout that the prior 5-10 signals already failed to produce.", "quote": "Since clearly this is a terrible environment for entering on stops, a best trade will virtually never develop until after a breakout, and you will lose money by taking trades as you hope that your trade will result in a successful breakout, even though the prior 5 to 10 signals did not.", "pages": "263", "book": "Reversals"}, {"id": "l_psychology_144", "theme": "psychology", "teaching": "Trading like an institution (scaling in against the trend with limit orders) is emotionally draining, produces uncomfortably large drawdowns, and tends to cause traders to exit with a big loss right before the market reverses in their favor — better to wait for stop-entry environments with ~60% odds.", "quote": "The drawdowns get uncomfortably large and you will end up making mistakes, like exiting with a big loss just before the market reverses and goes your way. It is far better to enter on stops and wait for an environment where the probability is often 60 percent, and not trade in a tight trading range.", "pages": "263", "book": "Reversals"}, {"id": "l_psychology_145", "theme": "psychology", "teaching": "It's easy to get trapped out of a great trade by a sharp adverse pullback; avoid tightening stops too early and try to hold at least part of a position with only a breakeven stop until the always-in direction clearly flips.", "quote": "It is easy to get trapped out of a great trade, but it is important to try hard to avoid getting trapped out. Do not tighten your stops too early, and try to hold some of your position with a breakeven stop until the market clearly becomes always-in long.", "pages": "267", "book": "Reversals"}, {"id": "l_psychology_146", "theme": "psychology", "teaching": "When shorts (or longs) get stopped out by a breakout-test that runs their breakeven stops and then reverses back in the original trend direction, they should be willing to re-enter at a worse price rather than staying on the sidelines, since the breakout test's purpose was exactly to scare weak hands out.", "quote": "If traders let themselves be stopped out, they would now be short again, but at 41 cents worse!", "pages": "263", "book": "Reversals"}, {"id": "l_psychology_147", "theme": "psychology", "teaching": "Reading and understanding price action theory (even 570,000 words of it) is necessary but not sufficient — turning knowledge into consistent profitability requires extensive deliberate practice, comparable to mastering golf or a musical instrument.", "quote": "Reading these 570,000 words is like reading a detailed manual on how to do anything, such as playing golf or a violin. It takes a lot of hard work to turn the information into the ability to make a living as a trader.", "pages": "280", "book": "Reversals"}, {"id": "l_psychology_148", "theme": "psychology", "teaching": "Every bar, even a strong trend bar, is simultaneously a potential signal bar for a reversal in either direction on the next bar — stay open to the exact opposite of what you expect, and when a surprise happens, don't question or deny it, just read and trade it.", "quote": "Every bar, even a strong trend bar, is a signal bar for both directions, and the market can begin a trend up or down on the next bar. Be open to all possibilities, including the exact opposite of what you expect, and when the surprise happens, don't question or deny it. Just read it and trade it.", "pages": "280", "book": "Reversals"}, {"id": "l_psychology_149", "theme": "psychology", "teaching": "If you are positive a setup is good, don't take the trade — overconfidence means you're using unrealistically high probabilities and missing what the other side of the trade sees.", "quote": "Whenever you are positive that your setup is good, don't take the trade. You are missing something.", "pages": "281", "book": "Reversals"}, {"id": "l_psychology_150", "theme": "psychology", "teaching": "Feeling twisted inside because a pullback seems to be going too far usually means the trend has actually reversed, not that it's just a deep pullback.", "quote": "If ever you feel twisted inside because a pullback is going too far, you are likely mistakenly seeing a pullback when in fact the trend has reversed.", "pages": "281", "book": "Reversals"}, {"id": "l_psychology_151", "theme": "psychology", "teaching": "The market is not fair, has no concept of fairness, and is driven by relentlessly objective computer programs; a trader's job is to copy what the big/institutional orders are doing since they will keep entering after you and drive price to your profit.", "quote": "Computer programs control all market activity, and they have no concept of fairness... your job is to see what they are doing and then copy them.", "pages": "282", "book": "Reversals"}, {"id": "l_psychology_152", "theme": "psychology", "teaching": "Losers look for an external savior (gurus, TV experts, chat rooms, indicators, newsletters) to protect them from losses; none of these people are aligned with your interests, and you won't make money until you rely on your own analysis.", "quote": "Those who talk don't know and those who know don't talk. Don't watch TV or read any news.", "pages": "282", "book": "Reversals"}, {"id": "l_psychology_153", "theme": "psychology", "teaching": "Adopt an 'I don't care' mantra — trade small enough that a loss won't cloud your judgment, and ignore all outside noise (TV, other timeframes, indicators) in favor of the one chart in front of you and your own rules.", "quote": "\"I don't care!\" That is the most useful mantra.", "pages": "282", "book": "Reversals"}, {"id": "l_psychology_154", "theme": "psychology", "teaching": "Your goal is to make money, not to make trades; take only trades likely to make money and don't be upset about missing good ones — many great traders find trading lonely and boring but profitable.", "quote": "You don't have to trade. You goal as a trader is to make money, not to make trades.", "pages": "283", "book": "Reversals"}, {"id": "l_psychology_155", "theme": "psychology", "teaching": "Fear and greed are the dominant feelings for beginners and media; profitable traders instead feel uncertainty/confusion and urgency and use both to their advantage — certainty signals a strong trend, urgency/desperation for a pullback also signals a strong trend (entering a small position at market rather than waiting).", "quote": "The two most important feelings for the media and for beginners are fear and greed. Profitable traders feel neither.", "pages": "283", "book": "Reversals"}, {"id": "l_psychology_156", "theme": "psychology", "teaching": "If down on the day in the second half, don't modify your trading style or increase size/take lower-probability setups — stick to your rules into the close and you'll likely win back some losses; changing approach only costs more.", "quote": "The worst thing to do is to modify your trading style, which is probably why you are down on the day.", "pages": "284", "book": "Reversals"}, {"id": "l_psychology_157", "theme": "psychology", "teaching": "You won't make money long-term until you understand your own personality well enough to find a compatible trading style that you can follow with minimal stress, uncertainty, or anxiety.", "quote": "If you feel stress while trading, then you haven't yet found either your style or yourself.", "pages": "285", "book": "Reversals"}, {"id": "l_psychology_158", "theme": "psychology", "teaching": "You're competing against computers that have the edge of speed (avoid trading during news reports), lack of emotion (don't trade upset/distracted), and never getting tired (don't trade when worn out, e.g. end of day).", "quote": "You are competing against computers... it is usually best not to trade during a report.", "pages": "285", "book": "Reversals"}, {"id": "l_psychology_159", "theme": "psychology", "teaching": "After a loss on a stock, don't keep trying to make your money back on that same stock; the need to prove you were right is a sign of emotional weakness. Great traders accept losses and move on.", "quote": "There is a natural tendency to want to make back your money on the same stock after a loss, but this is a sign of your emotional weakness... Great traders accept their losses and move on", "pages": "224", "book": "Reversals"}, {"id": "l_psychology_160", "theme": "psychology", "teaching": "When a strong trend forms large trend bars after a long spike (10-20 bars), there is great risk of a protracted two-legged pullback, because strong with-trend traders only buy a significant pullback and strong countertrend traders enter at the market and scale in.", "quote": "there is a great risk of a protracted two-legged pullback because most strong bulls would only buy a significant pullback and most strong bears would short at the market and scale in higher", "pages": "230", "book": "Reversals"}, {"id": "l_psychology_161", "theme": "psychology", "teaching": "The best way to make money is to do what the smart money is doing (which is too big to hide) and read the chart, not to listen to TV pundits. A spike and parabolic climax tells you the smart bulls and bears are betting on the pullback.", "quote": "The best way to make money trading is by doing what the smart money is doing and not listening to experts on television", "pages": "230", "book": "Reversals"}, {"id": "l_management_0", "theme": "management", "teaching": "Take partial profits at the first target, move stop to breakeven, and let a runner ride — some trades each week will run to 4x or more of the initial target.", "quote": "Move your stop to breakeven and then let the remainder run. You will likely have at least a couple of trades each week that run to four or more times your initial target before setting up a reverse entry pattern.", "pages": "53(85)", "book": "Trends"}, {"id": "l_management_1", "theme": "management", "teaching": "When afraid of the risk on a fast, high-probability spike entry, take a smaller position just to be in the trade, then add/move to breakeven after confirmation and hold into the close.", "quote": "If you are afraid, just short a very small position to be sure to be in the trade. Once you have another strong bear trend bar, like bar 14, move your stop either to breakeven or to above the high of that bar and hold into the close.", "pages": "72(104)", "book": "Trends"}, {"id": "l_management_2", "theme": "management", "teaching": "When price fails to hit a breakeven stop by even a single tick before resuming with-trend, that's a sign of underlying strength and a new extreme is likely to follow.", "quote": "Bar 9 also tested the long entry above the bull bar that followed bar 7, and it missed the breakeven stop by a tick. When the bulls are able to prevent their breakeven stop from being hit, they are strong and a new high usually follows.", "pages": "81(113)", "book": "Trends"}, {"id": "l_management_3", "theme": "management", "teaching": "On failed breakout setups where opposing stop orders are used (buy above/sell below a small inside bar), if the with-trend order fills first, generally do not flip to reverse on the protective stop; but if it's a strongly opposing (e.g., prior bear trend) day, reversing may be warranted.", "quote": "if the trader was first filled on the buy (with trend) order, he usually should not reverse on the protective stop, but might if the day had been a bear trend day.", "pages": "140", "book": "Trends"}, {"id": "l_management_4", "theme": "management", "teaching": "After a strong bull trend bar off a higher low confirms the new swing, move the protective stop up to below that higher low and hold the position into the close rather than exiting early.", "quote": "Once the market turned up from the higher low with a strong bull trend bar, they could move their stop up to below the higher low and hold long into the close.", "pages": "153", "book": "Trends"}, {"id": "l_management_5", "theme": "management", "teaching": "Risk sizing should scale with bar size: if you want constant dollar risk across trades, trade fewer contracts/shares when the current bars (and thus your stop distance) are larger.", "quote": "If you wanted to keep your risk the same on all of your trades, you would have to trade fewer shares.", "pages": "168", "book": "Trends"}, {"id": "l_management_6", "theme": "management", "teaching": "When a setup is 'almost' a reliable pattern (e.g., almost an outside bar), it will likely still produce the outcome typical of that reliable pattern.", "quote": "in trading if something is almost a reliable pattern, it will likely yield the reliable result.", "pages": "193", "book": "Trends"}, {"id": "l_management_7", "theme": "management", "teaching": "Wait for the 5-minute (or any time frame) bar to close before entering; entering early to save a tick or two risks getting trapped by a late reversal in the final seconds of the bar, and the math (needing ~8 early entries to work for every 1 that fails) doesn't favor early entry except in a very strong trend.", "quote": "That means that you need about eight early entries to work as planned for every one that does not, and that simply won’t happen.", "pages": "201", "book": "Trends"}, {"id": "l_management_8", "theme": "management", "teaching": "Watch the strength of the close of the entry bar and the following bar(s): a body that grows strong into the close argues for holding/swinging more size; a weak close argues for scalping out more.", "quote": "If the entry bar is six ticks tall, you would much prefer seeing the body suddenly increase from a body that was two ticks to one that was four ticks in the final seconds of the bar. You will then likely reduce the number of contracts that you will scalp out.", "pages": "202", "book": "Trends"}, {"id": "l_management_9", "theme": "management", "teaching": "When scaling into countertrend positions within a with-trend channel (e.g., shorts in a bull channel), do most of that scaling in the first two-thirds of the day; being heavily positioned against a strong channel late in the day with a distant breakeven point is a management trap.", "quote": "It is best to do this only in the first two-thirds of the day. You do not want to find yourself heavily short in a bull channel with your breakeven entry so far below that you don't have enough time left to get out without a loss.", "pages": "224-225 (256-257)", "book": "Trends"}, {"id": "l_management_10", "theme": "management", "teaching": "Straight trend lines and trend channel lines consistently give more reliable setups and profitable trades than curved channels/moving-average bands, despite the popularity of the latter.", "quote": "Although the moving average often functions as support or resistance in a strong trend and many traders create curved channels and bands based on the moving average and many other factors, straight trend lines and trend channel lines consistently provide more reliable setups and profitable trades.", "pages": "220 (252)", "book": "Trends"}, {"id": "l_management_11", "theme": "management", "teaching": "Entering below the low of a single bear reversal bar (rather than below the low of both bars in a two-bar reversal) carries extra risk of a one-tick bear trap where price pokes one tick lower and then resumes; entering below the low of both bars of the two-bar reversal reduces that risk.", "quote": "The problem with entering below the low of the bar 7 bear bar is that the market often has a one-tick bear trap. ... This risk is less if you enter below the low of both bars.", "pages": "246 (278)", "book": "Trends"}, {"id": "l_management_12", "theme": "management", "teaching": "Best risk/reward for a trend trade is entering on the first pullback after a trend line break, before the trend is clearly established.", "quote": "The best risk/reward ratio occurs when you enter on the first pullback after a trend line break, before there is a clearly established trend.", "pages": "309", "book": "Trends"}, {"id": "l_management_13", "theme": "management", "teaching": "Even in the strongest trend, a pullback eventually forms because experienced early buyers take partial/full profits at resistance levels (measured moves, trend lines, channel lines, opposite side of a trading range) — not because bulls stop wanting to buy dips.", "quote": "It is because not everyone is looking to buy. Experienced traders who bought early on look for price levels to take partial profits... They always take their profits at some resistance level.", "pages": "310-311", "book": "Trends"}, {"id": "l_management_14", "theme": "management", "teaching": "In wide-range/high-volatility days, reduce position size (to half or less) and widen stops/targets accordingly to accommodate the bigger swings.", "quote": "Many of the bars today had a range of over 6 to 8 points. It would be prudent to reduce your position size to half or less, and increase your stop to 4 points and your profit target to 2 points.", "pages": "296", "book": "Trends"}, {"id": "l_management_15", "theme": "management", "teaching": "Trail your protective stop to just below the most recent swing low (bull) / above the most recent swing high (bear) as new trend extremes form; consider partial profits on new highs/lows.", "quote": "every time the market reaches a new high, traders should raise their protective stop to one tick below the most recent low. This is called trailing their stop.", "pages": "326-327", "book": "Trends"}, {"id": "l_management_16", "theme": "management", "teaching": "After a pullback tests the original entry and the market makes a new extreme, most traders raise stops to breakeven or below the pullback low because they don't want a second test of entry.", "quote": "Once the market tests the original entry price and then goes to a new high, most traders would then raise their stops to at least their entry price.", "pages": "327", "book": "Trends"}, {"id": "l_management_17", "theme": "management", "teaching": "On strong trend days, use a generous profit target and do not take any profit until price reaches at least twice your risk; tighten the stop as new confirming trend bars form to reduce dollar risk toward near-zero.", "quote": "On a strong trend day like this, it was far better to use a generous proﬁt target. Traders should not have tried to take any proﬁt until the market went to at least twice their risk.", "pages": "333", "book": "Trends"}, {"id": "l_management_18", "theme": "management", "teaching": "When holding a large profit late in the day, it's often wise to exit ahead of any setup that could produce a larger pullback, then look to re-enter after a two-legged pullback completes.", "quote": "When you have a large proﬁt, it is usually wise to exit in the ﬁnal hour or so on any setup that could lead to a larger pullback and then maybe look to get long again once that two-legged pullback is complete.", "pages": "333", "book": "Trends"}, {"id": "l_management_19", "theme": "management", "teaching": "A tight channel should only be traded in the with-trend direction because pullbacks won't extend far enough for a profitable countertrend trade; only channels with broad swings are tradable both ways, and even then trading countertrend prematurely against a channel is costly since channels can last far longer than expected.", "quote": "if the channel is fairly tight, it is tradable only in the with-trend direction because the pullbacks will not go far enough for a countertrend trade to be proﬁtable... it is still a trend and it is very costly to trade countertrend prematurely.", "pages": "360", "book": "Trends"}, {"id": "l_management_20", "theme": "management", "teaching": "Measured-move, trend-line, and trend-channel-line targets mostly fail, especially in very strong trends, but are still worth tracking as profit-taking areas rather than reversal-entry triggers; take a reversal trade only when the setup itself is strong.", "quote": "In general, it is far better to look at measured move targets as areas to take profits than as locations to take reversal trades. Traders should take a reversal trade only when the setup is strong.", "pages": "330 (362)", "book": "Trends"}, {"id": "l_management_21", "theme": "management", "teaching": "In a strong, non-climaxed trend, experienced traders buy small size all the way up (not waiting for pullbacks) with far-away stops, keeping position size small because risk per unit is larger, adding as the market rises.", "quote": "Whenever the market is trending strongly and has not yet had a climax, experienced traders are buying small positions all of the way up... their risk is greater so their position size is smaller, but they keep adding to their position as the market rises.", "pages": "347 (379)", "book": "Trends"}, {"id": "l_management_22", "theme": "management", "teaching": "When shorting/buying a high1 or high2 (etc.) after a sharp/climactic spike, expect the first pullback-based signal to fail and be prepared for at least a two-legged move before the setup that finally works; keep protective stops at the extreme until the market shows a second leg.", "quote": "After a climax, especially after a final flag reversal, the market usually has a two-legged correction, which means that a high 1 and maybe a high 2 would fail... keep your protective stop above the bar 5 high until after the market has begun its second leg.", "pages": "357 (389)", "book": "Trends"}, {"id": "l_management_23", "theme": "management", "teaching": "On trending trading range days, don't trail protective stops below swing lows (in an uptrend context) since they'll usually get hit; instead prefer exiting on strength (into the forming upper range) rather than on weakness — 'buy low, sell high' inside the range framework.", "quote": "Traders should not trail their protective stops below a swing low once they think that the market is in a trending trading range, because those stops will usually get hit. It makes more sense to look to exit on strength.", "pages": "361 (393)", "book": "Trends"}, {"id": "l_management_24", "theme": "management", "teaching": "When retracing a strong move, the market's first target is always the nearest earlier countertrend entry point (the signal-bar extreme of the last opposing setup).", "quote": "When a market retraces a strong move, the ﬁrst target is always the earlier countertrend entry points.", "pages": "404", "book": "Trends"}, {"id": "l_management_25", "theme": "management", "teaching": "In a tight-channel strong trend, pullbacks often come back and hit breakeven stops, trapping traders out; stops should instead be trailed below/above swing lows/highs rather than moved hastily to breakeven.", "quote": "Traders need to trail their stops below swing lows in a bull trend or above swing highs in a bear trend. If they are too eager to move their stops to breakeven, they will get trapped out.", "pages": "416,420,421", "book": "Trends"}, {"id": "l_management_26", "theme": "management", "teaching": "Entering on the first pullback after a strong initial leg exploits the tendency of strong moves to have at least two legs testing the extreme; it's a reliable way to catch a missed trend-from-open entry.", "quote": "Most strong moves have at least two legs, so entering on the ﬁrst pullback has a very good chance of leading to a proﬁtable trade.", "pages": "419", "book": "Trends"}, {"id": "l_management_27", "theme": "management", "teaching": "In tight-channel trends, price will typically return to the entry price within 5-10 bars before reaching a new extreme; fearful/inexperienced traders often exit at breakeven right before the next leg, getting trapped out of a strong trend.", "quote": "if there is a strong bull trend, the market will often come back to the entry price at the signal bar high in ﬁve to 10 bars, and will often dip a tick or two below it...They cannot take the pain anymore and exit with a small proﬁt or loss.", "pages": "421", "book": "Trends"}, {"id": "l_management_28", "theme": "management", "teaching": "Once a bull trend makes a new high, raise the protective stop to just below the most recent swing low (expecting trending lows); if the market instead enters a trading range where pullbacks fall below prior higher lows, switch to trading-range management.", "quote": "Trends tend to have trending highs and lows, so once a bull trend makes a new high, traders will raise their protective stops to just below the most recent swing low.", "pages": "421", "book": "Trends"}, {"id": "l_management_29", "theme": "management", "teaching": "In strong trends made of small, sideways, overlapping bars, price-action stops (below recent bar lows) get hit too often; a fixed money stop (e.g., about two points) is usually the better choice to stay in the trade.", "quote": "With so many small, sideways bars, price-action stops below the lows of prior bars get hit too often and it makes more sense to rely on the original two-point stop.", "pages": "440", "book": "Trends"}, {"id": "l_management_30", "theme": "management", "teaching": "In strong trend channels, swinging positions is more profitable than scalping because frequent with-trend pullbacks run stops on scalps; trail the stop beyond the prior swing point instead.", "quote": "As with most strong trend channels, you would make more by swinging than by scalping because there are frequent pullbacks that would run stops on even the with-trend scalps... It is better to trail your stop above the prior swing high.", "pages": "450", "book": "Trends"}, {"id": "l_management_31", "theme": "management", "teaching": "When a genuine breakout spike is underway and the wide required stop scares you off, deliberately trade a smaller ('I don't care') position size rather than skipping the trade — the math (60-80% chance of a measured move) still favors taking it.", "quote": "They have to get their position size down to the 'I don't care' size so that they can quickly get in the trade. The best way for them to take a scary trade is to automatically trade only a third or a quarter of their normal trade size and use the wide stop that is required.", "pages": "31", "book": "Trading Ranges"}, {"id": "l_management_32", "theme": "management", "teaching": "When a strong breakout's risk feels too large to take at full size, trade a reduced ('I don't care') quarter-size position just to participate and gain experience rather than skipping the trade entirely.", "quote": "If you have to, simply trade only a quarter-size position (\"I don't care\" size), just to get experience.", "pages": "42-43", "book": "Trading Ranges"}, {"id": "l_management_33", "theme": "management", "teaching": "Always be quicker to take profits on an existing trade than to initiate a new trade in the opposite direction — a countertrend entry requires a stronger setup than simply exiting a with-trend position.", "quote": "You should always be faster to take profits on a trade than you should be to look for an entry in the opposite direction.", "pages": "66-67", "book": "Trading Ranges"}, {"id": "l_management_34", "theme": "management", "teaching": "When deciding whether to hold a swing position after scalping part of a trade on a breakout bar that hasn't closed, ask whether you would enter at the market right now with a full swing-size position and the swing stop; if not, exit the swing portion at the market.", "quote": "One way to help decide if you should continue to hold your swing position is to ask yourself what you would do at this moment if you were not holding a position.", "pages": "51", "book": "Trading Ranges"}, {"id": "l_management_35", "theme": "management", "teaching": "In a very strong trend, it is often better to buy/sell at the market (or on tiny 1-2 tick dips) than to wait for a clean pullback, because the pullback you're waiting for may never come at a good price, or may come much higher/lower than the current price.", "quote": "When the trend is strong, it is often better to enter at the market than to wait for a pullback.", "pages": "86-87", "book": "Trading Ranges"}, {"id": "l_management_36", "theme": "management", "teaching": "On small/doji signal bars for high4/low4 setups, use a wider money-management stop (roughly 3 ticks beyond the bar, capped at about 8 ticks total risk on the ES) rather than a tight price-action stop, since these bars commonly get run by a tick before the real move.", "quote": "to avoid a whipsaw it is often best to place your protective stop at more than one tick beyond the signal bar (maybe three ticks, but no more than a total of eight ticks from your entry in the Emini when the average range is about 10 points)", "pages": "110, 116", "book": "Trading Ranges"}, {"id": "l_management_37", "theme": "management", "teaching": "A concrete stop-trailing/measured-move example: buying a bull spike with a fixed initial risk (~12 pts), moving to breakeven after a few bars, then trailing below each new higher low as the trend extends, captured ~50 points of a spike-and-channel bull run for 12 points of initial risk.", "quote": "If they held until the market reversed down at bar 17, they would have made about 50 points with an initial risk of 12 points, and a breakeven risk after the first few bars following their entry.", "pages": "145-146", "book": "Trading Ranges"}, {"id": "l_management_38", "theme": "management", "teaching": "Fibonacci retracement levels are essentially meaningless as a standalone reason to trade because virtually any pullback can be labeled 'close enough' to some Fibonacci ratio after the fact.", "quote": "Fibonacci traders would call the rally to bar 10 a 61.8 percent pullback and say that it was close enough, but every pullback is close enough to some Fibonacci number, making the Fibonacci numbers essentially meaningless most of the time.", "pages": "155", "book": "Trading Ranges"}, {"id": "l_management_39", "theme": "management", "teaching": "OCO bracket orders (fixed stop and target) plus stepping away from the screen can fix the tendency to exit winners too early at breakeven.", "quote": "you might try putting in a one cancels the other (OCO) bracket order as soon as you get long... Then go for a walk and come back in about an hour.", "pages": "166", "book": "Trading Ranges"}, {"id": "l_management_40", "theme": "management", "teaching": "Scaling to breakeven after partial profits, and tightening stops progressively (signal-bar extreme → entry-bar extreme → breakeven after a 5-tick move), lowers the win-rate required for profitability.", "quote": "If you move your stop from the signal bar extreme to the entry bar extreme (one tick beyond both) after the entry bar closes, and then to breakeven after a five-tick move, this further reduces the required winning percentage", "pages": "166", "book": "Trading Ranges"}, {"id": "l_management_41", "theme": "management", "teaching": "Look for where scalpers' stops cluster (second-entry levels) and consider adding to a position there if the pattern is still valid.", "quote": "Always look for where scalpers will have their stops, and look to add on to your position at that location, if the pattern is still valid.", "pages": "166", "book": "Trading Ranges"}, {"id": "l_management_42", "theme": "management", "teaching": "To decide whether to hold a swing trade, imagine you are flat: would you initiate this exact trade right now with the current stop distance? If not, exit immediately — holding is financially identical to a fresh entry.", "quote": "imagine that you are flat and think about whether you should enter at the market with a swing-size position and a protective stop exactly where a swing trader who is in the market would have his stop. If you would not take that trade, then you should exit your swing position immediately.", "pages": "167", "book": "Trading Ranges"}, {"id": "l_management_43", "theme": "management", "teaching": "When scaling into a countertrend position, exit or even reverse to the with-trend direction on the second adverse signal against you (e.g., a high 2 near the moving average while scaling into shorts in a bull trend) — don't keep averaging indefinitely.", "quote": "you should exit or reverse to the with-trend direction on the second move against you... exit or even reverse to long on a high 2, especially if it is near the moving average.", "pages": "195", "book": "Trading Ranges"}, {"id": "l_management_44", "theme": "management", "teaching": "Protective stops should always be an actual working order in the market, never just a mental stop, because traders ignore mental stops exactly when they're needed most.", "quote": "It is better to have the stop working, because many traders who use mental stops find too many reasons to ignore them when they are needed most.", "pages": "202", "book": "Trading Ranges"}, {"id": "l_management_45", "theme": "management", "teaching": "Two main stop types exist — money-management stops (fixed ticks/dollars) and price-action stops (beyond a bar/level); pick one primary method and use it consistently so stop placement isn't a distraction from the entry decision.", "quote": "In general, using one method most or all of the time is best because then it is such a part of your routine that you will always have a protective stop working.", "pages": "202", "book": "Trading Ranges"}, {"id": "l_management_46", "theme": "management", "teaching": "The default initial stop is one tick beyond the signal bar; once the entry bar closes as a strong trend bar, tighten to one/two ticks beyond the entry bar; if the entry bar is a doji, keep the original wider stop since a doji is a one-bar trading range.", "quote": "The initial price action stop for most trades is one tick beyond the signal bar until the entry bar closes, when it is tightened to one or two ticks beyond the entry bar if the entry bar is strong. If the entry bar is a doji, then rely on your original stop.", "pages": "203", "book": "Trading Ranges"}, {"id": "l_management_47", "theme": "management", "teaching": "In a strong trend, trail the protective stop to just below (bull) or above (bear) the most recent swing low/high once the market makes a new swing extreme; once the market looks like it's entering a trading range, stop trailing and take profits instead, since pullbacks will start breaking prior swing points.", "quote": "In a strong bull trend, traders often trail their protective stops to below the most recent swing low just after the market makes a new swing high. Once the market looks like it will enter a trading range, traders should take some profits.", "pages": "202, 206", "book": "Trading Ranges"}, {"id": "l_management_48", "theme": "management", "teaching": "If the market forces you to endure an N-tick adverse move before turning in your favor, the market will typically reward you with roughly N ticks of profit — use the observed max drawdown to set both the trailing stop and a realistic profit target.", "quote": "As a general rule, the market will rally enough to equal the size of the stop that it required you to have to stay in the trade... The market often rewards traders with as many ticks of profit as it forces them to risk.", "pages": "203, 206-207", "book": "Trading Ranges"}, {"id": "l_management_49", "theme": "management", "teaching": "When bars are unusually large, switch to a proportional money-management stop (e.g., about 60-70% of the signal bar's height, near the 62% Fibonacci retracement) rather than a full price-action stop, and reduce position size to keep dollar risk constant.", "quote": "If the bars at the time of entry into any trade are too large, it is wiser to use a money management stop, like eight ticks on the Emini 5 minute chart, or about a 70 percent pullback...The size of the money management stop is in proportion to the size of the bars.", "pages": "203", "book": "Trading Ranges"}, {"id": "l_management_50", "theme": "management", "teaching": "Reversing on a stop-out can be a good strategy when the context supports a genuine reversal (e.g., failed low 2), but a stop run inside a tight trading range is not a reversal signal — read context before flipping direction.", "quote": "When a protective stop is hit before making a scalper's profit, you were trapped into a bad trade, so reversing on the stop is occasionally a good strategy. This depends on the context...However, a stop run in a tight trading range is not a reversal.", "pages": "203", "book": "Trading Ranges"}, {"id": "l_management_51", "theme": "management", "teaching": "Pay close attention to the maximum adverse excursion (stop size needed) on the first trade of the day — it often becomes the appropriate stop size to use for the rest of the day, and if it's larger than usual you can also widen profit targets proportionally.", "quote": "pay close attention to the maximum size stop required in the first hour, because this often becomes the best stop to use for the rest of the day.", "pages": "203, 207-208", "book": "Trading Ranges"}, {"id": "l_management_52", "theme": "management", "teaching": "Entering late into a large trend-bar spike theoretically requires a very distant stop (below the whole spike); most traders instead scalp with a smaller position/stop, planning to re-enter a swing position on the pullback with a tighter stop.", "quote": "The theoretical stop for all of their entries is below the bottom of the spike, which is far away...most traders would consider scalping a larger position and using a smaller stop when they enter late in the spike.", "pages": "203-204", "book": "Trading Ranges"}, {"id": "l_management_53", "theme": "management", "teaching": "When taking a 5-minute-chart entry, manage the stop based on the 5-minute chart, not a lower timeframe — relying on a 1-minute chart to tighten stops causes excessive premature stop-outs.", "quote": "Rely on your stop and ignore the 1 minute chart. When taking a 5 minute entry, rely on a 5 minute stop, else you will lose too often.", "pages": "205", "book": "Trading Ranges"}, {"id": "l_management_54", "theme": "management", "teaching": "In a strong trend, take partial profits (e.g., half) once price has moved roughly 2x the initial stop distance, then trail the stop and scale out further portions at 3x, letting a small remainder run to a strong reversal signal or the close.", "quote": "If you believe that the trend is strong, it is reasonable to take about half of your position off after the market has gone your way for a distance equal to about twice the size of your original protective stop.", "pages": "210", "book": "Trading Ranges"}, {"id": "l_management_55", "theme": "management", "teaching": "A profit target is the flip side of a protective stop: it should be an actual working limit order that locks in gains while the trader's equation is still favorable, rather than something held only in your head and given back.", "quote": "Remember, a profit target is the flip side of a protective stop and is there to protect you from yourself...it is also better to use a profit-taking limit order that is always in the market.", "pages": "210", "book": "Trading Ranges"}, {"id": "l_management_56", "theme": "management", "teaching": "The least risky form of \"scaling in\" is really just taking a fresh independent signal while an existing position is still open and still valid — treat each entry as its own trade with its own stop/target rather than a true averaged position; complexity beyond 2-3 entries becomes unmanageable for most traders.", "quote": "If traders are determined to try to scale into a trade, the least risky approach is to take a second entry if one appears while they are still in their trade and if their premise remains valid...at some point their position becomes too complicated to be worth the effort.", "pages": "213-214", "book": "Trading Ranges"}, {"id": "l_management_57", "theme": "management", "teaching": "Scalp trade management differs fundamentally from swing management: scalps assume limited profit potential (no trend, or trading against trend) and use OCO stop/target brackets; countertrend scalping should be reserved for only the most experienced traders.", "quote": "Scalping in a trading range can be a profitable strategy, but only the most experienced traders should consider trading against the trend.", "pages": "209", "book": "Trading Ranges"}, {"id": "l_management_58", "theme": "management", "teaching": "On trades with strong follow-through potential, take partial profits at a target, move the stop to breakeven, and let a runner ride — some weekly trades run 4x or more the initial target before a reverse setup appears.", "quote": "Move your stop to breakeven and then let the remainder run. You will likely have at least a couple of trades each week that run to four or more times your initial target", "pages": "6", "book": "Reading Price Charts"}, {"id": "l_management_59", "theme": "management", "teaching": "Wait for the entry bar (and signal bar) to fully close before acting — entering early risks being caught by a last-second reversal; conversely, moving a stop up based on an unclosed bar can get you stopped out right before the market reverses in your favor. Discipline means trusting the initial stop and plan until the relevant bar closes.", "quote": "Good entry, good plan, bad discipline. You just let yourself get trapped out of a good trade.", "pages": "69", "book": "Reading Price Charts"}, {"id": "l_management_60", "theme": "management", "teaching": "Watch the strength of the close of the entry bar and the following bars: a strengthening close (bigger body into the close) argues for holding more contracts/points; weak closes argue for scaling out sooner.", "quote": "If there are strong closes, you should be more willing to swing more contracts and hold them for more points than if these bars had weak closes.", "pages": "69-70", "book": "Reading Price Charts"}, {"id": "l_management_61", "theme": "management", "teaching": "In a very strong trend all trades should be With Trend swings (scalping part off); Countertrend scalps should not be taken at all no matter how tempting.", "quote": "In a very strong trend, all trades should be With Trend swings (scalping out part), and no trades should be Countertrend scalps, as tempting as they are.", "pages": "82, 108", "book": "Reading Price Charts"}, {"id": "l_management_62", "theme": "management", "teaching": "In strong/choppy trends with small bars, a fixed-size money stop (e.g., a two-point stop on the Emini) can work better than a price-action-based stop, which gets hit too often by noise.", "quote": "None of these pullbacks in Figure 3.6 would have hit a two-point money stop, which is usually the best stop to use in a strong trend, unless the average daily range is more than about 15 points.", "pages": "109-110", "book": "Reading Price Charts"}, {"id": "l_management_63", "theme": "management", "teaching": "In a runaway trend, prefer the 3-minute chart over the 1-minute chart for extra With Trend entries — the 1-minute has too many mixed Countertrend setups and reading speed demands that add stress and hurt execution; stick to 3- or 5-minute charts.", "quote": "Since you need to be making sure that you catch every With Trend entry, it is best to trade only off the 3- or 5-minute charts in a runaway trend.", "pages": "77-78, 103-104", "book": "Reading Price Charts"}, {"id": "l_management_64", "theme": "management", "teaching": "If you find you missed a With Trend entry, stop hunting for Countertrend scalps and refocus entirely on With Trend setups — missed entries are a signal to re-anchor on the dominant trend, not chase alternatives.", "quote": "If you find that you missed a With Trend entry, stop looking for Countertrend scalps and start trading only With Trend setups.", "pages": "79", "book": "Reading Price Charts"}, {"id": "l_management_65", "theme": "management", "teaching": "During a suspected Failed Final Flag (sideways bars after a protracted trend), it's fine to take a setup near the flag's edge in the trend direction, but avoid chasing a breakout of the far edge — the opposite side may be willing to fade a new extreme (bear trap / bull trap risk).", "quote": "be careful buying a breakout of the high of the trading range because bears might be willing to sell a new high and bulls might be beginning to take profits at the high.", "pages": "128", "book": "Reading Price Charts"}, {"id": "l_management_66", "theme": "management", "teaching": "On a '2 Hour Mode' (2HM) day, once you recognize price has stayed off the EMA for 2+ hours, mentally prepare to fade all EMA touches with-trend, but wait for an actual price-action setup rather than blindly fading contact.", "quote": "Once you become aware that a 2HM is present, look to fade all touches of the EMA, but wait for a setup off the EMA, and enter on a stop.", "pages": "136", "book": "Reading Price Charts"}, {"id": "l_management_67", "theme": "management", "teaching": "When trading countertrend (against the prevailing trend), scalp most or all of the position unless the reversal shows exceptional strength.", "quote": "When trading countertrend, you should scalp most or all of your position unless the reversal is strong.", "pages": "146", "book": "Reading Price Charts"}, {"id": "l_management_68", "theme": "management", "teaching": "After a big bar, always look to fade small bars that follow it rather than trading in the big bar's direction, since a trading range is likely forming.", "quote": "always look to fade small bars that occur after big bars, since a trading range is likely forming and you should only be selling near the high or buying near low.", "pages": "180", "book": "Reading Price Charts"}, {"id": "l_management_69", "theme": "management", "teaching": "When you miss the earliest entry of a strong breakout, wait for at least two strong trend bars (or 3-4 moderate ones), then enter a 1- or 3-min pullback using half/swing size, using the same stop you'd have used entering earlier; scalp half and move stop to breakeven, then add on subsequent pullbacks.", "quote": "It is best to wait for at least two strong trend bars...or three or four moderate-size trend bars, and enter the 1- or 3-minute pullback using half of your normal size...Scalp out half, and then move your stop to breakeven.", "pages": "182", "book": "Reading Price Charts"}, {"id": "l_management_70", "theme": "management", "teaching": "Breakeven stops are not necessarily exact — they should be set based on the instrument's typical stop-running behavior (some stocks/instruments consistently run a few cents/ticks past breakeven before reversing; know your instrument's tendency).", "quote": "GS, on the other hand, routinely runs the stops before the pullback ends, so a trader would have to be willing to risk a little if he is trying to hold on to his position.", "pages": "185-188", "book": "Reading Price Charts"}, {"id": "l_management_71", "theme": "management", "teaching": "The more momentum/strength signs present in a reversal's first leg, the more reliable the reversal — ideally many bars, breaking well beyond the EMA, mostly trend bars in the new direction, extending beyond swing points of the prior trend.", "quote": "The more signs of strength, the more reliable is the reversal. Ideally, the first leg of the reversal will extend for many bars, break well beyond the EMA, have the majority of the bars be trend bars in the direction of the new trend...", "pages": "205-206", "book": "Reading Price Charts"}, {"id": "l_management_72", "theme": "management", "teaching": "When two legs are expected/likely in a move, always swing part of the position rather than taking a full scalp exit, because sometimes what looks like a two-legged pullback turns into a protracted new trend.", "quote": "Always swing part of your position when two legs are likely because sometimes there will be a protracted new trend rather than just a two-legged pullback.", "pages": "222-223", "book": "Reading Price Charts"}, {"id": "l_management_73", "theme": "management", "teaching": "When the extreme of a signal/entry bar is tested but the protective-stop level is not exceeded, the trade will often be profitable; if just missed by one tick on a long, it effectively forms a Double Bottom Bull Flag with the entry/signal bar low as the first bottom.", "quote": "If the extreme of the bar is tested but not exceeded, the stops are tested but not hit, and the trade will often be profitable.", "pages": "226", "book": "Reading Price Charts"}, {"id": "l_management_74", "theme": "management", "teaching": "Beginners should restrict countertrend fade entries to setups where the signal bar closes strongly in the fade direction — waiting for a strong opposite-close reversal bar improves odds materially.", "quote": "It is far more reliable if you wait for a signal bar with a strong bear close and beginners should restrict themselves to this type of fade setup.", "pages": "230", "book": "Reading Price Charts"}, {"id": "l_management_75", "theme": "management", "teaching": "On a clear Trend-from-the-Open day, restrict yourself to With-Trend setups (e.g., M2S or simple Low 2/High 2) only — this keeps win rate high and preserves psychological stamina/focus for taking entries.", "quote": "On a clear Bear Trend from the Open day, the best approach is to only trade With Trend and look to sell M2S setups or simple Low 2s. Your winning percentage will be high, allowing you to have a healthy attitude and continue to take entries.", "pages": "254,280", "book": "Reading Price Charts"}, {"id": "l_management_76", "theme": "management", "teaching": "When a stock/instrument consistently just misses its usual scalp profit target on two attempts, reduce the profit target for the current session (e.g., from $1 to 50 cents) rather than continuing to fight for the old target.", "quote": "With the market largely sideways and just missing a one-dollar scalp, a trader would likely reduce his profit target to about 50 cents.", "pages": "282", "book": "Reading Price Charts"}, {"id": "l_management_77", "theme": "management", "teaching": "Always swing at least part of a position with a breakeven stop because a move can run much farther than seems reasonable, especially around reports and on emotional days.", "quote": "In general, always swing part of the position with a breakeven stop because sometimes a swing will go much farther than you could ever imagine.", "pages": "289", "book": "Reading Price Charts"}, {"id": "l_management_78", "theme": "management", "teaching": "Neither pure scalping nor pure swing trading is superior; both yield roughly the same profit over time, and traders should pick the style that suits their personality (e.g., scalp Eminis, swing stocks).", "quote": "Neither way is superior and traders choose the method that best suits their personalities and both yield about the same profit.", "pages": "297", "book": "Reading Price Charts"}, {"id": "l_management_79", "theme": "management", "teaching": "If your limit profit-target order gets filled at the exact extreme without the market trading through it, that signals unusual trend pressure and the market is likely to continue beyond the target — look to re-enter on any pullback.", "quote": "If you were long and the market was willing to buy your position back from you...at the very highest tick of the leg, the buyers are aggressive and will likely reemerge on any pullback. Look for opportunities to get long again.", "pages": "299", "book": "Reading Price Charts"}, {"id": "l_management_80", "theme": "management", "teaching": "Initial protective stop is one tick beyond the signal bar; once the entry bar closes, tighten to one/two ticks beyond the entry bar. If bars are too large, use a fixed price/money stop (e.g., 8 ticks on the Emini) or ~60% of the signal bar's height as an alternative.", "quote": "The initial stop is one tick beyond the signal bar until the entry bar closes when it is tightened to one or two ticks beyond the entry bar. If the bars are too large, it is wiser to use a price stop, like eight ticks on the Emini 5-minute chart, or a 60 percent pullback.", "pages": "307", "book": "Reading Price Charts"}, {"id": "l_management_81", "theme": "management", "teaching": "Size the position inversely to bar size/stop size to keep dollar risk constant (e.g., reduce size 75% for an 8-point stop day so a 4-point target is still tradable at similar or better daily P&L).", "quote": "You need to reduce your position size by 75 percent to keep your risk the same, but if you follow basic price action principles, you could make the same or even more than on a typical day.", "pages": "307-308", "book": "Reading Price Charts"}, {"id": "l_management_82", "theme": "management", "teaching": "On uncertain-range days, trade one contract for the first trade or two to discover the stop size actually needed, then calibrate size/target for the rest of the day (and revert if volatility contracts again).", "quote": "If you are uncertain if today will be a huge range day and will require large stops, trade just one contract for the first one or two trades and see how large a stop would have been needed to keep you in the trade.", "pages": "308", "book": "Reading Price Charts"}, {"id": "l_management_83", "theme": "management", "teaching": "As a rule of thumb, the market tends to rally/fall roughly as far beyond entry as the size of the stop that was required to stay in the trade (e.g., an 11-tick required stop implies roughly a 12-tick move in your favor).", "quote": "AB a general rule, the market will rally enough to equal the size of the stop that it required you to have to stay in the trade.", "pages": "309", "book": "Reading Price Charts"}, {"id": "l_management_84", "theme": "management", "teaching": "When an entry bar is a doji, it's usually safe to allow a one-tick pullback beyond it before worrying, since a doji is a one-bar trading range and buying/covering back into it makes little sense.", "quote": "Also, when the entry bar is a doji, it is usually safe to allow a one tick pullback. A doji bar is a one bar trading range and it is foolish to buy above a trading range, so don't buy back your short there.", "pages": "310", "book": "Reading Price Charts"}, {"id": "l_management_85", "theme": "management", "teaching": "Manage stops on the timeframe you entered on — rely on a 5-minute stop for a 5-minute entry even if a lower timeframe shows the trade testing your stop, or you'll be stopped out of many otherwise-good trades.", "quote": "When taking a 5-minute entry, rely on a 5-minute stop, else you will lose too often and be stopped out of a great many trades in your attempt to risk less per trade.", "pages": "311", "book": "Reading Price Charts"}, {"id": "l_management_86", "theme": "management", "teaching": "The largest stop that would have been needed to hold a trade in the first hour is usually a good stop to use for the rest of the day.", "quote": "pay close attention to the maximum size stop required in the first hour because this often becomes the best stop to use for the rest of the day.", "pages": "308, 316 (Figure 10.21 caption)", "book": "Reading Price Cha

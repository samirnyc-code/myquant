      - data/vix_daily.parquet
      - data/VIX_History.csv
      - data/spx_daily.csv
      - data/spx_daily.parquet
      - data/ES_stoch_daily.csv
    produced_by: "TODO — grep confirms consumers (options_app.py, mr_bps_regime_wf.py); find writer"
    update_cadence: daily
    expected_freshness_days: 5
    count_rows: false
    useful_for: "Daily VIX + SPX/ES reference series for regime/basis context (consumed by options_app.py, mr_bps_regime_wf.py)."
    access: "pd.read_csv('data/vix_daily.csv'); pd.read_csv('data/spx_daily.csv')"
    gotchas: "Loose top-level files (csv + parquet twins). VIX_History.csv is the raw CBOE download; vix_daily.* is the derived series. ⚠ writer not yet pinned down (produced_by = TODO)."

  - key: signals
    title: "NinjaTrader signal exports (MyReversals / MyMicroChannel)"
    category: Misc
    paths:
      - data/signals
    produced_by: "scripts/ama_export_signals_nt.py / qs_export_signals_nt.py"
    update_cadence: manual
    expected_freshness_days: 999
    count_rows: false
    useful_for: "CURRENT (user-confirmed) — exported NT8 indicator signals (MyReversals, MyMicroChannel) used for overlap studies. Keep."
    access: "pd.read_csv('data/signals/<export>.txt', sep=';')"
    gotchas: "Filenames carry contract+timeframe+as-of+lookback (e.g. 'ES SEP26 5 Minute … 1850 Days'). Regenerate via ama_export_signals_nt.py / qs_export_signals_nt.py when a fresh NT8 export is available."

  - key: briefs
    title: "Morning / daily briefs"
    category: Misc
    paths:
      - data/briefs
    produced_by: "scripts/nq_daily_brief.py / build_morning_report.py"
    update_cadence: on-demand
    expected_freshness_days: 999
    count_rows: false
    useful_for: "Generated morning/daily brief artifacts (nq_daily_brief.py / build_morning_report.py)."
    access: "browse the dir"
    gotchas: "Ephemeral output, not a source dataset. NOT currently scheduled (last run 6d+ ago) — that's expected, not a failure. Regenerate on demand, or ask to wire a daily task if you want the morning brief running automatically again."

  - key: misc_cache
    title: "Assorted caches / scratch (cache, raw, leg_labels)"
    category: Misc
    paths:
      - data/cache
      - data/raw
      - data/leg_labels
    produced_by: "various"
    update_cadence: manual
    expected_freshness_days: 999
    count_rows: false
    useful_for: "Transient caches / staging (cache/, raw/, leg_labels/); safe to ignore for analysis."
    access: "n/a"
    gotchas: "May be empty/stale; candidates for cleanup. Grouped here so they show up in the footprint rather than hiding."

  - key: databento_mbo
    title: "Databento ES MBO (24h order-by-order tick tape)"
    category: Ticks
    paths:
      - data/databento
    produced_by: "scratchpad/dbn_perfile.py (Databento batch, file-by-file to dodge the whole-zip 504)"
    update_cadence: on-demand
    expected_freshness_days: 999
    count_rows: false
    useful_for: "Databento ES MBO (market-by-order) — the FULL 24-hour order-by-order tape (every add/mod/cancel), the deep L3 source ticks_continuous (RTH-only trades) lacks. Feeds overnight-aware studies and true order-book reconstruction."
    access: "per-session glbx-mdp3-YYYYMMDD.mbo.dbn.zst under GLBX-*/; decode with the databento python lib (DBNStore)"
    gotchas: "~39GB. Q1 2026 (Jan 1-Mar 31) COMPLETE; Apr 1-Jul 20 2026 PARTIAL (batch.download 504'd mid-zip -- needs file-by-file). GITIGNORED (never commit the flat files). +6 months L3 arriving next -- catalog before it lands."

  - key: depth_l2
    title: "ES Level-2 market depth (DOM recordings)"
    category: Order flow
    paths:
      - data/depth
    produced_by: "nt8/addons/MarketDepthRecorderAddOn.cs (+ MarketDepthRecorder.cs strategy) -- NT8 live L2 recorder"
    update_cadence: daily
    expected_freshness_days: 4
    count_rows: false
    useful_for: "ES order-book depth (DOM) snapshots per session -- raw material for absorption / liquidity / iceberg studies. NT keeps no deep DOM history, so this is the only L2 we have going forward."
    access: "pd.read_parquet('data/depth/ES_09-26_depth_2026-07-21.parquet')"
    gotchas: "Per-session parquet+csv (ES_09-26_depth_YYYY-MM-DD). addon_test/ = the AddOn recorder run in PARALLEL with the strategy for shadow validation (output byte-identical). WARN: 55-min gap 2026-07-20 22:28-23:23 CT (an NT restart dialog blocked the recorder). Live-record only -- no backfill exists."

  - key: footprint
    title: "ES footprint / volume-bar reconstruction (free MzPack)"
    category: Order flow
    paths:
      - data/footprint
    produced_by: "nt8 FootprintExporter (from NT ticks) + scripts/footprint_metrics.py / flowlab_*.py"
    update_cadence: on-demand
    expected_freshness_days: 999
    count_rows: false
    useful_for: "ES footprint (bid x ask traded volume per price per bar) reconstructed FREE from NT ticks -- MzPack-equivalent. Two files per run: _bars_ (OHLCV) + _footprint_ (per-price bid/ask ladder)."
    access: "pd.read_csv('data/footprint/ES_09-26_6500V_footprint_20260721_231756.csv')"
    gotchas: "6500V = 6500-contract volume bars. VALIDATED exact vs MzPack (0 delta error) -- only their tuned absorption LABELS are proprietary, the numbers are ours. Timestamped per export (multiple runs/day)."

  - key: discord_intel
    title: "Discord trader-intel scrape (setups / nuggets / corpora)"
    category: Intel
    paths:
      - data/discord
    produced_by: "scripts/discord_scrape.py + discord_intel (hourly incremental; channels in config.json)"
    update_cadence: hourly
    expected_freshness_days: 1
    count_rows: false
    useful_for: "Scraped trader-Discord intel: setups, nuggets, links and per-trader corpora, rolled into report.html. Context source for marks and research."
    access: "open('data/discord/report.html'); structured extracts under data/discord/parsed/"
    gotchas: "config.json holds channel/server IDs (gitignored). ~33 channels / 83k msgs / 1550 setups / 2975 nuggets / 19973 links. *_corpus.txt + *_profile.md = per-trader dossiers. Incremental -- gaps if the scraper is down."

  - key: annotations
    title: "Chart annotations -- user marks / R:R / divergence"
    category: Options desk
    paths:
      - data/annotations
    produced_by: "scripts/mark_setups.py / mark_rr.py / mark_divergence.py (user-driven)"
    update_cadence: manual
    expected_freshness_days: 999
    count_rows: false
    useful_for: "Hand-authored chart annotations -- setup marks, R:R marks, CVD-divergence marks + raw drawings.json. The curated ground-truth label set for setup studies."
    access: "pd.read_csv('data/annotations/marks.csv')"
    gotchas: "marks.csv = master; marks_rr.* = R:R-tagged; divergence_marks.csv = CVD-divergence; drawings.json = raw NT drawings. Backups timestamped (marks_backup_*). Hand-curated ground truth -- never overwrite programmatically."
